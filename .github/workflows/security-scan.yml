name: security-scan

# Security-Scans über alle Sub-Layer:
#   - gitleaks: secret-scan over the full committed history (backstop to the
#               lefthook pre-commit hook, which is staged-only + --no-verify-bypassable)
#   - trivy:    Vulnerability-Scan der referenzierten Container-Images + Helm-Charts
#   - conftest: Rego-Policies gegen rendered Manifeste (policies/)
#
# Snyk ist bewusst NICHT hier — die saubere Variante (`env:` zur Token-Detection
# + Job-Level `if:`) ist von GHA nicht erlaubt, weil `env`-Context im Job-`if:`
# nicht resolvt. Reaktivieren wenn SNYK_TOKEN als Repo-Secret existiert; dann
# als eigener Workflow mit Schedule-Trigger + sauberer Token-Prüfung im Step.
#
# CI-Konvention (siehe AGENTS.md): jeder Step ruft NUR task <name>, kein Inline.
# Lokal reproduzierbar via `task scan` in der Devbox-Shell.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"  # Montags 04:00 UTC

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks (secret-scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4
        with:
          # fetch-depth: 0 is load-bearing for BOTH gitleaks paths: the full all-refs
          # sweep (schedule) AND resolving GITLEAKS_SCAN_RANGE's base/head endpoints
          # (pull_request/push). Narrowing it would silently degrade the scoped scan to
          # a full-scan fallback over a shallow clone — do not reduce. (apps#340)
          fetch-depth: 0

      - name: Devbox setup
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          enable-cache: true

      - name: gitleaks secret-scan (backstop to the lefthook pre-commit hook)
        # Scope the scan to the event's commit range so an unrelated in-flight branch's
        # finding cannot fail this run (apps#340). pull_request → base..head, push →
        # before..after, schedule → unset → full all-refs sweep. `task scan:secrets`
        # validates the range and falls back to a full scan if it does not resolve.
        env:
          GITLEAKS_SCAN_RANGE: ${{ github.event_name == 'pull_request' && format('{0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || github.event_name == 'push' && format('{0}..{1}', github.event.before, github.sha) || '' }}
        run: devbox run -- task scan:secrets

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4

      - name: Devbox setup
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          enable-cache: true

      - name: Render all sub-layers
        run: devbox run -- task render

      - name: Trivy scan rendered manifests
        run: devbox run -- task scan:trivy

      # Trivy-SARIF in den Security-Tab uploaden — nur auf public Repos.
      # Code-Scanning / SARIF-Upload braucht bei PRIVATEN Repos GitHub Advanced
      # Security (kostenpflichtig); ohne GHAS antwortet der Upload mit
      # "Resource not accessible by integration". Solange das Repo private ist,
      # bleiben die Trivy-Findings im Job-Log sichtbar, aber ohne Security-Tab-Upload.
      # Sobald das Repo public wird, läuft der Upload automatisch.
      - name: Upload SARIF
        if: github.event_name != 'pull_request' && github.event.repository.private == false
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: trivy-results.sarif

  conftest:
    name: conftest (Rego-Policies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4

      - name: Devbox setup
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          enable-cache: true

      - name: Render all sub-layers
        run: devbox run -- task render

      - name: Conftest test
        run: devbox run -- task scan:conftest

      - name: Conftest verify (Policy-Selbsttests)
        run: devbox run -- task scan:conftest-verify
