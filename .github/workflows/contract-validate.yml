name: contract-validate

# Customization-contract self-consistency (ADR-0024 v2, Layer 1).
#
# DELIBERATELY separate from oci-publish.yml/`task ci`: the contract is rolled
# out per component. A dedicated job does NOT couple unfinished components to the
# render/lint pipeline — it only validates components that already carry a
# customization.yaml (task validate:contract reports the rest without failing).
#
# Runs on EVERY PR to main — intentionally NOT path-filtered. This job is a
# REQUIRED status check (branch protection on main: required_status_checks =
# [ci, validate-contract]). A path-filtered required check never reports on a PR
# that touches none of the filtered paths, so GitHub blocks that PR forever
# waiting for a status that never arrives (e.g. .claude/- or docs-only PRs). The
# job is a trivial green no-op when no customization.yaml changed — it validates
# the existing contracts and reports the rest without failing — so always running
# adds one cheap check, never a coupling to unfinished components.
#
# Convention (AGENTS.md § CI-Konventionen): pipeline = thin task caller.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4

      - name: Devbox setup
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          enable-cache: true

      - name: Validate customization contract
        run: devbox run -- task validate:contract
