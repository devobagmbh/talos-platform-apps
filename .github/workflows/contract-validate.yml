name: contract-validate

# Customization-contract self-consistency (ADR-0024 v2, Layer 1).
#
# DELIBERATELY separate from oci-publish.yml/`task ci`: the contract is rolled
# out per component. A dedicated job does NOT couple unfinished components to the
# render/lint pipeline — it only validates components that already carry a
# customization.yaml (task validate:contract reports the rest without failing).
# Runs only when contracts, the schema, or rendered manifests change.
#
# Convention (AGENTS.md § CI-Konventionen): pipeline = thin task caller.

on:
  pull_request:
    branches: [main]
    paths:
      - 'sub-layers/*/components/*/customization.yaml'
      - 'sub-layers/*/components/*/rendered/manifest.yaml'
      - 'schemas/customization.schema.json'
      - 'Taskfile.yml'
      - '.github/workflows/contract-validate.yml'

permissions:
  contents: read

jobs:
  validate-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4

      - name: Devbox setup
        uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: true

      - name: Validate customization contract
        run: devbox run -- task validate:contract
