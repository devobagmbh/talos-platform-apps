name: oci-publish

# Render + Lint + Scan auf PR; render + push + sign auf Tag-Push.
#
# Tag-Pattern: <sub-layer>/<component>-vX.Y.Z
#   z. B. lifecycle/crossplane-v0.1.0, observability/loki-v0.3.1
# Komponente ist die OCI-Distribution-Unit (ADR-0009); Sub-Layer ist die
# organisatorische Klammer. Der Workflow extrahiert beide aus dem Tag und
# publiziert genau diese eine Komponente als signiertes OCI-Artefakt.
#
# Konvention (AGENTS.md § CI-Konventionen):
#   1. Devbox-Cache aktiv (jetify-com/devbox-install-action)
#   2. Lokal reproduzierbar via `task ci` und `task publish -- <sub-layer>/<component> <tag>`
#   3. Pipeline = dünner Task-Caller — Steps rufen ausschließlich `task <name>`

on:
  pull_request:
    branches: [main]
  push:
    tags:
      # One pattern per sub-layer (AGENTS.md taxonomy). The capability-driven
      # sub-layers (compute/identity/network/security/storage-block) are listed
      # too so a `<sub-layer>/<component>-vX.Y.Z` tag triggers publish the moment
      # the sub-layer exists — patterns for not-yet-created dirs are harmless.
      - 'automation/*-v*'
      - 'compute/*-v*'
      - 'databases/*-v*'
      - 'identity/*-v*'
      - 'lifecycle/*-v*'
      - 'observability/*-v*'
      - 'network/*-v*'
      - 'registry/*-v*'
      - 'secrets/*-v*'
      - 'security/*-v*'
      - 'storage-block/*-v*'
      - 'storage-objects/*-v*'

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------
  # PR-Trigger: nur Lint + Render + Conftest. Kein Push, kein Sign.
  # --------------------------------------------------------------------
  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # PR CI may cancel a superseded run on the same PR ref (resource hygiene).
    concurrency:
      group: oci-publish-ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4
        with:
          # fetch-depth: 0 so all git tags are present: `task ci` → validate:release-config
          # guard E asserts every released (tagged) component is in the manifest, and a
          # tag-less shallow checkout would blind it (it fails loud rather than vacuously). #318
          fetch-depth: 0

      - name: Devbox setup
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          enable-cache: true

      - name: Lokale CI-Pipeline reproduzieren
        run: devbox run -- task ci

  # --------------------------------------------------------------------
  # Tag-Push: render + push + sign für den getaggten Sub-Layer.
  # --------------------------------------------------------------------
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Serialize publishes of the SAME tag ref; NEVER cancel a mid-flight publish — a
    # cancelled run can leave a pushed-but-unsigned (or unverified) OCI artifact.
    concurrency:
      group: oci-publish-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write   # GHCR push
      id-token: write   # cosign keyless OIDC
    steps:
      # No fetch-depth: 0 here — the publish job runs `task ci:artifact`, which does NOT
      # include the release-coverage guard (validate:release-config / guard E), so it does
      # not need the full tag set. Tags would only matter for guard E, which is a PR-gate
      # concern, not a per-publish one (#318 review).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4

      - name: Devbox setup
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          enable-cache: true

      - name: Komponenten-ID und Tag aus refs/tags ableiten
        id: parse
        shell: bash
        run: |
          set -eu
          # tag ist z. B. "lifecycle/crossplane-v0.1.0"
          full="${GITHUB_REF_NAME}"
          # Komponenten-ID = alles vor dem letzten "-v" (z. B. "lifecycle/crossplane")
          component_id="${full%-v*}"
          # Version-Tag = "v" + Rest (z. B. "v0.1.0")
          version="v${full##*-v}"
          # Both parsed fields flow verbatim into the signed `task publish`/`task
          # verify` steps, so validate BOTH here — independently of git's ref-name
          # grammar — before anything is written to GITHUB_OUTPUT or pushed/signed.
          #
          # 1) component_id: a "<sub-layer>/<component>" identifier in the catalog
          #    charset, then it MUST resolve to a real component dir. The shape check
          #    also blocks shell metacharacters and path traversal; the dir check
          #    catches a malformed tag (or a name that breaks the -v split) before
          #    render/push/sign acts on the wrong path.
          if [[ ! "$component_id" =~ ^[a-z0-9-]+/[a-z0-9-]+$ ]]; then
            echo "::error::component_id '$component_id' (from tag '$full') is not a '<sub-layer>/<component>' identifier" >&2
            exit 1
          fi
          dir="sub-layers/${component_id%/*}/components/${component_id##*/}"
          if [ ! -d "$dir" ]; then
            echo "::error::component_id '$component_id' does not resolve to a component dir ($dir; expected '<sub-layer>/<component>')" >&2
            exit 1
          fi
          # 2) version: a strict vMAJOR.MINOR.PATCH[-prerelease] SemVer. The accepted
          #    set is a SUBSET of the OCI tag grammar — build metadata ("+...") is
          #    rejected because "+" is illegal in an OCI tag, so a version that passes
          #    here cannot fail mid-publish at helm push / cosign sign. This also
          #    rejects an empty/garbage version (e.g. a trailing-"-v" tag → "v") and
          #    any shell metacharacter.
          if [[ ! "$version" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version '$version' (from tag '$full') is not a valid vMAJOR.MINOR.PATCH SemVer tag" >&2
            exit 1
          fi
          echo "component_id=$component_id" >> "$GITHUB_OUTPUT"
          echo "version=$version"           >> "$GITHUB_OUTPUT"
          echo "Tag '$full' → component_id='$component_id', version='$version'"

      - name: "Lokale CI-Pipeline (artifact validation: lint + render + crd-split + conftest)"
        # ci:artifact, NOT full ci — the publish job validates the artifact it is about to
        # sign; the catalog-wide release-coverage gates run at the PR gate, not per-publish (#318).
        run: devbox run -- task ci:artifact

      - name: helm + cosign gegen GHCR authentifizieren
        run: |
          # helm schreibt in ~/.config/helm/registry, cosign liest
          # ~/.docker/config.json — beide Logins nötig, sonst scheitert
          # cosign sign mit "UNAUTHORIZED" beim Pull-Scope des Artefakts.
          echo "${{ secrets.GITHUB_TOKEN }}" | devbox run -- helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | devbox run -- cosign login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: task publish (render + push + sign keyless)
        run: |
          devbox run -- task publish -- \
            "${{ steps.parse.outputs.component_id }}" \
            "${{ steps.parse.outputs.version }}"

      - name: Verifikation (cosign verify)
        run: |
          devbox run -- task verify -- \
            "${{ steps.parse.outputs.component_id }}" \
            "${{ steps.parse.outputs.version }}"
