name: issue-triage

# Auto-labeling of new issues based on their body:
# - Sub-layer dropdown in the issue template sets the matching `area:*` label
# - Pipeline-stage dropdown additionally sets `area:gitops` or similar
# - If no heuristic matches, `needs:triage` is applied — maintainer trigger.

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const existing = (context.payload.issue.labels || []).map(l => l.name);

            const labelsToAdd = [];

            // Sub-layer dropdown — from the bug_report/feature_request template.
            // Format: "### Affected sub-layer\n\n<value>"
            const subLayerMatch = body.match(/###\s*Affected sub-layer.*?\n+\s*(\S[^\n]*)/i);
            if (subLayerMatch) {
              const value = subLayerMatch[1].trim().toLowerCase();
              const subLayerToLabel = {
                "automation": "area:automation",
                "databases": "area:database",
                "dns": "area:dns",
                "lifecycle": "area:lifecycle",
                "observability": "area:observability",
                "registry": "area:registry",
                "secrets": "area:secrets",
                "storage-objects": "area:storage",
                "cross-cutting (pipeline / build / tooling)": "area:gitops",
                "new (new sub-layer)": "area:layer-model",
              };
              const label = subLayerToLabel[value];
              if (label && !existing.includes(label)) labelsToAdd.push(label);
            }

            // Pipeline stage (bug_report) — heuristic for CI/tooling relevance
            if (/GHA pipeline|task ci|task render|OCI publish/i.test(body)) {
              if (!existing.includes("area:gitops") && !labelsToAdd.includes("area:gitops")) {
                labelsToAdd.push("area:gitops");
              }
            }

            // Fallback: needs:triage when nothing was detected heuristically
            if (labelsToAdd.length === 0 && existing.length === 0) {
              labelsToAdd.push("needs:triage");
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber, labels: labelsToAdd,
              });
              core.info(`Applied labels: ${labelsToAdd.join(", ")}`);
            } else {
              core.info("No additional labels to apply.");
            }
