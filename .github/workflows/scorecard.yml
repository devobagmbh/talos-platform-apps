name: OpenSSF Scorecard

# Weekly security scorecard run. Measures repo hygiene against
# proven supply-chain security practices. Results land in the
# GitHub security tab as SARIF + with the OSSF Scorecard API.
#
# Note: Scorecard is designed for PUBLIC repos — publish_results
# and the default GITHUB_TOKEN have no access to private repos
# (git fetch responds with "Repository not found"). The job is therefore
# skipped automatically as long as the repo is private and runs
# again as soon as it is made public.

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 1"  # Mondays 01:30 UTC

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.private == false }}
    permissions:
      contents: read  # actions/checkout against the own repo
      security-events: write  # SARIF upload
      id-token: write  # OIDC for publish_results
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          sarif_file: scorecard-results.sarif
