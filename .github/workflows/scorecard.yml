name: OpenSSF Scorecard

# Wöchentlicher Security-Scorecard-Lauf. Misst Repo-Hygiene gegen
# bewährte Supply-Chain-Security-Praktiken. Ergebnisse landen in der
# GitHub-Security-Tab als SARIF + bei der OSSF-Scorecard-API.
#
# Hinweis: Scorecard ist für PUBLIC-Repos ausgelegt — publish_results
# und Default-GITHUB_TOKEN haben auf private Repos keinen Zugriff
# (git fetch antwortet mit "Repository not found"). Der Job wird daher
# automatisch übersprungen solange das Repo private ist und läuft
# wieder los, sobald es public gestellt wird.

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 1"  # Montags 01:30 UTC

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.private == false }}
    permissions:
      contents: read  # actions/checkout gegen das eigene Repo
      security-events: write  # SARIF-Upload
      id-token: write  # OIDC für publish_results
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
