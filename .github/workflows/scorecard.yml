name: OpenSSF Scorecard

# Wöchentlicher Security-Scorecard-Lauf. Misst Repo-Hygiene gegen
# bewährte Supply-Chain-Security-Praktiken. Ergebnisse landen in der
# GitHub-Security-Tab als SARIF + bei der OSSF-Scorecard-API.

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 1"  # Montags 01:30 UTC

permissions: read-all

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4
        with:
          persist-credentials: false

      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: scorecard-results.sarif
