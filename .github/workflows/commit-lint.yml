name: commit-lint

# Server-side PR-gate (G2, issue #464): validate the PR title (Conventional Commit) and
# the whole-PR single-component scope. Under squash-only merges the PR title becomes the
# squash commit subject that release-please parses, and the PR collapses to ONE commit
# touching N components — this is the squash-time enforcement the per-commit
# lint:commit-scope (a local, --no-verify-bypassable lefthook) loses.
#
# Runs on EVERY PR to main — intentionally NOT path-filtered. When this job is added to
# branch-protection required_status_checks (issue #463, a separate step) a path-filtered
# required check would never report on a PR touching none of the filtered paths, so GitHub
# would block that PR forever waiting for a status that never arrives (see contract-validate.yml).
#
# Convention (AGENTS.md § CI-Konventionen): the step calls ONLY `task lint:pr`; all logic
# lives in the Taskfile. The PR title is passed via `env:` (never an inline `${{ }}` splice
# into a run-script argument) so a malicious title stays inert. Locally reproducible:
# `PR_TITLE="<title>" LINT_PR_RANGE="<base>..<head>" task lint:pr`.

on:
  pull_request:
    branches: [main]
    # edited → re-validate when the PR title changes; synchronize → when commits change scope.
    types: [opened, synchronize, reopened, edited]
  # merge_group: this job becomes a required check via #463, so it MUST report on the
  # queue's merge_group head or the PR deadlocks. A merge_group event carries no PR object
  # (hence no PR title), and GitHub's merge queue cannot re-validate PR metadata — so the
  # title/scope check (enforced at PR time) is a deliberate pass-through (same job name).
  # Accepted residual: a title edit made WHILE a PR sits in the queue is not re-checked.
  merge_group:

permissions:
  contents: read

# Only the LATEST run per PR reports. A title edit does not change head.sha, so without this an
# older racing run (from a prior title) could post a stale conclusion for the same
# (check, head_sha) after a newer one finishes — leaving a green while the live title (= the
# squash subject, squash_merge_commit_title=PR_TITLE) is non-Conventional. cancel-in-progress
# makes the newest title/scope the authoritative check.
concurrency:
  # Fall back to run_id on merge_group (no PR number) so a queue run gets its own group
  # instead of collapsing into a constant `commit-lint-` group that cancel-in-progress
  # would thrash (matching pr-needs-review.yml).
  group: commit-lint-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  commit-lint:
    name: commit-lint
    runs-on: ubuntu-latest
    steps:
      - name: merge_group short-circuit (PR title/scope enforced at PR time)
        if: github.event_name == 'merge_group'
        run: 'echo "merge_group: PR title/scope is immutable post-approval — enforced at PR time."'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4
        if: github.event_name == 'pull_request'
        with:
          # fetch-depth: 0 so the three-dot (merge-base) scope diff can reach both the PR
          # base and head commits; a shallow clone would not have the merge-base.
          fetch-depth: 0

      - name: Devbox setup
        if: github.event_name == 'pull_request'
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          enable-cache: true

      - name: Conventional PR title + single-component scope
        if: github.event_name == 'pull_request'
        # Both inputs via env: (value assignment, never a run-script splice) so the untrusted
        # PR title cannot inject. base.sha/head.sha are GitHub-controlled hex SHAs; lint:pr
        # validates them with `git rev-parse --verify` and fails closed if unresolvable.
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          LINT_PR_RANGE: ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
        run: devbox run -- task lint:pr
