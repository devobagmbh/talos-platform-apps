name: release-please

# Automated, per-component release management for the catalog.
#
# On every push to main, release-please maintains one release PR per component
# (path-based commit-split — a commit under sub-layers/<sl>/components/<c>/ bumps
# only that component; the lefthook `lint:commit-scope` gate keeps a commit to one
# component). Merging a release PR cuts the git tag <sub-layer>/<component>-vX.Y.Z
# and a GitHub Release.
#
# The tag is created with a GitHub App installation token (NOT the built-in
# GITHUB_TOKEN), so the `push: tags:` event DOES fire and triggers oci-publish.yml,
# which renders + pushes + signs + verifies the component. The cosign keyless
# signing identity therefore stays oci-publish.yml@refs/tags/... — unchanged for
# `task verify` and for the consumer-side Kyverno policy image-verify-platform-oci.
#
# Why an App token and not GITHUB_TOKEN: tags created with GITHUB_TOKEN do not
# raise workflow events (documented GitHub recursion guard), so oci-publish.yml
# would never run. The App installation token is short-lived (minted per run via
# actions/create-github-app-token) — no long-lived PAT, consistent with
# AGENTS.md § Hard Constraints "Never commit long-lived keys".
#
# ONE-TIME SETUP (org admin): create a GitHub App in `devobagmbh` with repo
# permissions Contents: Read & Write + Pull requests: Read & Write + Issues:
# Read & Write, install it on this repository, then configure:
#   - repo variable  RELEASE_PLEASE_APP_ID          = the App's numeric ID
#   - repo secret     RELEASE_PLEASE_APP_PRIVATE_KEY = the App's PEM private key
# Until RELEASE_PLEASE_APP_ID is set the job is SKIPPED (neutral — see the `if:`
# guard below). Once the variable is set, the private-key secret must also be
# present, or the token step fails. See README § Release automation (release-please).
#
# Rule-3 note (AGENTS.md § CI conventions): this is release MANAGEMENT
# (GitHub-API orchestration via two `uses:` actions, no build steps), exempt per
# the API-orchestration carve-out. The build/publish runs through oci-publish.yml,
# which is the `task` caller.

on:
  push:
    branches: [main]
  # Manual escape hatch for the shared-manifest deadlock. Every per-component
  # release PR edits the same .release-please-manifest.json; a mass release (e.g.
  # after a bulk migration) makes the adjacent JSON lines conflict, so once some
  # siblings merge the rest go DIRTY. `always-update: true` (in
  # release-please-config.json) makes each run recreate every open release PR on
  # the current main HEAD, clearing the textual conflict — so an ordinary
  # push:[main] rebases the stuck PRs instead of leaving them DIRTY. This does NOT
  # make a flood fully autonomous: each rebase-push dismisses the PR's approval
  # (branch-protection dismiss_stale_reviews), so a mass wave still needs O(n)
  # serial re-approvals (release-please does the rebase; the human only
  # re-approves — no git rebuild). This dispatch is the recovery for the one state
  # push:[main] cannot reach: all open release PRs DIRTY with no mergeable PR left
  # to push main. Re-runnable if a large sweep hits the timeout below. See
  # AGENTS.md § Release automation.
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # release-please mutates shared state (release-PR branches, the manifest, tags).
  # Two pushes to main racing two runs can clobber a release PR or the manifest, so
  # serialize. Do NOT cancel-in-progress: a cancelled mid-flight run can leave a
  # half-updated release PR — queue instead of killing.
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Bound the run: the concurrency group above is cancel-in-progress: false, so a
    # hung token-mint or release-please call would otherwise hold the queue (and
    # block every subsequent release run) up to the 6h GHA default. A steady-state
    # run is a metadata-only API call (well under a minute); but `always-update:
    # true` makes each run touch EVERY open release PR, and `sequential-calls:
    # true` issues those updates serially — so a mass wave (dozens of open release
    # PRs) sweeps far longer than the former metadata-only case. 20 min gives that
    # sweep headroom while staying far below the 6h default it guards against; a
    # sweep that still times out mid-wave is recoverable — the next push (or a
    # workflow_dispatch) re-runs it, and the open-PR count shrinks as the queue
    # drains, so successive sweeps finish faster.
    timeout-minutes: 20
    # Skip (neutral, not failed) until the App is configured, so the workflow does
    # not red-X every push to main during the one-time setup window. Once the repo
    # variable RELEASE_PLEASE_APP_ID is set, the job runs.
    if: ${{ vars.RELEASE_PLEASE_APP_ID != '' }}
    steps:
      - name: Mint a short-lived GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - name: release-please (maintain release PRs, cut tags on merge)
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          # App token (not GITHUB_TOKEN) so the cut tag triggers oci-publish.yml.
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
