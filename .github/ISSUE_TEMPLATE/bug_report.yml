name: Bug Report
description: Fehler in talos-platform-apps melden (Sub-Layer-Render, Pipeline, OCI-Publish, Konsumenten-Inkompatibilität)
labels: ["type:feature", "area:gitops"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für den Bug-Report. Fülle die Felder aus, damit wir das Issue zügig triagen können.

  - type: dropdown
    id: sub-layer
    attributes:
      label: Betroffener Sub-Layer
      options:
        - automation
        - databases
        - dns
        - lifecycle
        - observability
        - registry
        - secrets
        - storage-objects
        - cross-cutting (Pipeline / Build / Tooling)
    validations:
      required: true

  - type: dropdown
    id: stage
    attributes:
      label: Wo tritt der Fehler auf?
      options:
        - "task render (lokal)"
        - "task ci (lokal)"
        - "GHA-Pipeline (PR-Trigger)"
        - "GHA-Pipeline (Tag-Push, OCI-Publish/Sign)"
        - "Konsumenten-Cluster (Argo-Sync nach OCI-Pull)"
        - "Andere"
    validations:
      required: true

  - type: input
    id: tag
    attributes:
      label: Betroffenes OCI-Tag (falls relevant)
      placeholder: "observability/loki-v0.3.1"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Was ist passiert?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduktionsschritte
      description: "Konkrete Befehle inkl. Devbox-Zustand, falls relevant."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      render: shell
    validations:
      required: false
