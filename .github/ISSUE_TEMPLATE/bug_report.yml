name: Bug Report
description: Report a defect in talos-platform-apps (sub-layer render, pipeline, OCI publish, consumer incompatibility)
labels: ["kind: bug", "area: gitops"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the bug report. Fill in the fields so we can triage it quickly.

  - type: dropdown
    id: sub-layer
    attributes:
      label: Affected sub-layer
      options:
        - automation
        - databases
        - dns
        - lifecycle
        - observability
        - registry
        - secrets
        - storage-objects
        - cross-cutting (pipeline / build / tooling)
    validations:
      required: true

  - type: dropdown
    id: stage
    attributes:
      label: Where does the failure occur?
      options:
        - "task render (local)"
        - "task ci (local)"
        - "GHA pipeline (PR trigger)"
        - "GHA pipeline (tag push, OCI publish/sign)"
        - "Consumer cluster (Argo sync after OCI pull)"
        - "Other"
    validations:
      required: true

  - type: input
    id: tag
    attributes:
      label: Affected OCI tag (if relevant)
      placeholder: "observability/loki-v0.3.1"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: "Concrete commands incl. devbox state, if relevant."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
    validations:
      required: false
