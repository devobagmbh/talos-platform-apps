name: Feature Request
description: Propose a new sub-layer feature, new Helm chart, pipeline improvement, or new convention
labels: ["type:feature"]
body:
  - type: dropdown
    id: sub-layer
    attributes:
      label: Affected sub-layer (or "new")
      options:
        - automation
        - compute
        - databases
        - dns
        - identity
        - lifecycle
        - network
        - observability
        - registry
        - secrets
        - security
        - storage-block
        - storage-objects
        - cross-cutting (Pipeline / Build / Tooling)
        - new (new sub-layer)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: "What do you want to achieve?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
    validations:
      required: false

  - type: textarea
    id: adr-impact
    attributes:
      label: ADR-Impact
      description: "If an ADR in talos-platform-docs is affected (e.g. 0009 Platform-Layer-Model, 0011 Secrets, 0015 Monitoring), please link it."
    validations:
      required: false
