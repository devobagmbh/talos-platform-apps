# Taskfile für talos-platform-apps
# https://taskfile.dev
#
# Konvention (siehe AGENTS.md § CI-Konventionen): Pipeline ist Task-Caller.
# GHA-Workflows rufen ausschließlich `task <name>`; alle Logik wohnt hier.

version: '3'

# Konvention: Tasks sind silent. Commands echoen sich nicht selbst —
# nur die Commands geben Output an die Konsole. Ausnahmen via `silent: false`
# explizit am Task.
silent: true

# DOCKER_HOST aus dem aktiven docker-Context ableiten, damit talosctl (das hart
# auf unix:///var/run/docker.sock schaut) auch auf Colima/Orbstack/Docker-Desktop
# den richtigen Socket findet. Fallback = Standard-Socket. 2>/dev/null hält CI-
# Jobs ohne docker still; nicht-docker-Tasks (lint/render/ci) ignorieren die Var.
env:
  DOCKER_HOST:
    sh: docker context inspect --format '{{`{{ .Endpoints.docker.Host }}`}}' 2>/dev/null || echo "unix:///var/run/docker.sock"

vars:
  # Alle Komponenten als <sub-layer>/<component>-Liste, aus dem Verzeichnis-Baum
  # gelesen. Komponente ist die OCI-Distribution-Unit (ADR-0009); Sub-Layer ist
  # die organisatorische Klammer.
  COMPONENTS:
    sh: |
      shopt -s nullglob
      for sldir in sub-layers/*/; do
        sl=$(basename "$sldir")
        for cdir in "$sldir"components/*/; do
          echo "$sl/$(basename "$cdir")"
        done
      done

  # The kube-context for the LOCAL Talos test cluster — single source of truth for
  # the context name. `talosctl cluster create --name talos-platform-apps` writes
  # this deterministic default (admin@<cluster-name>). Every local:* task that
  # contacts the cluster pins it via --context {{.LOCAL_KUBE_CONTEXT}} (helm:
  # --kube-context) — the per-component E2E + teardown + standalone helpers AND the
  # local:up bring-up sub-tasks (cluster:up post-switch apply, cert-manager / cilium
  # / storage / gateway-api / argo installs, certs, gateway:apply, registry:bridge,
  # start readiness probe).
  # Scope of the guarantee: pinning selects the kubeconfig context *by name*, so a
  # current-context left pointing at a DIFFERENT, differently-named cluster cannot be
  # hit — the common accident this defends against. It does NOT verify the named
  # context's server: URL — guarding against a same-named entry or a repointed
  # cluster server is kubeconfig hygiene the operator owns, which no --context flag
  # can check (local:cluster:up does add a server-URL self-heal for its own bring-up
  # path; see its guard). So this is current-context-drift protection, not cluster-
  # identity verification.
  # Three call classes are intentionally NOT pinned because none selects a running
  # cluster by context: (1) the context bootstrap in local:cluster:up (kubectl config
  # set-cluster / talosctl kubeconfig / kubectx) that CREATES and selects the context
  # itself; (2) client-side generators (kubectl create … --dry-run=client) that only
  # render YAML before piping into a pinned apply; (3) helm repo add/update, which
  # touch the local repo cache, not the cluster.
  LOCAL_KUBE_CONTEXT: admin@talos-platform-apps

tasks:
  default:
    desc: Liste verfügbare Targets
    cmd: task --list

  # --- Render ---

  render:
    desc: Rendert alle Komponenten in sub-layers/*/components/*/rendered/manifest.yaml
    cmds:
      - for: { var: COMPONENTS }
        task: render:one
        vars: { COMPONENT_ID: '{{.ITEM}}' }

  render:one:
    desc: 'Rendert eine Komponente: task render:one -- <sub-layer>/<component>'
    summary: |
      Komponente ist die OCI-Distribution-Unit. Pfad:
        sub-layers/<sub-layer>/components/<component>/
      Eingabe-Konvention:
        helm/*.yaml      — YAML mit metadata.{chart,repo,version,namespace} + values
                           oder metadata.inline: true für Custom-Stubs
        manifests/*.yaml — Raw-Manifeste, werden 1:1 konkateniert
      Output:
        sub-layers/<sub-layer>/components/<component>/rendered/manifest.yaml
    cmd: |
      component_id="{{.COMPONENT_ID | default .CLI_ARGS}}"
      if [ -z "$component_id" ] || [ "${component_id#*/}" = "$component_id" ]; then
        echo "usage: task render:one -- <sub-layer>/<component>"
        exit 1
      fi
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      root="sub-layers/${sub_layer}/components/${component}"
      out="${root}/rendered/manifest.yaml"

      if [ ! -d "$root" ]; then
        echo "ERROR: Komponente ${component_id} existiert nicht (${root})"
        exit 1
      fi

      mkdir -p "$(dirname "$out")"
      : > "$out"
      echo "=== Render ${component_id} ==="

      shopt -s nullglob
      for vfile in "$root"/helm/*.yaml; do
        name=$(basename "$vfile" .yaml)
        inline=$(yq -r '.metadata.inline // false' "$vfile")

        if [[ "$inline" == "true" ]]; then
          namespace=$(yq -r '.metadata.namespace // "default"' "$vfile")
          echo "  ↳ Inline-Stub  $name (ns=$namespace)"
          {
            echo "# Inline-Stub: $name (Komponente: ${component_id})"
            echo "# Custom-Manifeste folgen im Sub-Layer-Inhalt-Issue."
            echo "---"
            echo "apiVersion: v1"
            echo "kind: Namespace"
            echo "metadata:"
            echo "  name: $namespace"
            echo "  labels:"
            echo "    platform.devoba.de/sub-layer: ${sub_layer}"
            echo "    platform.devoba.de/component: ${component}"
            echo "---"
          } >> "$out"
          continue
        fi

        chart=$(yq -r '.metadata.chart' "$vfile")
        repo=$(yq -r '.metadata.repo' "$vfile")
        version=$(yq -r '.metadata.version' "$vfile")
        namespace=$(yq -r '.metadata.namespace // "default"' "$vfile")

        vals_tmp=$(mktemp)
        yq '.values' "$vfile" > "$vals_tmp"
        # Optionaler lokaler Values-Overlay: nur gesetzt, wenn der Caller EXTRA_VALUES
        # exportiert (local:dev/local:publish für UI-Komponenten — z. B. externalURL/
        # CORS auf den .localhost.direct-Host). CI setzt es NIE → prod rendert mit den
        # committeten Platzhaltern. Späteres --values gewinnt → Overlay sticht Default.
        extra_vals=""
        if [ -n "${EXTRA_VALUES:-}" ] && [ -f "${EXTRA_VALUES}" ]; then
          extra_vals="--values ${EXTRA_VALUES}"
          echo "  ↳ + lokaler Values-Overlay: ${EXTRA_VALUES}"
        fi
        # Vendored chart: ${root}/vendor/<chart>-<version>.tgz. Used when the upstream
        # Helm repo blocks CI-runner IPs (e.g. charts.crossplane.io 403s GitHub-Actions
        # IPs while serving locally). Prefer the local archive; fall back to the HTTP repo.
        # (Separate from charts/ which is gitignored for transient Helm dependency charts.)
        # --skip-tests: helm test hooks (templates/tests/*) never belong in a published
        # GitOps manifest — Argo would apply the test Pod as a regular resource, and such
        # hooks often use unpinned images (e.g. busybox).
        archive="${root}/vendor/${chart}-${version}.tgz"
        if [ -f "$archive" ]; then
          echo "  ↳ Helm-Render   $name (chart=$chart version=$version, vendored)"
          helm template "$name" "$archive" \
            --namespace "$namespace" --skip-tests \
            --values "$vals_tmp" $extra_vals >> "$out"
        else
          echo "  ↳ Helm-Render   $name (chart=$chart version=$version, repo=$repo)"
          helm template "$name" "$chart" \
            --repo "$repo" --version "$version" \
            --namespace "$namespace" --skip-tests \
            --values "$vals_tmp" $extra_vals >> "$out"
        fi
        echo "---" >> "$out"
        rm -f "$vals_tmp"
      done

      for mfile in "$root"/manifests/*.yaml; do
        echo "  ↳ Raw-Manifest  $(basename "$mfile")"
        cat "$mfile" >> "$out"
        echo "---" >> "$out"
      done
      echo "  → $(wc -l < "$out") Zeilen → ${out}"

  render:sublayer:
    desc: 'Rendert alle Komponenten eines Sub-Layers: task render:sublayer -- <sub-layer>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task render:sublayer -- <sub-layer>}"
      sldir="sub-layers/${sub_layer}/components"
      if [ ! -d "$sldir" ]; then
        echo "ERROR: ${sldir} existiert nicht"
        exit 1
      fi
      for cdir in "$sldir"/*/; do
        component=$(basename "$cdir")
        task render:one -- "${sub_layer}/${component}"
      done

  # --- Lint ---

  lint:
    desc: YAML- und Markdown-Lint
    cmds:
      - yamllint -c .yamllint.yaml sub-layers/ Taskfile.yml .github/
      # markdown: lint tracked files only (`git ls-files`). The old `**/*.md` glob
      # scanned every .md on disk — 266 files, 168 of them inside the gitignored
      # `.claude/worktrees/` build copies plus untracked scratch (Plans/). Tracked
      # files are exactly the published docs and stay DRY with .gitignore.
      # Null-delimited | xargs -0 (matching lint:rendered below) keeps paths intact
      # under word-splitting; -r skips the run when no .md is tracked.
      # CHANGELOG.md is excluded: it is generated and committed by release-please,
      # whose format we do not control (it emits two blank lines after the version
      # header → markdownlint MD012). Linting it would make every `chore(main):
      # release …` PR red. Treated like rendered/ — a tool artifact, not authored docs.
      # knowledge/SPEC.md is excluded for the same reason: it is a verbatim pinned
      # upstream copy of the OKF spec (Apache-2.0), vendored not authored, whose
      # emphasis-as-heading style trips MD036. Do not edit vendored upstream to our rules.
      - git ls-files -z '*.md' ':!:*CHANGELOG.md' ':!:knowledge/SPEC.md' | xargs -0 -r markdownlint --config .markdownlint.yaml

  lint:rendered:
    desc: kubeconform gegen alle Komponenten-rendered/manifest.yaml
    # Nur das gerenderte Roh-Manifest, nicht das gepackte rendered/chart/
    # (Chart.yaml ist Helm-Metadaten, kein K8s-Resource → kubeconform-Error).
    cmd: |
      find sub-layers -path '*/components/*/rendered/manifest.yaml' -print0 2>/dev/null | \
        xargs -0 -r kubeconform -strict -ignore-missing-schemas -summary

  lint:kustomize-base:
    desc: 'kustomize build gate: every non-empty rendered/manifest.yaml must build as the trivial consumer base (resources: [manifest.yaml]) that `task package` ships.'
    summary: |
      kubeconform (lint:rendered) validates the raw manifest YAML; `kustomize build` is
      stricter. Since `task package` ships every component as a Kustomize base
      (kustomization.yaml + manifest.yaml, sourceType=Kustomize) so consumers can apply
      source.kustomize.patches, the artifact must actually kustomize-build. Duplicate
      resource IDs (same GVK+namespace+name across the concatenated Helm/raw docs) or an
      empty document pass kubeconform but ABORT kustomize build — such a component would
      pass PR + publish and fail ONLY at consumer Argo reconcile, catalog-wide and
      post-publish. Builds the SAME base package emits, in an isolated temp dir
      (hermetic, no network), for every rendered manifest. Assumes `task render` ran.
    vars:
      # Seam so test:kustomize-base can drive this gate over fixtures (default = the real
      # rendered manifests). Keep the glob quoted-safe: shell-expanded in the `for`.
      KLINT_GLOB: '{{.KLINT_GLOB | default "sub-layers/*/components/*/rendered/manifest.yaml"}}'
    cmd: |
      set -eu
      work="$(mktemp -d)" || { echo "lint:kustomize-base: mktemp failed" >&2; exit 2; }
      trap 'rm -rf "$work"' EXIT
      fail=0
      for manifest in {{.KLINT_GLOB}}; do
        [ -e "$manifest" ] || continue      # glob had no match
        [ -s "$manifest" ] || continue      # skip empty (no raw manifest rendered)
        id="$(echo "$manifest" | sed -E 's#.*components/([^/]+)/.*#\1#')"
        d="$work/$(printf '%s' "$id" | tr -c 'A-Za-z0-9._-' _)"
        mkdir -p "$d"
        cp "$manifest" "$d/manifest.yaml"
        printf 'apiVersion: kustomize.config.k8s.io/v1beta1\nkind: Kustomization\nresources:\n  - manifest.yaml\n' > "$d/kustomization.yaml"
        if kustomize build "$d" >/dev/null 2>"$d/err"; then
          echo "✓ kustomize base builds: $id"
        else
          echo "✗ KUSTOMIZE BUILD FAILED: $id" >&2
          sed 's/^/    /' "$d/err" >&2
          fail=1
        fi
      done
      exit $fail

  test:kustomize-base:
    desc: 'Test of lint:kustomize-base: a valid base builds (green → 0); a duplicate-resource-ID manifest aborts kustomize build (red → non-zero). Red-green bound to the gate via the KLINT_GLOB seam.'
    summary: |
      Hermetic red-green test for the kustomize-build gate (wired into `task ci`). Writes
      throwaway fixture manifests (no network; the real repo is never mutated) and drives
      lint:kustomize-base through its KLINT_GLOB seam — so a future edit that breaks the gate
      logic (path join, printf schema, exit propagation) turns this red. Scenarios:
        green  one valid object                       → lint:kustomize-base exits 0
        red    two objects, SAME GVK+ns+name (dup id) → kustomize build aborts → non-zero
               (the exact class the gate guards: passes kubeconform, breaks kustomize build)
    cmd: |
      set -eu
      root="$(git rev-parse --show-toplevel)"
      tmp="$(mktemp -d)" || { echo "test:kustomize-base: mktemp failed" >&2; exit 2; }
      trap 'rm -rf "$tmp"' EXIT
      mkdir -p "$tmp/green/components/greenc/rendered" "$tmp/red/components/redc/rendered"
      # GREEN: one valid object → builds clean
      printf 'apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: ok\n  namespace: x\ndata:\n  a: "b"\n' \
        > "$tmp/green/components/greenc/rendered/manifest.yaml"
      # RED: duplicate resource ID (same GVK+ns+name) — passes kubeconform, ABORTS kustomize build
      printf 'apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: dup\n  namespace: x\ndata:\n  a: "b"\n---\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: dup\n  namespace: x\ndata:\n  a: "c"\n' \
        > "$tmp/red/components/redc/rendered/manifest.yaml"
      if task -d "$root" lint:kustomize-base KLINT_GLOB="$tmp/green/components/*/rendered/manifest.yaml" >/dev/null 2>&1; then
        echo "✓ green fixture builds (gate passes)"
      else
        echo "✗ test:kustomize-base: green fixture unexpectedly FAILED the gate" >&2; exit 1
      fi
      if task -d "$root" lint:kustomize-base KLINT_GLOB="$tmp/red/components/*/rendered/manifest.yaml" >/dev/null 2>&1; then
        echo "✗ test:kustomize-base: red fixture (duplicate id) unexpectedly PASSED the gate" >&2; exit 1
      else
        echo "✓ red fixture (duplicate resource id) correctly rejected"
      fi
      echo "test:kustomize-base OK"

  validate:crd-split:
    desc: 'Strict-B CRD-count oracle (ADR-0028): -crds artifact renders >0 CRDs + carries crd-bearing:true; its workload half renders 0 CRDs. Assumes `task render` ran.'
    summary: |
      The executable form of AGENTS.md "CRD management - strict B" build-gate oracle
      (previously documented but unimplemented). Keyed STRUCTURALLY on the directory
      naming + sibling, not on the marker alone:
        - an `<x>-crds` component MUST carry a line-anchored `crd-bearing: true` AND
          render >0 CustomResourceDefinition (else: marker missing/typo, or a
          mislabeled empty crds half);
        - a workload `<x>` that has an `<x>-crds` sibling MUST render 0 CRDs (the CRDs
          belong in the -crds artifact: crds.create:false / no inline CRDs).
      Standalone components (no -crds suffix, no -crds sibling - e.g. crossplane's
      operator-installed CRDs, ADR-0028 "out of scope") are NOT gated. Operates on
      rendered/ output, so `task render`/`render:one` must have produced it; a missing
      rendered/ for a gated component is a failure (run render first). Part of `task ci`.
    cmd: |
      set -eu
      root="$(git rev-parse --show-toplevel)"
      fail=0
      for compat in "$root"/sub-layers/*/components/*/compatibility.yaml; do
        [ -f "$compat" ] || continue
        comp_dir="$(dirname "$compat")"
        comp="$(basename "$comp_dir")"
        sl="$(basename "$(dirname "$(dirname "$comp_dir")")")"
        id="$sl/$comp"
        rd="$comp_dir/rendered"
        # CRD count over the rendered MANIFEST ONLY (rendered/manifest.yaml), never the whole
        # rendered/ tree: `task package` also writes rendered/<component>-<tag>.tar.gz (a binary
        # tarball a recursive yq/kubeconform walk would choke on; lint:rendered restricts to
        # manifest.yaml for the same reason). awk always exits 0 -> safe under `set -e`; a missing
        # manifest yields 0, but the per-arm `[ -f "$manifest" ]` guard is the authoritative
        # "was it rendered?" check.
        manifest="$rd/manifest.yaml"
        crd_count="$(grep -c '^kind: CustomResourceDefinition' "$manifest" 2>/dev/null | awk '{s+=$1} END{print s+0}')"
        # Marker is column-anchored: a leading-# comment line must NOT match.
        has_marker=no
        if grep -Eq '^crd-bearing:[[:space:]]+true[[:space:]]*(#.*)?$' "$compat" 2>/dev/null; then
          has_marker=yes
        fi
        case "$comp" in
          *-crds)
            [ "$has_marker" = yes ] || { echo "crd-split: ${id} is a -crds artifact but its compatibility.yaml has no line-anchored 'crd-bearing: true' (marker missing or typo)" >&2; fail=1; }
            if [ ! -f "$manifest" ]; then
              echo "crd-split: ${id} (-crds) has no rendered/manifest.yaml - run 'task render' first" >&2; fail=1
            elif [ "$crd_count" -eq 0 ]; then
              echo "crd-split: ${id} is a -crds artifact but renders 0 CustomResourceDefinition (mislabeled empty crds half)" >&2; fail=1
            fi
            ;;
          *)
            # the crd-bearing marker belongs ONLY on a -crds half; a non--crds component
            # carrying it is a misplaced marker (the co-build oracle keys on it).
            [ "$has_marker" = no ] || { echo "crd-split: ${id} carries 'crd-bearing: true' but is not a -crds artifact - the marker belongs ONLY on the -crds half" >&2; fail=1; }
            if [ -d "${root}/sub-layers/${sl}/components/${comp}-crds" ]; then
              if [ ! -f "$manifest" ]; then
                echo "crd-split: ${id} (workload half) has no rendered/manifest.yaml - run 'task render' first" >&2; fail=1
              elif [ "$crd_count" -ne 0 ]; then
                echo "crd-split: ${id} is the workload half of a strict-B pair but renders ${crd_count} CustomResourceDefinition(s) - CRDs belong in ${comp}-crds (crds.create:false / strip inline CRDs)" >&2; fail=1
              fi
            fi
            ;;
        esac
      done
      [ "$fail" -eq 0 ] || { echo "crd-split: strict-B CRD-count oracle FAILED (see above)" >&2; exit 1; }
      echo "crd-split: OK - every -crds artifact renders CRDs + carries the marker; every workload half is CRD-free"

  lint:version:
    desc: 'A7 parity (apps#226): render-source⇒version guard + declared version.<sot> vs rendered reality (parity needs `task render`)'
    summary: |
      A7 version-provenance gate (apps#226): declared `version.<sot>` in each
      compatibility.yaml vs the rendered reality. The SOT axis hard-fails; secondary
      declared axes WARN. Skips components not yet migrated to the typed `version`
      block, so it is safe to run repo-wide during rollout (no coupling to unfinished
      components — same discipline as validate:contract). Logic is INLINE here per the
      Taskfile convention ("Logic lives in the Taskfile, not external scripts/").

      Per-`sot` rendered mapping (pinned):
        app        -> app.kubernetes.io/version label, else image/package tag  [contain version.app]
        crd-schema -> rendered CRD/XRD .spec.group + .spec.versions[].name      [contain each api_surface[]]
        chart      -> declared-only (NOT render-checked)   [WARN]
        none       -> no provenance axis to check          [WARN]
      `version.artifacts[]` (when present) are render-checked against image tags (hard-fail).
      Env STRICT=1 turns a MIGRATED component's missing render from WARN into FAIL (set in CI).

      Forward invariant (render-source ⇒ version block): a component that ships render
      source (helm/ or manifests/) must declare at least one provides entry AND carry a
      typed `version` block (a non-empty `version.sot`) on EVERY entry — any missing,
      empty (sot-less), or absent-provides case FAILs under STRICT (WARN otherwise).
      Covers the all-missing case, a multi-provides component that versions only some
      entries (the rest would otherwise escape the parity loop, which skips sot-less
      entries), and a built component declaring no provides at all. Without it a newly-
      built component could silently skip the block. Unbuilt stubs (no render source)
      and sub-layer aggregates are exempt.
      Optional scope: `task lint:version -- <sub-layer>/<component> ...`.
    cmd: |
      set -euo pipefail
      set -- {{.CLI_ARGS}}
      STRICT="${STRICT:-0}"
      repo_root="$(git rev-parse --show-toplevel)"
      cd "$repo_root"

      fail=0
      warn=0
      checked=0

      if [ "$#" -gt 0 ]; then
        compat_files=()
        for c in "$@"; do compat_files+=("sub-layers/${c%/*}/components/${c#*/}/compatibility.yaml"); done
      else
        # portable to bash 3.2 (macOS default) — `mapfile` is bash 4+
        compat_files=()
        while IFS= read -r line; do compat_files+=("$line"); done \
          < <(find sub-layers -name compatibility.yaml -not -path '*/.claude/*' | sort)
      fi

      for compat in "${compat_files[@]}"; do
        [ -f "$compat" ] || { echo "ERROR $compat not found"; fail=1; continue; }
        # (.provides // []) — null-safe under jq-based yq (sub-layer aggregators have no provides).
        # Count entries with a NON-EMPTY version.sot, not just has("version"): a bare `version:`
        # / `version: {}` is present-but-meaningless — it passes key-presence yet the parity loop
        # skips it on empty sot, so keying on sot closes that silent-bypass.
        migrated=$(yq -r '[(.provides // [])[] | select((.version.sot // "") != "")] | length' "$compat")
        comp_dir="$(dirname "$compat")"
        sub_layer="$(echo "$comp_dir" | sed -E 's#sub-layers/([^/]+)/components/.*#\1#')"
        cid="${sub_layer}/$(basename "$comp_dir")"

        # A7 forward invariant (apps#226): render source ⇒ the component declares ≥1 provides
        # entry AND EVERY entry carries a typed version block (a non-empty version.sot, per the
        # `migrated` definition above). Checked per component, not just the all-missing case: a
        # multi-provides component mixing versioned + version-less entries would otherwise escape
        # both this guard and the parity loop (which skips an entry whose .version.sot is empty),
        # and a built component declaring no provides at all (total=0) would pass vacuously.
        # Stubs (no render source) and sub-layer aggregates (path without /components/) are exempt.
        # The probe MUST track render:one's input contract (helm/*.yaml OR manifests/*.yaml) — a
        # new render source shape there needs a matching update here. Probe is pipe-free,
        # dir-guarded, -type f: `find` over a MISSING path exits non-zero (even with 2>/dev/null)
        # and `| head` would SIGPIPE it — under `set -o pipefail` both falsely negate. `find`
        # (not a glob) is shell-agnostic (zsh nomatch is fatal).
        has_src=0
        case "$comp_dir" in
          */components/*)
            for d in "$comp_dir/helm" "$comp_dir/manifests"; do
              if [ -d "$d" ] && [ -n "$(find "$d" -maxdepth 1 -type f -name '*.yaml' 2>/dev/null)" ]; then
                has_src=1; break
              fi
            done
            ;;
        esac
        total=$(yq -r '(.provides // []) | length' "$compat")
        flag_reason=""
        if [ "$has_src" = "1" ]; then
          if [ "$total" -eq 0 ]; then
            flag_reason="declares no provides entries (a built component needs at least one with a typed version block)"
          elif [ "$migrated" -lt "$total" ]; then
            flag_reason="$((total - migrated))/${total} provides entries lack a typed version block (a non-empty version.sot) — add one to each"
          fi
        fi
        if [ -n "$flag_reason" ]; then
          if [ "$STRICT" = "1" ]; then
            echo "FAIL  [$cid] has render source but $flag_reason (apps#226)"
            fail=1
          else
            echo "WARN  [$cid] has render source but $flag_reason (apps#226)"
            warn=$((warn + 1))
          fi
        fi

        [ "$migrated" -gt 0 ] || continue
        manifest="${comp_dir}/rendered/manifest.yaml"

        if [ ! -s "$manifest" ]; then
          if [ "$STRICT" = "1" ]; then
            echo "FAIL  [$cid] migrated but no rendered manifest (STRICT) — render failed or was skipped"
            fail=1
          else
            echo "WARN  [$cid] no rendered manifest — run 'task render:one -- $cid'; render-parity skipped"
            warn=$((warn + 1))
          fi
          continue
        fi

        n=$(yq -r '.provides | length' "$compat")
        for i in $(seq 0 $((n - 1))); do
          sot=$(yq -r ".provides[$i].version.sot // \"\"" "$compat")
          [ -n "$sot" ] && [ "$sot" != "null" ] || continue
          checked=$((checked + 1))
          case "$sot" in
            app)
              declared=$(yq -r ".provides[$i].version.app" "$compat")
              if [ -z "$declared" ] || [ "$declared" = "null" ]; then
                echo "FAIL  [$cid] sot=app but version.app is empty/null"
                fail=1
              else
                # extraction may legitimately be empty (label-less raw manifests) — guard against pipefail
                rendered=$(grep -hoE 'app\.kubernetes\.io/version: "?[^"]+' "$manifest" \
                           | sed -E 's/.*version: "?//' | sort -u | tr '\n' ' ' || true)
                # image tags AND Crossplane spec.package OCI refs (providers/functions carry no image:/label).
                # Per-grep `|| true`: a no-match grep exits 1, which under `set -e` aborts the whole
                # command group before the 2nd grep runs in the go-task interpreter (a package-only
                # render would then yield empty img_tags). Guard each so both always contribute.
                img_tags=$( { grep -hoE 'image: "?[^"@ ]+' "$manifest" || true; grep -hoE 'package: "?[^"@ ]+' "$manifest" || true; } \
                            | sed -E 's/.*://' | sort -u | tr '\n' ' ' || true)
                # `-- ` guards a `declared` beginning with `-`; space-padding anchors whole-token match
                if printf ' %s ' "$rendered" | grep -qF -- " $declared "; then
                  echo "OK    [$cid] sot=app declared=$declared ∈ rendered labels{ $rendered}"
                elif printf ' %s ' "$img_tags" | grep -qF -- " $declared "; then
                  # #226 A7: label-less components match via image/package tag
                  echo "OK    [$cid] sot=app declared=$declared ∈ rendered image/package tags (no app-version label)"
                else
                  echo "FAIL  [$cid] sot=app declared=$declared NOT in rendered labels{ $rendered} nor image tags"
                  fail=1
                fi
              fi
              ;;
            crd-schema)
              # A7: sot=crd-schema MUST declare a non-empty api_surface, else the
              # render-check loop below is vacuous and the axis would pass silently.
              n_surface=$(yq -r ".provides[$i].api_surface // [] | length" "$compat")
              if [ "$n_surface" -eq 0 ]; then
                echo "FAIL  [$cid] sot=crd-schema but api_surface is empty/absent — nothing to render-check"
                fail=1
              fi
              # CustomResourceDefinition AND Crossplane CompositeResourceDefinition (XRD)
              rendered_gv=$(yq -r 'select(.kind == "CustomResourceDefinition" or .kind == "CompositeResourceDefinition") | .spec.group + "/" + (.spec.versions // [])[].name' \
                            "$manifest" 2>/dev/null | sort -u)
              while IFS= read -r s; do
                [ -n "$s" ] && [ "$s" != "null" ] || continue
                gv="${s%%/*}/${s##*@}"   # k8s.cni.cncf.io/NAD@v1 -> k8s.cni.cncf.io/v1
                if printf '%s\n' "$rendered_gv" | grep -qxF -- "$gv"; then
                  echo "OK    [$cid] sot=crd-schema surface=$gv ∈ rendered CRDs"
                else
                  echo "FAIL  [$cid] sot=crd-schema surface=$gv NOT in rendered CRD group/versions{ $(printf '%s' "$rendered_gv" | tr '\n' ' ')}"
                  fail=1
                fi
              done < <(yq -r ".provides[$i].api_surface[]?" "$compat" 2>/dev/null)
              ;;
            chart | none)
              echo "WARN  [$cid] sot=$sot — provenance render-parity not enforced (declared-only)"
              warn=$((warn + 1))
              ;;
            *)
              echo "FAIL  [$cid] sot=$sot not in {app,chart,crd-schema,none}"
              fail=1
              ;;
          esac

          # artifacts[] cardinality (A3): every declared image:version must appear in the render.
          arts=$(yq -r ".provides[$i].version.artifacts // [] | length" "$compat")
          if [ "$arts" -gt 0 ]; then
            img_all=$(grep -hoE 'image: "?[^"@ ]+' "$manifest" | sed -E 's/image: "?//' | sort -u || true)
            for j in $(seq 0 $((arts - 1))); do
              aimg=$(yq -r ".provides[$i].version.artifacts[$j].image" "$compat")
              aver=$(yq -r ".provides[$i].version.artifacts[$j].version" "$compat")
              # whole-line exact match (-x): ':v1.19.4' must NOT match ':v1.19.40'
              if printf '%s\n' "$img_all" | grep -qxF -- "${aimg}:${aver}"; then
                echo "OK    [$cid] artifact ${aimg}:${aver} ∈ render"
              else
                echo "FAIL  [$cid] artifact ${aimg}:${aver} NOT in render"
                fail=1
              fi
            done
          fi
        done
      done

      echo "---"
      echo "checked=$checked warnings=$warn result=$([ $fail -eq 0 ] && echo PASS || echo FAIL)"
      exit $fail

  # Shared Conventional-Commit subject check — the single source of truth for the
  # subject pattern + passthrough + BLOCKED message, consumed by lint:commit-msg
  # (a commit subject from a file) and lint:pr (a PR title from the PR_TITLE env).
  # No `desc:` → hidden from `task --list`; still callable as a subprocess by both.
  # The subject arrives via the SUBJECT env var, NEVER via {{.CLI_ARGS}}: lint:pr's
  # caller (the PR title) is UNTRUSTED, so it must stay inert — SUBJECT is only ever
  # expanded inside double quotes / printf %s / a quoted `case`, never eval'd nor
  # spliced into the go-task template. CTX names the caller in the BLOCKED message.
  lint:conventional-subject:
    cmd: |
      set -eu
      # First line only: the effective subject is one line (a commit/squash subject). Guards a
      # multi-line title whose line 1 is non-Conventional but a later line matches the pattern.
      subject="$(printf '%s' "${SUBJECT:-}" | head -n1)"
      ctx="${CTX:-SUBJECT}"
      case "$subject" in
        Merge\ *|Revert\ *|fixup!\ *|squash!\ *) exit 0 ;;
      esac
      pattern='^(feat|fix|chore|docs|refactor|test|ci|build|perf|revert)(\([a-z0-9._/-]+\))?!?: .+'
      if ! printf '%s' "$subject" | grep -qE "$pattern"; then
        echo "${ctx} BLOCKED — not a Conventional Commit:" >&2
        echo "  subject: \"$subject\"" >&2
        echo "  expected: <type>(<scope>): <subject>" >&2
        echo "  type in feat|fix|chore|docs|refactor|test|ci|build|perf|revert (append ! or BREAKING CHANGE: for major)" >&2
        exit 1
      fi

  lint:commit-msg:
    desc: 'Conventional-Commit check of a message file: task lint:commit-msg -- <msg-file>'
    summary: |
      Layer-B check logic for the commit-msg hook (lefthook calls this target).
      Extracts the subject (first non-comment, non-blank line) and validates it via
      the shared lint:conventional-subject check (same pattern + passthrough as the
      PR-title gate lint:pr). The type set is the release-please versioning axis
      (feat→minor, fix→patch, BREAKING CHANGE / ! →major) plus the repo convention.

      Tool-free by design (AGENTS.md "Logic lives in the Taskfile"): the orchestrator
      (lefthook) is swappable, the capability lives here. Runs locally and in CI.
    cmd: |
      set -eu
      set -- {{.CLI_ARGS}}
      msg_file="${1:?usage: task lint:commit-msg -- <commit-msg-file>}"
      test -f "$msg_file" || { echo "lint:commit-msg: file not found: $msg_file" >&2; exit 1; }
      # First non-comment, non-blank line is the subject.
      subject="$(grep -vE '^[[:space:]]*#' "$msg_file" | sed '/^[[:space:]]*$/d' | head -1)"
      SUBJECT="$subject" CTX="COMMIT-MSG" task lint:conventional-subject

  lint:pr:
    desc: 'PR-gate (G2, #464): Conventional PR title ($PR_TITLE) + whole-PR three-dot diff touches ≤1 component'
    summary: |
      Server-side PR gate (issue #464). Two checks over the WHOLE PR (not per-commit):
        (1) the PR title is a Conventional-Commit subject — shares lint:conventional-subject
            with lint:commit-msg. The title arrives via the PR_TITLE env var and stays inert
            (only ever quoted / passed as the SUBJECT env — never {{.CLI_ARGS}}, never eval),
            so a malicious title like $(...) or a backtick cannot execute.
        (2) the whole-PR diff touches AT MOST ONE component — OR exactly a strict-B pair
            (<x> + <x>-crds), which is ONE release-coherent unit that MUST migrate atomically
            (ADR-0028: validate:crd-split reds main if the -crds sibling lands without its
            workload half in the same change, so the pair cannot be split into two PRs). Under
            squash-only merges the PR collapses to ONE squash commit; release-please maps
            commits to components path-based, so an UNRELATED >1-component squash would
            version-bump them all at once. The per-commit lint:commit-scope is evaded at squash
            time — this is that invariant's squash-time enforcement. A cross-component MOVE is
            counted via --no-renames (both old+new paths), and a stray file directly under
            components/ is not miscounted as a component (trailing-slash-anchored match).

      Range: LINT_PR_RANGE="<base>..<head>" (mirrors scan:secrets' GITLEAKS_SCAN_RANGE seam —
      the commit-lint workflow sets it from the PR base/head SHAs; test:pr-lint drives it over
      fixtures). The scope diff uses THREE dots (merge-base) so main's concurrent changes are
      excluded even if base.sha is stale. FAILS CLOSED on: empty/malformed range, an
      unresolvable SHA, two commits with NO shared merge base (unrelated histories), or any
      git-diff error — never a green pass on an unchecked diff. Non-component-only PRs
      (Taskfile/.github/docs) touch 0 components → pass. No {{.CLI_ARGS}}: both inputs are env
      vars, keeping the untrusted PR title out of the go-task template splice.
    cmd: |
      set -eu
      # Byte-collation for the sort -u below (repo convention, cf. validate:release-config): under a
      # UTF-8 locale sort may fold punctuation-only-differing names (foo-bar ≈ foo.bar) and undercount.
      export LC_ALL=C
      # (1) title — shared Conventional-subject check; PR_TITLE stays inert (env → SUBJECT env).
      SUBJECT="${PR_TITLE:-}" CTX="PR-TITLE" task lint:conventional-subject
      # (2) scope — whole-PR three-dot (merge-base) diff must touch ≤1 component (or a strict-B pair).
      range="${LINT_PR_RANGE:-}"
      base="${range%%..*}"
      head="${range##*..}"
      # Fail closed on: empty/malformed range, unresolvable SHA, or NO shared merge base
      # (unrelated histories — else `git diff A...B` errors and its exit, swallowed by the
      # pipeline `|| true`, would pass vacuously). merge-base is checked explicitly here.
      if [ -z "$range" ] || [ "$base" = "$range" ] \
         || ! git rev-parse -q --verify "${base}^{commit}" >/dev/null 2>&1 \
         || ! git rev-parse -q --verify "${head}^{commit}" >/dev/null 2>&1 \
         || ! git merge-base "${base}" "${head}" >/dev/null 2>&1; then
        echo "PR-SCOPE BLOCKED — LINT_PR_RANGE '${range}' is empty, unresolvable, or the two commits share no merge base (fail closed)" >&2
        exit 1
      fi
      # Capture the diff exit explicitly (backstop to the merge-base guard): any git-diff error
      # fails closed rather than being swallowed. --no-renames so a cross-component MOVE lists
      # BOTH old+new paths (counted as touching both components, not hidden as a rename).
      # core.quotePath=false: a non-ASCII path stays unquoted, so the `^sub-layers/` anchor below
      # is not broken by a leading `"` (which would silently uncount that component).
      if ! changed="$(git -c core.quotePath=false diff --no-renames --name-only "${base}...${head}" 2>/dev/null)"; then
        echo "PR-SCOPE BLOCKED — 'git diff ${base}...${head}' failed (fail closed)" >&2
        exit 1
      fi
      # Trailing '/' anchors the match INSIDE a component dir, so a stray file directly under
      # components/ (e.g. components/README.md) is not miscounted as a component.
      comps="$(printf '%s\n' "$changed" \
        | grep -oE '^sub-layers/[^/]+/components/[^/]+/' \
        | sed 's#/$##' | sort -u || true)"
      count="$(printf '%s\n' "$comps" | grep -cE '^sub-layers/' || true)"
      if [ "${count:-0}" -gt 1 ]; then
        # Exception: EXACTLY a strict-B pair (<x> + <x>-crds, same sub-layer, the -crds half
        # carrying the ADR-0028 `crd-bearing: true` marker) is ONE release-coherent unit that must
        # migrate atomically (validate:crd-split reds main if the halves are split across PRs).
        pair=no
        if [ "$count" -eq 2 ]; then
          c1="$(printf '%s\n' "$comps" | sed -n 1p)"
          c2="$(printf '%s\n' "$comps" | sed -n 2p)"
          # Name shape (sorted <x> precedes <x>-crds; full-path match enforces same sub-layer) AND
          # the semantic oracle: the -crds half's compatibility.yaml must carry the line-anchored
          # `crd-bearing: true` marker (the SAME oracle validate:crd-split keys on), read from the
          # PR-head tree via `git show` (works with the test's GIT_DIR seam). So a mere name-shaped
          # namesake — an unrelated component that happens to end in -crds — is NOT granted the pass.
          if [ "${c1}-crds" = "$c2" ] \
             && git show "${head}:${c2}/compatibility.yaml" 2>/dev/null \
                | grep -Eq '^crd-bearing:[[:space:]]+true[[:space:]]*(#.*)?$'; then
            pair=yes
          fi
        fi
        if [ "$pair" = yes ]; then
          echo "lint:pr OK — strict-B pair ($(basename "$c1") + $(basename "$c2")): one release-coherent unit (ADR-0028)"
        else
          echo "PR-SCOPE BLOCKED — the whole-PR diff touches ${count} components (squash-only + release-please" >&2
          echo "is path-based; one squash commit would version-bump all of them):" >&2
          printf '%s\n' "$comps" | sed 's/^/  - /' >&2
          echo "Split into one PR per component (only a strict-B <x>+<x>-crds pair may share a PR)." >&2
          exit 1
        fi
      else
        echo "lint:pr OK — title Conventional; whole-PR diff touches ${count:-0} component(s)"
      fi

  test:pr-lint:
    desc: 'Test of lint:pr (G2, #464): title + scope + fail-closed + injection-inert + strict-B pair + three-dot; red-green bound to lint:conventional-subject'
    summary: |
      Hermetic red-green test for the G2 PR-gate (wired into `task ci`). Builds a throwaway
      git repo (no network; the REAL repo is never mutated) with component-path fixtures as
      SIBLING commits off a common base, then drives lint:pr through its PR_TITLE +
      LINT_PR_RANGE seams — GIT_DIR / GIT_WORK_TREE point git at the temp repo while
      `task -d <root>` keeps go-task on the real Taskfile. Scenarios:
        1  valid title + single-component range           → 0
        2  valid title + two UNRELATED components         → non-zero (scope)
        3  non-Conventional title                         → non-zero (title; RED-GREEN bound to
                                                             the shared lint:conventional-subject
                                                             helper — break the pattern → red)
        4  empty range                                    → non-zero (fail closed)
        4b unresolvable SHAs                              → non-zero (fail closed)
        4c NO shared merge base (unrelated histories)     → non-zero (fail closed; not fail-open)
        5  injection title '$(touch m)' (non-CC)          → non-zero AND marker NOT created
        5b CC-VALID injection title 'feat(x): $(touch m)' → 0 AND marker NOT created (proves the
                                                             success path is inert too, not just
                                                             the early CC-reject path)
        6  strict-B pair (<x> + <x>-crds, crd-bearing)    → 0 via the pair PATH (asserts the
                                                             "strict-B pair" message, not just exit 0)
        6b namesake <x>+<x>-crds WITHOUT crd-bearing      → non-zero (bound to the ADR-0028 oracle,
                                                             not merely the -crds name shape)
        7  three-dot excludes a concurrent main change    → 0 (range main-adv..pr-head sees only
                                                             the PR's component, not comp-c on main)
        8  multi-line title, line 1 non-Conventional      → non-zero (validates line 1 only)
    cmd: |
      set -eu
      root="$(git rev-parse --show-toplevel)"
      tmp="$(mktemp -d)" || { echo "test:pr-lint: mktemp failed" >&2; exit 2; }
      marker="$tmp/PWNED"
      trap 'rm -rf "$tmp"' EXIT
      gitc() { git -C "$tmp" "$@"; }
      mkf() { mkdir -p "$tmp/$(dirname "$1")"; printf '%s\n' "${2:-x}" > "$tmp/$1"; }
      gitc init -q
      gitc config user.email t@example.invalid
      gitc config user.name test
      gitc config commit.gpgsign false
      # C0 base: comp-a
      mkf sub-layers/obs/components/comp-a/f.yaml a0
      gitc add -A; gitc commit -q -m base
      base="$(gitc rev-parse HEAD)"
      # Sibling commits off base → each base..headX diff is exactly that commit's changes.
      gitc checkout -q "$base"; mkf sub-layers/obs/components/comp-a/f.yaml a1
      gitc add -A; gitc commit -q -m one-comp;      head1="$(gitc rev-parse HEAD)"
      gitc checkout -q "$base"; mkf sub-layers/obs/components/comp-a/f.yaml a2; mkf sub-layers/obs/components/comp-a-crds/f.yaml c0; mkf sub-layers/obs/components/comp-a-crds/compatibility.yaml "crd-bearing: true"
      gitc add -A; gitc commit -q -m strict-b-pair; head_pair="$(gitc rev-parse HEAD)"
      # Namesake pair WITHOUT the crd-bearing marker → must NOT get the pair pass (oracle, not name).
      gitc checkout -q "$base"
      mkf sub-layers/obs/components/comp-e/f.yaml e0
      mkf sub-layers/obs/components/comp-e-crds/f.yaml ec0
      mkf sub-layers/obs/components/comp-e-crds/compatibility.yaml "requires: {}"
      gitc add -A; gitc commit -q -m fake-pair;     head_fakepair="$(gitc rev-parse HEAD)"
      gitc checkout -q "$base"; mkf sub-layers/obs/components/comp-a/f.yaml a3; mkf sub-layers/obs/components/comp-b/f.yaml b0
      gitc add -A; gitc commit -q -m unrelated;     head_unrel="$(gitc rev-parse HEAD)"
      gitc checkout -q "$base"; mkf sub-layers/obs/components/comp-c/f.yaml x0
      gitc add -A; gitc commit -q -m main-advance;  main_adv="$(gitc rev-parse HEAD)"
      # Orphan root (no shared history with base) — built LAST (mutates index/worktree).
      gitc checkout -q --orphan orphan
      gitc rm -rq --cached . 2>/dev/null || true
      rm -rf "$tmp/sub-layers"
      mkf sub-layers/obs/components/comp-a/f.yaml o0
      gitc add -A; gitc commit -q -m orphan-root;   orphan="$(gitc rev-parse HEAD)"
      fail=0
      # git points at the temp repo (GIT_DIR/GIT_WORK_TREE); go-task stays on the real Taskfile
      # via -d "$root". Seam vars exported so the nested lint:pr inherits them unambiguously.
      run() {
        export GIT_DIR="$tmp/.git" GIT_WORK_TREE="$tmp" PR_TITLE="$1" LINT_PR_RANGE="$2"
        task -d "$root" lint:pr >/dev/null 2>&1
      }
      runo() {  # like run() but echoes lint:pr's combined output (for mechanism assertions)
        export GIT_DIR="$tmp/.git" GIT_WORK_TREE="$tmp" PR_TITLE="$1" LINT_PR_RANGE="$2"
        task -d "$root" lint:pr 2>&1
      }
      ok()  { echo "✓ $1"; }
      no()  { echo "✗ $1"; fail=1; }
      if run "feat(obs/comp-a): ok"  "$base..$head1";     then ok "1 single-component passes"; else no "1 single-component should pass"; fi
      if run "feat(obs): two"        "$base..$head_unrel"; then no "2 two unrelated components should fail"; else ok "2 two unrelated components blocked"; fi
      if run "just some words"       "$base..$head1";      then no "3 non-Conventional title should fail"; else ok "3 non-Conventional title blocked"; fi
      if run "feat(x): y"            "";                    then no "4 empty range should fail closed"; else ok "4 empty range fails closed"; fi
      if run "feat(x): y"            "dead..beef";          then no "4b unresolvable range should fail closed"; else ok "4b unresolvable range fails closed"; fi
      if run "feat(x): y"            "$base..$orphan";      then no "4c no-merge-base should fail closed"; else ok "4c no-merge-base fails closed (not fail-open)"; fi
      if run "\$(touch $marker)"     "$base..$head1";       then no "5 injection (non-CC) title should fail"; else ok "5 injection (non-CC) title blocked"; fi
      if [ -e "$marker" ]; then no "5 injection EXECUTED (marker created)"; else ok "5 injection inert"; fi
      rm -f "$marker"
      if run "feat(obs/comp-a): \$(touch $marker)" "$base..$head1"; then ok "5b CC-valid injection title passes"; else no "5b CC-valid injection title should pass"; fi
      if [ -e "$marker" ]; then no "5b injection EXECUTED in success path (marker created)"; else ok "5b injection inert in success path"; fi
      if out6="$(runo "feat(obs/comp-a): migrate strict-B" "$base..$head_pair")" \
         && printf '%s\n' "$out6" | grep -q 'strict-B pair'; then
        ok "6 strict-B pair passes via the pair path"
      else no "6 strict-B pair should pass via the pair path"; fi
      if run "feat(obs/comp-e): x"   "$base..$head_fakepair"; then no "6b namesake without crd-bearing should be blocked"; else ok "6b namesake without crd-bearing marker blocked"; fi
      if run "feat(obs/comp-a): ok"  "$main_adv..$head1";  then ok "7 three-dot excludes concurrent main change"; else no "7 three-dot should exclude the main change (comp-c)"; fi
      if run "$(printf 'garbage\nfeat(x): y')" "$base..$head1"; then no "8 multi-line title (bad line 1) should fail"; else ok "8 multi-line title blocked on line 1"; fi
      echo "---"
      if [ "$fail" -eq 0 ]; then echo "✓ test:pr-lint OK (14 assertions / 12 scenarios)"; else echo "✗ test:pr-lint FAILED"; fi
      exit "$fail"

  pr:triage:
    desc: 'PURE PR classifier for babysit-prs: reads assembled PR records JSON, prints "<number>\t<class>\t<pin-annotation>" TSV. Network-free.'
    summary: |
      The SINGLE, deterministic source of the babysit-prs auto-review partition —
      the security-critical decision of which open PR may enter the unattended
      auto-approve path. Network-free and side-effect-free: it reads an already-
      assembled JSON array of PR records (the babysit-prs skill does the `gh`
      gathering and assembly, then pipes here), and is bound red-green by
      `task test:pr-triage` (wired into `task ci`). Keeping the classification in
      a tested task target — not in skill prose — is why a regression in the
      withhold logic turns a fixture assertion red instead of silently
      auto-approving a PR it should have withheld.

      INPUT (stdin, or a file path in PR_TRIAGE_INPUT): a JSON array; each record:
        {"number":N, "isDraft":bool, "reviewDecision":"REVIEW_REQUIRED|CHANGES_REQUESTED|...",
         "isCrossRepository":bool, "authorLogin":"<login>", "mergeStateStatus":"CLEAN|BEHIND|DIRTY|...",
         "files":["<changed path>", ...],                 # AUTHORITATIVE complete list
         "addedActionPins":[{"repo":"owner/repo","ref":"<sha-or-ref>"}, ...],
         "alreadyReviewedAtHead":bool}                     # a review by ME exists at the current head
      ENV: ME (required — the operator login, for the self-authored test);
           TRUSTED_ACTIONS (optional — newline-separated owner/repo set already
           trusted in .github on origin/main).

      OUTPUT: one TSV line per in-scope PR (isDraft==false AND reviewDecision ∈
      {REVIEW_REQUIRED, CHANGES_REQUESTED}; all others are dropped as out-of-scope):
        <number>\t<class>\t<annotation>
      CLASS (first match wins — the precedence IS the contract):
        incomplete  — FAIL-CLOSED: a record missing/empty files[], authorLogin,
                      isCrossRepository (non-boolean), or mergeStateStatus. A real PR
                      always changes ≥1 file, so empty files[] means the skill's gh
                      gather degraded — withhold, never default a degraded record to
                      candidate (the safe default for a security classifier is withhold)
        dirty       — mergeStateStatus == DIRTY (a real conflict; a human resolves it)
        fork        — isCrossRepository (public repo; never auto-approve an external head)
        self        — authorLogin == ME (GitHub 422s self-approval; withhold, no re-nag)
        governance  — a changed path in the repo's central-review tier (its own
                      .github/CODEOWNERS "zentral, immer M1" set: AGENTS.md, CLAUDE.md,
                      Taskfile.yml — which holds THIS classifier — devbox.json/.lock,
                      .sops.yaml* = secret-decryption access) plus .github/ / .claude/
                      and the policies/ + schemas/ admission-control gates. Always a
                      human; this is what stops the loop approving a change that would
                      loosen its own gate or the platform's controls. Keep this set in
                      sync with CODEOWNERS' central tier.
        reviewed    — alreadyReviewedAtHead (the loop already reviewed this exact head; skip)
        candidate   — none of the above → eligible for the auto-approve path
      ANNOTATION (report hint for a withheld .github PR; NOT a class): for each added
      action pin, `new-action:<repo>` if its owner/repo is not in TRUSTED_ACTIONS, or
      `non-sha:<repo>@<ref>` if the ref is not a 40-hex commit SHA; `-` when clean.
      This annotation cannot detect an upstream tag-move of an already-trusted action
      (the tag legitimately resolves to the new commit) — that residual is stated in
      the skill, not defended here.
    cmd: |
      set -eu
      : "${ME:?pr:triage: ME (operator login) is required}"
      input="${PR_TRIAGE_INPUT:-/dev/stdin}"
      jq -r --arg me "$ME" --arg trusted "${TRUSTED_ACTIONS:-}" '
        ($trusted | split("\n") | map(select(length > 0))) as $T
        | ($me | ascii_downcase) as $ME
        | .[]
        | select(.isDraft == false
                 and (.reviewDecision == "REVIEW_REQUIRED" or .reviewDecision == "CHANGES_REQUESTED"))
        | .number as $n
        | (if ((.files | type) != "array") or ((.files | length) == 0)
                or ((.authorLogin // "") == "") or ((.isCrossRepository | type) != "boolean")
                or ((.mergeStateStatus // "") == "") then "incomplete"
           elif .mergeStateStatus == "DIRTY" then "dirty"
           elif (.isCrossRepository == true) then "fork"
           elif ((.authorLogin // "") | ascii_downcase) == $ME then "self"
           elif any((.files // [])[];
                    test("^AGENTS\\.md$") or test("^CLAUDE\\.md$") or test("^Taskfile\\.yml$")
                    or test("^devbox\\.(json|lock)$") or test("^\\.sops\\.yaml")
                    or test("^\\.github/") or test("^\\.claude/")
                    or test("^policies/") or test("^schemas/")) then "governance"
           elif (.alreadyReviewedAtHead == true) then "reviewed"
           else "candidate" end) as $class
        | ([ (.addedActionPins // [])[]
             | .repo as $r | .ref as $ref
             | if ($T | index($r)) == null then "new-action:\($r)"
               elif ($ref | test("^[0-9a-fA-F]{40}$")) then empty
               else "non-sha:\($r)@\($ref)" end ]) as $flags
        | [ ($n | tostring), $class, (if ($flags | length) > 0 then ($flags | join(",")) else "-" end) ]
        | @tsv
      ' "$input"

  test:pr-triage:
    desc: 'Hermetic red-green test for pr:triage (the babysit-prs auto-review partition; in task ci)'
    summary: |
      Binding acceptance test for the security-critical babysit-prs classifier.
      Network-free: feeds a fixture PR-records JSON to `pr:triage` and asserts each
      PR's class + pin annotation. Red-green — the class precedence, the
      governance-path globs (AGENTS.md / .github/ / .claude/), the self/fork/dirty
      tests, the draft/APPROVED drop, and the pin allowlist + 40-hex-SHA check are
      the single source in pr:triage; reverting ANY turns an assertion red (a
      should-be-withheld PR would classify `candidate` = auto-approvable, or a
      dropped PR would reappear).
    cmd: |
      set -eu
      work="$(mktemp -d)" || { echo "test:pr-triage: mktemp failed" >&2; exit 2; }
      trap 'rm -rf "$work"' EXIT
      fixture="$work/records.json"
      cat > "$fixture" <<'JSON'
      [
        {"number":644,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["sub-layers/x/components/y/helm/values.yaml"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":100,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":true,"authorLogin":"outsider","mergeStateStatus":"BEHIND","files":["README.md"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":101,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"Nosmoht","mergeStateStatus":"BEHIND","files":["sub-layers/a/b.yaml"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":102,"isDraft":false,"reviewDecision":"CHANGES_REQUESTED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"DIRTY","files":["sub-layers/a/b.yaml"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":103,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":[".github/workflows/ci.yml"],"addedActionPins":[{"repo":"actions/checkout","ref":"1111111111111111111111111111111111111111"}],"alreadyReviewedAtHead":false},
        {"number":104,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":[".github/workflows/ci.yml"],"addedActionPins":[{"repo":"attacker/evil","ref":"2222222222222222222222222222222222222222"}],"alreadyReviewedAtHead":false},
        {"number":105,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":[".github/workflows/ci.yml"],"addedActionPins":[{"repo":"actions/checkout","ref":"v4"}],"alreadyReviewedAtHead":false},
        {"number":106,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["AGENTS.md"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":107,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":[".claude/skills/pr-gate/SKILL.md"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":108,"isDraft":false,"reviewDecision":"CHANGES_REQUESTED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["sub-layers/a/b.yaml"],"addedActionPins":[],"alreadyReviewedAtHead":true},
        {"number":109,"isDraft":true,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["sub-layers/a/b.yaml"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":110,"isDraft":false,"reviewDecision":"APPROVED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["sub-layers/a/b.yaml"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":111,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["Taskfile.yml"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":112,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":[".sops.yaml"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":113,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["CLAUDE.md"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":114,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["policies/base/no_privileged_containers.rego"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":115,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":["devbox.lock"],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":116,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"robertschneiderdevoba","mergeStateStatus":"BEHIND","files":[],"addedActionPins":[],"alreadyReviewedAtHead":false},
        {"number":117,"isDraft":false,"reviewDecision":"REVIEW_REQUIRED","isCrossRepository":false,"authorLogin":"","mergeStateStatus":"BEHIND","files":["sub-layers/a/b.yaml"],"addedActionPins":[],"alreadyReviewedAtHead":false}
      ]
      JSON
      export ME="Nosmoht"
      export TRUSTED_ACTIONS="$(printf 'actions/checkout\nactions/cache')"
      export PR_TRIAGE_INPUT="$fixture"
      out="$(task pr:triage)"
      echo "triage output:"; printf '%s\n' "$out" | sed 's/^/  /'
      fail=0
      cls() { printf '%s\n' "$out" | awk -F'\t' -v n="$1" '$1==n{print $2}'; }
      ann() { printf '%s\n' "$out" | awk -F'\t' -v n="$1" '$1==n{print $3}'; }
      assert_class() {
        got="$(cls "$1")"
        if [ "$got" != "$2" ]; then echo "FAIL: PR#$1 class expected '$2' got '${got:-<none>}'"; fail=1; fi
      }
      assert_annot() {
        got="$(ann "$1")"
        if [ "$got" != "$2" ]; then echo "FAIL: PR#$1 annotation expected '$2' got '${got:-<none>}'"; fail=1; fi
      }
      assert_absent() {
        if printf '%s\n' "$out" | awk -F'\t' -v n="$1" '$1==n{f=1} END{exit !f}'; then
          echo "FAIL: PR#$1 must be DROPPED (out of scope), but appeared"; fail=1
        fi
      }
      assert_class 644 candidate; assert_annot 644 '-'
      assert_class 100 fork
      assert_class 101 self
      assert_class 102 dirty            # DIRTY wins over the candidate it would otherwise be
      assert_class 103 governance; assert_annot 103 '-'                       # trusted + sha-pinned
      assert_class 104 governance; assert_annot 104 'new-action:attacker/evil'
      assert_class 105 governance; assert_annot 105 'non-sha:actions/checkout@v4'
      assert_class 106 governance       # AGENTS.md
      assert_class 107 governance       # .claude/
      assert_class 108 reviewed         # already reviewed at head → skip
      assert_absent 109                 # draft dropped
      assert_absent 110                 # APPROVED dropped
      # Full CODEOWNERS central-review tier is governance-withheld (not a subset):
      assert_class 111 governance       # Taskfile.yml (holds THIS classifier — self-modification guard)
      assert_class 112 governance       # .sops.yaml (secret-decryption access control)
      assert_class 113 governance       # CLAUDE.md
      assert_class 114 governance       # policies/*.rego (admission-control gate)
      assert_class 115 governance       # devbox.lock
      # Fail-closed: a degraded record is withheld, never defaulted to candidate:
      assert_class 116 incomplete       # empty files[] → gh gather degraded → withhold
      assert_class 117 incomplete       # missing authorLogin → withhold
      count="$(printf '%s\n' "$out" | grep -cE '[^[:space:]]' || true)"
      if [ "${count:-0}" -ne 17 ]; then echo "FAIL: expected exactly 17 in-scope lines, got ${count:-0}"; fail=1; fi
      if [ "$fail" -eq 0 ]; then echo "test:pr-triage OK — classifier matches the babysit-prs withhold contract (17 in-scope / 2 dropped)"; fi
      exit "$fail"

  lint:commit-scope:
    desc: 'Single-component check: staged changes must touch at most ONE component'
    summary: |
      Layer-B check logic for the pre-commit hook (lefthook calls this target).
      release-please maps commits to components PATH-based (commit-split): a commit
      touching files under more than one components/<c>/ would version-bump ALL of
      them at once. This check enforces "one commit = one component". Non-component
      files (Taskfile, .github, top-level docs) trigger no release and are tolerated.
      Deliberate cross-component commit: `git commit --no-verify`.
    cmd: |
      set -eu
      components="$(git diff --cached --name-only \
        | grep -oE '^sub-layers/[^/]+/components/[^/]+' \
        | sort -u || true)"
      count="$(printf '%s\n' "$components" | grep -cE '^sub-layers/' || true)"
      if [ "${count:-0}" -gt 1 ]; then
        echo "COMMIT BLOCKED — staged changes touch ${count} components (release-please is path-based;" >&2
        echo "one commit would version-bump all of them):" >&2
        printf '%s\n' "$components" | sed 's/^/  - /' >&2
        echo "Split into one commit per component, or override deliberately: git commit --no-verify" >&2
        exit 1
      fi

  lint:signing-config:
    desc: 'verify commit signing is configured locally (main enforces required_signatures); see README § Commit signing'
    summary: |
      Layer-B check logic for the pre-commit `signing-config` hook (lefthook calls
      this target). `main` enforces branch-protection required_signatures, so an
      unsigned commit makes the PR mergeStateStatus=BLOCKED. This gate fails fast
      when commit signing is not CONFIGURED locally (commit.gpgsign + user.signingkey),
      catching the common "never set it up" case before a PR is opened.

      Scope: it is a config-PRESENCE check, not a signature check — a key that is
      missing, wrong, or not registered on GitHub still passes here and is caught
      by the server-side required_signatures (the authoritative gate) + the GitHub
      Verified badge. Reads the merged git config, so a one-time GLOBAL setup
      satisfies it in every clone and worktree (see README § "Commit signing").

      Local pre-commit only — deliberately NOT wired into `task ci`: CI checkouts
      have no per-developer signing config, and required_signatures is the CI-side
      gate. Deliberate bypass: `git commit --no-verify`.
    cmd: |
      set -eu
      # --bool normalizes git's boolean spellings (true/yes/on/1) to "true" so a
      # valid `commit.gpgsign yes|on|1` is not mis-rejected (it errors → "" on an
      # unset/garbage value, which correctly falls through to BLOCKED).
      sign="$(git config --bool --get commit.gpgsign 2>/dev/null || true)"
      key="$(git config --get user.signingkey 2>/dev/null || true)"
      if [ "$sign" = "true" ] && [ -n "$key" ]; then
        exit 0
      fi
      echo "COMMIT BLOCKED — commit signing is not configured locally." >&2
      echo "main enforces required_signatures; an unsigned commit makes the PR BLOCKED." >&2
      echo "Configure once, globally (see README § \"Commit signing\"):" >&2
      echo "  git config --global gpg.format ssh" >&2
      echo "  git config --global user.signingkey <your-public-key>.pub" >&2
      echo "  git config --global commit.gpgsign true" >&2
      echo "then register that key on GitHub as a *Signing* key." >&2
      echo "Deliberate bypass (discouraged): git commit --no-verify" >&2
      exit 1

  validate:release-config:
    desc: 'release-please coverage: every component is a package + built components are in the manifest (apps#245)'
    summary: |
      Cross-checks the catalog component directories against release-please-config.json
      and .release-please-manifest.json so a newly added component cannot be silently
      left out of release management. Fails (exit 1) when:
        - a component dir is missing from the config
        - a config package has no matching component dir (stale entry)
        - a built config package (no initial-version) is missing from the manifest
        - a package's `component` field != its path-derived <sub-layer>/<component> id
        - a released package (a git tag <component>-vX.Y.Z exists) is missing from the
          manifest — guard E; closes the #318 gap that built/stub classification cannot
          (a released package still carrying initial-version is indistinguishable from a
          never-released stub once its manifest entry is gone). Guard E reads git tags, so
          the CI checkout MUST fetch tags (fetch-depth: 0); a tag-less checkout fails loud
          rather than passing vacuously.
      Reports (non-fatal ℹ, never exit 1):
        - a stub config package (has initial-version) is ALSO in the manifest — a
          vestigial initial-version on an already-released package; release-please
          reads the manifest, so it is harmless. Guard E (above) now protects the
          manifest entry regardless, so the field is genuine low-priority cleanup
          (#314: hard-failing this blocked every first-release PR; #318).
      bootstrap-sha/last-release-sha are top-level-only, so this directory↔config parity
      (plus the component-identity and the tagged↔manifest checks) is the mechanical guard
      against a forgotten, mis-named, or de-released component (apps#245, see issue #259).
    cmd: |
      # NOTE: no `set -o pipefail` and no `grep -q` over a pipe — go-task's embedded
      # mvdan/sh terminates the script on the SIGPIPE that grep -q raises when it
      # closes the pipe early under pipefail. Set membership is done with `comm`
      # over sorted temp files instead (no early pipe close). LC_ALL=C pins the
      # collation so `sort` and `comm` agree byte-for-byte regardless of locale.
      set -u
      export LC_ALL=C
      # Paths are env-overridable so `task test:release-config` can drive this same
      # logic against synthetic fixtures (the first-release transition is otherwise
      # only reproducible against the live files). Default to the real repo files.
      cfg="${RP_CONFIG:-release-please-config.json}"
      man="${RP_MANIFEST:-.release-please-manifest.json}"
      [ -f "$cfg" ] || { echo "✗ ${cfg} not found"; exit 2; }
      [ -f "$man" ] || { echo "✗ ${man} not found"; exit 2; }
      tmp=$(mktemp -d) || { echo "✗ mktemp failed"; exit 2; }
      trap 'rm -rf "$tmp"' EXIT
      # Every directory under components/ is an OCI distribution unit (a buildable
      # component) — there are NO stack/composition directories: a stack (e.g.
      # kube-prometheus-stack) is documented in the sub-layer README, never as a
      # components/ entry (ADR-0009). So the dir set maps 1:1 to release packages,
      # with no exclusion list to maintain.
      for d in sub-layers/*/components/*/; do printf '%s\n' "${d%/}"; done | sort > "$tmp/dirs"
      jq -r '.packages | keys[]' "$cfg" | sort > "$tmp/cfg"
      jq -r 'keys[]' "$man" | sort > "$tmp/man"
      jq -r '.packages | to_entries[] | select(.value | has("initial-version")) | .["key"]' "$cfg" | sort > "$tmp/stub_declared"
      jq -r '.packages | to_entries[] | [.["key"], (.value.component // "")] | @tsv' "$cfg" > "$tmp/kc"
      [ -s "$tmp/cfg" ] || { echo "✗ ${cfg} has no .packages (unreadable / corrupt?)"; exit 2; }
      # A package is a STUB (unreleased) only until release-please cuts its first
      # release and writes its manifest entry. The leftover initial-version is then
      # VESTIGIAL — release-please reads the manifest, not initial-version — and
      # harmless. So the operational stub set excludes manifest-present (released)
      # packages: that is exactly what lets a first-release PR (which adds the
      # manifest entry without stripping the config initial-version) pass this gate
      # instead of tripping the old "stub redundantly in manifest" hard-fail. (#314)
      comm -23 "$tmp/stub_declared" "$tmp/man" > "$tmp/stub"   # stub = declared initial-version, NOT yet released
      comm -23 "$tmp/cfg" "$tmp/stub" > "$tmp/built"   # built = all packages minus (still-unreleased) stubs
      fail=0
      report() { echo "✗ $1"; sed 's/^/    /' < "$2"; fail=1; }
      comm -23 "$tmp/dirs" "$tmp/cfg" > "$tmp/a"; [ -s "$tmp/a" ] && report "component dir(s) missing from ${cfg} (every components/ dir must be a release package — add a packages entry):" "$tmp/a"
      comm -13 "$tmp/dirs" "$tmp/cfg" > "$tmp/b"; [ -s "$tmp/b" ] && report "stale ${cfg} package(s) with no component dir:" "$tmp/b"
      comm -23 "$tmp/built" "$tmp/man" > "$tmp/c"; [ -s "$tmp/c" ] && report "built package(s) missing from ${man}:" "$tmp/c"
      # Vestigial initial-version on an already-released (manifest-present) package
      # is a non-fatal cleanup hint, NOT a release-blocker — the old hard-fail here
      # blocked every first-release PR (#314). release-please ignores the field once
      # the manifest entry exists; the maintainer may strip it at leisure.
      comm -12 "$tmp/stub_declared" "$tmp/man" > "$tmp/d"; [ -s "$tmp/d" ] && { echo "ℹ released package(s) still carrying a vestigial initial-version (harmless — release-please reads the manifest; strip at leisure):"; sed 's/^/    /' < "$tmp/d"; }
      # Each package's `component` (release-please's release identity → tag name / OCI
      # path) must equal the path-derived <sub-layer>/<component>; a typo there cuts a
      # mis-named tag while dir↔key parity still passes.
      awk -F'\t' '{want=$1; sub(/^sub-layers\//,"",want); sub(/\/components\//,"/",want); if ($2 != want) print $1": component=\""$2"\" expected=\""want"\""}' "$tmp/kc" > "$tmp/f"
      [ -s "$tmp/f" ] && report "package(s) whose 'component' field != path-derived id:" "$tmp/f"
      # Guard E (tagged ⟹ in manifest): a package that has EVER been released — a git tag
      # <component>-vX.Y.Z exists — MUST have a manifest entry, independent of any (possibly
      # vestigial) initial-version. release-please re-cuts a manifest-less package at its
      # initial-version, so a lost manifest entry for an already-released component is a
      # silent version downgrade. The built/stub classification alone cannot catch this:
      # once its manifest entry is gone, a released package that still declares initial-version
      # is indistinguishable from a never-released stub. Git tags are the durable record of
      # released-ness, so they close that gap (#318). Released component-ids come from the
      # tags with the SemVer suffix stripped (a component name never ends in -vN.N.N, so the
      # strip is unambiguous), mapped back to package keys via the kc (key<TAB>component) table.
      git tag -l '*-v[0-9]*' 2>/dev/null | sed -E 's/-v[0-9]+\.[0-9]+\.[0-9]+.*$//' | sort -u > "$tmp/tagged_comp"
      tagcount=$(wc -l < "$tmp/tagged_comp" | tr -d ' ')
      awk -F'\t' 'NR==FNR{rel[$0]=1; next} ($2 in rel){print $1}' "$tmp/tagged_comp" "$tmp/kc" | sort > "$tmp/tagged"
      # Silent-blinding guard: guard E reads git tags, which a shallow / tag-less checkout
      # does not fetch (the CI job MUST checkout with fetch-depth: 0). If the manifest says
      # packages are released but git exposes zero tags, the checkout is tag-less — fail loud
      # rather than let guard E pass vacuously (it would then miss every dropped release entry).
      if [ -s "$tmp/man" ] && [ "$tagcount" -eq 0 ]; then
        echo "✗ guard E cannot run: no git release tags visible — the checkout is tag-less (use fetch-depth: 0) (#318)"; fail=1
      fi
      comm -23 "$tmp/tagged" "$tmp/man" > "$tmp/e"; [ -s "$tmp/e" ] && report "released package(s) (a git tag <component>-vX.Y.Z exists) missing from ${man} — a lost release entry; release-please would re-cut at initial-version (#318):" "$tmp/e"
      if [ "$fail" = "0" ]; then
        echo "✓ release-please coverage OK: $(wc -l < "$tmp/cfg" | tr -d ' ') package(s), $(wc -l < "$tmp/man" | tr -d ' ') manifest entr(y/ies), $(wc -l < "$tmp/tagged" | tr -d ' ') released (tagged) all in manifest; component fields match; every components/ dir is a release package."
      fi
      exit "$fail"

  test:release-config:
    desc: 'Test of validate:release-config: first-release passes, coverage + guard-E gaps still fail (#314, #318)'
    summary: |
      Drives validate:release-config against fixtures derived from the LIVE config+
      manifest+git-tags (guard E reads real tags, so a fully synthetic fixture cannot
      exercise it; directory↔config parity stays satisfied — only stub/manifest/initial-
      version membership is mutated). Victims are selected order-independently and each
      case skips gracefully if its victim class is empty, so the task NEVER hard-fails on
      catalog-state drift — critical because it is wired into `task ci` (a zero-stub
      steady state must not exit non-zero) (#318). Three cases:
        A) first-release transition — a stub package (initial-version) added to the
           manifest at its initial-version MUST pass (the #314 regression that blocked
           every new component's first release). Skipped if no stub exists.
        B) coverage gap — a built (non-stub) package removed from the manifest MUST fail
           (proves the relaxation did not blind the "built missing from manifest" guard).
        C) guard-E gap (#318) — a RELEASED (git-tagged) package that STILL carries
           initial-version, removed from the manifest, MUST fail via guard E. Without
           guard E it would pass (reclassified as a never-released stub), so this case is
           red-green bound to guard E. Skipped if no tagged non-stub victim exists.
    cmd: |
      set -u
      export LC_ALL=C
      cfg="release-please-config.json"; man=".release-please-manifest.json"
      t=$(mktemp -d) || { echo "✗ mktemp"; exit 2; }
      trap 'rm -rf "$t"' EXIT
      jq -r 'keys[]' "$man" | sort > "$t/man-keys"
      jq -r '.packages | to_entries[] | select(.value|has("initial-version")) | .["key"]' "$cfg" | sort > "$t/stub-keys"
      # stub victim: any package declaring initial-version (a still-unreleased first release).
      stub=$(head -1 "$t/stub-keys")
      # built victim: a manifest entry whose config package is NOT a stub — a genuinely
      # released package (on the live repo these are exactly the tagged packages). Selected
      # order-independently (comm over sorted temp files) so it can never accidentally pick a
      # vestigial first-release stub that happens to sort first (#315 review).
      built=$(comm -23 "$t/man-keys" "$t/stub-keys" | head -1)
      ran=0

      # --- Case A: first-release transition (a stub now present in the manifest) MUST pass (#314) ---
      if [ -n "$stub" ]; then
        iv=$(jq -r --arg k "$stub" '.packages[$k]."initial-version"' "$cfg")
        jq --arg k "$stub" --arg v "$iv" '. + {($k): $v}' "$man" > "$t/man-A.json"
        if RP_CONFIG="$cfg" RP_MANIFEST="$t/man-A.json" task validate:release-config >/dev/null 2>&1; then
          echo "✓ Case A (first-release transition '$stub' @ $iv) passes"; ran=$((ran + 1))
        else
          echo "✗ Case A FAILED: a first-release stub-in-manifest must pass (#314 regression)"; exit 1
        fi
      else
        echo "ℹ Case A skipped: no initial-version stub in the config (zero-stub steady state) — nothing to transition (#318)"
      fi

      # --- Case B: a built (non-stub) package dropped from the manifest MUST fail ---
      if [ -n "$built" ]; then
        jq --arg k "$built" 'del(.[$k])' "$man" > "$t/man-B.json"
        if RP_CONFIG="$cfg" RP_MANIFEST="$t/man-B.json" task validate:release-config >/dev/null 2>&1; then
          echo "✗ Case B FAILED: a built package missing from the manifest must be caught"; exit 1
        else
          echo "✓ Case B (built '$built' missing from manifest) is still caught"; ran=$((ran + 1))
        fi
      else
        echo "ℹ Case B skipped: no released non-stub package to drop"
      fi

      # --- Case C: a RELEASED (git-tagged) package that STILL carries initial-version, dropped
      #     from the manifest, MUST fail via guard E. Without guard E it would pass: adding
      #     initial-version + removing the manifest entry reclassifies it as a never-released
      #     stub (declares initial-version ∧ absent from manifest), so the built-missing guard
      #     does not fire — the #318 gap. The case is red-green bound to guard E (revert guard E
      #     → this passes → the test reports Case C FAILED). The 'built' victim is, on the live
      #     repo, a tagged package; we confirm its tag before relying on guard E. ---
      comp=""; [ -n "$built" ] && comp=$(jq -r --arg k "$built" '.packages[$k].component // ""' "$cfg")
      if [ -n "$comp" ] && [ -n "$(git tag -l "${comp}-v[0-9]*" 2>/dev/null | head -1)" ]; then
        jq --arg k "$built" '.packages[$k]."initial-version" = "0.1.0"' "$cfg" > "$t/cfg-C.json"
        jq --arg k "$built" 'del(.[$k])' "$man" > "$t/man-C.json"
        if RP_CONFIG="$t/cfg-C.json" RP_MANIFEST="$t/man-C.json" task validate:release-config >/dev/null 2>&1; then
          echo "✗ Case C FAILED: a released (tagged) package still carrying initial-version, dropped from the manifest, must be caught by guard E (#318 gap)"; exit 1
        else
          echo "✓ Case C (vestigial-released '$built' dropped from manifest) is caught by guard E"; ran=$((ran + 1))
        fi
      else
        echo "ℹ Case C skipped: no released non-stub package with a git tag (guard E not exercisable here)"
      fi

      [ "$ran" -gt 0 ] && echo "✓ test:release-config OK (${ran} case(s) ran)" || echo "ℹ test:release-config: no cases applicable in the current catalog state"
      exit 0

  validate:trivyignore:
    desc: 'Guard: .trivyignore.yaml entry shape — bounded expired_at (≤ N=90 days out), non-empty statement, paths/purls scope (#478)'
    summary: |
      Validates the ENTRY SHAPE of the trivy CVE-ignore file BEFORE the
      CVE-remediation campaign starts populating it (issue #478, ADR-0018
      residual: ".trivyignore.yaml needs an entry-shape + expired_at ≤ N days +
      scope guard built EARLY, before the file is populated"). Only the
      `.vulnerabilities[]` list is read — the sole list the CVE scanner consumes
      via `--ignorefile` (misconfig/secret findings use other mechanisms). Every
      entry MUST:
        - carry an `id:` (the waived CVE) and a `statement:` that is a non-empty
          STRING (who accepted it + why — the CODEOWNERS-auditable rationale). A
          non-string statement (`[]`, a number) is rejected — `tostring` would
          otherwise coerce it to a non-empty value and slip past.
        - carry `expired_at:` (trivy requires it — an entry without one never
          expires) that is a REAL calendar date (a round-trip through jq
          strptime/strftime — 2026-06-31 would silently normalize to 07-01, so it
          is rejected) at most N days in the FUTURE. N defaults to 90; override
          with TRIVYIGNORE_MAX_DAYS (itself bounded to 1-365 — an unbounded
          override would re-open this same far-future hole). A far-future /
          effectively-permanent suppression that would accrue unchecked is rejected
          here. A PAST expired_at is left to trivy (it natively stops honouring an
          expired entry, so the CVE blocks again);
        - be SCOPED to a NARROW target with NO broad value: at least one `paths:`
          or `purls:` value MUST narrow the waiver AND every value MUST be narrow.
          A `paths:` value is narrow by a POSITIVE ALLOWLIST — a concrete
          slash-separated path (literal segment chars `[\w.@+-]`, an optional
          leading `/`, and an optional trailing `/*` or `/**`) and NOTHING else.
          ANY other glob metacharacter — braces `{}`, character classes `[]`, `?`,
          a mid-path `*`, a leading `**` — makes the value broad and rejected
          (allowlist over denylist: enumerating broad forms leaked a new one every
          round; `/usr/**` and `usr/lib/**` stay narrow). A `purls:` value is broad
          if `*`/`**`/`pkg:*` (type-only wildcard) or empty. A bare CVE `id`, or ANY
          broad value, waives that CVE catalog-wide (path/purl lists are OR-matched,
          so a broad glob beside a specific path still matches everything) and is
          rejected. A non-array `paths:`/`purls:` contributes no narrow value. The
          mechanical allowlist is the net for common shapes; CODEOWNERS review of
          every `.trivyignore.yaml` delta is the backstop for a legitimate exotic
          scope the allowlist rejects.
      An empty (`vulnerabilities: []`) or absent file passes trivially (no
      false-fail on the pre-campaign steady state). Wired into `task ci` as a
      repo-global merge-time gate alongside validate:release-config — deliberately
      NOT in the per-component publish hot path (ci:artifact), so one bad ignore
      entry cannot strand an already-cut tag. Red-green bound by
      test:validate-trivyignore (in `task ci` AND `task ci:artifact`).

      TRIVYIGNORE_FILE / TRIVYIGNORE_MAX_DAYS env seam mirrors
      validate:release-config's RP_CONFIG/RP_MANIFEST — it lets
      test:validate-trivyignore drive this exact logic against synthetic fixtures.
      Exit 0 = valid, 1 = bad entr(y/ies), 2 = setup/structural error (unreadable
      file, non-list `.vulnerabilities`).
    cmd: |
      # NOTE (mvdan/sh): no `set -o pipefail` + `grep -q` over a pipe — go-task's
      # embedded shell SIGPIPE-aborts on the early grep close (repo convention, cf.
      # validate:release-config). Findings are built in one yq pass (repo yq is
      # python-yq = jq over YAML→JSON, so a jq filter reads the .vulnerabilities
      # list directly), and the today+N-day cutoff is computed with jq date
      # builtins (strptime/mktime/strftime) — portable, no GNU-vs-BSD `date`
      # arithmetic. `today` itself is taken from `date` at runtime, never hardcoded.
      set -u
      f="${TRIVYIGNORE_FILE:-.trivyignore.yaml}"
      maxdays="${TRIVYIGNORE_MAX_DAYS:-90}"   # AC1: an entry may expire at most N days out; N defaults to 90.
      # Bound the override to a positive integer ≤ 365 days: an unbounded
      # TRIVYIGNORE_MAX_DAYS would re-open the far-future suppression hole this
      # guard exists to close (a >1-year waiver is never acceptable).
      case "$maxdays" in ''|*[!0-9]*) echo "✗ TRIVYIGNORE_MAX_DAYS='${maxdays}' must be a positive integer (1-365)"; exit 2 ;; esac
      if [ "$maxdays" -lt 1 ] || [ "$maxdays" -gt 365 ]; then
        echo "✗ TRIVYIGNORE_MAX_DAYS='${maxdays}' out of range — a suppression window must be 1-365 days"; exit 2
      fi
      # AC5: an absent file is trivially valid (nothing suppressed yet).
      if [ ! -f "$f" ]; then echo "✓ ${f} absent — nothing to validate"; exit 0; fi
      vtype="$(yq -r '.vulnerabilities | type' "$f" 2>/dev/null)" || { echo "✗ ${f}: unreadable / not valid YAML"; exit 2; }
      case "$vtype" in
        null)  echo "✓ ${f}: no 'vulnerabilities' entries — nothing to validate"; exit 0 ;;   # AC5: key absent / null
        array) : ;;
        *)     echo "✗ ${f}: '.vulnerabilities' must be a list, got '${vtype}'"; exit 2 ;;
      esac
      today="$(date -u +%Y-%m-%d)"   # computed at runtime, never hardcoded (AC1)
      findings="$(yq -r --arg today "$today" --arg maxdays "$maxdays" '
        ($maxdays | tonumber) as $md
        | ($today | strptime("%Y-%m-%d") | mktime) as $te
        | ($te + ($md * 86400)) as $cutoff
        | ($cutoff | strftime("%Y-%m-%d")) as $cutoffdate
        | (.vulnerabilities // [])
        | to_entries[]
        | .["key"] as $i
        | .["value"] as $e
        | (($e.id // "") | tostring | gsub("^\\s+|\\s+$"; "")) as $id
        | ($e.expired_at // "") as $exp
        | (($e.paths // []) | if type == "array" then length else 0 end) as $totpaths
        | (($e.purls // []) | if type == "array" then length else 0 end) as $totpurls
        | (($e.paths // []) | if type == "array" then (map(select((type == "string") and (test("^/?[\\w.@+-]+(/[\\w.@+-]+)*(/\\*\\*?)?$")))) | length) else 0 end) as $narrowpaths
        | (($e.purls // []) | if type == "array" then (map(select((type == "string") and (test("^(|\\*{1,2}|pkg:\\*.*)$") | not))) | length) else 0 end) as $narrowpurls
        | ($narrowpaths + $narrowpurls) as $narrowscope
        | (($totpaths + $totpurls) - $narrowscope) as $broadscope
        | [
            (if $id == "" then "entry[\($i)]: missing id field (the waived CVE)" else empty end),
            (if ($e.statement | type) != "string"
             then "entry[\($i)] (id=\($e.id // "?")): statement missing or not a string — AC2, a non-empty string rationale is required"
             elif (($e.statement | gsub("^\\s+|\\s+$"; "")) == "")
             then "entry[\($i)] (id=\($e.id // "?")): empty statement — AC2, rationale required"
             else empty end),
            (if $narrowscope == 0
             then "entry[\($i)] (id=\($e.id // "?")): unscoped — AC3, only a concrete path (opt. trailing /* or /**) or a specific purl is narrow; any other glob waives it catalog-wide"
             elif $broadscope > 0
             then "entry[\($i)] (id=\($e.id // "?")): broad scope value beside a narrow one — AC3, path/purl lists are OR-matched so a non-allowlisted glob still waives it catalog-wide"
             else empty end),
            (if ($exp | tostring) == ""
             then "entry[\($i)] (id=\($e.id // "?")): missing expired_at — AC1, trivy requires it (entry never expires)"
             elif (($exp | tostring) | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}$") | not)
             then "entry[\($i)] (id=\($e.id // "?")): expired_at=\($exp) is not YYYY-MM-DD — AC1"
             elif ((try (($exp | tostring) | strptime("%Y-%m-%d") | mktime | strftime("%Y-%m-%d")) catch "") != ($exp | tostring))
             then "entry[\($i)] (id=\($e.id // "?")): expired_at=\($exp) is not a real calendar date — AC1 (strptime would silently normalize it, e.g. 06-31 → 07-01, or reject it outright)"
             elif (($exp | strptime("%Y-%m-%d") | mktime) > $cutoff)
             then "entry[\($i)] (id=\($e.id // "?")): expired_at=\($exp) is more than \($md) days out (max \($cutoffdate)) — AC1"
             else empty end)
          ]
        | .[]
      ' "$f" 2>&1)" || { echo "✗ ${f}: validation program error:"; printf '%s\n' "$findings" | sed 's/^/    /'; exit 2; }
      if [ -n "$findings" ]; then
        echo "✗ ${f}: invalid ignore entr(y/ies):"
        printf '%s\n' "$findings" | sed 's/^/    /'
        echo "  → fix the entry (prefer an image bump over a long suppression); CODEOWNERS inspects every delta."
        exit 1
      fi
      n="$(yq -r '.vulnerabilities | length' "$f")"
      echo "✓ ${f}: ${n} ignore entr(y/ies) valid (expired_at ≤ ${maxdays}d out, non-empty statement, narrowly paths/purls-scoped)"
      exit 0

  test:validate-trivyignore:
    desc: 'Hermetic red-green test for the validate:trivyignore entry-shape guard (#478; in task ci + ci:artifact)'
    summary: |
      Binding acceptance test for the .trivyignore.yaml entry-shape guard (issue
      #478). Network-free: writes fixture ignore files to a temp dir and drives the
      REAL `task validate:trivyignore` (via the TRIVYIGNORE_FILE seam) over each,
      asserting accept/reject per AC. Relative dates (near/mid/far) are generated
      with jq date builtins so the test is calendar-independent — it never bit-rots
      as the fixed 90-day window advances. Red-green (AC7): neuter the guard (make
      it exit 0 unconditionally) and every REJECT case turns green in the guard →
      this test reports FAIL and exits 1. The N-day boundary case (mid = today+120d)
      is bound to the cutoff math: it MUST reject at the default N=90 and accept at
      N=200, so gutting the expired_at comparison also turns this test red.

      Review-hardening cases each red-green bind a further gate: broad-glob scope
      values (paths **, purls pkg:*, null) MUST reject (fix 1 — narrowness, not
      element count); TRIVYIGNORE_MAX_DAYS=9999 MUST reject a valid entry (fix 2 —
      the 1-365 ceiling); a slash-separated expired_at MUST reject with a CLEAN
      exit 1 via assert_reject_clean (fix 3 — dropping the format branch makes
      strptime error to exit 2 instead, which that exit-code-aware assert catches).
    cmd: |
      set -eu
      work="$(mktemp -d)"
      trap 'rm -rf "$work"' EXIT
      near="$(jq -rn 'now + 30*86400  | strftime("%Y-%m-%d")')"   # within 90d
      mid="$(jq -rn  'now + 120*86400 | strftime("%Y-%m-%d")')"   # past 90d, within 200d
      far="$(jq -rn  'now + 400*86400 | strftime("%Y-%m-%d")')"   # far future
      # Fixtures use UNQUOTED heredocs so $near/$mid/$far interpolate; no other `$`
      # appears in the bodies. The 6-space cmd indent is stripped by the YAML block
      # scalar, so each body lands at column 0 (same mechanism as test:trivy-extract).
      cat > "$work/ok-paths.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1001
          statement: accepted 2026-07 by CODEOWNERS; upstream fix pending, image bump tracked
          expired_at: $near
          paths:
            - usr/local/bin/app
      YAML
      cat > "$work/ok-purls.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1002
          statement: not reachable at runtime; waived pending minor bump
          expired_at: $near
          purls:
            - pkg:golang/stdlib@1.22
      YAML
      cat > "$work/far.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1003
          statement: has a rationale but the window is far too long
          expired_at: $far
          paths: [usr/bin/x]
      YAML
      cat > "$work/no-exp.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1004
          statement: no expiry, would never stop suppressing
          paths: [usr/bin/x]
      YAML
      cat > "$work/no-stmt.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1005
          expired_at: $near
          paths: [usr/bin/x]
      YAML
      cat > "$work/empty-stmt.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1006
          statement: "   "
          expired_at: $near
          paths: [usr/bin/x]
      YAML
      cat > "$work/bare.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1007
          statement: rationale present but no scope, waives the CVE catalog-wide
          expired_at: $near
      YAML
      cat > "$work/mid.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1008
          statement: expiry between 90 and 200 days out
          expired_at: $mid
          paths: [usr/bin/x]
      YAML
      cat > "$work/mixed.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1009
          statement: this entry is well formed
          expired_at: $near
          paths: [usr/bin/x]
        - id: CVE-2025-1010
          statement: this entry is unscoped
          expired_at: $near
      YAML
      cat > "$work/broad-paths.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1012
          statement: a recursive glob is still a catalog-wide waiver
          expired_at: $near
          paths: ["**"]
      YAML
      cat > "$work/broad-purls.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1013
          statement: a type-only purl wildcard is still a catalog-wide waiver
          expired_at: $near
          purls: ["pkg:*"]
      YAML
      cat > "$work/null-path.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1014
          statement: a null path element is not a narrowing scope
          expired_at: $near
          paths: [null]
      YAML
      cat > "$work/badfmt.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1015
          statement: well formed except for a slash-separated date
          expired_at: 2026/07/02
          paths: [usr/bin/x]
      YAML
      # --- cross-model (Codex) review fixtures ---
      cat > "$work/mixed-broad.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1016
          statement: a broad glob beside a narrow path is still catalog-wide (OR-matched)
          expired_at: $near
          paths: ["**", "usr/bin/x"]
      YAML
      cat > "$work/multi-narrow.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1017
          statement: two narrow paths, no broad value
          expired_at: $near
          paths: ["usr/bin/a", "usr/bin/b"]
      YAML
      cat > "$work/broad-purl-glob.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1018
          statement: a bare glob purl is still a catalog-wide waiver
          expired_at: $near
          purls: ["**"]
      YAML
      cat > "$work/badcal.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1019
          statement: June has no 31st; strptime would silently normalize it
          expired_at: "2026-06-31"
          paths: [usr/bin/x]
      YAML
      # --- review round 4 (Fix E): compound doublestar paths that match everything ---
      cat > "$work/glob-root.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1022
          statement: /** matches every path in trivy doublestar
          expired_at: $near
          paths: ["/**"]
      YAML
      cat > "$work/glob-anyfile.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1023
          statement: '**/* matches every path'
          expired_at: $near
          paths: ["**/*"]
      YAML
      cat > "$work/glob-anyany.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1024
          statement: '**/** matches every path'
          expired_at: $near
          paths: ["**/**"]
      YAML
      cat > "$work/subtree-abs.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1025
          statement: a concrete subtree is a legitimate narrow scope
          expired_at: $near
          paths: ["/usr/**"]
      YAML
      cat > "$work/subtree-rel.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1026
          statement: a concrete relative subtree is a legitimate narrow scope
          expired_at: $near
          paths: ["usr/lib/**"]
      YAML
      # --- review round 5 (Fix G): allowlist rejects EVERY glob metacharacter class ---
      cat > "$work/glob-brace.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1027
          statement: brace alternation matches multiple broad patterns
          expired_at: $near
          paths: ["{*,**/*}"]
      YAML
      cat > "$work/glob-class.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1028
          statement: a character class is still a wildcard
          expired_at: $near
          paths: ["[a-z]*"]
      YAML
      cat > "$work/glob-qmark.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1029
          statement: '?* matches any non-empty path'
          expired_at: $near
          paths: ["?*"]
      YAML
      cat > "$work/glob-anyq.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1030
          statement: '**/? is a broad recursive glob'
          expired_at: $near
          paths: ["**/?"]
      YAML
      cat > "$work/glob-badbracket.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1031
          statement: a lone bracket is not a concrete path
          expired_at: $near
          paths: ["["]
      YAML
      cat > "$work/long-path.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1032
          statement: a realistic deep concrete path with dots, digits and hyphens
          expired_at: $near
          paths: ["usr/local/lib/python3.13/site-packages/foo-1.2.dist-info"]
      YAML
      cat > "$work/arr-stmt.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1020
          statement: []
          expired_at: $near
          paths: [usr/bin/x]
      YAML
      cat > "$work/num-stmt.yaml" <<YAML
      vulnerabilities:
        - id: CVE-2025-1021
          statement: 42
          expired_at: $near
          paths: [usr/bin/x]
      YAML
      printf 'vulnerabilities: []\n' > "$work/empty-list.yaml"
      printf '# no vulnerabilities key\nother: value\n' > "$work/no-key.yaml"
      fail=0
      assert_reject() {   # $1=fixture $2=label ; $3.. = extra env (KEY=VAL ...)
        fx="$1"; lbl="$2"; shift 2
        if env "$@" TRIVYIGNORE_FILE="$fx" task validate:trivyignore >/dev/null 2>&1; then
          echo "FAIL: '$lbl' must be REJECTED by the guard"; fail=1
        else
          echo "ok reject: $lbl"
        fi
      }
      assert_accept() {   # $1=fixture $2=label ; $3.. = extra env
        fx="$1"; lbl="$2"; shift 2
        if env "$@" TRIVYIGNORE_FILE="$fx" task validate:trivyignore >/dev/null 2>&1; then
          echo "ok accept: $lbl"
        else
          echo "FAIL: '$lbl' must be ACCEPTED by the guard"; fail=1
          env "$@" TRIVYIGNORE_FILE="$fx" task validate:trivyignore 2>&1 | sed 's/^/    /'
        fi
      }
      assert_reject_clean() {   # $1=fixture $2=label ; $3.. = extra env — asserts a CLEAN finding (guard exit 1), not a setup/strptime error (exit 2)
        # go-task remaps EVERY non-zero cmd exit to its own code (201), so `$?` cannot
        # tell exit 1 from exit 2 through the `task` wrapper (verified). Bind instead on
        # two output signals that DO differ: the guard prints "invalid ignore entr(y/ies):"
        # only on its findings path, and go-task echoes the underlying "exit status 1".
        # Drop the format elif → strptime errors → "validation program error" + "exit
        # status 2" → neither signal present → this assert flips to FAIL (red).
        fx="$1"; lbl="$2"; shift 2
        out="$(env "$@" TRIVYIGNORE_FILE="$fx" task validate:trivyignore 2>&1 || true)"
        has_finding=0; has_exit1=0
        case "$out" in *"invalid ignore entr"*) has_finding=1 ;; esac
        case "$out" in *"exit status 1"*) has_exit1=1 ;; esac
        if [ "$has_finding" -eq 1 ] && [ "$has_exit1" -eq 1 ]; then
          echo "ok reject(clean finding, exit 1): $lbl"
        else
          echo "FAIL: '$lbl' must be REJECTED with a clean finding (guard exit 1); got:"; printf '%s\n' "$out" | sed 's/^/    /'; fail=1
        fi
      }
      # AC4 / AC5 — well-formed + empty/absent PASS
      assert_accept "$work/ok-paths.yaml"       "AC4 well-formed, paths-scoped"
      assert_accept "$work/ok-purls.yaml"       "AC4 well-formed, purls-scoped"
      assert_accept "$work/empty-list.yaml"     "AC5 vulnerabilities: []"
      assert_accept "$work/no-key.yaml"         "AC5 no vulnerabilities key"
      assert_accept "$work/does-not-exist.yaml" "AC5 absent file"
      # AC1 — expired_at rules
      assert_reject "$work/far.yaml"            "AC1 expired_at far in the future"
      assert_reject "$work/no-exp.yaml"         "AC1 missing expired_at"
      # AC2 — statement rules
      assert_reject "$work/no-stmt.yaml"        "AC2 missing statement"
      assert_reject "$work/empty-stmt.yaml"     "AC2 whitespace-only statement"
      # AC3 — scope rule (bare + broad-glob narrowness; review fix 1)
      assert_reject "$work/bare.yaml"           "AC3 bare CVE, no paths/purls"
      assert_reject "$work/broad-paths.yaml"    "AC3 broad glob paths (**)"
      assert_reject "$work/broad-purls.yaml"    "AC3 type-only purl wildcard (pkg:*)"
      assert_reject "$work/null-path.yaml"      "AC3 null path element (not narrowing)"
      # per-entry iteration: a single bad entry fails the whole file
      assert_reject "$work/mixed.yaml"          "one unscoped entry among valid ones"
      # AC1 N-day boundary bound to the cutoff math: +120d rejected at N=90, accepted at N=200
      assert_reject "$work/mid.yaml"            "AC1 expired_at +120d at default N=90"
      assert_accept "$work/mid.yaml"            "AC1 expired_at +120d at N=200" TRIVYIGNORE_MAX_DAYS=200
      # TRIVYIGNORE_MAX_DAYS ceiling (review fix 2): a valid entry rejected because the window is absurd
      assert_reject "$work/ok-paths.yaml"       "MAX_DAYS ceiling (9999 > 365)" TRIVYIGNORE_MAX_DAYS=9999
      # non-YYYY-MM-DD expired_at must be a CLEAN finding (exit 1), not a strptime setup error (exit 2) (review fix 3)
      assert_reject_clean "$work/badfmt.yaml"   "AC1 expired_at non-YYYY-MM-DD → clean finding (exit 1)"
      # --- cross-model (Codex) review: Fix A/B (broad+narrow scope), Fix C (calendar), Fix D (statement type) ---
      assert_reject "$work/mixed-broad.yaml"      "Fix A: broad glob (**) beside a narrow path"
      assert_accept "$work/multi-narrow.yaml"     "Fix A: two narrow paths, no broad value"
      assert_reject "$work/broad-purl-glob.yaml"  "Fix B: bare glob purl (**)"
      assert_reject_clean "$work/badcal.yaml"     "Fix C: calendar-invalid expired_at (2026-06-31) → clean finding"
      assert_reject "$work/arr-stmt.yaml"         "Fix D: array statement ([])"
      assert_reject "$work/num-stmt.yaml"         "Fix D: numeric statement (42)"
      # --- review round 4 (Fix E): positive-narrowness rejects compound all-glob paths, keeps subtrees ---
      assert_reject "$work/glob-root.yaml"        "Fix E: /** (matches every path)"
      assert_reject "$work/glob-anyfile.yaml"     "Fix E: **/* (matches every path)"
      assert_reject "$work/glob-anyany.yaml"      "Fix E: **/** (matches every path)"
      assert_accept "$work/subtree-abs.yaml"      "Fix E: /usr/** (concrete subtree, narrow)"
      assert_accept "$work/subtree-rel.yaml"      "Fix E: usr/lib/** (concrete subtree, narrow)"
      # --- review round 5 (Fix G): allowlist rejects every glob metacharacter class, keeps concrete paths ---
      assert_reject "$work/glob-brace.yaml"       "Fix G: brace alternation ({*,**/*})"
      assert_reject "$work/glob-class.yaml"       "Fix G: character class ([a-z]*)"
      assert_reject "$work/glob-qmark.yaml"       "Fix G: question-mark glob (?*)"
      assert_reject "$work/glob-anyq.yaml"        "Fix G: recursive question glob (**/?)"
      assert_reject "$work/glob-badbracket.yaml"  "Fix G: lone bracket ([)"
      assert_accept "$work/long-path.yaml"        "Fix G: deep concrete path (dots/digits/hyphens)"
      if [ "$fail" -eq 0 ]; then echo "test:validate-trivyignore OK — guard matches #478 AC1–AC5 + review hardening + cross-model + round-4 + allowlist fixes"; fi
      exit "$fail"

  validate:contract:
    desc: 'Customization-Contract self-consistency (ADR-0024 v2, Layer 1); optional: -- <sub-layer>/<component> to scope to one'
    summary: |
      Validates each component's customization.yaml against
      schemas/customization.schema.json (ADR-0024 v2 freeze-line contract) with
      check-jsonschema. Components WITHOUT customization.yaml are reported (not
      yet under contract).

      Scope: schema self-consistency only. The deeper render-time checks from
      ADR-0024 (config-file mount #1, selector non-nil #3, config snapshot #5)
      are a follow-up and require the Dex pilot component.
    cmd: |
      set -uo pipefail
      schema="schemas/customization.schema.json"
      # Optional per-component scope: `task validate:contract -- <sub-layer>/<component>`
      # validates only that component; with no arg, every component is validated.
      scope="{{.CLI_ARGS}}"
      if [ -n "$scope" ]; then
        set -- "sub-layers/${scope%/*}/components/${scope#*/}/"
      else
        set -- sub-layers/*/components/*/
      fi
      fail=0
      found=0
      missing=""
      for cdir in "$@"; do
        comp_id=$(echo "$cdir" | sed 's|sub-layers/||; s|/components/|/|; s|/$||')
        cfile="${cdir}customization.yaml"
        if [ ! -f "$cfile" ]; then
          missing="${missing}  - ${comp_id}"$'\n'
          continue
        fi
        found=$((found+1))
        if out=$(check-jsonschema --schemafile "$schema" "$cfile" 2>&1); then
          echo "✓ ${comp_id}"
        else
          echo "✗ ${comp_id}:"
          printf '%s\n' "$out" | sed 's/^/    /'
          fail=1
        fi
      done
      echo ""
      echo "→ ${found} component(s) validated against ${schema}."
      if [ -n "$missing" ]; then
        echo "Components WITHOUT customization.yaml (not yet under contract):"
        printf '%s' "$missing"
      fi
      exit $fail

  check:primitives:
    desc: 'Self-containment + A1 + verdict-schema + doc-conformance + harness-evolution-path parity of the .claude/ primitives'
    summary: |
      Deterministic hygiene gate for the repo-local Claude Code primitives
      (agents/skills/workflows/hooks). All checks fail-closed:
        (a) self-containment — no reference to a developer's global user config
            (~/.claude, claude-config, or a bare rules/<x>.md / references/<x>.md
            that is not the repo-local .claude/rules/). The primitives must stand
            alone for any developer who clones the repo.
        (b) A1 — no peer-agent names anywhere in an agent file (description OR
            body), self excepted. Routing lives in skills, never in a worker's
            prose or its routing description (prevents dead-documentation +
            O(N^2) coupling). Implemented by `check:agent-names` (parameterized
            + covered by `test:check-primitives`).
        (c) verdict-schema consistency — catches the schema-drift / non-local-
            invalidation class (a change to one consumer silently breaking
            another). Two canonical verdict contracts exist: the REVIEWER enum
            (approved|rejected|needs-info) and the EVALUATOR enum (pass|fail).
            Every agent that declares a verdict enum must use exactly one of them
            (discovered dynamically — a new reviewer is covered without editing
            this check); BOTH commit hooks (require-review.sh, pre-commit) must
            read `verdict` (never the retired `status`); the live workflow must
            dispatch both contracts with the canonical enums.
        (d) doc-conformance scope parity — DOCUMENTATION.md AND both reviewer
            prompts (catalog-evaluator, staff-reviewer) must each name every
            governed inline-comment file class (the canonical four; a hardcoded
            floor — a NEW class needs a one-line add here, deliberately NOT derived
            from DOCUMENTATION.md prose since a benign reflow could silently swap the
            oracle). PR #165 review: the prompts had narrowed to "manifest comments".
        (e) harness-evolution path parity — review-convergence.md's paths:
            FRONTMATTER (only) must carry a trigger glob for every canonical
            primitive dir (agents/skills/hooks/workflows/rules) PLUS
            **/DOCUMENTATION.md — a hardcoded floor, NOT "whatever the body names".
            Caught the missing .claude/rules/** (PR #165 finding #2): the body said
            rule edits are harness-evolution but the trigger did not load on them.
      Honest limits (NOT covered — by design or deferred): the agent-enum check
      normalizes whitespace then matches the value sequence exactly (catches dropped
      OR added values), but harvests only column-0 lowercase-kebab `verdict:` lines —
      an indented line or a value outside `[a-z-]` (title-case, digits) falls outside
      the grep harvest (it is not a full parser; the canonical values are
      lowercase-kebab so the harvest matches the real corpus). The WORKFLOW-enum
      check only asserts the canonical enum
      substring is PRESENT somewhere in catalog-fleet.js — a deliberate decoy comment
      or an enum on a non-dispatch line evades it (pinning the live dispatch line
      would need JS-parser semantics; the threat model is accidental drift, not an
      adversarial insider). A1 matches whole-token peer names only, so plural/affixed
      forms (`researchers`) are intentionally NOT flagged — a token boundary cannot
      tell the peer `researcher`+s from the English word without false-positiving.
      It also greps the JS dispatch-prompt enum, not the JS parser semantics (the
      parser is deliberately tolerant → 'errored'); it checks hook case-arm presence,
      not that each arm denies; the forgeable `reviewer-role` self-assertion is a
      known dormant-hook residual (see Plans/ + the hooks' own notes). (d)/(e) are
      accidental-drift guards over a hardcoded canonical floor (a NEW governed class
      or primitive dir needs a one-line add here — chosen over prose-derivation, which
      a benign reflow can silently mis-derive into a green check over the wrong set).
      (d) matches each class token as a fixed substring, so a prompt that keeps the
      token while flipping its scoping verb (an "out of scope: X" line) would
      false-pass; (e) scans only the frontmatter block, but a quoted glob mention there
      still satisfies it. Both fail-closed on a missing governing file; neither defends
      an adversarial edit — the semantic backstop is the 2-round harness-evolution review.
    cmd: |
      set -uo pipefail
      fail=0

      # (a) self-containment
      sc_hits=$(grep -rnE '~/\.claude|claude-config' .claude/agents .claude/skills .claude/workflows .claude/hooks 2>/dev/null || true)
      bare_hits=$(grep -rnE '(^|[^./[:alnum:]])(rules|references)/[a-z0-9-]+\.md' \
        .claude/agents .claude/skills .claude/workflows .claude/hooks 2>/dev/null \
        | grep -vE '\.claude/(rules|references)/' || true)
      if [ -n "$sc_hits$bare_hits" ]; then
        [ -n "$sc_hits" ] && printf '%s\n' "$sc_hits"
        [ -n "$bare_hits" ] && printf '%s\n' "$bare_hits"
        echo "✗ self-containment: primitive references a global user config (above)"
        fail=1
      else
        echo "✓ self-containment: no global-config references"
      fi

      # (b) A1 — no peer-agent names in any agent file (self excepted).
      #     Delegated to `check:agent-names` so the matching logic has ONE source
      #     and is unit-testable against fixtures (see `test:check-primitives`).
      if task check:agent-names; then :; else fail=1; fi

      # (c) verdict-schema consistency
      sc=0
      # Every agent verdict-enum line must be exactly one canonical contract.
      #   Delegated to `check:agent-verdicts` (harvest is whitespace- AND
      #   trailing-content-tolerant, normalize-then-exact-match on the value
      #   sequence, fail-closed on an empty corpus). Fixture-tested in
      #   `test:check-primitives`.
      if task check:agent-verdicts; then :; else sc=1; fi
      # No agent may carry a retired status:-keyed verdict block.
      stale=$(grep -rlE '^status: (approved|escalate|changes-requested|rejected|needs-info)' .claude/agents/*.md 2>/dev/null || true)
      [ -n "$stale" ] && { echo "✗ schema: retired status:-keyed verdict block in: $stale"; sc=1; }
      # Live workflow must dispatch BOTH contracts with the canonical enums.
      #   Delegated to `check:workflow-enums` (whitespace-tolerant ERE, not a
      #   fixed-string byte-match, so a cosmetic reformat does not cry wolf; the
      #   token values are still matched exactly). Fixture-tested in
      #   `test:check-primitives`.
      if task check:workflow-enums; then :; else sc=1; fi
      # Both commit hooks read `verdict`, not the retired `status`, and accept the three reviewer values.
      for hook in require-review.sh pre-commit; do
        grep -qF 'PRIMARY_VERDICT=' ".claude/hooks/$hook" || { echo "✗ schema: hooks/$hook does not read 'verdict'"; sc=1; }
        grep -qE 'get_yaml_field .*"status"' ".claude/hooks/$hook" && { echo "✗ schema: hooks/$hook still reads the retired 'status' field"; sc=1; }
        for v in approved rejected needs-info; do
          grep -qE "(^|\\|)[[:space:]]*${v}\\)" ".claude/hooks/$hook" || { echo "✗ schema: hooks/$hook lacks case arm for verdict '$v'"; sc=1; }
        done
      done
      [ "$sc" = 0 ] && echo "✓ verdict-schema consistent across agents/workflow/both hooks" || fail=1

      # (d) doc-conformance scope parity — DOCUMENTATION.md AND both reviewer prompts
      #     must each name every governed inline-comment file class. The class set is
      #     the canonical floor below (hardcoded, like (e)'s dir set; a NEW governed
      #     class in DOCUMENTATION.md needs a one-line add here). Hardcoding avoids
      #     deriving the oracle from fragile prose position — a benign reflow of
      #     DOCUMENTATION.md could otherwise make the check validate the WRONG/half set
      #     and still report green. Class tokens are quoted literals (helm/*.yaml is a
      #     glob) so the for-list never pathname-expands. Fail-closed on a missing file.
      dc=0
      for cls in 'helm/*.yaml' 'manifests/*.yaml' 'customization.yaml' 'compatibility.yaml'; do
        for f in DOCUMENTATION.md .claude/agents/catalog-evaluator.md .claude/agents/staff-reviewer.md; do
          if [ -f "$f" ] && grep -qF "$cls" "$f"; then :; else
            echo "✗ doc-conformance: $f omits governed inline-comment class '$cls'"
            dc=1
          fi
        done
      done
      [ "$dc" = 0 ] && echo "✓ doc-conformance: governed inline-comment classes present in DOCUMENTATION.md + both prompts (presence tripwire; scoping is review-judged)" || fail=1

      # (e) harness-evolution path parity — review-convergence.md's paths: FRONTMATTER
      #     must carry a trigger glob for every canonical primitive dir (the five below)
      #     plus the documentation standard, else a harness-evolution edit there does not
      #     load the 2-round reminder (PR #165 finding #2: .claude/rules/** was missing).
      #     The glob set is the fixed canonical floor (a NEW primitive dir needs a
      #     one-line add); the check asserts a floor, NOT "whatever the body names". Only
      #     the frontmatter block is scanned, so a body prose mention cannot satisfy it.
      #     Fail-closed on a missing file.
      #     A malformed frontmatter (no line-1 `---`, or no closing `---`) fails
      #     closed: the awk exits nonzero rather than over-capturing body prose (so a
      #     body glob mention cannot satisfy a dropped frontmatter glob).
      rc=.claude/rules/review-convergence.md
      he=0
      if [ ! -f "$rc" ]; then
        echo "✗ harness-evolution: $rc is missing"
        he=1
      elif fm=$(awk 'NR==1{if($0!="---") exit 2; next} $0=="---"{found=1; exit 0} {print} END{if(!found) exit 3}' "$rc"); then
        for glob in '.claude/agents/**' '.claude/skills/**' '.claude/hooks/**' '.claude/workflows/**' '.claude/rules/**' '**/DOCUMENTATION.md'; do
          if printf '%s\n' "$fm" | grep -qF "\"$glob\""; then :; else
            echo "✗ harness-evolution: $rc frontmatter paths: omits \"$glob\""
            he=1
          fi
        done
      else
        echo "✗ harness-evolution: $rc has no well-formed YAML frontmatter (--- … ---)"
        he=1
      fi
      [ "$he" = 0 ] && echo "✓ harness-evolution: review-convergence.md frontmatter carries every canonical primitive-dir + DOCUMENTATION.md glob" || fail=1

      if [ "$fail" != 0 ]; then echo ""; echo "check:primitives FAILED"; fi
      exit $fail

  check:agent-names:
    desc: 'A1 gate: no agent file names a peer agent (self excepted). AGENTS_DIR overridable.'
    summary: |
      Per-peer standalone-token scan: for each agent file, every OTHER agent's
      name must not appear as a standalone token. Self is excluded BEFORE
      matching (not filtered out afterwards) — that is what makes substring
      names safe. The token boundary [^-[:alnum:]] treats '-' as intra-token, so
      a name that is a hyphen-substring of another (`reviewer` inside
      `staff-reviewer`, or a future bare `reviewer` vs `plan-reviewer`) is NOT a
      false match, while a genuine standalone peer reference still is.
      Single source of the A1 logic: `check:primitives` calls this; the older
      build-all-names-alternation form false-positived on substring names.
      AGENTS_DIR defaults to .claude/agents; `test:check-primitives` passes
      fixture dirs to exercise both the false-positive and false-negative edges.
    cmd: |
      set -uo pipefail
      shopt -s nullglob
      # NOTE: go-task's shell aborts the whole script when the LAST command in a
      # loop body returns nonzero (verified: a mid-script `cond && stmt` is fine,
      # but `cond && stmt` as a loop body's final statement kills the run when
      # cond is false). So use if/fi for the flag-set — the loop body then ends on
      # `fi` (always 0). The summary line / `|| fail` idiom elsewhere is the same
      # guard at the top-level scope.
      dir='{{.AGENTS_DIR | default ".claude/agents"}}'
      a1=0
      found=0
      for f in "$dir"/*.md; do
        found=1
        self=$(basename "$f" .md)
        hits=""
        for g in "$dir"/*.md; do
          p=$(basename "$g" .md)
          if [ "$p" = "$self" ]; then continue; fi
          # Agent basenames are kebab-case ([a-z0-9-]+) → no ERE metachars to escape.
          # Boundary [^-[:alnum:]] treats '-' as intra-token, so a peer name glued
          # into a longer hyphenated name (incl. the self name) does not match.
          if grep -qE "(^|[^-[:alnum:]])${p}([^-[:alnum:]]|$)" "$f"; then
            hits="$hits $p"
          fi
        done
        if [ -n "$hits" ]; then
          echo "✗ A1: $self names peer agent(s):$hits"
          a1=1
        fi
      done
      if [ "$found" = 0 ]; then
        echo "✗ A1: no agent files found in $dir"
        exit 1
      fi
      if [ "$a1" = 0 ]; then
        echo "✓ A1: no peer-agent names in agent files"
      fi
      exit "$a1"

  check:workflow-enums:
    desc: 'Schema gate: the live workflow dispatches both canonical verdict enums. WORKFLOW_FILE overridable.'
    summary: |
      Whitespace-tolerant check that the workflow dispatches BOTH canonical
      verdict contracts in its dispatch-prompt strings (reviewer:
      approved|rejected|needs-info; evaluator: pass|fail). Uses ERE, not a
      fixed-string grep -F byte-match, so a cosmetic reformat (spaces around ':'
      or '|') does NOT cry wolf — yet the token values are matched exactly, so a
      genuinely missing or value-drifted enum still FAILS. Single source of the
      workflow-enum logic: `check:primitives` calls this. WORKFLOW_FILE defaults
      to .claude/workflows/catalog-fleet.js; `test:check-primitives` passes
      fixtures to exercise the reformat and drift edges.
    cmd: |
      set -uo pipefail
      wf='{{.WORKFLOW_FILE | default ".claude/workflows/catalog-fleet.js"}}'
      sc=0
      if [ ! -f "$wf" ]; then
        echo "✗ schema: workflow file not found: $wf"
        exit 1
      fi
      # `\|` is a literal pipe in the enum string; [[:space:]]* tolerates reformat.
      if ! grep -qE '"verdict"[[:space:]]*:[[:space:]]*"approved"[[:space:]]*\|[[:space:]]*"rejected"[[:space:]]*\|[[:space:]]*"needs-info"' "$wf"; then
        echo "✗ schema: $wf reviewer dispatch lacks the reviewer verdict enum (approved|rejected|needs-info)"
        sc=1
      fi
      if ! grep -qE '"verdict"[[:space:]]*:[[:space:]]*"pass"[[:space:]]*\|[[:space:]]*"fail"' "$wf"; then
        echo "✗ schema: $wf verify dispatch lacks the evaluator verdict enum (pass|fail)"
        sc=1
      fi
      if [ "$sc" = 0 ]; then
        echo "✓ workflow dispatches both canonical verdict enums"
      fi
      exit "$sc"

  check:agent-verdicts:
    desc: 'Schema gate: every agent verdict-enum line is exactly one canonical contract. AGENTS_DIR overridable.'
    summary: |
      For each agent file, every column-0 `verdict:` enum line whose values are
      lowercase-kebab (`[a-z-]`) must be exactly one canonical contract (reviewer:
      approved | rejected | needs-info; evaluator: pass | fail). The harvest is
      whitespace-tolerant AND has no trailing `$` anchor, so a non-spaced spelling
      (`approved|rejected`) OR a verdict line with a trailing `# comment` is still
      harvested and validated. Each enum is whitespace-normalized, then the value
      SEQUENCE is matched exactly, so a dropped OR an added value fails. Harvest scope
      (this grep is NOT a full parser — honest-limit also noted in check:primitives):
      an INDENTED verdict line, or values outside `[a-z-]` (title-case, digits), fall
      outside the harvest and are not validated. The canonical contracts are
      lowercase-kebab and the live agents write column-0 lines, so the harvest matches
      the real corpus; a parser-grade check is future work. Fail-closed on an empty
      corpus. Single source of the agent-verdict logic: `check:primitives` (c)
      delegates here. AGENTS_DIR defaults to .claude/agents; `test:check-primitives`
      passes fixtures.
    cmd: |
      set -uo pipefail
      shopt -s nullglob
      dir='{{.AGENTS_DIR | default ".claude/agents"}}'
      rev_enum='verdict: approved | rejected | needs-info'   # reviewer contract
      evl_enum='verdict: pass | fail'                        # builder-evaluator contract
      sc=0
      found=0
      for f in "$dir"/*.md; do
        found=1
        while IFS= read -r vline; do
          # Normalize whitespace around ':' and '|', strip trailing ws (incl. a CR),
          # then match the value sequence exactly against a canonical contract.
          norm=$(printf '%s' "$vline" | sed -E 's/^verdict:[[:space:]]*/verdict: /; s/[[:space:]]*\|[[:space:]]*/ | /g; s/[[:space:]]*$//')
          if [ "$norm" != "$rev_enum" ] && [ "$norm" != "$evl_enum" ]; then
            echo "✗ schema: $(basename "$f") declares non-canonical verdict enum: '$vline'"
            sc=1
          fi
        done < <(grep -oE '^verdict:[[:space:]]*[a-z-]+([[:space:]]*\|[[:space:]]*[a-z-]+)+' "$f" || true)
      done
      if [ "$found" = 0 ]; then
        echo "✗ schema: no agent files found in $dir"
        exit 1
      fi
      if [ "$sc" = 0 ]; then
        echo "✓ agent verdict enums canonical"
      fi
      exit "$sc"

  test:check-primitives:
    desc: 'Deterministic tests of the gate: A1 substring matching + workflow verdict-enum tolerance.'
    summary: |
      Hermetic fixtures (mktemp; no network) for the two fixture-testable gate
      sub-checks:
        A1 (check:agent-names):
          1. no false positive — a self-name containing a peer name as a
             hyphen-substring (`rev` in `rev-helper`) is NOT flagged;
          2. no false negative — a genuine standalone peer reference IS flagged.
        workflow enums (check:workflow-enums):
          3. a reformatted workflow (spaces around ':' and '|') still matches;
          4. a value-drifted enum (needs-info dropped) still FAILS.
        Plus: the real .claude tree passes both checks.
    cmd: |
      set -uo pipefail
      tmp=$(mktemp -d)
      trap 'rm -rf "$tmp"' EXIT
      errors=0

      # ---- A1: check:agent-names ----
      mkdir -p "$tmp/pass" "$tmp/fail"
      # PASS: rev-helper's self-name contains peer `rev` as a hyphen-substring;
      # no standalone peer reference → must NOT be flagged.
      printf 'Role: rev. Operates on its own.\n' > "$tmp/pass/rev.md"
      printf 'Role: rev-helper. Operates independently; emits findings only.\n' > "$tmp/pass/rev-helper.md"
      # FAIL: rev-helper keeps its self-name (hyphen-substring `rev`) AND adds a
      # genuine standalone reference to peer `rev` → flagged for `rev` only.
      printf 'Role: rev. Operates on its own.\n' > "$tmp/fail/rev.md"
      printf 'Role: rev-helper. Delegates to the rev agent for scoring.\n' > "$tmp/fail/rev-helper.md"

      if out=$(task check:agent-names AGENTS_DIR="$tmp/pass" 2>&1); then
        echo "✓ test: A1 substring self-name not false-flagged"
      else
        echo "✗ test: A1 PASS fixture was flagged (false positive):"; printf '%s\n' "$out"; errors=1
      fi
      if out=$(task check:agent-names AGENTS_DIR="$tmp/fail" 2>&1); then
        echo "✗ test: A1 FAIL fixture passed (false negative):"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'rev-helper names peer agent\(s\): rev$'; then
        echo "✓ test: A1 genuine standalone peer reference caught"
      else
        echo "✗ test: A1 FAIL fixture failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi
      # empty dir → fail-closed via the `found=0` guard (exit 1 + no-files message).
      mkdir -p "$tmp/empty"
      if out=$(task check:agent-names AGENTS_DIR="$tmp/empty" 2>&1); then
        echo "✗ test: A1 empty dir did not fail closed (found-guard regressed):"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'no agent files found'; then
        echo "✓ test: A1 empty dir fails closed"
      else
        echo "✗ test: A1 empty dir failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi

      # ---- workflow enums: check:workflow-enums ----
      # reformat: spaces around ':' and '|' in the reviewer enum → must still match.
      printf '%s\n' \
        'const reviewer = `{"role":"x", "verdict" : "approved" | "rejected" | "needs-info"}`' \
        'const verify = `{"verdict": "pass"|"fail"}`' \
        > "$tmp/wf_reformat.js"
      # drift: reviewer enum dropped `needs-info` → reviewer half must FAIL.
      printf '%s\n' \
        'const reviewer = `{"verdict": "approved"|"rejected"}`' \
        'const verify = `{"verdict": "pass"|"fail"}`' \
        > "$tmp/wf_broken.js"

      if out=$(task check:workflow-enums WORKFLOW_FILE="$tmp/wf_reformat.js" 2>&1); then
        echo "✓ test: workflow-enum reformat tolerated"
      else
        echo "✗ test: reformatted workflow rejected (over-strict):"; printf '%s\n' "$out"; errors=1
      fi
      if out=$(task check:workflow-enums WORKFLOW_FILE="$tmp/wf_broken.js" 2>&1); then
        echo "✗ test: value-drifted enum passed (false negative):"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'reviewer dispatch lacks the reviewer verdict enum'; then
        echo "✓ test: value-drifted reviewer enum caught"
      else
        echo "✗ test: drift fixture failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi

      # ---- agent verdicts: check:agent-verdicts ----
      mkdir -p "$tmp/av"
      # canonical agent (must NOT be flagged) + a drifted enum hidden behind a
      # trailing comment (the silent-drop edge — must still be harvested and FAIL).
      printf 'Role doc.\nverdict: approved | rejected | needs-info\n' > "$tmp/av/good.md"
      printf 'Role doc.\nverdict: approved | maybe   # a trailing comment must not hide drift\n' > "$tmp/av/drift.md"
      if out=$(task check:agent-verdicts AGENTS_DIR="$tmp/av" 2>&1); then
        echo "✗ test: agent-verdict drift behind a trailing comment passed (false negative):"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'drift.md declares non-canonical' && ! printf '%s' "$out" | grep -qE 'good.md'; then
        echo "✓ test: agent-verdict drift (trailing-comment edge) caught, canonical not flagged"
      else
        echo "✗ test: agent-verdict fixture failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi
      # empty corpus → fail-closed (own found guard, independent of the A1 check).
      if out=$(task check:agent-verdicts AGENTS_DIR="$tmp/empty" 2>&1); then
        echo "✗ test: agent-verdicts empty dir did not fail closed:"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'no agent files found'; then
        echo "✓ test: agent-verdicts empty dir fails closed"
      else
        echo "✗ test: agent-verdicts empty dir failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi

      # ---- real tree passes all three checks ----
      if task check:agent-names >/dev/null 2>&1 && task check:workflow-enums >/dev/null 2>&1 && task check:agent-verdicts >/dev/null 2>&1; then
        echo "✓ test: real .claude tree passes A1 + workflow-enum + agent-verdict checks"
      else
        echo "✗ test: real .claude tree is flagged"; errors=1
      fi

      if [ "$errors" = 0 ]; then echo "test:check-primitives PASSED"; else echo "test:check-primitives FAILED"; fi
      exit "$errors"

  # --- Security-Scans (Issue #11.8) ---

  scan:
    desc: alle Security-Scans (gitleaks + trivy + conftest + optional snyk)
    cmds:
      - task: scan:secrets
      - task: scan:trivy
      - task: scan:conftest
      - task: scan:psa-conformance
      - |
        if [[ -n "${SNYK_TOKEN:-}" ]]; then
          task scan:snyk
        else
          echo "SNYK_TOKEN nicht gesetzt — snyk skipped"
        fi

  scan:secrets:
    desc: 'gitleaks secret-scan (CI backstop to the lefthook hook); scoped to GITLEAKS_SCAN_RANGE if set, else full history'
    summary: |
      Server-side secret-detection backstop (ADR-0032 §Residual e). The lefthook
      `secrets` pre-commit job scans only staged hunks and is bypassable via
      `git commit --no-verify`; this is the CI backstop.

      Scope: with GITLEAKS_SCAN_RANGE="<base>..<head>" set, scans only that commit
      range (the PR/push diff); unset, scans the FULL committed history across all
      refs. security-scan.yml scopes pull_request/push to the event range so an
      unrelated in-flight branch's finding cannot fail this PR (apps#340); the weekly
      schedule leaves it unset → full all-refs sweep (the catch-all for history). An
      unresolvable range (empty, or an all-zeros/force-push 'before' SHA) falls back
      to a full scan, so the gate never errors on a degenerate range. The env-override
      mirrors validate:release-config's RP_CONFIG/RP_MANIFEST seam — no GHA-specific
      code in the task; locally `task scan:secrets` is the full scan.

      The .gitleaks.toml allowlist exempts local/fixtures/ (dummy E2E values only, per
      AGENTS.md "no real secrets even in tests") and the CRD-schema PEM placeholder
      (apps#334). Catalog code (sub-layers/) is fully scanned.
    cmd: |
      set -u
      range="${GITLEAKS_SCAN_RANGE:-}"
      # Scoped scan only when BOTH endpoints resolve to real commits AND the range is
      # non-empty; otherwise fall back to a full all-refs scan. The non-empty check
      # closes an empty-range no-op (base==head, or a reversed range, would scan zero
      # commits and pass); a degenerate/empty/unresolvable range must over-scan (full),
      # never under-scan — the gate fails safe toward more scanning, never a green pass
      # on an unscanned diff.
      if [ -n "$range" ] && git rev-parse -q --verify "${range%%..*}^{commit}" >/dev/null 2>&1 && git rev-parse -q --verify "${range##*..}^{commit}" >/dev/null 2>&1 && [ "$(git rev-list --count "${range}" 2>/dev/null || echo 0)" -gt 0 ]; then
        echo "gitleaks: scoped scan of ${range}"
        gitleaks git --config .gitleaks.toml --no-banner --redact --log-opts "${range}"
      else
        [ -n "$range" ] && echo "gitleaks: range '${range}' empty or unresolvable — running full scan"
        gitleaks git --config .gitleaks.toml --no-banner --redact
      fi

  scan:trivy:
    desc: Trivy-Misconfig-Scan über sub-layers/, SARIF-Output
    deps: [render]
    # trivy fs akzeptiert nur EIN Target — daher das gesamte sub-layers/-Verzeichnis
    # rekursiv scannen (statt 22 rendered-Dirs einzeln, was mit 'multiple targets
    # cannot be specified' scheitert). Erfasst rendered/manifest.yaml + Quell-Manifeste;
    # READMEs/compatibility.yaml werden vom Misconfig-Scanner ignoriert.
    cmd: |
      trivy fs sub-layers/ \
        --scanners misconfig,secret \
        --format sarif \
        --output trivy-results.sarif

  scan:conftest:
    desc: Conftest-Policies aus policies/ gegen alle Komponenten-rendered/-Manifeste
    deps: [render]
    cmd: |
      files=$(find sub-layers -path '*/components/*/rendered/manifest.yaml' -size +0 -type f)
      if [ -z "$files" ]; then
        echo "Keine nicht-leeren rendered/manifest.yaml gefunden — nichts zu prüfen"
        exit 0
      fi
      echo "Conftest gegen $(echo "$files" | wc -l | tr -d ' ') Komponenten-Manifeste:"
      echo "$files" | sed 's/^/  - /'
      echo ""
      conftest test --policy policies/ --all-namespaces $files

  scan:psa-conformance:
    desc: 'PSA conformance: each component workload must satisfy its declared Namespace enforce level (combine, per component)'
    deps: [render]
    summary: |
      base.pod_security_standards only checks the enforce LABEL is valid; it cannot
      see whether the shipped workloads CONFORM to that level — the Namespace and the
      workloads are SEPARATE conftest documents. This gate runs conformance.pod_security
      with `conftest test --combine` PER COMPONENT (so the combined input is one
      component's Namespace + its workloads) and denies a workload that violates the
      declared Baseline structural controls (hostPath, host namespaces, privileged,
      host ports, hostProcess, non-Default procMount, Unconfined seccomp). Catches the
      "declared enforce level too strict for the workload" defect (apps PR #328)
      deterministically, before it ships. Scope + deferred controls: see the policy
      header in policies/conformance/pod_security_conformance.rego.
    cmd: |
      rc=0
      files=$(find sub-layers -path '*/components/*/rendered/manifest.yaml' -size +0 -type f)
      for f in $files; do
        comp=$(echo "$f" | sed -E 's#sub-layers/([^/]+)/components/([^/]+)/.*#\1/\2#')
        if ! out=$(conftest test --combine --all-namespaces --policy policies/conformance/ "$f" 2>&1); then
          echo "✗ $comp"
          printf '%s\n' "$out" | grep 'FAIL' | sed 's/^/    /'
          rc=1
        fi
      done
      if [ "$rc" -eq 0 ]; then echo "✓ all components conform to their declared PSA enforce level"; fi
      exit $rc

  scan:conftest-verify:
    desc: Conftest-Policy-Selbsttests (testdata/-Korpus)
    cmd: conftest verify --policy policies/

  scan:snyk:
    desc: Snyk IaC-Scan (braucht SNYK_TOKEN)
    cmd: |
      snyk iac test sub-layers/ \
        --sarif-file-output=snyk-results.sarif

  # --- Image-CVE gate (G3b/E5, ADR-0018): extractor + scanner + PR/weekly/publish paths ---

  scan:extract-images:
    desc: 'Extract scannable image refs from rendered manifest(s): TRIVY_MANIFESTS="<paths>" task scan:extract-images'
    summary: |
      Pure, network-free image-ref extractor — the SINGLE source of the extraction
      regex, shared by the CVE-scan tasks and bound red-green by `task
      test:trivy-extract` (in `task ci` AND `task ci:artifact`). Reads rendered
      manifest paths from TRIVY_MANIFESTS (space-separated; catalog paths are
      `[a-z0-9-]`, so the intentional unquoted word-split is safe) and prints the
      unique scannable refs.

      Extraction (key-based, extends the proven validate:version pattern at
      Taskfile ~416/465):
        - matches `<prefix>[Ii]mage: <ref>` → catches image:, valkeyImage:,
          exporterImage:, initImage:, bare `busybox:1.37`. The value capture
          `[^"' ]+` keeps the WHOLE ref INCLUDING an `@sha256:` digest, so a
          `repo:tag@sha256` (scanned by digest) AND a digest-only `repo@sha256`
          pin (the most secure form) are both extracted and scanned.
        - TAG/DIGEST FILTER `:[^/]+$` (colon in the last path segment) keeps only
          refs carrying a tag or digest — the same shape the `base.no_latest_image_tag`
          conftest predicate `_has_explicit_tag_or_digest` accepts. A workload
          container image lacking both is already conftest-blocked (in ci:artifact,
          before publish), so the filter never drops a real workload image; it drops
          untagged non-pullable operator-config bare names (piraeus `csi-attacher`)
          and CRD-description prose (`image: docker.io/grafana/grafana.`), where
          scanning would fail-closed on a legitimate publish. `grep -vE '^-'` drops a
          malformed leading-`-` ref (trivy would parse it as a flag).
      SCOPE (not a completeness claim): only `[Ii]mage:`-keyed refs in the rendered
      artifact are covered. Image fields conftest does NOT police — env operands
      (`RELATED_IMAGE_*: value:`), Crossplane `spec.package`, nested-map
      `image:{repository,tag}` splits, non-`[Ii]mage` CR keys — are the operator-
      runtime / consumer-Kyverno layer's responsibility (ADR-0018). See the AGENTS.md
      residuals; the gate scans what the apps artifact directly declares, not every
      image an operator materialises at runtime.
    cmd: |
      set -eu
      manifests="${TRIVY_MANIFESTS:?usage: TRIVY_MANIFESTS=\"<rendered manifest paths>\" task scan:extract-images}"
      # grep no-match (exit 1) is masked by the trailing sort (exits 0 on empty
      # input) — "no images" is a valid, expected result. No pipefail (mvdan/sh).
      # `["']?` + `[^"' ]` tolerate double/single-quoted values and keep the whole
      # `repo[:tag][@sha256:digest]` ref; `:[^/]+$` requires a tag or digest;
      # `^-` refs (trivy flag-injection) are dropped. $manifests is intentionally
      # word-split (space-separated multi-path); catalog paths are `[a-z0-9-]`.
      grep -hoE "[a-zA-Z]*[Ii]mage: [\"']?[^\"' ]+" $manifests 2>/dev/null \
        | sed -E "s/^[a-zA-Z]*[Ii]mage: [\"']?//" \
        | grep -E ':[^/]+$' \
        | grep -vE '^-' \
        | sort -u

  scan:trivy-images-of:
    desc: 'CVE-scan a rendered component (or all): TRIVY_COMPONENT=<sl>/<c> task scan:trivy-images-of'
    summary: |
      The image-CVE gate scanner (E1/E5). Resolves the rendered manifest(s) in scope
      (TRIVY_COMPONENT=<sub-layer>/<component> → that one; unset → every component),
      extracts refs via scan:extract-images, and runs `trivy image` per ref. The E5
      wiring in oci-publish.yml is currently `continue-on-error` (advisory) during the
      catalog remediation; the fail-closed exit is what makes the eventual hard flip a
      one-line workflow change.

      Precondition: the in-scope component(s) MUST already be rendered (the caller
      renders — E5 via ci:artifact, the PR-check/weekly via render). A missing or
      empty rendered manifest exits non-zero (fail closed). A component that
      legitimately renders 0 scannable images (a `-crds` / config-only artifact)
      exits 0 — "nothing to scan". Extraction CORRECTNESS (that a component WITH
      images does not silently extract 0 through a regex regression) is guarded
      red-green at build time by test:trivy-extract, wired into BOTH `task ci` and
      `task ci:artifact` — there is deliberately no runtime "expected images" flag
      (it could not distinguish a legitimately-empty `-crds` render from a broken
      extractor, so it was dead weight / false confidence).

      trivy: `--scanners vuln --severity HIGH,CRITICAL --exit-code 1` (NO
      `--ignore-unfixed` → unfixed HIGH/CRITICAL also block, per E1);
      `--ignorefile .trivyignore.yaml` (native `expired_at:`); `-- "$img"` so a
      malformed leading-`-` ref cannot be parsed as a flag. Default `--db-repository`
      (`mirror.gcr.io/...,ghcr.io/...`) gives mirror-first + GHCR fallback.

      Exit: 0 = clean, non-zero = a CVE finding OR a scan/infra error (unpullable ref,
      DB miss, registry 429) — so E5 fails closed on either. go-task collapses any
      non-zero exit to a single code, so the CVE-vs-error distinction the weekly job
      needs is emitted on a stable `RESULT=cve|error|clean` line (the weekly greps
      `RESULT=cve`), so an infra flake is never mislabelled as a CVE finding.

      Severity policy (E1): blocks ALL HIGH/CRITICAL, incl. unfixed, by default.
      TRIVY_IGNORE_UNFIXED=1 adds `--ignore-unfixed` (block only fixable). It is NOT
      wired as a silent GHA repo variable — the E5 step pins it empty, so activation
      is a CODEOWNERS-reviewed workflow edit, not an out-of-band Settings toggle.
    cmd: |
      set -eu
      comp="${TRIVY_COMPONENT:-}"
      unfixed=""
      [ -n "${TRIVY_IGNORE_UNFIXED:-}" ] && unfixed="--ignore-unfixed"
      if [ -n "$comp" ]; then
        manifests="sub-layers/${comp%/*}/components/${comp#*/}/rendered/manifest.yaml"
        if [ ! -s "$manifests" ]; then
          echo "scan:trivy-images-of: rendered manifest missing/empty for '$comp' ($manifests) — render it first (fail closed)" >&2
          echo "scan:trivy-images-of: RESULT=error"
          exit 1
        fi
      else
        manifests="$(find sub-layers -path '*/components/*/rendered/manifest.yaml' -size +0 -type f | sort | tr '\n' ' ')"
        if [ -z "$(printf '%s' "$manifests" | tr -d '[:space:]')" ]; then
          echo "scan:trivy-images-of: no rendered manifests found — run 'task render' first (fail closed)" >&2
          echo "scan:trivy-images-of: RESULT=error"
          exit 1
        fi
      fi
      images="$(TRIVY_MANIFESTS="$manifests" task scan:extract-images)"
      count="$(printf '%s\n' "$images" | grep -cE '[^[:space:]]' || true)"
      if [ "${count:-0}" -eq 0 ]; then
        echo "scan:trivy-images-of: 0 scannable images in scope — nothing to scan (OK)"
        echo "scan:trivy-images-of: RESULT=clean"
        exit 0
      fi
      imgfile="$(mktemp)"
      trap 'rm -f "$imgfile"' EXIT
      printf '%s\n' "$images" > "$imgfile"
      cve=0; err=0
      echo "scan:trivy-images-of: scanning ${count} image(s)${comp:+ for $comp}"
      while IFS= read -r img; do
        [ -n "$img" ] || continue
        if trivy image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 \
             $unfixed --ignorefile .trivyignore.yaml --quiet -- "$img"; then
          echo "  OK    $img"
        else
          rc=$?
          if [ "$rc" -eq 1 ]; then
            echo "  BLOCK $img — HIGH/CRITICAL vulnerabilit(ies) found"
            cve=1
          else
            echo "  ERROR $img — trivy rc=$rc (scan/infra error)"
            err=1
          fi
        fi
      done < "$imgfile"
      # go-task collapses ANY non-zero cmd exit to a single code (201), so a distinct
      # 1-vs-2 exit is NOT observable by the caller. The exit is therefore just
      # pass/fail (0 = clean; non-zero → E5 fails closed on a CVE *or* a scan/infra
      # error), and the CVE-vs-error distinction the weekly job needs is emitted on a
      # stable RESULT= line it greps — so an infra flake is not mislabelled as a CVE.
      if [ "$cve" -eq 1 ]; then echo "scan:trivy-images-of: RESULT=cve"; exit 1; fi
      if [ "$err" -eq 1 ]; then echo "scan:trivy-images-of: RESULT=error"; exit 1; fi
      echo "scan:trivy-images-of: RESULT=clean"
      exit 0

  scan:trivy-cve:
    desc: 'Advisory diff-scoped image-CVE scan (PR early-warning; TRIVY_SCAN_RANGE=<base>..<head>)'
    summary: |
      E2 advisory PR-check: CVE-scans the images of the components changed in
      TRIVY_SCAN_RANGE (three-dot merge-base diff), rendering each in scope first.
      Fail-safe: any changed file that is neither inside a component dir nor
      pure-docs (a shared file — devbox.*, catalog/, policies/, workflows, Taskfile
      — can change every render) → full-catalog scan; unset/unresolvable range →
      full scan. ADVISORY: security-scan.yml runs it non-required (its diff-scope
      edge cases never block a merge); the HARD block is the E5 publish scan
      (scan:trivy-images-of in oci-publish.yml). Mirrors the scan:secrets
      GITLEAKS_SCAN_RANGE env-seam (apps#340).
    cmd: |
      set -eu
      range="${TRIVY_SCAN_RANGE:-}"
      full=no
      if [ -z "$range" ]; then
        full=yes
      elif [ "${range%%..*}" = "$range" ] \
        || ! git rev-parse -q --verify "${range%%..*}^{commit}" >/dev/null 2>&1 \
        || ! git rev-parse -q --verify "${range##*..}^{commit}" >/dev/null 2>&1 \
        || ! git merge-base "${range%%..*}" "${range##*..}" >/dev/null 2>&1; then
        echo "scan:trivy-cve: range '${range}' unresolvable — full-catalog scan"
        full=yes
      else
        changed="$(git -c core.quotePath=false diff --no-renames --name-only "${range%%..*}...${range##*..}" 2>/dev/null)" || full=yes
      fi
      if [ "$full" = no ]; then
        outside="$(printf '%s\n' "$changed" \
          | grep -vE '(^$|\.md$|^\.github/(ISSUE_TEMPLATE|PULL_REQUEST))' \
          | grep -vE '^sub-layers/[^/]+/components/[^/]+/' || true)"
        if [ -n "$(printf '%s' "$outside" | tr -d '[:space:]')" ]; then
          echo "scan:trivy-cve: shared/non-component change in range → full-catalog scan"
          full=yes
        fi
      fi
      if [ "$full" = yes ]; then
        task render >/dev/null
        task scan:trivy-images-of
        exit $?
      fi
      comps="$(printf '%s\n' "$changed" \
        | grep -oE '^sub-layers/[^/]+/components/[^/]+/' \
        | sed -E 's#^sub-layers/([^/]+)/components/([^/]+)/#\1/\2#' | sort -u || true)"
      if [ -z "$(printf '%s' "$comps" | tr -d '[:space:]')" ]; then
        echo "scan:trivy-cve: no component changes in range — nothing to scan"
        exit 0
      fi
      rc=0
      for c in $comps; do
        echo "scan:trivy-cve: $c"
        task render:one -- "$c" >/dev/null
        TRIVY_COMPONENT="$c" task scan:trivy-images-of || rc=1
      done
      exit $rc

  scan:trivy-cve-all:
    desc: 'Full-catalog image-CVE scan (weekly advisory + local baseline pre-flight)'
    summary: |
      Renders the whole catalog and CVE-scans every extracted image. Advisory: the
      local baseline pre-flight is `task scan:trivy-cve-all` over current main
      (remediate/.trivyignore.yaml-accept every HIGH/CRITICAL before the first
      post-merge publish, else it strands). The weekly security-scan.yml job renders
      and scans as SEPARATE steps (so a render flake is not mislabelled) and opens a
      `risk: high` issue only on a real CVE finding (scanner exit 1). Exit codes
      follow scan:trivy-images-of: 1 = HIGH/CRITICAL, 2 = scan/infra error.
    deps: [render]
    cmd: |
      task scan:trivy-images-of

  test:trivy-extract:
    desc: 'Hermetic red-green test for the scan:extract-images image extractor (G3b AC6-extraction; in task ci)'
    summary: |
      Binding acceptance test for the CVE-gate image extractor (issue G3b
      AC6-extraction). Network-free: writes a fixture rendered manifest and asserts
      scan:extract-images' output (9 kept / 5 dropped + a total-count bound).
      Red-green: the key-regex, the tag/digest filter and the leading-`-` reject are
      the single source in scan:extract-images; reverting ANY turns an assertion red —
      a bare-name / CRD-prose ref would be extracted, a real tag+digest or digest-only
      ref dropped, or a malformed `-`-ref kept. Refs are drawn from the real catalog
      renders (hubble tag+digest, valkey custom keys, grafana-operator-crds prose,
      piraeus bare names) plus a digest-only pin (A1) and a flag-injection ref (V3).
    cmd: |
      set -eu
      work="$(mktemp -d)"
      trap 'rm -rf "$work"' EXIT
      fixture="$work/manifest.yaml"
      cat > "$fixture" <<'YAML'
      apiVersion: apps/v1
      kind: Deployment
      spec:
        template:
          spec:
            containers:
              - name: a
                image: busybox:1.37
              - name: b
                image: "nginx:1.27-alpine"
            initContainers:
              - name: c
                image: docker.io/busybox:1.37.0
      ---
      apiVersion: grafana.integreatly.org/v1beta1
      kind: Grafana
      spec:
        deployment:
          spec:
            template:
              spec:
                containers:
                  - image: grafana/mimir:2.17.0
      ---
      apiVersion: hyperspike.io/v1
      kind: Valkey
      spec:
        valkeyImage: ghcr.io/hyperspike/valkey:8.1.4
        exporterImage: "ghcr.io/hyperspike/valkey-sidecar:v0.0.51"
      ---
      apiVersion: v1
      kind: Pod
      spec:
        containers:
          - name: single-quoted
            image: 'registry.k8s.io/pause:3.9'
      ---
      apiVersion: v1
      kind: Pod
      spec:
        containers:
          - name: relay
            image: "quay.io/cilium/hubble-relay:v1.19.4@sha256:59af8c0d561e560c2a042e7600a3496bc0367df8fbf868aa68d5834c8ec1a431"
      ---
      apiVersion: v1
      kind: Pod
      spec:
        containers:
          - name: digest-only
            image: "registry.k8s.io/coredns@sha256:451eee8bedcb2f029756dc3e9d73bab0e7943c1ac55cff3a4861c52a0fdd3e98"
          - name: leading-dash
            image: -evil:tag
      ---
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      spec:
        example1: Reference dashboards image, for example ghcr.io/team/dashboards:v1.4.7 here
        example2: 'Version sets the tag of the default image: docker.io/grafana/grafana.'
      ---
      apiVersion: piraeus.io/v1
      kind: LinstorSatelliteConfiguration
      spec:
        podTemplate:
          spec:
            initContainers:
              - name: drbd
                image: drbd9-noble
              - name: csi
                image: csi-attacher
      YAML
      images="$(TRIVY_MANIFESTS="$fixture" task scan:extract-images)"
      echo "extracted:"; printf '%s\n' "$images" | sed 's/^/  /'
      fail=0
      assert_has() {
        if ! printf '%s\n' "$images" | grep -qxF "$1"; then
          echo "FAIL: extractor must FIND '$1' (AC6-extraction)"; fail=1
        fi
      }
      assert_hasnt() {
        if printf '%s\n' "$images" | grep -qxF "$1"; then
          echo "FAIL: extractor must DROP '$1' (AC6-extraction)"; fail=1
        fi
      }
      assert_has 'busybox:1.37'
      assert_has 'nginx:1.27-alpine'
      assert_has 'grafana/mimir:2.17.0'
      assert_has 'ghcr.io/hyperspike/valkey:8.1.4'
      assert_has 'ghcr.io/hyperspike/valkey-sidecar:v0.0.51'
      assert_has 'docker.io/busybox:1.37.0'
      assert_has 'registry.k8s.io/pause:3.9'
      # tag+digest kept WHOLE (scanned by digest, not truncated to the tag)
      assert_has 'quay.io/cilium/hubble-relay:v1.19.4@sha256:59af8c0d561e560c2a042e7600a3496bc0367df8fbf868aa68d5834c8ec1a431'
      # digest-only pin kept + scanned (A1 — a `repo@sha256` best-practice pin must
      # NOT be silently dropped; binds the `[^"' ]` value capture red-green)
      assert_has 'registry.k8s.io/coredns@sha256:451eee8bedcb2f029756dc3e9d73bab0e7943c1ac55cff3a4861c52a0fdd3e98'
      assert_hasnt 'ghcr.io/team/dashboards:v1.4.7'
      assert_hasnt 'docker.io/grafana/grafana.'
      assert_hasnt 'drbd9-noble'
      assert_hasnt 'csi-attacher'
      # malformed leading-`-` ref dropped (V3 — would otherwise arg-inject trivy)
      assert_hasnt '-evil:tag'
      # total-count bound (staff-L1): a widened key-regex adds spurious refs the
      # per-item negatives do not enumerate — this catches "extractor gutted, still green".
      count="$(printf '%s\n' "$images" | grep -cE '[^[:space:]]' || true)"
      if [ "${count:-0}" -ne 9 ]; then
        echo "FAIL: expected exactly 9 extracted refs, got ${count:-0}"; fail=1
      fi
      if [ "$fail" -eq 0 ]; then echo "test:trivy-extract OK — extractor matches AC6-extraction (9 found / 5 dropped)"; fi
      exit "$fail"

  # --- Publish-Targets ---

  package:
    desc: 'pack the rendered manifest as a Kustomize-base OCI-layer tarball: task package -- <sub-layer>/<component> <tag>'
    summary: |
      Packs sub-layers/<sub-layer>/components/<component>/rendered/manifest.yaml into a
      single-layer tarball for ArgoCD native-OCI distribution (ADR-0009 §OCI-Artefakt-Form).
      No Helm-chart wrapper. The tarball is a trivial Kustomize base — kustomization.yaml
      (resources: [manifest.yaml]) + manifest.yaml — so the artifact resolves as
      sourceType=Kustomize and a consumer can overlay per-cluster fields via
      source.kustomize.patches (consumer source.path '.', identical render, no patches by
      default). This Kustomize-base shape evolves ADR-0009 §OCI-Artefakt-Form (single
      manifest → base) on the ADR-0024 calibrated-friction decision; the companion
      talos-platform-docs ADR-0009 amendment is a fast-follow. The OCI-manifest annotations
      are set by `task push` via `oras push --annotation`.

      Output: sub-layers/<sub-layer>/components/<component>/rendered/<component>-<tag>.tar.gz
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task package -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task package -- <sub-layer>/<component> <tag>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      chart_version="${tag#v}"

      root="sub-layers/${sub_layer}/components/${component}"
      manifest="${root}/rendered/manifest.yaml"
      test -s "$manifest" || { echo "ERROR: $manifest fehlt — vorher task render:one -- ${component_id}"; exit 1; }

      # ArgoCD-native-OCI erwartet EIN OCI-Artefakt mit genau einem Layer, dessen
      # Inhalt (tar.gz) die Manifeste im Root trägt — der Konsument referenziert es
      # mit source.path: '.'. Der Layer-Media-Type + die org.opencontainers.image.*-
      # Annotationen werden beim `task push` gesetzt (oras). Doku:
      # argo-cd.readthedocs.io/en/stable/user-guide/oci/
      out="${root}/rendered/${component}-${chart_version}.tar.gz"
      rm -f "$out"
      # Kustomize base: alongside manifest.yaml the tarball carries a trivial
      # kustomization.yaml (resources: [manifest.yaml]) so the artifact resolves as
      # sourceType=Kustomize. This lets a consumer overlay per-cluster fields via
      # source.kustomize.patches without a catalog PR (ADR-0024 calibrated-friction).
      # The base imposes no restriction of its own — a patch could technically touch
      # any field, including the image; the boundaries (image-digest pinning, no
      # hostPath / cluster-admin bindings) are enforced downstream by consumer-side
      # controls (cosign verifyImages, ADR-0018 Kyverno safe-defaults), not by this
      # format. A plain-manifest tarball would be sourceType=Directory with no patch
      # surface. `task render:one` still concatenates ALL Helm charts + raw manifests
      # into the one manifest.yaml — kustomization.yaml only references it (identical render).
      kust="${root}/rendered/kustomization.yaml"
      printf 'apiVersion: kustomize.config.k8s.io/v1beta1\nkind: Kustomization\nresources:\n  - manifest.yaml\n' > "$kust"
      # Gate before emitting the tarball (apps#508): the base MUST `kustomize build`.
      # kubeconform (lint:rendered) validates the raw manifest, but kustomize is stricter
      # — duplicate resource IDs (same GVK+namespace+name across the concatenated docs) or
      # an empty document pass kubeconform yet ABORT kustomize build, failing only at
      # consumer Argo reconcile. Validate the EXACT base being shipped, here, up front.
      if ! kustomize build "${root}/rendered" >/dev/null; then
        rm -f "$kust"
        echo "ERROR: 'kustomize build' failed for ${component_id} — the published base would fail at consumer Argo reconcile (duplicate resource IDs / empty doc?)" >&2
        exit 1
      fi
      # Portable tar (GNU + bsdtar): kustomization.yaml + manifest.yaml at the tarball root.
      tar -czf "$out" -C "${root}/rendered" kustomization.yaml manifest.yaml
      rm -f "$kust"
      echo "✓ Packaged: ${out}"

  push:
    desc: 'oras push einer Komponente: task push -- <sub-layer>/<component> <tag>'
    summary: |
      Pusht den via "task package" gebauten Manifest-Tarball als generisches
      OCI-Artefakt (ArgoCD-native-OCI, ADR-0009 §OCI-Artefakt-Form) nach
      OCI_REGISTRY/<sub-layer>/<component>:<tag> — Single-Layer, Media-Type
      application/vnd.oci.image.layer.v1.tar+gzip. KEIN Helm-Chart mehr.

      Default OCI_REGISTRY: ghcr.io/devobagmbh/talos-platform-apps

      Voraussetzungen:
        - rendered + packaged
        - oras login OCI_REGISTRY

      Beispiel: task push -- lifecycle/crossplane v0.1.0
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task push -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task push -- <sub-layer>/<component> <tag>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      chart_version="${tag#v}"

      root="sub-layers/${sub_layer}/components/${component}"
      pkg="${root}/rendered/${component}-${chart_version}.tar.gz"
      test -s "$pkg" || { echo "ERROR: $pkg fehlt — vorher task package -- ${component_id} $tag"; exit 1; }

      # OCI-Manifest-Annotationen (ArgoCD-UI + Supply-Chain-Provenance). ArgoCD liest
      # die org.opencontainers.image.*-Keys vom OCI-Manifest; oras setzt sie via
      # --annotation. revision + created sind Build-Zeit-dynamisch, der Rest deterministisch.
      repo_url="https://github.com/devobagmbh/talos-platform-apps"
      revision=$(git rev-parse HEAD 2>/dev/null || echo unknown)
      created=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      component_url="${repo_url}/tree/main/sub-layers/${sub_layer}/components/${component}"

      # app_version = reale Workload-Version (sot=app) aus compatibility.yaml, sonst Tag.
      compat="${root}/compatibility.yaml"
      app_version=""
      if [ -f "$compat" ]; then
        app_version=$(yq -r '[.provides[].version | select(.sot == "app") | .app] | .[0] // ""' "$compat" 2>/dev/null)
      fi
      app_version="${app_version:-$chart_version}"

      ref="{{.OCI_REGISTRY}}/${sub_layer}/${component}:${chart_version}"
      pkg_file="${component}-${chart_version}.tar.gz"
      echo "Pushing ${pkg} → oci://${ref}"
      # Aus rendered/ pushen (relativer Dateiname): oras lehnt absolute Pfade ab und
      # setzt den übergebenen Pfad als Layer-Title — so bleibt es der reine Dateiname.
      # --plain-http=false erzwingt HTTPS: oras nutzt für localhost-Refs sonst per
      # Default plain-HTTP und trifft die lokale mkcert-TLS-Registry (HTTPS) mit einem
      # HTTP-Request → 400. Für ghcr.io (kein localhost) ist der Flag ein No-op.
      ( cd "${root}/rendered" && oras push --plain-http=false "$ref" \
        --annotation "org.opencontainers.image.title=${component_id}" \
        --annotation "org.opencontainers.image.description=Pre-rendered Devoba-Platform-Komponente ${component_id}" \
        --annotation "org.opencontainers.image.version=${chart_version}" \
        --annotation "org.opencontainers.image.revision=${revision}" \
        --annotation "org.opencontainers.image.source=${repo_url}" \
        --annotation "org.opencontainers.image.url=${component_url}" \
        --annotation "org.opencontainers.image.created=${created}" \
        --annotation "org.opencontainers.image.authors=Devoba Platform Maintainers" \
        --annotation "platform.devoba.de/sub-layer=${sub_layer}" \
        --annotation "platform.devoba.de/component=${component}" \
        --annotation "platform.devoba.de/pre-rendered=true" \
        --annotation "platform.devoba.de/app-version=${app_version}" \
        "${pkg_file}:application/vnd.oci.image.layer.v1.tar+gzip" )
      echo "✓ Pushed: oci://${ref}"

  sign:
    desc: 'cosign sign keyless: task sign -- <sub-layer>/<component> <tag>'
    summary: |
      Signiert das native OCI-Artefakt via cosign keyless.
      Lokal-Setup (localhost/kind-registry) überspringt cosign.
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task sign -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task sign -- <sub-layer>/<component> <tag>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      chart_version="${tag#v}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}/${component}:${chart_version}"
      if [[ "{{.OCI_REGISTRY}}" == *"localhost"* ]] || [[ "{{.OCI_REGISTRY}}" == *"kind-registry"* ]]; then
        echo "Lokale Registry erkannt — cosign übersprungen"
        exit 0
      fi
      echo "Signing $ref (keyless)"
      cosign sign --yes "$ref"
      echo "✓ Signed: $ref"

  attest:
    desc: 'SBOM + SLSA-Attestations (vertagt nach Phase 2 — ADR-0009 § Phase-1-Scope)'
    cmd: |
      echo "Vertagt nach Phase 2+ (ADR-0009 § Phase-1-Scope)."
      echo "SLSA-v1-Provenance + CycloneDX-SBOM werden aktiviert, sobald externe"
      echo "Konsumenten existieren oder Audit-Anforderung greift."

  publish:
    desc: 'render → package → push → sign einer Komponente: task publish -- <sub-layer>/<component> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task publish -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task publish -- <sub-layer>/<component> <tag>}"
      task render:one -- "$component_id"
      task package    -- "$component_id" "$tag"
      task push       -- "$component_id" "$tag"
      task sign       -- "$component_id" "$tag"
      echo "✓ Published ${component_id}:${tag}"

  publish:sublayer:
    desc: 'render + push aller Komponenten eines Sub-Layers mit gleichem Tag: task publish:sublayer -- <sub-layer> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task publish:sublayer -- <sub-layer> <tag>}"
      tag="${2:?usage: task publish:sublayer -- <sub-layer> <tag>}"
      sldir="sub-layers/${sub_layer}/components"
      if [ ! -d "$sldir" ]; then
        echo "ERROR: ${sldir} existiert nicht"
        exit 1
      fi
      for cdir in "$sldir"/*/; do
        component=$(basename "$cdir")
        task publish -- "${sub_layer}/${component}" "$tag"
      done

  verify:
    desc: 'cosign verify einer Komponente: task verify -- <sub-layer>/<component> <tag>'
    summary: |
      Verifiziert die cosign-Keyless-Signature. Erwartete Identity:
        https://github.com/devobagmbh/talos-platform-apps/.github/workflows/oci-publish.yml@refs/tags/<sub-layer>/<component>-<tag>
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task verify -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task verify -- <sub-layer>/<component> <tag>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      # OCI-Tag ist die Chart-Version ohne v-Präfix (wie push/sign), nicht der Git-Tag
      chart_version="${tag#v}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}/${component}:${chart_version}"
      cosign verify "$ref" \
        --certificate-identity-regexp "^https://github\.com/devobagmbh/talos-platform-apps/\.github/workflows/oci-publish\.yml@refs/tags/${sub_layer}/${component}-.*$" \
        --certificate-oidc-issuer https://token.actions.githubusercontent.com

  # --- CI (lokal-äquivalent zur GHA-Pipeline) ---

  okf:install:
    desc: 'Install the pinned openknowledge CLI (not a Nix/devbox pkg) into .okf/bin'
    summary: |
      openknowledge is not packaged in Nixpkgs, so — as the one documented carve-out
      to CI convention 1 (tools come from devbox) — its CLI is installed from a
      version-pinned GitHub release asset whose per-platform sha256 is pinned in-repo
      below. Runs identically locally and in the GHA `ci` job (called by `task ci`);
      `.okf/` is GHA-cached (key = the Taskfile.yml hash) so a normal PR never re-downloads.
      No curl-pipe-to-shell — the tarball is checksum-verified BEFORE extraction and the
      binary is located by search inside the archive, fail-closed on any mismatch, with
      retry + timeout so a transient CDN blip does not hard-fail the required `ci` gate.

      Idempotent, checksum-gated: an existing .okf/bin (local OR GHA-cache-restored) is
      trusted for the skip only when its bytes match the repo-pinned BINARY sha256 below —
      integrity is the anchor, never the binary's self-reported `version` string alone (the
      version is re-checked too, but ONLY after the byte match, so untrusted bytes are never
      executed). This closes the #522-review vector: the GHA Actions cache is not CODEOWNERS/
      signing-protected and oci-publish.yml restores it under a prefix `restore-keys`
      fallback, so a poisoned okf-<os>-* entry could satisfy the old version-string-only skip
      and run unverified in the required `ci` gate. A checksum miss, version skew, or absent
      binary (e.g. a fresh checkout) falls through to the checksum-verified download below.

      Supply-chain trust model (ACCEPTED RESIDUAL): openknowledge-sh/openknowledge ships
      only checksums.txt for its releases — NO cosign signature, NO SLSA provenance
      (verified 2026-07-11). The inline sha256 therefore detects post-adoption asset
      tampering (a retagged release with different bytes fails closed) but does NOT defend
      against a pin-time upstream compromise; this is asymmetric with the repo's own
      cosign-keyless OCI signing and is accepted for a build-time doc validator. A version
      bump MUST re-pin ALL four tarball checksums AND all four binary checksums together
      (derive each binary sha by verifying the tarball sha, extracting, and hashing the
      binary) — a wrong/missing one fails closed on that platform with an explicit
      expected-vs-actual message (there is no mechanical OKF_VERSION<->checksum parity
      gate; accepted, the failure is loud).
    vars:
      OKF_VERSION: v0.5.0
    cmd: |
      set -u
      # OKF_BIN_DIR overrides the install/lookup dir; OKF_WANT_OVERRIDE overrides the wanted
      # version — both are test seams for test:okf-install (prod = .okf/bin + the pinned
      # OKF_VERSION), inert when unset. OKF_WANT_OVERRIDE lets the test construct a sha-matching
      # binary with a MISMATCHED wanted version, red-greening the version-identity clause.
      dest="${OKF_BIN_DIR:-.okf/bin}"
      bin="${dest}/openknowledge"
      want="${OKF_WANT_OVERRIDE:-{{.OKF_VERSION}}}"
      # sha256 helper — Linux (sha256sum) / macOS (shasum); used for both the tarball and
      # the on-disk binary integrity checks below.
      sha256_of() {
        if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1" | cut -d' ' -f1
        else shasum -a 256 "$1" | cut -d' ' -f1; fi
      }
      # Fail fast + loud in the MAIN shell if no sha256 tool exists: sha256_of runs inside
      # $(...) subshells where an `exit` would not terminate the task (it falls through to a
      # misleading downstream "checksum mismatch (empty)"), so the availability guard lives here.
      command -v sha256sum >/dev/null 2>&1 || command -v shasum >/dev/null 2>&1 || {
        echo "✗ no sha256 tool available (need sha256sum or shasum)"; exit 2; }
      os=$(uname -s | tr '[:upper:]' '[:lower:]')
      case "$(uname -m)" in
        x86_64|amd64)  arch=amd64 ;;
        arm64|aarch64) arch=arm64 ;;
        *) echo "✗ unsupported arch: $(uname -m)"; exit 2 ;;
      esac
      # Per-platform sha256 of the v0.5.0 release TARBALLS (openknowledge-sh/openknowledge
      # releases/download/v0.5.0/checksums.txt). A version bump re-pins ALL of these.
      case "${os}_${arch}" in
        linux_amd64)  sha="0f58de81e52f064fbf52aac5289e0b1b6dc0e58de2f47c4e043263e9e927cb27" ;;
        linux_arm64)  sha="227479edc8965a2a70b5380a23f3e5f8f4fc4685e70bc878bda227f7548cf6d1" ;;
        darwin_amd64) sha="29801d38436903b043812d04e0a5e364f167c54ab54760cc6cc87a933292f834" ;;
        darwin_arm64) sha="8316f6206943e42973f6645b9deebba46299038f223cc1b1fe42d5cb2fac2150" ;;
        *) echo "✗ no pinned checksum for ${os}_${arch}"; exit 2 ;;
      esac
      # Per-platform sha256 of the EXTRACTED openknowledge BINARY (v0.5.0) — the integrity
      # anchor for the idempotent skip + GHA cache-hit path (#522 review). Derived via the
      # tarball chain of trust: verify the tarball sha, extract, hash the binary.
      case "${os}_${arch}" in
        linux_amd64)  bin_sha="c1a6ffd314a4ac5c2c22aff2d8f922c7cebb3b3efe9f4b1b378074e63c699273" ;;
        linux_arm64)  bin_sha="a689710aad02b6bdbd430eaa362369f3a57d0c06b7bce16542f24e4030ce255d" ;;
        darwin_amd64) bin_sha="cda8e9360db1fd3ab2bffbc250b1cf493d6e68bd8e3e76048b7773054b80493c" ;;
        darwin_arm64) bin_sha="f8d813e92b032830bfb1081e6d099e248b9a00d7eb8490626eb990b79b2885e5" ;;
        *) echo "✗ no pinned binary checksum for ${os}_${arch}"; exit 2 ;;
      esac
      # Idempotent skip — checksum-gated (integrity) THEN version-checked (identity): an
      # existing binary (local OR GHA-cache-restored) is trusted only when its bytes match
      # the repo-pinned bin_sha. `&&` short-circuits, so `$bin version` runs ONLY after the
      # byte match — it never executes attacker-controlled bytes, yet still binds the skip
      # to OKF_VERSION so a version bump that forgets to re-pin bin_sha self-heals to a
      # re-download instead of silently running the stale binary.
      if [ -x "$bin" ] && [ "$(sha256_of "$bin")" = "$bin_sha" ] && [ "$("$bin" version 2>/dev/null)" = "${want#v}" ]; then
        echo "✓ openknowledge ${want} present + checksum-verified at ${bin}"
        exit 0
      fi
      # Test seam (test:okf-install): assert the gate DECISION without the network download.
      # Reaching here means the on-disk binary is absent or failed the checksum/version gate;
      # in verify-only mode report that (exit 3) instead of downloading. No-op in production.
      if [ "${OKF_INSTALL_VERIFY_ONLY:-}" = 1 ]; then
        echo "✗ okf:install verify-only: no checksum-verified ${want} binary at ${bin} (would download)" >&2; exit 3
      fi
      asset="openknowledge_${os}_${arch}.tar.gz"
      url="https://github.com/openknowledge-sh/openknowledge/releases/download/${want}/${asset}"
      tmp=$(mktemp -d "${TMPDIR:-/tmp}/okf-install.XXXXXX") || { echo "✗ mktemp failed"; exit 2; }
      trap 'rm -rf "$tmp"' EXIT
      echo "↓ downloading ${asset} (${want})"
      # --retry + timeouts: this runs in the required `ci` gate, so a transient CDN 5xx/429
      # or slow connect must fail fast + retry, never hang to the job limit.
      curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused --connect-timeout 20 --max-time 180 \
        -o "${tmp}/${asset}" "$url" || { echo "✗ download failed: $url"; exit 2; }
      actual=$(sha256_of "${tmp}/${asset}")
      if [ "$actual" != "$sha" ]; then
        echo "✗ checksum mismatch for ${asset}"; echo "  expected ${sha}"; echo "  actual   ${actual}"; exit 2
      fi
      # Defense-in-depth (post-checksum): before extracting, refuse an archive that could write
      # outside $tmp — absolute or ../-traversing member NAMES, OR a symlink/hardlink member (whose
      # target a name-scan cannot see, so a `evil -> /abs/path` + `evil/x` pair could otherwise
      # escape). Portable pre-scan (avoids GNU-only tar guard flags). Fires only behind the tarball-
      # checksum gate, so it hardens the residual upstream/pin-time-compromise case; the pinned
      # v0.5.0 asset is plain regular files (LICENSE/README/notices/binary), no links.
      if tar -tzf "${tmp}/${asset}" | grep -qE '^/|(^|/)\.\.(/|$)'; then
        echo "✗ archive contains absolute or path-traversing entries — refusing to extract"; exit 2
      fi
      if tar -tvzf "${tmp}/${asset}" | grep -qE '^[lh]'; then
        echo "✗ archive contains a symlink/hardlink member — refusing to extract"; exit 2
      fi
      tar -xzf "${tmp}/${asset}" -C "$tmp" || { echo "✗ extract failed"; exit 2; }
      found=$(find "$tmp" -type f -name openknowledge | head -1)
      [ -n "$found" ] || { echo "✗ openknowledge binary not found in archive"; exit 2; }
      # Defense-in-depth: the extracted binary must match the pinned binary sha before
      # install (the tarball sha covers download integrity; this pins the exact bytes the
      # skip / cache-hit path will later trust).
      found_sha=$(sha256_of "$found")
      if [ "$found_sha" != "$bin_sha" ]; then
        echo "✗ extracted binary checksum mismatch"; echo "  expected ${bin_sha}"; echo "  actual   ${found_sha}"; exit 2
      fi
      # Guard mkdir + install: there is no `set -e`, so an unguarded failure here would
      # fall through to the success echo and exit 0 with .okf/bin absent/stale.
      mkdir -p "$dest" || { echo "✗ mkdir ${dest} failed"; exit 2; }
      install -m 0755 "$found" "$bin" || { echo "✗ install to ${bin} failed"; exit 2; }
      echo "✓ installed openknowledge ${want} → ${bin}"

  okf:validate:
    desc: 'Validate the knowledge/ OKF bundle (structure + link resolution)'
    summary: |
      Two gates over the knowledge/ Open Knowledge Format bundle:
        1. `openknowledge validate` — structural OKF conformance (frontmatter/type,
           reserved-file rules, log dates, UTF-8, markdown syntax); exits 1 on errors.
        2. issue gate — `openknowledge validate` reports broken and bundle-ESCAPING links
           as WARNINGS only (exit 0), so this enforces them: `list --json` surfaces each
           as an issues[] entry, and this fails on ANY issue (predominantly link-target).
           `(.issues // [])` is robust to whether a clean concept omits the key (v0.4.0)
           or emits `[]` (a possible future serialization).
      Link-closure enforcement lives in gate 2, NOT the core validator: `openknowledge
      validate` (gate 1) reports broken/bundle-escaping links as WARNINGS and exits 0, so
      gate 2 (`list --json` + the jq issue-check below) is the layer that actually fails the
      build on them (and CI runs gate 2). Uses the checksum+version-verified
      .okf/bin/openknowledge from the okf:install dependency — never an unverified
      `openknowledge` from PATH (a binary of that name on PATH is not the pinned one).
    deps: [okf:install]
    cmd: |
      set -u
      # okf:install (dep) guarantees .okf/bin/openknowledge is present AND checksum+version
      # verified before this runs, so validate trusts ONLY that binary — no PATH fallback,
      # which would execute an unverified binary and void the pin's guarantee (#522 review).
      okf=".okf/bin/openknowledge"
      [ -x "$okf" ] || { echo "✗ verified openknowledge missing at ${okf} — run: task okf:install"; exit 2; }
      "$okf" validate ./knowledge || exit 1
      tmp=$(mktemp "${TMPDIR:-/tmp}/okf-list.XXXXXX") || { echo "✗ mktemp failed"; exit 2; }
      trap 'rm -f "$tmp"' EXIT
      "$okf" list --json ./knowledge > "$tmp" || { echo "✗ openknowledge list failed"; exit 2; }
      # Fail on ANY reported issue (broken/escaping links + any other OKF warning class).
      # Robust to clean concepts omitting `issues` OR emitting an empty array.
      if jq -e '[.[] | select((.issues // []) | length > 0)] | length == 0' "$tmp" >/dev/null; then
        echo "✓ OKF issue gate: no bundle issues (all links resolve inside the bundle)"
      else
        echo "✗ OKF issue gate: bundle issues (unresolved/escaping links or other OKF warnings):"
        jq -c '.[] | select((.issues // []) | length > 0) | {path, issues}' "$tmp"
        exit 1
      fi
      echo "✓ knowledge/ OKF bundle valid"

  okf:freshness:
    desc: 'OKF freshness (advisory): flag knowledge/ concepts whose sources: changed in the PR range without a timestamp bump'
    summary: |
      PR-scoped staleness gate for the knowledge/ OKF bundle (AGENTS.md § Knowledge-bundle
      maintenance). For every concept whose `sources:` frontmatter lists a file changed in the
      PR range, that concept's own `timestamp:` MUST be bumped in the SAME range (the
      re-verification signal). A newly-ADDED concept is fresh by definition (its whole body,
      incl. timestamp, is one +hunk).

      Range seam mirrors lint:pr: OKF_FRESHNESS_RANGE="<base>..<head>" — okf-freshness.yml sets
      it from the PR base/head SHAs; test:okf-freshness drives it over throwaway-repo fixtures.
      THREE-dot (merge-base) diff so main's concurrent changes are excluded. FAILS CLOSED on an
      empty/malformed range, an unresolvable SHA, or no shared merge base — same guard as lint:pr.

      Posture: ADVISORY by default — a stale FINDING prints and exits 0. OKF_FRESHNESS_STRICT=1 makes
      a finding exit 1 (the #541 blocking flip: set it in okf-freshness.yml + add the job to
      branch-protection required checks). The fail-closed guard above (unevaluable range) always exits
      1, in either posture — an un-runnable gate is visibly red, not silently green; today it is a
      non-required check so even a red run never blocks a merge. test:okf-freshness runs STRICT to
      assert exit codes. Pure git/awk (no openknowledge binary).
      Local: OKF_FRESHNESS_RANGE="origin/main..HEAD" task okf:freshness

      `sources:` parsing handles a block sequence AND single-line flow-style (`[a, b]`); a source
      listed as a DIRECTORY (trailing `/` or a tree at head) matches any changed path beneath it.
      Known limitations (accepted for the advisory stage; hardened before the #541 strict flip):
        - Enforces "someone re-verified" (a timestamp VALUE change), NOT that the content is correct —
          catches the dominant "forgot the concept entirely" case; content correctness stays review's job.
        - A MULTI-LINE flow-style `sources:` (the `[` and `]` on different lines) is not parsed — the
          single-line form is; a renamed concept resets its freshness obligation. Broad sources
          (AGENTS.md/Taskfile.yml) fire often — audit source specificity before the strict flip (#541).
    cmd: |
      set -eu
      range="${OKF_FRESHNESS_RANGE:-}"
      base="${range%%..*}"
      head="${range##*..}"
      # Fail closed: empty/malformed range, unresolvable SHA, or unrelated histories (no merge base) —
      # else `git diff A...B` errors and a swallowed exit would pass vacuously (cf. lint:pr).
      if [ -z "$range" ] || [ "$base" = "$range" ] \
         || ! git rev-parse -q --verify "${base}^{commit}" >/dev/null 2>&1 \
         || ! git rev-parse -q --verify "${head}^{commit}" >/dev/null 2>&1 \
         || ! git merge-base "${base}" "${head}" >/dev/null 2>&1; then
        echo "OKF-FRESHNESS BLOCKED — OKF_FRESHNESS_RANGE '${range}' is empty, unresolvable, or the two commits share no merge base (fail closed)" >&2
        exit 1
      fi
      if ! changed="$(git -c core.quotePath=false diff --name-only "${base}...${head}" 2>/dev/null)"; then
        echo "OKF-FRESHNESS BLOCKED — 'git diff ${base}...${head}' failed (fail closed)" >&2
        exit 1
      fi
      srctmp="$(mktemp)" || { echo "OKF-FRESHNESS BLOCKED — mktemp failed (fail closed)" >&2; exit 1; }
      trap 'rm -f "$srctmp"' EXIT
      stale=0
      # Timestamp VALUE from a concept's FRONTMATTER (bounded to the first ---...--- block; the whole
      # value incl. any internal colons — never split on ':' — so an ISO 8601 datetime compares whole).
      ts_of() { awk 'NR==1&&/^---[[:space:]]*$/{infm=1;next} infm&&/^---[[:space:]]*$/{exit} infm&&/^timestamp:/{sub(/^timestamp:[[:space:]]*/,"");print;exit}'; }
      # Iterate concepts from the PR-HEAD tree. NO git pathspec anywhere (ls-tree post-filtered by
      # grep, timestamps read via the repo-root-relative `<rev>:<path>` form) so the check is
      # cwd-independent — it works from another checkout (the test seam) as well as a normal CI clone.
      # Sources-less files (index/log) are skipped.
      for concept in $(git ls-tree -r --name-only "$head" | grep -E '^knowledge/.*\.md$' || true); do
        body="$(git show "${head}:${concept}" 2>/dev/null)" || continue
        # Extract `sources:` items — bounded to the frontmatter (first `---` .. next `---`) so a
        # `- ` bullet in the body is never mistaken for a source. Handles BOTH a block sequence
        # (`- path` lines) AND single-line flow-style (`sources: [a, b]`); the flow branch `next`s
        # before the block branch, so the two shapes never double-count. Quote stripping uses
        # \047 (octal single-quote) inside a STRING-regex to avoid a literal ' in the awk script.
        srcs="$(printf '%s\n' "$body" | awk '
          NR==1 && /^---[[:space:]]*$/ {infm=1; next}
          infm && /^---[[:space:]]*$/ {exit}
          infm && /^sources:[[:space:]]*\[/ {
            s=$0; sub(/^sources:[[:space:]]*\[/,"",s); sub(/\].*$/,"",s);
            n=split(s, a, ",");
            for (i=1;i<=n;i++) { it=a[i];
              gsub("^[[:space:]]+","",it); gsub("[[:space:]]+$","",it);
              gsub("^[\"\047]","",it); gsub("[\"\047]$","",it);
              if (it!="") print it; }
            next
          }
          infm && /^sources:/ {f=1; next}
          infm && f && /^[[:space:]]*-[[:space:]]/ {sub(/^[[:space:]]*-[[:space:]]*/,""); sub(/[[:space:]]+$/,""); print; next}
          infm && f && /^[^[:space:]-]/ {f=0}
        ')"
        if [ -z "$srcs" ]; then
          # sources: present but nothing parseable (single-line block AND single-line flow ARE
          # handled) — a MULTI-LINE flow (`[` and `]` on separate lines) or other exotic shape is
          # SURFACED, not silently skipped, so it cannot route around the gate invisibly (#522
          # review). Full YAML parsing is a #541 item. A concept with no `sources:` key at all
          # (index/log) simply produces no warning.
          if printf '%s\n' "$body" | awk 'NR==1&&/^---[[:space:]]*$/{infm=1;next} infm&&/^---[[:space:]]*$/{exit} infm&&/^sources:/{f=1} END{exit !f}'; then
            echo "⚠ okf:freshness: ${concept} — sources: present but no parseable items (multi-line flow / exotic shape treated as UNCHECKED)" >&2
          fi
          continue
        fi
        # Did any declared source change in-range? A FILE source matches a changed path exactly
        # (grep -Fx); a DIRECTORY source (trailing `/`, or a tree object at head) matches any
        # changed path beneath it — git diff emits file paths, never bare directory names, so a
        # bare dir source would otherwise never fire. awk index($0,p)==1 is a literal prefix test
        # (no regex escaping of the path). Loop is heredoc-fed (not piped) so `hit` survives.
        printf '%s\n' "$srcs" > "$srctmp"
        hit=""
        while IFS= read -r src; do
          [ -z "$src" ] && continue
          isdir=0
          case "$src" in
            */) isdir=1; src="${src%/}" ;;
            *) # tree at head OR base — the base check catches a source dir DELETED at head (no
               # longer a tree there) whose removed children would otherwise miss the file-mode match.
               if [ "$(git cat-file -t "${head}:${src}" 2>/dev/null || true)" = tree ] \
                  || [ "$(git cat-file -t "${base}:${src}" 2>/dev/null || true)" = tree ]; then isdir=1; fi ;;
          esac
          if [ "$isdir" = 1 ]; then
            h="$(printf '%s\n' "$changed" | awk -v p="${src}/" 'index($0,p)==1{print; exit}')"
          else
            h="$(printf '%s\n' "$changed" | grep -Fx "$src" | head -1 || true)"
          fi
          if [ -n "$h" ]; then hit="$h"; break; fi
        done < "$srctmp"
        [ -z "$hit" ] && continue
        # Fresh iff the concept is NEW at base (no ts_base) OR its timestamp VALUE changed
        # base→head (the re-verification bump). Both reads use `<rev>:<path>` (root-relative).
        ts_head="$(printf '%s\n' "$body" | ts_of)"
        ts_base="$(git show "${base}:${concept}" 2>/dev/null | ts_of || true)"
        # Fresh iff NEW at base (no ts_base) OR the timestamp changed to a NON-EMPTY value. Removing
        # or blanking the timestamp at head (ts_head empty) is NOT a re-verification → falls through
        # to STALE rather than being read as "changed".
        if [ -z "$ts_base" ] || { [ -n "$ts_head" ] && [ "$ts_base" != "$ts_head" ]; }; then
          continue
        fi
        echo "STALE: ${concept} — source '${hit}' changed without a timestamp bump" >&2
        stale=$((stale + 1))
      done
      if [ "$stale" -gt 0 ]; then
        if [ "${OKF_FRESHNESS_STRICT:-}" = 1 ]; then
          echo "✗ okf:freshness: ${stale} stale concept(s) — bump timestamp + re-verify (STRICT)" >&2; exit 1
        fi
        echo "⚠ okf:freshness (advisory): ${stale} stale concept(s) — bump timestamp + re-verify; see AGENTS.md § Knowledge-bundle maintenance" >&2
        exit 0
      fi
      echo "✓ okf:freshness: no stale concepts in range"

  test:okf-freshness:
    desc: 'Test of okf:freshness: stale/fresh/no-source/new-concept detection + fail-closed + advisory-vs-strict; red-green bound to the sources↔timestamp rule'
    summary: |
      Hermetic red-green test (wired into `task ci`, no network; the REAL repo is never mutated).
      Builds a throwaway git repo with concept fixtures as SIBLING commits off a common base, then
      drives okf:freshness through its OKF_FRESHNESS_RANGE + OKF_FRESHNESS_STRICT seams (GIT_DIR /
      GIT_WORK_TREE point git at the temp repo; `task -d <root>` keeps go-task on the real Taskfile).
      Scenarios (STRICT unless noted):
        1  source changed, timestamp NOT bumped          → non-zero AND names the concept (STALE)
        2  source changed, timestamp bumped              → 0 (the re-verification signal)
        3  non-source file changed                       → 0 (concept's sources untouched)
        4  NEW concept whose source also changed         → 0 (fresh by definition)
        5  empty range                                   → non-zero (fail closed)
        6  scenario-1 tree, advisory (STRICT unset)      → 0 AND prints the advisory warning
        7  source changed, body edited, SAME timestamp   → non-zero (pins "timestamp VALUE changed")
        8  ISO datetime source changed, sub-hour bump    → 0 (pins full-value timestamp extraction)
        9  source changed, timestamp field REMOVED       → non-zero (empty ts_head ≠ a re-verification)
        10 flow-style `sources: [x]` source changed      → non-zero (flow-style is parsed, not skipped)
        11 file under a DIRECTORY source changed         → non-zero (directory prefix match)
        12 MULTI-LINE flow `sources:` (unparseable)      → prints a ⚠ warning (surfaced, not silently skipped)
    cmd: |
      set -eu
      root="$(git rev-parse --show-toplevel)"
      tmp="$(mktemp -d)" || { echo "test:okf-freshness: mktemp failed" >&2; exit 2; }
      trap 'rm -rf "$tmp"' EXIT
      gitc() { git -C "$tmp" "$@"; }
      mkf() { mkdir -p "$tmp/$(dirname "$1")"; printf '%s\n' "${2:-x}" > "$tmp/$1"; }
      mkconcept() {  # $1 path  $2 timestamp  $3 source-path  [$4 body]. `printf '%s\n' <lines...>` —
        # the task interpreter (mvdan/sh) does NOT support `printf --`, and a format starting with `-`
        # is misparsed; passing each line as an ARG (format '%s\n', reused per arg) sidesteps both.
        mkdir -p "$tmp/$(dirname "$1")"
        printf '%s\n' '---' 'type: reference' 'title: t' "timestamp: $2" 'sources:' "  - $3" '---' '' "${4:-Body prose.}" > "$tmp/$1"
      }
      gitc init -q
      gitc config user.email t@example.invalid
      gitc config user.name test
      gitc config commit.gpgsign false
      # base: concept x (date ts) sourcing src.txt; concept z (ISO datetime ts) sourcing zsrc.txt;
      # plus the sources + an unrelated other.txt
      mkconcept knowledge/reference/x.md 2026-01-01 src.txt
      mkconcept knowledge/reference/z.md 2026-01-01T14:30:00Z zsrc.txt
      mkf src.txt s0; mkf zsrc.txt z0; mkf other.txt o0
      # 10/11 fixtures: fx.md uses FLOW-STYLE `sources: [fsrc.txt]`; dx.md sources a DIRECTORY `dsrc`
      mkf fsrc.txt f0
      printf '%s\n' '---' 'type: reference' 'title: t' 'timestamp: 2026-01-01' 'sources: [fsrc.txt]' '---' '' 'Body.' > "$tmp/knowledge/reference/fx.md"
      mkf dsrc/inner.txt d0
      printf '%s\n' '---' 'type: reference' 'title: t' 'timestamp: 2026-01-01' 'sources:' '  - dsrc' '---' '' 'Body.' > "$tmp/knowledge/reference/dx.md"
      # 12 fixture: mlfx.md uses MULTI-LINE flow (`[` and `]` on separate lines) — NOT parsed; must warn
      mkf mlsrc.txt m0
      printf '%s\n' '---' 'type: reference' 'title: t' 'timestamp: 2026-01-01' 'sources: [' '  mlsrc.txt,' ']' '---' '' 'Body.' > "$tmp/knowledge/reference/mlfx.md"
      gitc add -A; gitc commit -q -m base; base="$(gitc rev-parse HEAD)"
      # 1 stale: change the source only
      gitc checkout -q "$base"; mkf src.txt s1
      gitc add -A; gitc commit -q -m stale; head_stale="$(gitc rev-parse HEAD)"
      # 2 fresh: change the source AND bump x's timestamp
      gitc checkout -q "$base"; mkf src.txt s1; mkconcept knowledge/reference/x.md 2026-02-02 src.txt
      gitc add -A; gitc commit -q -m fresh; head_fresh="$(gitc rev-parse HEAD)"
      # 3 no-source: change an unrelated file
      gitc checkout -q "$base"; mkf other.txt o1
      gitc add -A; gitc commit -q -m nosrc; head_nosrc="$(gitc rev-parse HEAD)"
      # 4 new concept whose source also changes in the same commit
      gitc checkout -q "$base"; mkf newsrc.txt n0; mkconcept knowledge/reference/y.md 2026-01-01 newsrc.txt
      gitc add -A; gitc commit -q -m newconcept; head_new="$(gitc rev-parse HEAD)"
      # 7 body edited but timestamp value UNCHANGED (pins the "timestamp VALUE changed" invariant —
      # a weaker "concept file changed at all" check would wrongly pass this)
      gitc checkout -q "$base"; mkf src.txt s1; mkconcept knowledge/reference/x.md 2026-01-01 src.txt 'Body EDITED.'
      gitc add -A; gitc commit -q -m body-edit-same-ts; head_bodyedit="$(gitc rev-parse HEAD)"
      # 8 ISO datetime, sub-hour bump (pins full-value timestamp extraction — a colon-splitting
      # extractor would truncate both to ...T14 and wrongly flag STALE)
      gitc checkout -q "$base"; mkf zsrc.txt z1; mkconcept knowledge/reference/z.md 2026-01-01T14:55:00Z zsrc.txt
      gitc add -A; gitc commit -q -m iso-subhour; head_iso="$(gitc rev-parse HEAD)"
      # 9 timestamp field REMOVED at head + source changed (an empty ts_head must NOT read as "changed")
      gitc checkout -q "$base"; mkf src.txt s1
      printf '%s\n' '---' 'type: reference' 'title: t' 'sources:' '  - src.txt' '---' '' 'Body.' > "$tmp/knowledge/reference/x.md"
      gitc add -A; gitc commit -q -m ts-removed; head_tsgone="$(gitc rev-parse HEAD)"
      # 10 flow-style source changed, no ts bump (proves flow-style is PARSED, not silently unchecked)
      gitc checkout -q "$base"; mkf fsrc.txt f1
      gitc add -A; gitc commit -q -m flow-stale; head_flow="$(gitc rev-parse HEAD)"
      # 11 file UNDER a directory source changed, no ts bump (proves DIRECTORY prefix matching)
      gitc checkout -q "$base"; mkf dsrc/inner.txt d1
      gitc add -A; gitc commit -q -m dir-stale; head_dir="$(gitc rev-parse HEAD)"
      fail=0
      # OKF_FRESHNESS_STRICT defaults to 1 (strict) when arg2 is UNSET; an explicitly-empty arg2
      # (`run "$r" ""`) stays empty → advisory. `${2-1}` (no colon) is UNSET-only, so "" is preserved.
      run()  { export GIT_DIR="$tmp/.git" GIT_WORK_TREE="$tmp" OKF_FRESHNESS_RANGE="$1" OKF_FRESHNESS_STRICT="${2-1}"; task -d "$root" okf:freshness >/dev/null 2>&1; }
      runo() { export GIT_DIR="$tmp/.git" GIT_WORK_TREE="$tmp" OKF_FRESHNESS_RANGE="$1" OKF_FRESHNESS_STRICT="${2-1}"; task -d "$root" okf:freshness 2>&1; }
      ok() { echo "✓ $1"; }
      no() { echo "✗ $1"; fail=1; }
      # Exit assertions use `if run ...` (direct exit — reliable under the task interpreter, where a
      # command-substitution capture does NOT propagate exit); message assertions capture separately
      # via `runo | grep`.
      if run "$base..$head_stale"; then no "1 stale (strict) should exit non-zero"; else ok "1 stale (strict) exits non-zero"; fi
      if runo "$base..$head_stale" | grep -q 'STALE: knowledge/reference/x.md'; then ok "1 stale names the concept"; else no "1 stale did not name the concept"; fi
      if run "$base..$head_fresh"; then ok "2 fresh (timestamp bumped) passes"; else no "2 fresh should pass"; fi
      if run "$base..$head_nosrc"; then ok "3 non-source change passes"; else no "3 non-source change should pass"; fi
      if run "$base..$head_new"; then ok "4 new concept fresh-by-definition passes"; else no "4 new concept should pass"; fi
      if run ""; then no "5 empty range should fail closed"; else ok "5 empty range fails closed"; fi
      if run "$base..$head_stale" ""; then ok "6 advisory (strict unset) exits 0"; else no "6 advisory should exit 0"; fi
      if runo "$base..$head_stale" "" | grep -q 'advisory'; then ok "6 advisory warning printed"; else no "6 advisory warning missing"; fi
      if run "$base..$head_bodyedit"; then no "7 body-edit + same timestamp should be STALE"; else ok "7 body-edit + same timestamp is STALE (value invariant pinned)"; fi
      if run "$base..$head_iso"; then ok "8 ISO sub-hour bump passes (full-value timestamp)"; else no "8 ISO sub-hour bump should pass"; fi
      if run "$base..$head_tsgone"; then no "9 timestamp-removed + source changed should be STALE"; else ok "9 timestamp-removed is STALE (empty ts_head not read as changed)"; fi
      if run "$base..$head_flow"; then no "10 flow-style source stale should exit non-zero"; else ok "10 flow-style source parsed → STALE"; fi
      if runo "$base..$head_flow" | grep -q 'STALE: knowledge/reference/fx.md'; then ok "10 flow-style names the concept"; else no "10 flow-style did not name the concept"; fi
      if run "$base..$head_dir"; then no "11 directory source stale should exit non-zero"; else ok "11 directory source (prefix) → STALE"; fi
      if runo "$base..$head_dir" | grep -q 'STALE: knowledge/reference/dx.md'; then ok "11 directory names the concept"; else no "11 directory did not name the concept"; fi
      if runo "$base..$head_stale" | grep -q '⚠ okf:freshness:.*no parseable items'; then ok "12 multi-line flow surfaces a warning (not silently skipped)"; else no "12 multi-line flow warning missing"; fi
      echo "---"
      if [ "$fail" -eq 0 ]; then echo "✓ test:okf-freshness OK (16 assertions / 12 scenarios)"; else echo "✗ test:okf-freshness FAILED"; fi
      exit "$fail"

  test:okf-install:
    desc: 'Test of okf:install checksum gate: the skip/cache-hit path trusts a binary by sha256+version, never version-string alone; red-green bound to the #522 fix'
    summary: |
      Hermetic red-green test (wired into `task ci`, NO network — never downloads). Drives the REAL
      okf:install gate in verify-only mode (OKF_INSTALL_VERIFY_ONLY=1 + OKF_BIN_DIR=<tmp>): the task
      runs its presence + sha256(bin_sha) + version checks and exits 0 (trusts the on-disk binary) or
      3 (rejects it — would download), WITHOUT the network step. Because it drives the production code
      path, a future refactor that reverts the gate to version-string trust turns B/C/E red. ACCEPT is
      asserted by task exit 0; REJECT by the gate's specific verify-only message on stderr — go-task
      collapses any non-zero inner exit to its own code (201), so the message, not the code, is what
      distinguishes a real reject from an env/setup error. Fixtures reuse the real checksum-verified
      .okf/bin/openknowledge (from the okf:install dep) as the known-good binary. Scenarios:
        A  byte-identical + right version                          → exit 0 (accept)
        B  tampered bytes                                          → exit 3 (reject — checksum gate)
        C  version-forging (prints the wanted version, wrong bytes) → exit 3 (sha wins over version string)
        D  binary absent                                           → exit 3 (reject)
        E  sha-match but MISMATCHED wanted version (OKF_WANT_OVERRIDE) → exit 3 (version-identity is bound,
           not sha alone — red-greens the #522 version clause)
      NOTE: verify-only exercises the skip/cache-hit DECISION (the #522 primary threat + version
      binding). The download-path integrity checks (tarball-sha, extracted-binary sha, tar traversal/
      link guards) run only on a real download — covered by the live `ci` cache-miss run, not here.
    deps: [okf:install]
    cmd: |
      set -u
      root="$(git rev-parse --show-toplevel)"
      real="$root/.okf/bin/openknowledge"
      [ -x "$real" ] || { echo "test:okf-install: prerequisite .okf/bin/openknowledge missing (run: task okf:install)" >&2; exit 2; }
      ver="$("$real" version 2>/dev/null)"   # the wanted version, as reported by the verified binary
      tmp="$(mktemp -d)" || { echo "test:okf-install: mktemp failed" >&2; exit 2; }
      trap 'rm -rf "$tmp"' EXIT
      mkdir -p "$tmp/bin"
      # Each run is a SEPARATE `task` process (no dedup with the parent), so okf:install re-evaluates
      # the gate every time against the freshly-seeded $tmp/bin. NOTE: go-task collapses any non-zero
      # inner exit to its own code (201), so a REJECT is asserted by the gate's specific verify-only
      # message on stderr — NOT a bare non-zero, which cannot tell a real reject from an env error
      # (exit 2). ACCEPT is asserted by task exit 0. Capture is set -e-safe (assignment in an if).
      fail=0; ok() { echo "✓ $1"; }; no() { echo "✗ $1"; fail=1; }
      # $2 = wanted-version override ("" = none); $3 = accept|reject.
      check() {
        if out="$(OKF_BIN_DIR="$tmp/bin" OKF_WANT_OVERRIDE="$2" OKF_INSTALL_VERIFY_ONLY=1 task -d "$root" okf:install 2>&1)"; then rc=0; else rc=1; fi
        case "$3" in
          accept) if [ "$rc" -eq 0 ]; then ok "$1"; else no "$1 — expected ACCEPT (exit 0), got failure: $out"; fi ;;
          reject) if [ "$rc" -ne 0 ] && printf '%s' "$out" | grep -q 'verify-only: no checksum-verified'; then ok "$1"; else no "$1 — expected gate REJECT, got rc=$rc: $out"; fi ;;
        esac
      }
      # A accept: the real, checksum+version-matching binary
      cp "$real" "$tmp/bin/openknowledge"; chmod +x "$tmp/bin/openknowledge"
      check "A accepts the checksum+version-matching binary" "" accept
      # B reject: tampered bytes
      printf 'trojan\n' > "$tmp/bin/openknowledge"; chmod +x "$tmp/bin/openknowledge"
      check "B rejects a tampered binary" "" reject
      # C reject: a binary self-reporting the wanted version but with wrong bytes (the #522 attack shape)
      printf '#!/bin/sh\necho %s\n' "$ver" > "$tmp/bin/openknowledge"; chmod +x "$tmp/bin/openknowledge"
      check "C rejects a version-forging binary (sha wins over version string)" "" reject
      # D reject: no binary present
      rm -f "$tmp/bin/openknowledge"
      check "D rejects when the binary is absent" "" reject
      # E reject: the REAL (sha-matching) binary but a MISMATCHED wanted version. Proves the skip is
      # bound to the version, not sha alone; deleting the version clause would make this ACCEPT.
      cp "$real" "$tmp/bin/openknowledge"; chmod +x "$tmp/bin/openknowledge"
      check "E rejects a sha-match with the wrong wanted version (version-identity bound)" "v99.99.99" reject
      echo "---"
      if [ "$fail" -eq 0 ]; then echo "✓ test:okf-install OK (5 assertions / 5 scenarios)"; else echo "✗ test:okf-install FAILED"; fi
      exit "$fail"

  ci:
    desc: Lokale Reproduktion der GHA-PR-Pipeline (release-coverage gates + ci:artifact)
    cmds:
      # Release-coverage gates — catalog-wide release-please invariants (config↔dir↔
      # manifest↔git-tag parity). These are PR/merge-time checks, NOT artifact
      # validation, so they live here and in the PR `ci` job but are DELIBERATELY
      # excluded from `ci:artifact` (the publish job). guard E in validate:release-config
      # is repo-global and runs after the tag is cut; running it in the per-component
      # publish hot path would let one inconsistent tag (a stray or manual-backfill tag
      # for a component not in the manifest) strand the just-cut tag and block every
      # other component's publish. The PR gate catches the same gap before any tag
      # exists, so the publish job does not need it (#314, #318 review).
      - task: validate:release-config
      # Repo-global entry-shape guard for .trivyignore.yaml (#478) — bounded
      # expired_at + non-empty statement + paths/purls scope. A merge-time gate
      # alongside validate:release-config; deliberately NOT in ci:artifact (the
      # publish hot path), so one malformed ignore entry cannot strand a cut tag.
      - task: validate:trivyignore
      # Hermetic regression guard for the #314 first-release relaxation (fast, no
      # network). Wired into the PR `ci` so a regression in validate:release-config's
      # stub handling is caught automatically, not only when a dev remembers (#315 review).
      - task: test:release-config
      # Hermetic red-green guard for the G2 PR-gate (#464): a regression in lint:pr or the
      # shared lint:conventional-subject helper is caught here, not only in the commit-lint
      # workflow on a live PR. Fast, no network (throwaway git repo).
      - task: test:pr-lint
      # Hermetic red-green guard for the babysit-prs auto-review partition (pr:triage).
      # A regression in the withhold logic (fork/self/DIRTY/governance-path) or the
      # action-pin allowlist is caught here, not only when the loop wrongly auto-approves
      # a PR it should have withheld. Fast, no network (fixture records JSON).
      - task: test:pr-triage
      # Hermetic red-green guard for the image-CVE extractor (G3b AC6-extraction,
      # fast, no network). Wired here so a regression in the scan:extract-images
      # regex/tag-filter — which would let a bare name fail-close a publish, or let
      # a CVE-laden image slip past extraction — is caught at PR time, not at the
      # E5 publish gate.
      - task: test:trivy-extract
      # Hermetic red-green guard for the .trivyignore.yaml entry-shape validator
      # (#478) — mirrors test:trivy-extract's placement (in `ci` AND `ci:artifact`).
      - task: test:validate-trivyignore
      # Hermetic red-green guard for the kustomize-build gate: a regression in
      # lint:kustomize-base (path join, printf schema, exit propagation) is caught here,
      # not only when a real component render trips it post-publish.
      - task: test:kustomize-base
      # OKF knowledge/ bundle gate (PR-scoped, repo-wide doc gate — like
      # validate:release-config, NOT artifact validation, so here and NOT in
      # ci:artifact). okf:install is the documented carve-out to CI convention 1
      # (openknowledge is not a Nix/devbox pkg); it is idempotent + checksum-pinned,
      # so `task ci` stays locally reproducible on a fresh clone.
      - task: okf:install
      - task: okf:validate
      # Hermetic red-green guard for the knowledge-bundle freshness gate (advisory today via
      # okf-freshness.yml; #541 blocking flip). Fast, no network (throwaway git repo). The LIVE
      # okf:freshness runs in okf-freshness.yml with the PR range — like lint:pr, only its TEST
      # lives in `task ci`.
      - task: test:okf-freshness
      # Hermetic red-green guard for the okf:install checksum gate (#522): a regression that
      # reverts the skip/cache-hit path to version-string trust is caught here, not only when a
      # poisoned GHA cache is exploited. Fast, no network (drives okf:install in verify-only mode).
      - task: test:okf-install
      - task: ci:artifact

  ci:artifact:
    desc: Artifact validation shared by the PR `ci` gate and the publish job (no catalog-wide release-coverage gates)
    summary: |
      The render/lint/policy checks that validate the component artifact(s) being
      published. Run by BOTH the PR `ci` job (via `task ci`) and the tag-push publish
      job. The catalog-wide release-coverage gates (validate:release-config +
      test:release-config) are NOT here: they are a merge-time invariant over the whole
      catalog, and guard E is repo-global + post-tag, so running it per-publish would
      let one inconsistent tag strand a cut tag and block all publishes (#318 review).
    cmds:
      - task: check:primitives
      # Hermetic (<1s, no network) — also in ci:artifact so a direct/backfill tag
      # push (which runs ci:artifact, not the PR `ci`) still validates the CVE
      # extractor before the E5 scan trusts it.
      - task: test:trivy-extract
      # Also in ci:artifact so a direct/backfill tag push (which runs ci:artifact,
      # not the PR `ci`) still red-greens the .trivyignore.yaml guard (#478).
      - task: test:validate-trivyignore
      # Also in ci:artifact so a direct/backfill tag push red-greens the kustomize-build gate.
      - task: test:kustomize-base
      - task: lint
      - task: validate:compatibility
      - task: render
      - task: lint:rendered
      - task: lint:kustomize-base
      - task: validate:crd-split
      - task: lint:version
      - task: scan:conftest-verify
      - task: scan:conftest
      - task: scan:psa-conformance

  # Note: validate:contract is DELIBERATELY not part of `ci`. The customization
  # contract is rolled out per component (ADR-0024); coupling the render/lint
  # pipeline to it would be the wrong dependency — a single broken contract would
  # block the whole pipeline. Instead it runs as a separate, targeted call (+ its
  # own CI job contract-validate.yml, which only checks components that carry one).

  # Note: validate:compatibility IS part of `ci` (unlike validate:contract) because
  # compatibility.yaml is a UNIVERSAL per-component contract — every component is
  # required to carry one (no per-component rollout). A missing or invalid
  # compatibility.yaml is always a pipeline failure, not an optional gap to report.

  validate:compatibility:
    desc: 'Compatibility-Contract schema validation (apps#246): every component compatibility.yaml must conform to schemas/compatibility.schema.json'
    summary: |
      Validates every component's compatibility.yaml against
      schemas/compatibility.schema.json (draft 2020-12) with check-jsonschema.
      Fails closed on zero found (no empty-run pass).

      Unlike validate:contract (customization.yaml, per-component rollout), this task
      is part of `task ci` because compatibility.yaml is a universal per-component
      contract — every component is required to carry one.

      Schema enforces:
        - required: [requires, provides]
        - provides[] items are closed (additionalProperties:false) — rejects legacy 'apis' key
        - provides[].version.sot enum: [app, chart, crd-schema, none]
        - version block is optional (unbuilt stubs carry no version)
        - capabilities[] is optional per item (providers-style no-capability components)

      Optional per-component scope: `task validate:compatibility -- <sub-layer>/<component>`
      validates only that component (parity with validate:contract). With no arg every
      component is validated AND the negative fixtures under schemas/testdata/ are asserted
      to be rejected (red-green regression guard for the schema's reject-side).
    cmd: |
      set -uo pipefail
      schema="schemas/compatibility.schema.json"
      # Optional per-component scope: `task validate:compatibility -- <sub-layer>/<component>`.
      scope="{{.CLI_ARGS}}"
      if [ -n "$scope" ]; then
        set -- "sub-layers/${scope%/*}/components/${scope#*/}/"
      else
        set -- sub-layers/*/components/*/
      fi
      fail=0
      found=0
      for cdir in "$@"; do
        [ -d "$cdir" ] || continue
        comp_id=$(echo "$cdir" | sed 's|sub-layers/||; s|/components/|/|; s|/$||')
        cfile="${cdir}compatibility.yaml"
        if [ ! -f "$cfile" ]; then
          echo "✗ ${comp_id}: compatibility.yaml MISSING"
          fail=1
          continue
        fi
        found=$((found+1))
        if out=$(check-jsonschema --schemafile "$schema" "$cfile" 2>&1); then
          echo "✓ ${comp_id}"
        else
          echo "✗ ${comp_id}:"
          printf '%s\n' "$out" | sed 's/^/    /'
          fail=1
        fi
      done
      echo ""
      if [ "$found" -eq 0 ]; then
        echo "ERROR: no compatibility.yaml files found — check sub-layers/ structure" >&2
        exit 1
      fi
      echo "→ ${found} component(s) validated against ${schema}."
      # Negative-fixture regression guard (full-corpus runs only). The schema MUST
      # reject each known-bad fixture; a fixture that PASSES means the reject-side
      # (additionalProperties:false / required sot / sot enum / resource_policy
      # coherence) silently regressed.
      if [ -z "$scope" ]; then
        for nf in schemas/testdata/compatibility-apis-legacy.yaml \
                  schemas/testdata/compatibility-missing-sot.yaml \
                  schemas/testdata/compatibility-bad-sot-enum.yaml \
                  schemas/testdata/compatibility-resource-policy-fixed-with-targets.yaml \
                  schemas/testdata/compatibility-resource-policy-tunable-without-targets.yaml \
                  schemas/testdata/compatibility-resource-policy-tunable-empty-targets.yaml \
                  schemas/testdata/compatibility-resource-policy-unknown-key.yaml \
                  schemas/testdata/compatibility-resource-policy-target-unknown-key.yaml \
                  schemas/testdata/compatibility-resource-policy-star-not-sole.yaml; do
          if check-jsonschema --schemafile "$schema" "$nf" >/dev/null 2>&1; then
            echo "✗ NEGATIVE FIXTURE PASSED (schema reject-side regressed): $nf" >&2
            fail=1
          else
            echo "✓ negative fixture correctly rejected: $(basename "$nf")"
          fi
        done
        # Positive-fixture guard: the schema MUST accept a valid resource_policy
        # block; a fixture that FAILS means the accept-side (ADR-0024 Resource-Sizing)
        # regressed. Together with the negatives this binds red-green on schema revert.
        for pf in schemas/testdata/compatibility-resource-policy-valid.yaml; do
          if check-jsonschema --schemafile "$schema" "$pf" >/dev/null 2>&1; then
            echo "✓ positive fixture correctly accepted: $(basename "$pf")"
          else
            echo "✗ POSITIVE FIXTURE REJECTED (schema accept-side regressed): $pf" >&2
            fail=1
          fi
        done
      fi
      exit $fail

  # --- Worktree (parallel independent sessions) ---
  # Multiple independent Claude Code sessions build components in parallel on ONE
  # shared clone: each session gets its own git worktree under .claude/worktrees/.
  # The only .git-mutating steps (fetch + worktree add/remove/prune) run under a
  # mkdir-atomic lock (portable; macOS has no flock) so concurrent sessions can't
  # corrupt shared .git. slug = <sub-layer>-<component>; branch = catalog-build/<slug>.

  worktree:create:
    desc: 'Isolierten Worktree für eine Komponente anlegen: task worktree:create -- <sub-layer>/<component>'
    summary: |
      Cross-session-sicherer git-Worktree unter .claude/worktrees/<slug> auf Branch
      catalog-build/<slug>. Idempotent (existierender Worktree wird wiederverwendet);
      fail-fast, wenn der Branch bereits existiert (Claim einer anderen Session).
      Gibt den absoluten Worktree-Pfad auf der LETZTEN Zeile aus (vom Skill via
      `| tail -1` gelesen).
    cmd: |
      component_id="{{.COMPONENT_ID | default .CLI_ARGS}}"
      if [ -z "$component_id" ] || [ "${component_id#*/}" = "$component_id" ]; then
        echo "usage: task worktree:create -- <sub-layer>/<component>" >&2
        exit 1
      fi
      slug="${component_id%/*}-${component_id#*/}"
      # Anchor ALL paths + git ops to the MAIN worktree root (cwd-independent), fail-closed.
      # `git worktree list` always prints the MAIN worktree first, as an absolute path, from
      # any cwd inside the repo (including a linked worktree) and regardless of the git-dir
      # layout (--separate-git-dir / GIT_DIR override) — unlike dirname(--git-common-dir),
      # which only holds when .git sits directly under the root. The guard REFUSES a
      # non-absolute/empty result (outside a repo, broken git) rather than falling back to
      # cwd — a cwd-relative lock would let two sessions in different cwds see two distinct
      # physical locks and break cross-session mutual exclusion.
      root="$(git worktree list --porcelain 2>/dev/null | sed -n 's/^worktree //p' | head -1)"
      case "$root" in /*) ;; *) echo "worktree:create: cannot resolve main repo root (got '$root'); refusing" >&2; exit 1 ;; esac
      wt="$root/.claude/worktrees/${slug}"
      lock="$root/.claude/worktrees/.lock"
      branch="catalog-build/${slug}"
      # BASE_REF: the commit-ish the new worktree branch is based on. Default origin/main applies
      # only when UNSET (`-`, not `:-`): an explicitly-EMPTY BASE_REF stays empty and fails closed
      # at the guard below, rather than silently collapsing to origin/main and basing a co-build
      # workload on main without its stacked crds (an orchestrator slug-derivation-bug guard). A
      # co-build workload half passes BASE_REF=catalog-build/<crds-slug> so its worktree is STACKED
      # on the just-built crds branch (which carries the crds dir the workload's stacked PR + local
      # E2E need). Validated below, AFTER the fetch.
      BASE_REF="${BASE_REF-origin/main}"
      mkdir -p "$root/.claude/worktrees"
      # acquire cross-session lock (mkdir is atomic on POSIX; no flock on macOS).
      # Staleness is PID-liveness-based: a held lock is reclaimed only if its
      # recorded holder process is dead — so a slow `git fetch` under the lock is
      # never stolen mid-operation. The >5min age check is a last-resort fallback
      # for the rare window where the pid file was not yet written.
      waited=0
      until mkdir "$lock" 2>/dev/null; do
        holder="$(cat "$lock/pid" 2>/dev/null || true)"
        if [ -n "$holder" ] && ! kill -0 "$holder" 2>/dev/null; then
          rm -rf "$lock" 2>/dev/null || true   # holder process is dead
          continue
        fi
        if [ -n "$(find "$lock" -maxdepth 0 -mmin +5 2>/dev/null)" ]; then
          rm -rf "$lock" 2>/dev/null || true   # >5min, no live pid
          continue
        fi
        waited=$((waited + 1))
        if [ "$waited" -gt 600 ]; then
          echo "worktree:create: could not acquire lock within ~300s (holder pid ${holder:-unknown})" >&2
          exit 1
        fi
        sleep 0.5
      done
      trap 'rm -rf "$lock" 2>/dev/null || true' EXIT  # go-task sh: EXIT only; kill/crash covered by PID-liveness reclaim above
      echo "$$" > "$lock/pid" 2>/dev/null || true
      # idempotent reuse: dir exists and is on the expected branch
      if [ -d "$wt" ]; then
        cur="$(git -C "$wt" rev-parse --abbrev-ref HEAD 2>/dev/null || true)"
        if [ "$cur" = "$branch" ]; then
          (cd "$wt" && pwd)
          exit 0
        fi
        echo "worktree:create: $wt exists but is on '$cur', not '$branch'" >&2
        exit 1
      fi
      # claim check: branch exists (local or remote) without our worktree -> owned elsewhere
      if git -C "$root" show-ref --verify --quiet "refs/heads/${branch}" \
         || git -C "$root" ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
        echo "worktree:create: component ${component_id} already claimed (branch ${branch} exists) — another session owns it" >&2
        exit 1
      fi
      git -C "$root" fetch origin --quiet || echo "worktree:create: warning: git fetch failed, using existing ${BASE_REF}" >&2
      # A non-default BASE_REF (a co-build crds branch) MUST resolve LOCALLY: co-build is
      # single-clone foreground — the crds half built its branch in THIS clone (kept after
      # worktree:remove). A remote-only/absent ref fails closed here rather than silently basing
      # the workload on the wrong tree. origin/main keeps its existing fetch-fail-tolerant path.
      if [ "$BASE_REF" != "origin/main" ] && ! git -C "$root" rev-parse --verify --quiet "$BASE_REF" >/dev/null; then
        echo "worktree:create: base-ref '${BASE_REF}' not found locally — build the crds half first in this clone, or (cross-clone) merge the crds PR and re-run" >&2
        exit 1
      fi
      git -C "$root" worktree add "$wt" -b "$branch" "$BASE_REF" >/dev/null
      (cd "$wt" && pwd)

  worktree:remove:
    desc: 'Worktree einer Komponente entfernen (Branch bleibt): task worktree:remove -- <sub-layer>/<component>'
    cmd: |
      component_id="{{.COMPONENT_ID | default .CLI_ARGS}}"
      if [ -z "$component_id" ] || [ "${component_id#*/}" = "$component_id" ]; then
        echo "usage: task worktree:remove -- <sub-layer>/<component>" >&2
        exit 1
      fi
      slug="${component_id%/*}-${component_id#*/}"
      # Anchor to the MAIN worktree root, fail-closed (same method as worktree:create;
      # MUST derive $root identically so remove-from-a-different-cwd cannot orphan a
      # worktree+branch — branch == claim, a stranded claim permanently stalls the component).
      root="$(git worktree list --porcelain 2>/dev/null | sed -n 's/^worktree //p' | head -1)"
      case "$root" in /*) ;; *) echo "worktree:remove: cannot resolve main repo root (got '$root'); refusing" >&2; exit 1 ;; esac
      wt="$root/.claude/worktrees/${slug}"
      lock="$root/.claude/worktrees/.lock"
      mkdir -p "$root/.claude/worktrees"
      waited=0
      until mkdir "$lock" 2>/dev/null; do
        holder="$(cat "$lock/pid" 2>/dev/null || true)"
        if [ -n "$holder" ] && ! kill -0 "$holder" 2>/dev/null; then
          rm -rf "$lock" 2>/dev/null || true
          continue
        fi
        if [ -n "$(find "$lock" -maxdepth 0 -mmin +5 2>/dev/null)" ]; then
          rm -rf "$lock" 2>/dev/null || true
          continue
        fi
        waited=$((waited + 1))
        if [ "$waited" -gt 600 ]; then
          echo "worktree:remove: could not acquire lock within ~300s (holder pid ${holder:-unknown})" >&2
          exit 1
        fi
        sleep 0.5
      done
      trap 'rm -rf "$lock" 2>/dev/null || true' EXIT  # go-task sh: EXIT only; kill/crash covered by PID-liveness reclaim above
      echo "$$" > "$lock/pid" 2>/dev/null || true
      if [ -d "$wt" ]; then
        if [ -n "$(git -C "$wt" status --porcelain 2>/dev/null)" ] && [ "${FORCE:-}" != "1" ]; then
          echo "worktree:remove: $wt has uncommitted changes — commit/push them first, or re-run with FORCE=1" >&2
          exit 1
        fi
        git -C "$root" worktree remove --force "$wt"
      fi
      git -C "$root" worktree prune
      echo "removed worktree $wt (branch catalog-build/${slug} kept; delete with: git branch -D catalog-build/${slug})"

  worktree:list:
    desc: Aktive Komponenten-Worktrees auflisten
    cmd: |
      # `git worktree list` is cwd-independent — same list (absolute paths) from any cwd
      # inside the repo, including a linked worktree — so no main-root anchor is needed here.
      # `\.` escapes the regex dot so the filter matches the literal `.claude/worktrees/` path.
      git worktree list | grep '\.claude/worktrees/' || echo "(no active component worktrees)"

  # --- Housekeeping ---

  clean:
    desc: rendered/-Output und Scan-Artefakte entfernen
    cmds:
      - find sub-layers -path '*/components/*/rendered' -type d -exec rm -rf {} +
      - rm -f trivy-results.sarif snyk-results.sarif

  hooks:install:
    desc: install the lefthook-managed git hooks (.git/hooks/{pre-commit,commit-msg})
    cmd: lefthook install

  devbox-info:
    desc: Devbox-Tool-Versionen anzeigen
    cmd: devbox info

  # --- Lokale Entwicklung: Talos (docker) + Local-Registry + ArgoCD ---

  local:preflight:
    desc: 'Prüft dass alle Tools im PATH sind (sonst hilfreicher Hinweis)'
    cmd: |
      missing=""
      for t in docker talosctl kubectl kubectx helm mkcert envsubst yq; do
        command -v "$t" >/dev/null 2>&1 || missing="$missing $t"
      done
      if [ -n "$missing" ]; then
        echo "ERROR: folgende Tools fehlen im PATH:$missing"
        echo ""
        echo "Vermutlich ist die Devbox-Shell für dieses Repo nicht aktiv."
        echo "Fix:"
        echo "  direnv allow            # einmalig, lädt Repo-Devbox-PATH bei cd"
        echo "  oder"
        echo "  devbox shell            # explizite Shell mit Repo-Tools"
        exit 1
      fi

  local:up:
    desc: 'Lokales Entwicklungs-Setup hoch: Registry + Talos + Gateway-API + Cilium + ArgoCD'
    # WICHTIG: Gateway-API-CRDs müssen VOR Cilium installiert werden, sonst
    # initialisiert der Cilium-Operator seinen Gateway-API-Controller nicht
    # und es entsteht keine GatewayClass 'cilium' (Folge: Gateway hängt für
    # immer in "Waiting for controller").
    cmds:
      - task: local:preflight
      - task: local:registry:up
      - task: local:cluster:up
      - task: local:gateway-api:install
      - task: local:cilium:install
      - task: local:storage:install
      - task: local:cert-manager:install
      - task: local:certs
      - task: local:argo:install
      - task: local:gateway:apply
      - task: local:registry:bridge
      - |
        echo ""
        echo "✓ Lokales Setup bereit."
        echo "  Argo-UI:       https://argocd.localhost.direct"
        echo "  Argo-Admin-Pw: task local:argo:password"
        echo "  Registry:      https://localhost:5001 (Workstation, mkcert-TLS)"
        echo "                 kind-registry.registry.svc.cluster.local:5000 (Cluster, mkcert-TLS)"
        echo "  Lokal pushen:  task local:publish -- <sub-layer> <tag>"

  local:down:
    desc: 'Alles abreißen: Cluster + Registry + Mkcert-Daten'
    cmds:
      - talosctl cluster destroy --name talos-platform-apps || true
      - task: local:registry:down

  local:stop:
    desc: 'Cluster + Registry pausieren (Container stoppen, State bleibt)'
    # Im Gegensatz zu local:down wird hier nichts gelöscht — beim nächsten
    # local:start sind alle Workloads + Daten wieder da. Sinnvoll für
    # Laptop-Suspend oder mehrtägige Pausen ohne Re-Install.
    cmd: |
      for c in talos-platform-apps-controlplane-1 kind-registry; do
        if [ "$(docker inspect -f '{{`{{.State.Running}}`}}' "$c" 2>/dev/null)" = "true" ]; then
          docker stop "$c" >/dev/null
          echo "✓ $c gestoppt"
        else
          echo "  $c läuft nicht (skip)"
        fi
      done

  local:start:
    desc: 'Pausierten Cluster + Registry wieder starten'
    # Erwartet, dass local:up schon einmal lief — startet nur die bestehenden
    # Container neu. Wartet bis die K8s-API antwortet, damit Folge-Tasks
    # (kubectl, helm) nicht in Race-Conditions laufen.
    cmd: |
      for c in kind-registry talos-platform-apps-controlplane-1; do
        if ! docker inspect "$c" >/dev/null 2>&1; then
          echo "ERROR: Container '$c' existiert nicht — task local:up?"
          exit 1
        fi
        if [ "$(docker inspect -f '{{`{{.State.Running}}`}}' "$c")" = "true" ]; then
          echo "  $c läuft bereits"
        else
          docker start "$c" >/dev/null
          echo "✓ $c gestartet"
        fi
      done
      kubectx {{.LOCAL_KUBE_CONTEXT}} >/dev/null 2>&1 || true
      echo "warte bis K8s-API antwortet..."
      ready=false
      for i in $(seq 1 60); do
        if kubectl --context {{.LOCAL_KUBE_CONTEXT}} get --raw='/readyz' >/dev/null 2>&1; then
          ready=true
          echo "✓ K8s-API ready"
          break
        fi
        sleep 2
      done
      if [ "$ready" != "true" ]; then
        echo "ERROR: K8s-API auf Context {{.LOCAL_KUBE_CONTEXT}} nach 60 Versuchen nicht ready — task local:up?"
        exit 1
      fi

  local:registry:up:
    desc: 'Lokale Docker-Registry auf localhost:5001 mit mkcert-TLS starten (idempotent)'
    # Container terminiert TLS selbst — gleicher mkcert-Cert für Workstation
    # (SAN: localhost, 127.0.0.1) und Cluster (SAN: kind-registry.registry.svc.cluster.local).
    # Damit kann Argo intra-cluster die Cert-Chain validieren ohne --plain-http /
    # insecure-Flags. mkcert -install ist idempotent.
    cmd: |
      mkcert -install >/dev/null 2>&1
      mkdir -p .mkcert-registry
      if [ ! -f .mkcert-registry/kind-registry-cert.pem ]; then
        cd .mkcert-registry
        mkcert -cert-file kind-registry-cert.pem -key-file kind-registry-key.pem \
          localhost 127.0.0.1 \
          kind-registry kind-registry.registry kind-registry.registry.svc \
          kind-registry.registry.svc.cluster.local >/dev/null
        chmod 644 kind-registry-key.pem
        cd ..
        echo "✓ mkcert-Cert für kind-registry generiert"
      fi
      if [ "$(docker inspect -f '{{`{{.State.Running}}`}}' kind-registry 2>/dev/null)" = "true" ]; then
        echo "✓ kind-registry läuft bereits"
      else
        docker rm -f kind-registry >/dev/null 2>&1 || true
        docker run -d --restart=always \
          -p 127.0.0.1:5001:5000 \
          -v "$PWD/.mkcert-registry:/certs:ro" \
          -e REGISTRY_HTTP_TLS_CERTIFICATE=/certs/kind-registry-cert.pem \
          -e REGISTRY_HTTP_TLS_KEY=/certs/kind-registry-key.pem \
          --name kind-registry \
          registry:2 >/dev/null
        echo "✓ kind-registry gestartet (https://localhost:5001, TLS via mkcert)"
      fi

  local:registry:down:
    desc: 'Lokale Registry stoppen + entfernen'
    cmd: docker rm -f kind-registry || true

  local:cluster:up:
    desc: 'Talos-Cluster (docker provisioner) erstellen + lokale Registry verbinden'
    cmds:
      - |
        # Talos docker-provisioner cluster: single schedulable control plane,
        # prod-pinned Talos (v1.13.3) + K8s (1.36.0). CNI/proxy off, KubePrism,
        # and the localhost:5001 registry mirror all come from local/talos-patch.yaml.
        # Host 80/443 → NodePort 30080/30443 (Cilium-Gateway) via -p, the talosctl
        # analog of kind's extraPortMappings.
        # Node-Sizing: der talosctl-Default (2GiB/2CPU) ist zu klein — Cilium + Argo
        # + mehrere Plattform-Komponenten (crossplane, cnpg, …) sprengen 2GiB →
        # apiserver-Timeouts + OOM. Default 8GiB/6CPU (Limit, keine Reservierung →
        # passt auch in kleinere VMs, bis tatsächlich genutzt). Per LOCAL_NODE_MEMORY
        # / LOCAL_NODE_CPUS übersteuerbar.
        # talosctl create is NOT idempotent (it refuses if the state dir exists).
        # NOTE: `talosctl cluster show` is NOT a reliable existence probe — it exits
        # 0 with empty output even when nothing exists. Gate on the state dir.
        state_dir="${HOME}/.talos/clusters/talos-platform-apps"
        if [ -d "$state_dir" ]; then
          echo "✓ Talos-Cluster 'talos-platform-apps' existiert bereits (skip create)"
        else
          talosctl cluster create docker \
            --name talos-platform-apps \
            --workers 0 \
            --memory-controlplanes "${LOCAL_NODE_MEMORY:-8GiB}" \
            --cpus-controlplanes "${LOCAL_NODE_CPUS:-6}" \
            --image ghcr.io/siderolabs/talos:v1.13.3 \
            --kubernetes-version 1.36.0 \
            --config-patch @local/talos-patch.yaml \
            -p 80:30080/tcp,443:30443/tcp
        fi
      - |
        # Select the kube context. create writes it correctly (server = the
        # docker-forwarded 127.0.0.1:<port>). A skipped create with a pruned
        # kubeconfig needs a rebuild — but `talosctl kubeconfig` writes the in-VM
        # node IP (10.5.0.2:6443), which is unreachable from the host, so we
        # repoint the server at the forwarded 6443 port. Node .2 is deterministic
        # in the default 10.5.0.0/24 subnet (.1 = gateway).
        # Guard on the server URL the kube-context actually RESOLVES to: a stale
        # context named admin@talos-platform-apps (a prior, unrelated cluster that
        # reused this deterministic default name) would otherwise be trusted as-is,
        # and every pinned --context call would then hit ITS server. `config view
        # --minify --context` follows the context to its referenced cluster's server
        # — so a context pointing at a DIFFERENTLY-named cluster is still caught,
        # unlike a bare cluster-name lookup. Rebuild whenever that server is not this
        # container's forwarded loopback port (an absent context yields an empty
        # server, which also triggers the rebuild). A redundant rebuild is harmless —
        # talosctl kubeconfig --force + set-cluster are idempotent in outcome.
        api_port=$(docker port talos-platform-apps-controlplane-1 6443/tcp | head -1 | sed 's/.*://')
        if [ -z "$api_port" ]; then
          echo "ERROR: 'docker port talos-platform-apps-controlplane-1 6443/tcp' returned empty — container not running yet? Re-run once local:cluster:up has brought it up."
          exit 1
        fi
        expected_server="https://127.0.0.1:${api_port}"
        current_server=$(kubectl config view --minify --context {{.LOCAL_KUBE_CONTEXT}} -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null || true)
        if [ "$current_server" != "$expected_server" ]; then
          talosctl --context talos-platform-apps kubeconfig --force --nodes 10.5.0.2 >/dev/null
          kubectl config set-cluster talos-platform-apps --server="$expected_server"
        fi
        kubectx {{.LOCAL_KUBE_CONTEXT}}
      - |
        # Registry-Container ins Talos-Docker-Netzwerk (= Cluster-Name) hängen,
        # damit der Node sie über die Docker-DNS als kind-registry:5000 auflöst
        # (Registry-Mirror im machine-config). 'connect' meckert wenn schon drin → || true.
        docker network connect talos-platform-apps kind-registry 2>/dev/null || true
      - |
        # ConfigMap nach KEP-1755 (local-registry-hosting)
        kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f - <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: local-registry-hosting
          namespace: kube-public
        data:
          localRegistryHosting.v1: |
            host: "localhost:5001"
            help: "https://github.com/siderolabs/talos"
        EOF

  local:cert-manager:install:
    desc: 'cert-manager via Helm installieren (CRDs inline)'
    cmd: |
      helm repo add jetstack https://charts.jetstack.io 2>/dev/null || true
      helm repo update jetstack
      helm upgrade --install cert-manager jetstack/cert-manager \
        --kube-context {{.LOCAL_KUBE_CONTEXT}} \
        --namespace cert-manager --create-namespace \
        --version v1.17.0 \
        --set crds.enabled=true \
        --wait --timeout 5m

  local:certs:
    desc: 'mkcert-Root-CA ins System-Trust + Cluster-Secret + ConfigMap + ClusterIssuer'
    # Drei Targets für die CA:
    #   1. cert-manager-NS als TLS-Secret → ClusterIssuer für *.localhost.direct
    #   2. argocd-NS als ConfigMap → initContainer mountet die CA und appended sie
    #      an /etc/ssl/certs/ca-certificates.crt im argocd-repo-server-Pod,
    #      damit die nativen OCI-Pulls gegen kind-registry-TLS validieren.
    # Material kommt direkt aus $(mkcert -CAROOT) (kein lokales Zwischen-File,
    # vermeidet Permission-Issues beim zweiten Lauf — mkcert speichert mit 0600).
    cmd: |
      mkcert -install
      caroot=$(mkcert -CAROOT)
      kubectl create secret tls mkcert-ca \
        --cert="$caroot/rootCA.pem" --key="$caroot/rootCA-key.pem" \
        -n cert-manager \
        --dry-run=client -o yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      kubectl create namespace argocd --dry-run=client -o yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      kubectl create configmap mkcert-ca \
        --from-file=ca.crt="$caroot/rootCA.pem" \
        -n argocd \
        --dry-run=client -o yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/mkcert-cluster-issuer.yaml
      echo "✓ mkcert-CA als ClusterIssuer + im argocd-NS bereit"

  local:cilium:install:
    desc: 'Cilium als CNI installieren (kubeProxyReplacement, Gateway-API enabled)'
    cmd: |
      # Cilium ohne kube-proxy braucht eine API-Adresse. Auf Talos zeigt sie auf
      # KubePrism (node-lokaler LB auf 127.0.0.1:7445, machine-config) — identisch
      # zu talos-seeder-cluster/tofu/main.tf. Kein docker-inspect der Node-IP mehr.
      echo "Cilium k8sServiceHost=localhost:7445 (KubePrism)"
      helm repo add cilium https://helm.cilium.io 2>/dev/null || true
      helm repo update cilium
      helm upgrade --install cilium cilium/cilium \
        --kube-context {{.LOCAL_KUBE_CONTEXT}} \
        --namespace kube-system \
        --version 1.19.3 \
        --values local/cilium-values.yaml \
        --set k8sServiceHost=localhost \
        --set k8sServicePort=7445 \
        --wait --timeout 5m
      # Wartet, bis CoreDNS via Cilium-CNI läuft. 5m statt 2m: beim Erst-Install
      # zieht der Cilium-Agent/Operator/Envoy erst Images, bevor das CNI Pods
      # verdrahtet — 2m war zu knapp und ließ local:up false-negativ failen.
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n kube-system rollout status deployment/coredns --timeout=5m

  local:storage:install:
    desc: 'local-path-provisioner als Default-StorageClass (lokal — Katalog-CSI braucht das NAS)'
    # Das lokale Talos-Cluster hat keine StorageClass; die Katalog-CSIs (synology/
    # democratic) brauchen das echte NAS. Für stateful Local-Tests (CNPG-Cluster,
    # Harbor-PVCs …) installieren wir Rancher local-path-provisioner. Talos-
    # Anpassung: / ist read-only → hostPath nach /var/local-path-provisioner.
    cmd: |
      ver="v0.0.30"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f "https://raw.githubusercontent.com/rancher/local-path-provisioner/${ver}/deploy/local-path-storage.yaml"
      # Talos erzwingt Pod-Security; der Helper-Pod (mountet hostPath) braucht
      # einen privileged-NS, sonst blockt PSA die PVC-Provisionierung.
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} label namespace local-path-storage pod-security.kubernetes.io/enforce=privileged --overwrite
      cfg='{"nodePathMap":[{"node":"DEFAULT_PATH_FOR_NON_LISTED_NODES","paths":["/var/local-path-provisioner"]}]}'
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n local-path-storage patch configmap local-path-config --type merge \
        -p "$(jq -nc --arg c "$cfg" '{data:{"config.json":$c}}')"
      # local-path als Default-StorageClass (CNPG & Co. setzen kein storageClassName)
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} patch storageclass local-path \
        -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n local-path-storage rollout restart deployment/local-path-provisioner
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n local-path-storage rollout status deployment/local-path-provisioner --timeout=2m
      echo "✓ local-path ist Default-StorageClass"

  local:gateway-api:install:
    desc: 'Gateway-API-CRDs installieren (Standard-Channel v1.2.0)'
    cmd: |
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=2m
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=2m

  local:argo:install:
    desc: 'ArgoCD via Helm im Cluster installieren (HTTPRoute auf argocd.localhost.direct)'
    cmd: |
      # Chart-Version MUSS base's argocd_chart_version spiegeln (talos-platform-base
      # tofu/modules/talos-cluster/variables.tf): die lokale Test-Umgebung nutzt
      # dieselbe ArgoCD-Version wie das Substrat, sonst testet man gegen eine andere
      # ArgoCD-Version als Produktion. base pinnt argo-cd 9.4.5 (= ArgoCD v3.3.2).
      helm repo add argo https://argoproj.github.io/argo-helm 2>/dev/null || true
      helm repo update argo
      helm upgrade --install argocd argo/argo-cd \
        --kube-context {{.LOCAL_KUBE_CONTEXT}} \
        --namespace argocd --create-namespace \
        --version 9.4.5 \
        --values local/argocd-values.yaml \
        --wait --timeout 5m

  local:gateway:apply:
    desc: 'Gateway + HTTPRoutes apply + Cilium-Gateway-Service auf NodePort patchen'
    cmd: |
      kubectl create namespace gateway --dry-run=client -o yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/gateway.yaml
      # warten bis Cilium den Gateway-Service erzeugt hat
      for i in $(seq 1 30); do
        if kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n gateway get svc cilium-gateway-localhost-direct >/dev/null 2>&1; then break; fi
        echo "  ... warte auf cilium-gateway-localhost-direct ($i/30)"
        sleep 2
      done
      # Patch auf NodePort + feste Ports 30080/30443
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n gateway patch svc cilium-gateway-localhost-direct --type=merge -p '{
        "spec": {
          "type": "NodePort",
          "ports": [
            {"name": "port-80",  "port": 80,  "targetPort": 80,  "nodePort": 30080, "protocol": "TCP"},
            {"name": "port-443", "port": 443, "targetPort": 443, "nodePort": 30443, "protocol": "TCP"}
          ]
        }
      }'
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/argocd-route.yaml
      echo "✓ Gateway + ArgoCD-HTTPRoute angewendet"

  local:registry:bridge:
    desc: 'kind-registry-Container als Cluster-Service exposen (Service+EndpointSlice)'
    # Bridge ist Service+EndpointSlice ohne Selector im 'registry'-NS,
    # statische Container-IP aus 'docker container inspect'. Damit ist der
    # kind-registry-Container intra-cluster über die Service-DNS
    # kind-registry.registry.svc.cluster.local:5000 erreichbar.
    # TLS terminiert der Container selbst (mkcert-Cert mit Service-DNS-SAN),
    # KEINE Gateway-HTTPRoute mehr — direkter Pfad ohne Re-Encrypt.
    cmd: |
      # Netzwerk = Cluster-Name (talosctl docker provisioner). Hyphen im Namen →
      # index statt Dot-Access im Go-Template.
      kind_registry_ip=$(docker container inspect kind-registry \
        --format '{{`{{ (index .NetworkSettings.Networks "talos-platform-apps").IPAddress }}`}}')
      if [ -z "$kind_registry_ip" ] || [ "$kind_registry_ip" = "<no value>" ]; then
        echo "ERROR: kind-registry nicht im talos-platform-apps-Netzwerk — task local:cluster:up?"
        exit 1
      fi
      echo "kind-registry-Container IP: $kind_registry_ip"
      KIND_REGISTRY_IP="$kind_registry_ip" envsubst < local/registry-bridge.yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      echo "✓ Registry-Bridge angewendet"
      echo "  Workstation-Push:  oci://localhost:5001/talos-platform-apps (mkcert-TLS, SAN: localhost)"
      echo "  Cluster-Pull:      kind-registry.registry.svc.cluster.local:5000/talos-platform-apps (mkcert-TLS, SAN: Service-DNS)"

  local:argo:uninstall:
    desc: 'ArgoCD entfernen (Cluster bleibt)'
    cmd: helm uninstall argocd --namespace argocd --kube-context {{.LOCAL_KUBE_CONTEXT}} || true

  local:argo:ui:
    desc: 'Argo-UI öffnen (falls Browser nicht automatisch startet: https://argocd.localhost.direct)'
    cmd: |
      pw=$(task local:argo:password --silent)
      echo "Argo-UI: https://argocd.localhost.direct"
      echo "Login:   admin / $pw"
      command -v open >/dev/null && open https://argocd.localhost.direct || true

  local:argo:password:
    desc: 'Initial-Admin-Passwort von ArgoCD ausgeben'
    cmd: |
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get secret argocd-initial-admin-secret \
        -o jsonpath='{.data.password}' | base64 -d
      echo ""

  local:publish:
    desc: 'render + package + push einer Komponente zur lokalen Registry: task local:publish -- <sub-layer>/<component> <tag>'
    summary: |
      Pusht an oci://localhost:5001/talos-platform-apps/<sub-layer>/<component>:<tag>
      (Workstation-View, mkcert-TLS via SAN 'localhost'). Argo CD im Cluster
      pullt dasselbe Artefakt intra-cluster über
      kind-registry.registry.svc.cluster.local:5000/talos-platform-apps/<sub-layer>/<component>:<tag>
      (gleicher Container, gleicher mkcert-Cert mit anderem SAN).
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task local:publish -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task local:publish -- <sub-layer>/<component> <tag>}"
      # Lokaler Values-Overlay (externalURL/CORS auf .localhost.direct), falls vorhanden
      ov="local/values-overrides/${component_id%/*}/${component_id#*/}.yaml"; [ -f "$ov" ] || ov=""
      EXTRA_VALUES="$ov" OCI_REGISTRY=localhost:5001/talos-platform-apps task render:one -- "$component_id"
      OCI_REGISTRY=localhost:5001/talos-platform-apps task package    -- "$component_id" "$tag"
      OCI_REGISTRY=localhost:5001/talos-platform-apps task push       -- "$component_id" "$tag"
      echo "✓ Lokal publiziert: oci://localhost:5001/talos-platform-apps/${component_id}:${tag#v}"

  local:publish:sublayer:
    desc: 'Alle Komponenten eines Sub-Layers lokal publishen: task local:publish:sublayer -- <sub-layer> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:publish:sublayer -- <sub-layer> <tag>}"
      tag="${2:?usage: task local:publish:sublayer -- <sub-layer> <tag>}"
      sldir="sub-layers/${sub_layer}/components"
      if [ ! -d "$sldir" ]; then
        echo "ERROR: ${sldir} existiert nicht"
        exit 1
      fi
      for cdir in "$sldir"/*/; do
        component=$(basename "$cdir")
        task local:publish -- "${sub_layer}/${component}" "$tag"
      done

  local:apply:
    desc: 'Argo-Apps eines Sub-Layers im Cluster anwenden: task local:apply -- <sub-layer> <tag>'
    summary: |
      Sucht local/argo-apps/<sub-layer>/*.yaml und applied jede Datei mit
      envsubst-Substitution für ${TAG} und ${REGISTRY}. Pro Komponente eine
      eigene Argo-Application mit fester sync-wave-Annotation im Template.

      ${REGISTRY} = kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
                    (Cluster-Pull-Pfad, intra-cluster TLS via mkcert-SAN).
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:apply -- <sub-layer> <tag>}"
      tag="${2:?usage: task local:apply -- <sub-layer> <tag>}"
      chart_version="${tag#v}"
      apps_dir="local/argo-apps/${sub_layer}"
      # Pin the LOCAL Talos test cluster explicitly — NEVER the operator's current
      # kube-context, which may be a real/shared cluster. Applying Argo apps to the
      # wrong cluster is a cross-cluster footgun (all other local:* tasks pin this
      # context for the same reason).
      KC="kubectl --context {{.LOCAL_KUBE_CONTEXT}}"

      if [ ! -d "$apps_dir" ]; then
        echo "ERROR: ${apps_dir} existiert nicht"
        exit 1
      fi

      shopt -s nullglob
      for tmpl in "$apps_dir"/*.yaml; do
        component=$(basename "$tmpl" .yaml)
        TAG="$chart_version" \
          REGISTRY="kind-registry.registry.svc.cluster.local:5000/talos-platform-apps" \
          envsubst < "$tmpl" | $KC apply -f -
        echo "  ✓ ${sub_layer}/${component} → Argo-App '${sub_layer}-${component}'"
        # Lokale HTTPRoute mit applien, falls die Komponente eine UI hat (nur lokal).
        route="local/http-routes/${sub_layer}/${component}.yaml"
        if [ -f "$route" ]; then
          $KC apply -f "$route" >/dev/null
          echo "    🌐 https://${component}.localhost.direct"
        fi
      done
      echo "✓ Sub-Layer ${sub_layer} angelegt (Tag ${chart_version})"
      echo "  Sync-Status: ${KC} -n argocd get applications -l platform.devoba.de/sub-layer=${sub_layer}"

  local:deps:
    desc: 'Transitive Katalog-Abhängigkeiten einer Komponente in Install-Reihenfolge: task local:deps -- <sub-layer>/<component>'
    summary: |
      Liest sub-layers/<sl>/<comp>/compatibility.yaml `requires` rekursiv:
        - Component-Pfade (a/b) direkt,
        - Capabilities (z. B. cnpg-postgres) via provides[].capabilities[].id der
          anderen Komponenten aufgelöst (kein Hardcoding),
        - talos-platform-base (Substrat) wird übersprungen.
      Ausgabe (stdout): je Zeile eine Komponente, Dependencies zuerst (Post-Order),
      das Ziel selbst NICHT enthalten. Warnungen → stderr. Quelle der Wahrheit ist
      compatibility.yaml — es gibt KEIN separates Dependency-Format.
    cmd: |
      set -uo pipefail
      set -- {{.CLI_ARGS}}
      target="${1:?usage: task local:deps -- <sub-layer>/<component>}"

      comp_file() { echo "sub-layers/${1%/*}/components/${1#*/}/compatibility.yaml"; }

      # Capability-ID → erste Komponente, die sie in provides[].capabilities[] führt
      cap_to_comp() {
        for cf in sub-layers/*/components/*/compatibility.yaml; do
          if yq -e ".provides[]?.capabilities[]? | select(.id == \"$1\")" "$cf" >/dev/null 2>&1; then
            d=$(dirname "$cf")
            echo "$(basename "$(dirname "$(dirname "$d")")")/$(basename "$d")"
            return 0
          fi
        done
        return 1
      }

      seen=" "
      order=""
      resolve() {
        cf=$(comp_file "$1")
        [ -f "$cf" ] || return 0
        keys=$(yq -r '.requires // {} | keys | .[]' "$cf" 2>/dev/null)
        for k in $keys; do
          case "$k" in
            talos-platform-base*) continue ;;
            */*) dep="$k" ;;
            *) dep=$(cap_to_comp "$k") || { echo "WARN: Capability '$k' (von $1) → keine Komponente im Katalog" >&2; continue; } ;;
          esac
          case " $seen " in *" $dep "*) continue ;; esac
          seen="$seen $dep"
          resolve "$dep"
          order="${order}${dep}|"
        done
      }
      resolve "$target"
      printf '%s' "$order" | tr '|' '\n' | sed '/^$/d'

  local:dev:
    desc: 'Skaffold-artiger Watch-Loop für EINE Komponente: task local:dev -- <sub-layer>/<component>'
    summary: |
      Beobachtet sub-layers/<sub-layer>/components/<component>/ und fährt bei JEDER
      Änderung automatisch render → package → push (lokale Registry, frischer Tag)
      + Argo-Hard-Refresh. Die automated-syncPolicy der Application appliert dann
      selbst — kein manuelles publish/apply mehr.

      rendered/ ist gitignored → watchexec triggert NICHT auf den eigenen Output
      (kein Endlos-Loop). Strg-C beendet den Loop. Voraussetzung: ein Argo-App-
      Template local/argo-apps/<sub-layer>/<component>.yaml (Vorlage: crossplane).
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task local:dev -- <sub-layer>/<component>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      comp_dir="sub-layers/${sub_layer}/components/${component}"
      app_tmpl="local/argo-apps/${sub_layer}/${component}.yaml"
      [ -d "$comp_dir" ] || { echo "ERROR: ${comp_dir} existiert nicht"; exit 1; }
      [ -f "$app_tmpl" ] || { echo "ERROR: kein Argo-App-Template ${app_tmpl} — anlegen (Vorlage: local/argo-apps/lifecycle/crossplane.yaml)"; exit 1; }
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} get ns argocd >/dev/null 2>&1 || { echo "ERROR: Cluster/ArgoCD nicht da — erst 'task local:up'"; exit 1; }

      # Katalog-Abhängigkeiten zuerst hochziehen (aus compatibility.yaml requires,
      # via local:deps aufgelöst). Skip pro Dep, wenn Argo-App schon Synced/Healthy.
      # Deaktivierbar mit LOCAL_DEV_SKIP_DEPS=1.
      if [ "${LOCAL_DEV_SKIP_DEPS:-0}" != "1" ]; then
        deps=$(task local:deps -- "$component_id" 2>/dev/null || true)
        if [ -n "$deps" ]; then
          echo "Abhängigkeiten (Install-Reihenfolge): $(echo "$deps" | paste -sd' ' -)"
          echo "$deps" | while IFS= read -r dep; do
            [ -z "$dep" ] && continue
            dep_app="${dep%/*}-${dep#*/}"
            dep_tmpl="local/argo-apps/${dep%/*}/${dep#*/}.yaml"
            h=$(kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get application "$dep_app" -o jsonpath='{.status.health.status}' 2>/dev/null || true)
            s=$(kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get application "$dep_app" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)
            if [ "$h" = "Healthy" ] && [ "$s" = "Synced" ]; then
              echo "  ✓ ${dep} bereits Synced/Healthy (skip)"
            elif [ ! -f "$dep_tmpl" ]; then
              echo "  ⚠ ${dep}: kein Argo-App-Template (${dep_tmpl}) — bitte manuell bereitstellen"
            else
              echo "  → ${dep} deployen…"
              task local:dev:sync -- "$dep"
            fi
          done
        fi
      fi

      # Test-Fixtures: consumer-eigene Instanzen (CNPG-Cluster, Valkey) + Dev-Secrets,
      # die der Katalog nicht liefert. Auto, sofern vorhanden; LOCAL_DEV_SKIP_FIXTURES=1 aus.
      fdir="local/fixtures/${sub_layer}/${component}"
      if [ "${LOCAL_DEV_SKIP_FIXTURES:-0}" != "1" ] && [ -d "$fdir" ]; then
        echo "Test-Fixtures (Instanzen + Dev-Secrets):"
        task local:fixtures -- "$component_id"
      fi

      # Hinweis auf consumer-gelieferte Secrets — nur wenn KEINE Fixture sie stellt
      # (sonst werden sie oben automatisch erzeugt).
      cust="${comp_dir}/customization.yaml"
      if [ ! -d "$fdir" ] && [ -f "$cust" ]; then
        sref=$(yq -r '.provided_refs.secret // ""' "$cust" 2>/dev/null)
        skeys=$(yq -r '.required.secret_keys[]?' "$cust" 2>/dev/null | paste -sd, -)
        if [ -n "$skeys" ]; then
          echo "ℹ ${component_id} braucht Secret '${sref}' mit Keys [${skeys}] (consumer-supplied, manuell anlegen — oder local/fixtures/${sub_layer}/${component}/ anlegen)"
        fi
      fi

      echo "Initial-Build ${component_id}…"
      task local:dev:sync -- "$component_id"

      # Lokale HTTPRoute applien, falls die Komponente eine UI hat. Nur lokal —
      # in prod ist die Route consumer-eigen (cluster-spez. Hostname, ADR-0023/0024).
      route="local/http-routes/${sub_layer}/${component}.yaml"
      if [ -f "$route" ]; then
        kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f "$route" >/dev/null
        echo "🌐 erreichbar unter https://${component}.localhost.direct"
      fi

      # Skaffold-artiges Teardown: Strg-C entfernt, was DIESE Komponente ausmacht —
      # Argo-App + HTTPRoute + Fixtures (CR-Instanzen + generierte Secrets). Deps/
      # Operatoren bleiben (teuer im Re-Deploy). LOCAL_DEV_KEEP=1 behält alles.
      # WICHTIG: go-tasks mvdan/sh kann KEINE Signal-Traps ("invalid signal
      # specification"). Watch + Trap laufen daher in echtem `bash -c`; Vars per env.
      echo ""
      echo "👀 Watching ${comp_dir} — Speichern löst Rebuild + Argo-Sync aus. Strg-C → Teardown."
      DEV_SL="$sub_layer" DEV_COMP="$component" DEV_CID="$component_id" \
      DEV_COMPDIR="$comp_dir" DEV_ROUTE="$route" DEV_FDIR="$fdir" DEV_APPTMPL="$app_tmpl" \
      bash -c '
        set -u
        K="kubectl --context {{.LOCAL_KUBE_CONTEXT}}"
        cleanup() {
          trap - INT TERM
          if [ "${LOCAL_DEV_KEEP:-0}" = "1" ]; then echo; echo "LOCAL_DEV_KEEP=1 → ${DEV_CID} bleibt im Cluster."; exit 0; fi
          echo; echo "🧹 Strg-C → räume ${DEV_CID} auf …"
          $K -n argocd delete application "${DEV_SL}-${DEV_COMP}" --ignore-not-found --wait=false >/dev/null 2>&1
          [ -f "$DEV_ROUTE" ] && $K delete -f "$DEV_ROUTE" --ignore-not-found --wait=false >/dev/null 2>&1
          if [ -d "$DEV_FDIR" ]; then
            [ -d "$DEV_FDIR/manifests" ] && $K delete -f "$DEV_FDIR/manifests" --ignore-not-found --wait=false >/dev/null 2>&1
            if [ -f "$DEV_FDIR/secrets.yaml" ]; then
              fns=$(yq -r ".spec.destination.namespace" "$DEV_APPTMPL" 2>/dev/null); { [ -z "$fns" ] || [ "$fns" = "null" ]; } && fns="$DEV_COMP"
              for n in $(yq -r ".secrets[].name" "$DEV_FDIR/secrets.yaml" 2>/dev/null); do $K -n "$fns" delete secret "$n" --ignore-not-found >/dev/null 2>&1; done
            fi
          fi
          echo "  ✓ ${DEV_CID} (App, Route, Fixtures) entfernt. Operatoren/Deps bleiben — task local:down räumt alles ab."
          exit 0
        }
        trap cleanup INT TERM
        watchexec --watch "$DEV_COMPDIR" --ignore "**/rendered/**" --debounce 800ms --postpone -- task local:dev:sync -- "$DEV_CID"
      '

  local:dev:sync:
    desc: 'Eine Dev-Iteration (intern, von local:dev getriggert): render→push→Argo-refresh mit frischem Tag'
    # Eigenständig aufrufbar für einen einmaligen Sync. Frischer Tag pro Lauf
    # (0.0.0-dev.<epoch>), weil ArgoCD OCI-Tags per Digest cached — gleicher Tag
    # würde nicht neu gezogen. Fehlerhafter Render (Tippfehler mitten im Edit)
    # bricht nur diese Iteration ab; der watchexec-Loop läuft weiter.
    cmd: |
      set -euo pipefail
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task local:dev:sync -- <sub-layer>/<component>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      app_tmpl="local/argo-apps/${sub_layer}/${component}.yaml"
      app_name="${sub_layer}-${component}"
      registry="kind-registry.registry.svc.cluster.local:5000/talos-platform-apps"
      tag="0.0.0-dev.$(date +%s)"
      # Lokaler Values-Overlay (externalURL/CORS auf .localhost.direct), falls vorhanden
      ov="local/values-overrides/${sub_layer}/${component}.yaml"; [ -f "$ov" ] || ov=""
      echo "▶ ${component_id} → ${tag}"
      EXTRA_VALUES="$ov" OCI_REGISTRY=localhost:5001/talos-platform-apps task render:one -- "$component_id" >/dev/null
      OCI_REGISTRY=localhost:5001/talos-platform-apps task package    -- "$component_id" "$tag" >/dev/null
      OCI_REGISTRY=localhost:5001/talos-platform-apps task push       -- "$component_id" "$tag" >/dev/null
      TAG="$tag" REGISTRY="$registry" envsubst < "$app_tmpl" \
        | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f - >/dev/null
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd annotate application "$app_name" \
        argocd.argoproj.io/refresh=hard --overwrite >/dev/null
      echo "  ✓ ${app_name} → ${tag} (Argo auto-sync läuft)"

  local:fixtures:
    desc: 'Lokale Test-Fixtures (Capability-Instanzen + Dev-Secrets) einer Komponente: task local:fixtures -- <sub-layer>/<component>'
    summary: |
      Bringt die consumer-eigenen Ressourcen, die der Katalog NICHT liefert
      (ADR-0023/0024), für lokale Tests ein:
        - CR-Manifeste aus local/fixtures/<sl>/<comp>/manifests/ (CNPG-Cluster, Valkey, …)
        - Dev-Secrets aus secrets.yaml — zur Apply-Zeit generiert, idempotent
          (keine Werte im Repo). `fromCnpgApp` kopiert das password aus dem
          CNPG-Auto-Secret <cluster>-app, sonst Zufallswert pro Key.
      No-op, wenn kein Fixtures-Verzeichnis existiert.
    cmd: |
      set -uo pipefail
      set -- {{.CLI_ARGS}}
      cid="${1:?usage: task local:fixtures -- <sub-layer>/<component>}"
      sl="${cid%/*}"; comp="${cid#*/}"
      fdir="local/fixtures/${sl}/${comp}"
      [ -d "$fdir" ] || { echo "  (keine Fixtures für ${cid})"; exit 0; }
      KC="kubectl --context {{.LOCAL_KUBE_CONTEXT}}"
      ns=$(yq -r '.spec.destination.namespace' "local/argo-apps/${sl}/${comp}.yaml" 2>/dev/null)
      { [ -z "$ns" ] || [ "$ns" = "null" ]; } && ns="$comp"
      $KC create namespace "$ns" --dry-run=client -o yaml | $KC apply -f - >/dev/null

      if [ -d "$fdir/manifests" ]; then
        $KC apply -f "$fdir/manifests" >/dev/null && echo "  ✓ Fixture-Manifeste angewendet"
      fi

      spec="$fdir/secrets.yaml"
      [ -f "$spec" ] || exit 0
      count=$(yq -r '.secrets | length' "$spec" 2>/dev/null)
      i=0
      while [ "$i" -lt "${count:-0}" ]; do
        name=$(yq -r ".secrets[$i].name" "$spec")
        cnpg=$(yq -r ".secrets[$i].fromCnpgApp // \"\"" "$spec")
        if $KC -n "$ns" get secret "$name" >/dev/null 2>&1; then
          echo "  ✓ Secret ${name} existiert (skip)"
        elif [ -n "$cnpg" ]; then
          echo "  → warte auf CNPG-Auto-Secret ${cnpg}-app …"
          for _ in $(seq 1 60); do $KC -n "$ns" get secret "${cnpg}-app" >/dev/null 2>&1 && break; sleep 2; done
          pw=$($KC -n "$ns" get secret "${cnpg}-app" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d)
          if [ -n "$pw" ]; then
            $KC -n "$ns" create secret generic "$name" --from-literal=password="$pw" >/dev/null
            echo "  ✓ Secret ${name} (password aus ${cnpg}-app)"
          else
            echo "  ⚠ ${cnpg}-app (noch) nicht da — ${name} übersprungen"
          fi
        else
          args=""
          # literals: feste Dev-Werte (lokale Convenience, z. B. admin/admin — KEINE
          # echten Secrets; Werte dürfen keine Leerzeichen enthalten).
          for kv in $(yq -r ".secrets[$i].literals // {} | to_entries[] | .key + \"=\" + .value" "$spec" 2>/dev/null); do
            args="$args --from-literal=${kv}"
          done
          # generate: Zufallswerte pro Key. head liest /dev/urandom direkt (endlich)
          # → kein SIGPIPE; danach base64/tr/cut.
          for key in $(yq -r ".secrets[$i].generate[]?" "$spec"); do
            val=$(head -c 18 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | cut -c1-24)
            args="$args --from-literal=${key}=${val}"
          done
          $KC -n "$ns" create secret generic "$name" $args >/dev/null
          echo "  ✓ Secret ${name} (literals + generiert)"
        fi
        i=$((i+1))
      done

  local:remove:
    desc: 'Alle Argo-Apps eines Sub-Layers entfernen: task local:remove -- <sub-layer>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:remove -- <sub-layer>}"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd delete application \
        -l platform.devoba.de/sub-layer="$sub_layer",platform.devoba.de/local-test=true \
        --wait=true || true

  local:status:
    desc: 'Überblick: Cluster + Argo + Applications'
    cmd: |
      echo "=== Talos-Cluster ==="
      talosctl cluster show --name talos-platform-apps 2>/dev/null || echo "  (nicht da)"
      echo ""
      echo "=== Lokale Registry ==="
      docker ps --filter name=kind-registry --format 'table {{`{{.Names}}\t{{.Status}}\t{{.Ports}}`}}'
      echo ""
      echo "=== Argo-Status ==="
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get pods 2>/dev/null || echo "  (ArgoCD nicht installiert)"
      echo ""
      echo "=== Lokale Argo-Applications ==="
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get applications -l platform.devoba.de/local-test=true 2>/dev/null || true

  # --- Crossplane-Composition-Test (Pendant zum Argo/Helm-Loop) ---

  crossplane:render:
    desc: 'Composition OFFLINE rendern (composed Resources, ohne Cluster/Provisionierung): task crossplane:render'
    summary: |
      `crossplane render` fährt die Composition-Function-Pipeline lokal in Docker
      und zeigt die composed Resources (z. B. den opentofu-Workspace) — das
      Crossplane-Pendant zu `task render` (Helm). Schnell, kein Cluster, kein tofu.
      Default: XCluster-Composition + Test-XR. Override: XR=<file> COMP=<file>.
      functions.yaml-Versionen müssen zu sub-layers/lifecycle/.../providers passen.
    cmd: |
      xr="${XR:-local/crossplane/examples/xcluster-test.yaml}"
      comp="${COMP:-sub-layers/lifecycle/components/compositions/manifests/composition-xcluster.yaml}"
      crossplane render "$xr" "$comp" local/crossplane/functions.yaml

  crossplane:dev:
    desc: 'Skaffold-artiger Offline-Loop: rendert die Composition bei jedem Save neu'
    summary: |
      Beobachtet die Composition/XRD-Manifeste + local/crossplane/ und re-rendert
      bei jeder Änderung (offline, Docker-Functions). Strg-C beendet. Der schnelle
      Iterier-Loop für Composition-Logik — ohne Cluster, ohne Provisionierung.
    cmd: |
      echo "Initial-Render…"
      task crossplane:render || true
      echo ""
      echo "👀 Watching compositions/ + local/crossplane/ — Speichern → re-render. Strg-C beendet."
      watchexec --watch sub-layers/lifecycle/components/compositions/manifests \
        --watch local/crossplane --ignore '**/rendered/**' --debounce 500ms --postpone \
        -- task crossplane:render

  crossplane:apply:
    desc: 'XRD+Composition+Provider+Test-XR ins lokale Cluster; Reconcile bis zur Provider-Grenze'
    summary: |
      Deployt den lifecycle-Crossplane-Stack (crossplane, providers, compositions)
      ins lokale Talos-Cluster (via local:dev:sync) und appliert den Test-XR. Bis
      zur PROVIDER-GRENZE: XRD/Composition installiert, XCluster accepted, der
      opentofu-Workspace wird erzeugt — der echte tofu-apply schlägt lokal
      erwartbar fehl (keine Hardware/kein Backend). Testet die In-Cluster-Verdrahtung.
    cmd: |
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} get ns argocd >/dev/null 2>&1 || { echo "ERROR: Cluster/ArgoCD nicht da — erst 'task local:up'"; exit 1; }
      for c in lifecycle/crossplane lifecycle/providers lifecycle/compositions; do
        echo "→ ${c} deployen…"
        task local:dev:sync -- "$c"
      done
      echo "warte auf XCluster-CRD (Established)…"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} wait --for=condition=Established crd/xclusters.platform.devoba.de --timeout=120s || true
      # ClusterProviderConfig ZUERST (consumer-eigen, lokaler Dummy) — sonst kann
      # provider-opentofu sie beim Workspace-Reconcile nicht auflösen ("not found").
      echo "→ ClusterProviderConfig (lokaler Dummy) applien"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/crossplane/examples/clusterproviderconfig.yaml
      echo "→ Test-XR applien"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/crossplane/examples/xcluster-test.yaml
      echo ""
      echo "✓ Beobachten (tofu-apply scheitert lokal erwartbar — Provider-Grenze):"
      echo "  kubectl --context {{.LOCAL_KUBE_CONTEXT}} get xcluster xcluster-test"
      echo "  kubectl --context {{.LOCAL_KUBE_CONTEXT}} get workspace.opentofu.m.upbound.io"
      echo "  crossplane beta trace xcluster.platform.devoba.de/xcluster-test"

  local:harbor:proxy:
    desc: 'harbor Pull-Through-Proxy auf ghcr.io anlegen (z. B. für das Talos-Installer-Image): task local:harbor:proxy'
    summary: |
      Legt (idempotent) einen harbor Registry-Endpoint + ein Proxy-Cache-Project
      `ghcr` → https://ghcr.io an (ADR-0012 harbor-as-registry-proxy). Danach cacht
      harbor Pulls von ghcr.io beim ersten Zugriff, z. B.:
        harbor.localhost.direct/ghcr/siderolabs/installer:v1.13.3
      Voraussetzung: harbor läuft (task local:dev -- registry/harbor) + ist Healthy.
    cmd: |
      H="https://harbor.localhost.direct"
      pw=$(kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n harbor get secret harbor-runtime-secret -o jsonpath='{.data.HARBOR_ADMIN_PASSWORD}' 2>/dev/null | base64 -d)
      [ -n "$pw" ] || { echo "ERROR: harbor-runtime-secret nicht da — erst harbor hochziehen (task local:dev -- registry/harbor)"; exit 1; }
      A="admin:${pw}"
      if [ "$(curl -sf -u "$A" "$H/api/v2.0/registries?name=ghcr" | jq 'length')" = "0" ]; then
        curl -sS -u "$A" -X POST "$H/api/v2.0/registries" -H 'Content-Type: application/json' \
          -d '{"name":"ghcr","type":"docker-registry","url":"https://ghcr.io","insecure":false}' >/dev/null
        echo "✓ Registry-Endpoint ghcr (→ https://ghcr.io) angelegt"
      else echo "✓ Registry-Endpoint ghcr existiert"; fi
      rid=$(curl -sf -u "$A" "$H/api/v2.0/registries?name=ghcr" | jq -r '.[0].id')
      if [ "$(curl -sf -u "$A" "$H/api/v2.0/projects?name=ghcr" | jq 'length')" = "0" ]; then
        curl -sS -u "$A" -X POST "$H/api/v2.0/projects" -H 'Content-Type: application/json' \
          -d "{\"project_name\":\"ghcr\",\"registry_id\":${rid},\"metadata\":{\"public\":\"true\"}}" >/dev/null
        echo "✓ Proxy-Project ghcr angelegt"
      else echo "✓ Proxy-Project ghcr existiert"; fi
      echo "✓ Talos-Installer via harbor: harbor.localhost.direct/ghcr/siderolabs/installer:<tag>"
      echo "  Test:  curl -su admin:<pw> https://harbor.localhost.direct/v2/ghcr/siderolabs/installer/manifests/v1.13.3"
