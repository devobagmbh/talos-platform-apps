# Taskfile für talos-platform-apps
# https://taskfile.dev
#
# Konvention (siehe AGENTS.md § CI-Konventionen): Pipeline ist Task-Caller.
# GHA-Workflows rufen ausschließlich `task <name>`; alle Logik wohnt hier.

version: '3'

# Konvention: Tasks sind silent. Commands echoen sich nicht selbst —
# nur die Commands geben Output an die Konsole. Ausnahmen via `silent: false`
# explizit am Task.
silent: true

vars:
  SUB_LAYERS:
    sh: ls sub-layers/

tasks:
  default:
    desc: Liste verfügbare Targets
    cmd: task --list

  # --- Render ---

  render:
    desc: Rendert alle Sub-Layer in sub-layers/*/rendered/manifest.yaml
    cmds:
      - for: { var: SUB_LAYERS }
        task: render:one
        vars: { SUB_LAYER: '{{.ITEM}}' }

  render:one:
    desc: Rendert genau einen Sub-Layer
    summary: |
      Eingabe-Konvention pro Sub-Layer:
        helm/*.yaml     — YAML mit metadata.{chart,repo,version,namespace} + values
                          oder metadata.inline: true für Custom-Stubs
        manifests/*.yaml — Raw-Manifeste, werden 1:1 konkateniert
      Output: sub-layers/<name>/rendered/manifest.yaml
    vars:
      SUB_LAYER: '{{.SUB_LAYER | default .CLI_ARGS}}'
      ROOT: 'sub-layers/{{.SUB_LAYER}}'
      OUT: 'sub-layers/{{.SUB_LAYER}}/rendered/manifest.yaml'
    preconditions:
      - sh: test -d "{{.ROOT}}"
        msg: "Sub-Layer {{.SUB_LAYER}} existiert nicht ({{.ROOT}})"
    cmds:
      - mkdir -p "$(dirname {{.OUT}})"
      - ': > "{{.OUT}}"'
      - echo "=== Render Sub-Layer  {{.SUB_LAYER}} ==="
      - |
        shopt -s nullglob
        for vfile in {{.ROOT}}/helm/*.yaml; do
          name=$(basename "$vfile" .yaml)
          inline=$(yq -r '.metadata.inline // false' "$vfile")

          if [[ "$inline" == "true" ]]; then
            namespace=$(yq -r '.metadata.namespace // "default"' "$vfile")
            echo "  ↳ Inline-Stub  $name (ns=$namespace)"
            {
              echo "# Inline-Stub: $name (Sub-Layer: {{.SUB_LAYER}})"
              echo "# Custom-Manifeste folgen im Sub-Layer-Inhalt-Issue."
              echo "---"
              echo "apiVersion: v1"
              echo "kind: Namespace"
              echo "metadata:"
              echo "  name: $namespace"
              echo "  labels:"
              echo "    platform.devoba.de/sub-layer: {{.SUB_LAYER}}"
              echo "    platform.devoba.de/component: $name"
              echo "---"
            } >> "{{.OUT}}"
            continue
          fi

          chart=$(yq -r '.metadata.chart' "$vfile")
          repo=$(yq -r '.metadata.repo' "$vfile")
          version=$(yq -r '.metadata.version' "$vfile")
          namespace=$(yq -r '.metadata.namespace // "default"' "$vfile")

          echo "  ↳ Helm-Render   $name (chart=$chart version=$version)"
          vals_tmp=$(mktemp)
          yq '.values' "$vfile" > "$vals_tmp"
          helm template "$name" "$chart" \
            --repo "$repo" --version "$version" \
            --namespace "$namespace" \
            --values "$vals_tmp" >> "{{.OUT}}"
          echo "---" >> "{{.OUT}}"
          rm -f "$vals_tmp"
        done

        for mfile in {{.ROOT}}/manifests/*.yaml; do
          echo "  ↳ Raw-Manifest  $(basename "$mfile")"
          cat "$mfile" >> "{{.OUT}}"
          echo "---" >> "{{.OUT}}"
        done
      - echo "  → $(wc -l < {{.OUT}}) Zeilen geschrieben nach {{.OUT}}"

  # --- Lint ---

  lint:
    desc: YAML- und Markdown-Lint
    cmds:
      - yamllint -c .yamllint.yaml sub-layers/ Taskfile.yml .github/
      - markdownlint --config .markdownlint.yaml '**/*.md' --ignore .devbox --ignore .direnv

  lint:rendered:
    desc: kubeconform gegen alle rendered/-Manifeste
    cmd: |
      find sub-layers/*/rendered -name '*.yaml' -print0 2>/dev/null | \
        xargs -0 -r kubeconform -strict -ignore-missing-schemas -summary

  # --- Security-Scans (Issue #11.8) ---

  scan:
    desc: alle Security-Scans (trivy + conftest + optional snyk)
    cmds:
      - task: scan:trivy
      - task: scan:conftest
      - |
        if [[ -n "${SNYK_TOKEN:-}" ]]; then
          task scan:snyk
        else
          echo "SNYK_TOKEN nicht gesetzt — snyk skipped"
        fi

  scan:trivy:
    desc: Trivy-Scan über rendered/-Manifeste, SARIF-Output
    deps: [render]
    cmd: |
      trivy fs sub-layers/*/rendered/ \
        --format sarif \
        --output trivy-results.sarif

  scan:conftest:
    desc: Conftest-Policies aus policies/ gegen rendered/-Manifeste
    deps: [render]
    cmd: |
      files=$(find sub-layers -path '*/rendered/manifest.yaml' -size +0 -type f)
      if [ -z "$files" ]; then
        echo "Keine nicht-leeren rendered/manifest.yaml gefunden — nichts zu prüfen"
        exit 0
      fi
      echo "Conftest gegen $(echo "$files" | wc -l | tr -d ' ') Sub-Layer-Manifeste:"
      echo "$files" | sed 's/^/  - /'
      echo ""
      conftest test --policy policies/ --all-namespaces $files

  scan:conftest-verify:
    desc: Conftest-Policy-Selbsttests (testdata/-Korpus)
    cmd: conftest verify --policy policies/

  scan:snyk:
    desc: Snyk IaC-Scan (braucht SNYK_TOKEN)
    cmd: |
      snyk iac test sub-layers/ \
        --sarif-file-output=snyk-results.sarif

  # --- Publish-Targets ---

  package:
    desc: 'baut Helm-Chart-Wrapper aus rendered/manifest.yaml: task package -- <sub-layer> <tag>'
    summary: |
      Verpackt sub-layers/<sub-layer>/rendered/manifest.yaml in einen
      schlanken Helm-Chart-Wrapper (Chart.yaml + templates/manifest.yaml).
      Tag wird zur Chart-Version. Pre-rendered bleibt strikt — Templates
      sind statische YAML, kein Templating-Variable-Auflösen mehr.

      Output: sub-layers/<sub-layer>/rendered/chart/<sub-layer>-<tag>.tgz
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task package -- <sub-layer> <tag>}"
      tag="${2:?usage: task package -- <sub-layer> <tag>}"
      # Helm-Chart-Version muss SemVer ohne "v"-Präfix sein
      chart_version="${tag#v}"

      root="sub-layers/${sub_layer}"
      manifest="${root}/rendered/manifest.yaml"
      test -s "$manifest" || { echo "ERROR: $manifest fehlt oder ist leer — vorher task render:one -- $sub_layer"; exit 1; }

      wrapper="${root}/rendered/chart"
      rm -rf "$wrapper"
      mkdir -p "$wrapper/templates"

      cat > "$wrapper/Chart.yaml" <<EOF
      apiVersion: v2
      name: ${sub_layer}
      description: Pre-rendered Devoba-Platform-Sub-Layer ${sub_layer}
      type: application
      version: ${chart_version}
      appVersion: "${chart_version}"
      annotations:
        platform.devoba.de/sub-layer: ${sub_layer}
        platform.devoba.de/pre-rendered: "true"
      EOF

      cp "$manifest" "$wrapper/templates/manifest.yaml"

      helm package "$wrapper" --destination "${root}/rendered/"
      echo "✓ Packaged: ${root}/rendered/${sub_layer}-${chart_version}.tgz"

  push:
    desc: 'helm push eines Sub-Layer-Charts: task push -- <sub-layer> <tag>'
    summary: |
      Pusht das via "task package" gebaute Helm-Chart als OCI-Artefakt nach
      OCI_REGISTRY (Default: ghcr.io/devobagmbh/talos-platform-apps).

      Voraussetzungen:
        - rendered + packaged (via task package -- <sub-layer> <tag>)
        - helm registry login OCI_REGISTRY
          (lokal: echo $GITHUB_TOKEN | helm registry login ghcr.io -u <user> --password-stdin)

      Beispiel: task push -- lifecycle v0.0.0-dev
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task push -- <sub-layer> <tag>}"
      tag="${2:?usage: task push -- <sub-layer> <tag>}"
      chart_version="${tag#v}"

      pkg="sub-layers/${sub_layer}/rendered/${sub_layer}-${chart_version}.tgz"
      test -s "$pkg" || { echo "ERROR: $pkg fehlt — vorher task package -- $sub_layer $tag"; exit 1; }

      echo "Pushing $pkg → oci://{{.OCI_REGISTRY}}/${sub_layer}"
      helm push "$pkg" "oci://{{.OCI_REGISTRY}}"
      echo "✓ Pushed: oci://{{.OCI_REGISTRY}}/${sub_layer}:${chart_version}"

  sign:
    desc: 'cosign sign keyless: task sign -- <sub-layer> <tag>'
    summary: |
      Signiert das Helm-OCI-Artefakt unter <ref> via cosign keyless.
      Lokal-Setup (Registry ohne OIDC-Backing) überspringt cosign.

      In CI: GHA-OIDC-Token (permissions: id-token: write) →
        Fulcio-Cert → Rekor-Log-Eintrag → cosign-Signature im OCI-Tag.

      Lokal: kein cosign — die lokale Registry hat kein Trust-Backing,
      Argo-CD im Kind verifiziert ohnehin nicht. cosign nur in CI.
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task sign -- <sub-layer> <tag>}"
      tag="${2:?usage: task sign -- <sub-layer> <tag>}"
      chart_version="${tag#v}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}:${chart_version}"
      if [[ "{{.OCI_REGISTRY}}" == *"localhost"* ]] || [[ "{{.OCI_REGISTRY}}" == *"kind-registry"* ]]; then
        echo "Lokale Registry erkannt — cosign übersprungen"
        exit 0
      fi
      echo "Signing $ref (keyless)"
      cosign sign --yes "$ref"
      echo "✓ Signed: $ref"

  attest:
    desc: 'SBOM + SLSA-Attestations (vertagt nach Phase 2 — ADR-0009 § Phase-1-Scope)'
    cmd: |
      echo "Vertagt nach Phase 2+ (ADR-0009 § Phase-1-Scope)."
      echo "SLSA-v1-Provenance + CycloneDX-SBOM werden aktiviert, sobald externe"
      echo "Konsumenten existieren oder Audit-Anforderung greift."

  publish:
    desc: 'render → package → push → sign: task publish -- <sub-layer> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task publish -- <sub-layer> <tag>}"
      tag="${2:?usage: task publish -- <sub-layer> <tag>}"
      task render:one -- "$sub_layer"
      task package    -- "$sub_layer" "$tag"
      task push       -- "$sub_layer" "$tag"
      task sign       -- "$sub_layer" "$tag"
      echo "✓ Published $sub_layer:$tag"

  verify:
    desc: 'cosign verify gegen einen veröffentlichten OCI-Tag: task verify -- <sub-layer> <tag>'
    summary: |
      Verifiziert die cosign-Keyless-Signature. Erwartete Identity:
        https://github.com/devobagmbh/talos-platform-apps/.github/workflows/oci-publish.yml@refs/tags/<sub-layer>-<tag>
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task verify -- <sub-layer> <tag>}"
      tag="${2:?usage: task verify -- <sub-layer> <tag>}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}:${tag}"
      cosign verify "$ref" \
        --certificate-identity-regexp "^https://github\.com/devobagmbh/talos-platform-apps/\.github/workflows/oci-publish\.yml@refs/tags/${sub_layer}-.*$" \
        --certificate-oidc-issuer https://token.actions.githubusercontent.com

  # --- CI (lokal-äquivalent zur GHA-Pipeline) ---

  ci:
    desc: Lokale Reproduktion der GHA-Pipeline (lint + render + scan:conftest)
    cmds:
      - task: lint
      - task: render
      - task: lint:rendered
      - task: scan:conftest-verify
      - task: scan:conftest

  # --- Housekeeping ---

  clean:
    desc: rendered/-Output und Scan-Artefakte entfernen
    cmds:
      - rm -rf sub-layers/*/rendered
      - rm -f trivy-results.sarif snyk-results.sarif

  pre-commit-install:
    desc: pre-commit-Framework-Hooks installieren (.git/hooks/pre-commit)
    cmd: pre-commit install --install-hooks

  devbox-info:
    desc: Devbox-Tool-Versionen anzeigen
    cmd: devbox info

  # --- Lokale Entwicklung: Kind + Local-Registry + ArgoCD ---

  local:up:
    desc: 'Lokales Entwicklungs-Setup hoch: Registry + Kind + Cilium + Gateway-API + ArgoCD'
    cmds:
      - task: local:registry:up
      - task: local:cluster:up
      - task: local:cilium:install
      - task: local:gateway-api:install
      - task: local:cert-manager:install
      - task: local:certs
      - task: local:argo:install
      - task: local:gateway:apply
      - |
        echo ""
        echo "✓ Lokales Setup bereit."
        echo "  Argo-UI:       https://argocd.localhost.direct"
        echo "  Argo-Admin-Pw: task local:argo:password"
        echo "  Lokal pushen:  task local:publish -- <sub-layer> <tag>"

  local:down:
    desc: 'Alles abreißen: Cluster + Registry + Mkcert-Daten'
    cmds:
      - kind delete cluster --name talos-platform-apps || true
      - task: local:registry:down

  local:registry:up:
    desc: 'Lokale Docker-Registry auf localhost:5001 starten (idempotent)'
    cmd: |
      if [ "$(docker inspect -f '{{`{{.State.Running}}`}}' kind-registry 2>/dev/null)" = "true" ]; then
        echo "✓ kind-registry läuft bereits"
      else
        docker rm -f kind-registry >/dev/null 2>&1 || true
        docker run -d --restart=always -p 127.0.0.1:5001:5000 --name kind-registry registry:2
        echo "✓ kind-registry gestartet (localhost:5001)"
      fi

  local:registry:down:
    desc: 'Lokale Registry stoppen + entfernen'
    cmd: docker rm -f kind-registry || true

  local:cluster:up:
    desc: 'Kind-Cluster erstellen und mit lokaler Registry verbinden'
    cmds:
      - kind create cluster --name talos-platform-apps --config local/kind-config.yaml || true
      - kubectx kind-talos-platform-apps
      - |
        # Containerd-Config-Patches pro Node anbringen — local-registry@kind-registry:5000
        for node in $(kind get nodes --name talos-platform-apps); do
          docker exec "$node" mkdir -p /etc/containerd/certs.d/localhost:5001
          docker exec "$node" sh -c 'cat > /etc/containerd/certs.d/localhost:5001/hosts.toml <<EOF
        [host."http://kind-registry:5000"]
        EOF'
        done
      - |
        # Registry-Container ins kind-Docker-Netzwerk verbinden (idempotent)
        if [ "$(docker inspect -f='{{`{{json .NetworkSettings.Networks.kind}}`}}' kind-registry)" = 'null' ]; then
          docker network connect "kind" kind-registry
        fi
      - |
        # ConfigMap nach KEP-1755 (local-registry-hosting)
        kubectl apply -f - <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: local-registry-hosting
          namespace: kube-public
        data:
          localRegistryHosting.v1: |
            host: "localhost:5001"
            help: "https://kind.sigs.k8s.io/docs/user/local-registry/"
        EOF

  local:cert-manager:install:
    desc: 'cert-manager via Helm installieren (CRDs inline)'
    cmd: |
      helm repo add jetstack https://charts.jetstack.io 2>/dev/null || true
      helm repo update jetstack
      helm upgrade --install cert-manager jetstack/cert-manager \
        --namespace cert-manager --create-namespace \
        --version v1.17.0 \
        --set crds.enabled=true \
        --wait --timeout 5m

  local:certs:
    desc: 'mkcert-Root-CA ins System-Trust + als Cluster-Secret + ClusterIssuer'
    cmd: |
      mkcert -install
      caroot=$(mkcert -CAROOT)
      mkdir -p .mkcert
      cp "$caroot/rootCA.pem"     .mkcert/
      cp "$caroot/rootCA-key.pem" .mkcert/
      kubectl create secret tls mkcert-ca \
        --cert=.mkcert/rootCA.pem --key=.mkcert/rootCA-key.pem \
        -n cert-manager \
        --dry-run=client -o yaml | kubectl apply -f -
      kubectl apply -f local/mkcert-cluster-issuer.yaml
      echo "✓ mkcert-CA als ClusterIssuer 'mkcert-ca' bereit"

  local:cilium:install:
    desc: 'Cilium als CNI installieren (kubeProxyReplacement, Gateway-API enabled)'
    cmd: |
      # K8s-API-IP des Control-Plane-Containers ermitteln (Cilium ohne kube-proxy)
      api_ip=$(docker container inspect talos-platform-apps-control-plane \
        --format '{{`{{ .NetworkSettings.Networks.kind.IPAddress }}`}}')
      echo "Cilium k8sServiceHost=$api_ip:6443"
      helm repo add cilium https://helm.cilium.io 2>/dev/null || true
      helm repo update cilium
      helm upgrade --install cilium cilium/cilium \
        --namespace kube-system \
        --version 1.19.3 \
        --values local/cilium-values.yaml \
        --set k8sServiceHost="$api_ip" \
        --set k8sServicePort=6443 \
        --wait --timeout 5m
      # Wartet, bis CoreDNS via Cilium-CNI wieder läuft
      kubectl -n kube-system rollout status deployment/coredns --timeout=2m

  local:gateway-api:install:
    desc: 'Gateway-API-CRDs installieren (Standard-Channel v1.2.0)'
    cmd: |
      kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
      kubectl wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=2m
      kubectl wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=2m

  local:argo:install:
    desc: 'ArgoCD via Helm im Kind installieren (HTTPRoute auf argocd.localhost.direct)'
    cmd: |
      helm repo add argo https://argoproj.github.io/argo-helm 2>/dev/null || true
      helm repo update argo
      helm upgrade --install argocd argo/argo-cd \
        --namespace argocd --create-namespace \
        --version 7.7.0 \
        --values local/argocd-values.yaml \
        --wait --timeout 5m

  local:gateway:apply:
    desc: 'Gateway + HTTPRoute apply + Cilium-Gateway-Service auf NodePort patchen'
    cmd: |
      kubectl create namespace gateway --dry-run=client -o yaml | kubectl apply -f -
      kubectl apply -f local/gateway.yaml
      # warten bis Cilium den Gateway-Service erzeugt hat
      for i in $(seq 1 30); do
        if kubectl -n gateway get svc cilium-gateway-localhost-direct >/dev/null 2>&1; then break; fi
        echo "  ... warte auf cilium-gateway-localhost-direct ($i/30)"
        sleep 2
      done
      # Patch auf NodePort + feste Ports 30080/30443
      kubectl -n gateway patch svc cilium-gateway-localhost-direct --type=merge -p '{
        "spec": {
          "type": "NodePort",
          "ports": [
            {"name": "port-80",  "port": 80,  "targetPort": 80,  "nodePort": 30080, "protocol": "TCP"},
            {"name": "port-443", "port": 443, "targetPort": 443, "nodePort": 30443, "protocol": "TCP"}
          ]
        }
      }'
      kubectl apply -f local/argocd-route.yaml
      echo "✓ Gateway + HTTPRoute angewendet"
      echo "  Cilium-Gateway-Service: NodePort (30080→Host:80, 30443→Host:443)"

  local:argo:uninstall:
    desc: 'ArgoCD entfernen (Cluster bleibt)'
    cmd: helm uninstall argocd --namespace argocd || true

  local:argo:ui:
    desc: 'Argo-UI öffnen (falls Browser nicht automatisch startet: https://argocd.localhost.direct)'
    cmd: |
      pw=$(task local:argo:password --silent)
      echo "Argo-UI: https://argocd.localhost.direct"
      echo "Login:   admin / $pw"
      command -v open >/dev/null && open https://argocd.localhost.direct || true

  local:argo:password:
    desc: 'Initial-Admin-Passwort von ArgoCD ausgeben'
    cmd: |
      kubectl -n argocd get secret argocd-initial-admin-secret \
        -o jsonpath='{.data.password}' | base64 -d
      echo ""

  local:publish:
    desc: 'render + package + push zur lokalen Registry: task local:publish -- <sub-layer> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:publish -- <sub-layer> <tag>}"
      tag="${2:?usage: task local:publish -- <sub-layer> <tag>}"
      OCI_REGISTRY=localhost:5001/talos-platform-apps task render:one -- "$sub_layer"
      OCI_REGISTRY=localhost:5001/talos-platform-apps task package    -- "$sub_layer" "$tag"
      OCI_REGISTRY=localhost:5001/talos-platform-apps task push       -- "$sub_layer" "$tag"
      echo "✓ Lokal publiziert: oci://localhost:5001/talos-platform-apps/${sub_layer}:${tag#v}"

  local:apply:
    desc: 'Argo-Application aus local/argo-app-template.yaml im Kind anwenden: task local:apply -- <sub-layer> <tag> [<namespace>]'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:apply -- <sub-layer> <tag> [<namespace>]}"
      tag="${2:?usage: task local:apply -- <sub-layer> <tag> [<namespace>]}"
      namespace="${3:-default}"
      chart_version="${tag#v}"

      SUB_LAYER="$sub_layer" \
        TAG="$chart_version" \
        REGISTRY="kind-registry:5000/talos-platform-apps" \
        NAMESPACE="$namespace" \
        envsubst < local/argo-app-template.yaml | kubectl apply -f -

      echo "✓ Argo-Application angelegt: ${sub_layer}-local (chart=${sub_layer}:${chart_version}, ns=${namespace})"
      echo "  Status: kubectl -n argocd get application ${sub_layer}-local -o jsonpath='{.status.sync.status}'"

  local:remove:
    desc: 'Argo-Application + deployte Ressourcen entfernen: task local:remove -- <sub-layer>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:remove -- <sub-layer>}"
      kubectl -n argocd delete application "${sub_layer}-local" --wait=true || true

  local:status:
    desc: 'Überblick: Cluster + Argo + Applications'
    cmd: |
      echo "=== Kind-Cluster ==="
      kind get clusters | grep talos-platform-apps || echo "  (nicht da)"
      echo ""
      echo "=== Lokale Registry ==="
      docker ps --filter name=kind-registry --format 'table {{`{{.Names}}\t{{.Status}}\t{{.Ports}}`}}'
      echo ""
      echo "=== Argo-Status ==="
      kubectl -n argocd get pods 2>/dev/null || echo "  (ArgoCD nicht installiert)"
      echo ""
      echo "=== Lokale Argo-Applications ==="
      kubectl -n argocd get applications -l platform.devoba.de/local-test=true 2>/dev/null || true
