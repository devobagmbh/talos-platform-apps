# Taskfile für talos-platform-apps
# https://taskfile.dev
#
# Konvention (siehe AGENTS.md § CI-Konventionen): Pipeline ist Task-Caller.
# GHA-Workflows rufen ausschließlich `task <name>`; alle Logik wohnt hier.

version: '3'

# Konvention: Tasks sind silent. Commands echoen sich nicht selbst —
# nur die Commands geben Output an die Konsole. Ausnahmen via `silent: false`
# explizit am Task.
silent: true

# DOCKER_HOST aus dem aktiven docker-Context ableiten, damit talosctl (das hart
# auf unix:///var/run/docker.sock schaut) auch auf Colima/Orbstack/Docker-Desktop
# den richtigen Socket findet. Fallback = Standard-Socket. 2>/dev/null hält CI-
# Jobs ohne docker still; nicht-docker-Tasks (lint/render/ci) ignorieren die Var.
env:
  DOCKER_HOST:
    sh: docker context inspect --format '{{`{{ .Endpoints.docker.Host }}`}}' 2>/dev/null || echo "unix:///var/run/docker.sock"

vars:
  # Alle Komponenten als <sub-layer>/<component>-Liste, aus dem Verzeichnis-Baum
  # gelesen. Komponente ist die OCI-Distribution-Unit (ADR-0009); Sub-Layer ist
  # die organisatorische Klammer.
  COMPONENTS:
    sh: |
      shopt -s nullglob
      for sldir in sub-layers/*/; do
        sl=$(basename "$sldir")
        for cdir in "$sldir"components/*/; do
          echo "$sl/$(basename "$cdir")"
        done
      done

  # The kube-context for the LOCAL Talos test cluster — single source of truth for
  # the context name. `talosctl cluster create --name talos-platform-apps` writes
  # this deterministic default (admin@<cluster-name>). Every local:* task that
  # contacts the cluster pins it via --context {{.LOCAL_KUBE_CONTEXT}} (helm:
  # --kube-context) — the per-component E2E + teardown + standalone helpers AND the
  # local:up bring-up sub-tasks (cluster:up post-switch apply, cert-manager / cilium
  # / storage / gateway-api / argo installs, certs, gateway:apply, registry:bridge,
  # start readiness probe).
  # Scope of the guarantee: pinning selects the kubeconfig context *by name*, so a
  # current-context left pointing at a DIFFERENT, differently-named cluster cannot be
  # hit — the common accident this defends against. It does NOT verify the named
  # context's server: URL — guarding against a same-named entry or a repointed
  # cluster server is kubeconfig hygiene the operator owns, which no --context flag
  # can check (local:cluster:up does add a server-URL self-heal for its own bring-up
  # path; see its guard). So this is current-context-drift protection, not cluster-
  # identity verification.
  # Three call classes are intentionally NOT pinned because none selects a running
  # cluster by context: (1) the context bootstrap in local:cluster:up (kubectl config
  # set-cluster / talosctl kubeconfig / kubectx) that CREATES and selects the context
  # itself; (2) client-side generators (kubectl create … --dry-run=client) that only
  # render YAML before piping into a pinned apply; (3) helm repo add/update, which
  # touch the local repo cache, not the cluster.
  LOCAL_KUBE_CONTEXT: admin@talos-platform-apps

tasks:
  default:
    desc: Liste verfügbare Targets
    cmd: task --list

  # --- Render ---

  render:
    desc: Rendert alle Komponenten in sub-layers/*/components/*/rendered/manifest.yaml
    cmds:
      - for: { var: COMPONENTS }
        task: render:one
        vars: { COMPONENT_ID: '{{.ITEM}}' }

  render:one:
    desc: 'Rendert eine Komponente: task render:one -- <sub-layer>/<component>'
    summary: |
      Komponente ist die OCI-Distribution-Unit. Pfad:
        sub-layers/<sub-layer>/components/<component>/
      Eingabe-Konvention:
        helm/*.yaml      — YAML mit metadata.{chart,repo,version,namespace} + values
                           oder metadata.inline: true für Custom-Stubs
        manifests/*.yaml — Raw-Manifeste, werden 1:1 konkateniert
      Output:
        sub-layers/<sub-layer>/components/<component>/rendered/manifest.yaml
    cmd: |
      component_id="{{.COMPONENT_ID | default .CLI_ARGS}}"
      if [ -z "$component_id" ] || [ "${component_id#*/}" = "$component_id" ]; then
        echo "usage: task render:one -- <sub-layer>/<component>"
        exit 1
      fi
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      root="sub-layers/${sub_layer}/components/${component}"
      out="${root}/rendered/manifest.yaml"

      if [ ! -d "$root" ]; then
        echo "ERROR: Komponente ${component_id} existiert nicht (${root})"
        exit 1
      fi

      mkdir -p "$(dirname "$out")"
      : > "$out"
      echo "=== Render ${component_id} ==="

      shopt -s nullglob
      for vfile in "$root"/helm/*.yaml; do
        name=$(basename "$vfile" .yaml)
        inline=$(yq -r '.metadata.inline // false' "$vfile")

        if [[ "$inline" == "true" ]]; then
          namespace=$(yq -r '.metadata.namespace // "default"' "$vfile")
          echo "  ↳ Inline-Stub  $name (ns=$namespace)"
          {
            echo "# Inline-Stub: $name (Komponente: ${component_id})"
            echo "# Custom-Manifeste folgen im Sub-Layer-Inhalt-Issue."
            echo "---"
            echo "apiVersion: v1"
            echo "kind: Namespace"
            echo "metadata:"
            echo "  name: $namespace"
            echo "  labels:"
            echo "    platform.devoba.de/sub-layer: ${sub_layer}"
            echo "    platform.devoba.de/component: ${component}"
            echo "---"
          } >> "$out"
          continue
        fi

        chart=$(yq -r '.metadata.chart' "$vfile")
        repo=$(yq -r '.metadata.repo' "$vfile")
        version=$(yq -r '.metadata.version' "$vfile")
        namespace=$(yq -r '.metadata.namespace // "default"' "$vfile")

        vals_tmp=$(mktemp)
        yq '.values' "$vfile" > "$vals_tmp"
        # Optionaler lokaler Values-Overlay: nur gesetzt, wenn der Caller EXTRA_VALUES
        # exportiert (local:dev/local:publish für UI-Komponenten — z. B. externalURL/
        # CORS auf den .localhost.direct-Host). CI setzt es NIE → prod rendert mit den
        # committeten Platzhaltern. Späteres --values gewinnt → Overlay sticht Default.
        extra_vals=""
        if [ -n "${EXTRA_VALUES:-}" ] && [ -f "${EXTRA_VALUES}" ]; then
          extra_vals="--values ${EXTRA_VALUES}"
          echo "  ↳ + lokaler Values-Overlay: ${EXTRA_VALUES}"
        fi
        # Vendored chart: ${root}/vendor/<chart>-<version>.tgz. Used when the upstream
        # Helm repo blocks CI-runner IPs (e.g. charts.crossplane.io 403s GitHub-Actions
        # IPs while serving locally). Prefer the local archive; fall back to the HTTP repo.
        # (Separate from charts/ which is gitignored for transient Helm dependency charts.)
        # --skip-tests: helm test hooks (templates/tests/*) never belong in a published
        # GitOps manifest — Argo would apply the test Pod as a regular resource, and such
        # hooks often use unpinned images (e.g. busybox).
        archive="${root}/vendor/${chart}-${version}.tgz"
        if [ -f "$archive" ]; then
          echo "  ↳ Helm-Render   $name (chart=$chart version=$version, vendored)"
          helm template "$name" "$archive" \
            --namespace "$namespace" --skip-tests \
            --values "$vals_tmp" $extra_vals >> "$out"
        else
          echo "  ↳ Helm-Render   $name (chart=$chart version=$version, repo=$repo)"
          helm template "$name" "$chart" \
            --repo "$repo" --version "$version" \
            --namespace "$namespace" --skip-tests \
            --values "$vals_tmp" $extra_vals >> "$out"
        fi
        echo "---" >> "$out"
        rm -f "$vals_tmp"
      done

      for mfile in "$root"/manifests/*.yaml; do
        echo "  ↳ Raw-Manifest  $(basename "$mfile")"
        cat "$mfile" >> "$out"
        echo "---" >> "$out"
      done
      echo "  → $(wc -l < "$out") Zeilen → ${out}"

  render:sublayer:
    desc: 'Rendert alle Komponenten eines Sub-Layers: task render:sublayer -- <sub-layer>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task render:sublayer -- <sub-layer>}"
      sldir="sub-layers/${sub_layer}/components"
      if [ ! -d "$sldir" ]; then
        echo "ERROR: ${sldir} existiert nicht"
        exit 1
      fi
      for cdir in "$sldir"/*/; do
        component=$(basename "$cdir")
        task render:one -- "${sub_layer}/${component}"
      done

  # --- Lint ---

  lint:
    desc: YAML- und Markdown-Lint
    cmds:
      - yamllint -c .yamllint.yaml sub-layers/ Taskfile.yml .github/
      # markdown: lint tracked files only (`git ls-files`). The old `**/*.md` glob
      # scanned every .md on disk — 266 files, 168 of them inside the gitignored
      # `.claude/worktrees/` build copies plus untracked scratch (Plans/). Tracked
      # files are exactly the published docs and stay DRY with .gitignore.
      # Null-delimited | xargs -0 (matching lint:rendered below) keeps paths intact
      # under word-splitting; -r skips the run when no .md is tracked.
      # CHANGELOG.md is excluded: it is generated and committed by release-please,
      # whose format we do not control (it emits two blank lines after the version
      # header → markdownlint MD012). Linting it would make every `chore(main):
      # release …` PR red. Treated like rendered/ — a tool artifact, not authored docs.
      - git ls-files -z '*.md' ':!:*CHANGELOG.md' | xargs -0 -r markdownlint --config .markdownlint.yaml

  lint:rendered:
    desc: kubeconform gegen alle Komponenten-rendered/manifest.yaml
    # Nur das gerenderte Roh-Manifest, nicht das gepackte rendered/chart/
    # (Chart.yaml ist Helm-Metadaten, kein K8s-Resource → kubeconform-Error).
    cmd: |
      find sub-layers -path '*/components/*/rendered/manifest.yaml' -print0 2>/dev/null | \
        xargs -0 -r kubeconform -strict -ignore-missing-schemas -summary

  validate:crd-split:
    desc: 'Strict-B CRD-count oracle (ADR-0028): -crds artifact renders >0 CRDs + carries crd-bearing:true; its workload half renders 0 CRDs. Assumes `task render` ran.'
    summary: |
      The executable form of AGENTS.md "CRD management - strict B" build-gate oracle
      (previously documented but unimplemented). Keyed STRUCTURALLY on the directory
      naming + sibling, not on the marker alone:
        - an `<x>-crds` component MUST carry a line-anchored `crd-bearing: true` AND
          render >0 CustomResourceDefinition (else: marker missing/typo, or a
          mislabeled empty crds half);
        - a workload `<x>` that has an `<x>-crds` sibling MUST render 0 CRDs (the CRDs
          belong in the -crds artifact: crds.create:false / no inline CRDs).
      Standalone components (no -crds suffix, no -crds sibling - e.g. crossplane's
      operator-installed CRDs, ADR-0028 "out of scope") are NOT gated. Operates on
      rendered/ output, so `task render`/`render:one` must have produced it; a missing
      rendered/ for a gated component is a failure (run render first). Part of `task ci`.
    cmd: |
      set -eu
      root="$(git rev-parse --show-toplevel)"
      fail=0
      for compat in "$root"/sub-layers/*/components/*/compatibility.yaml; do
        [ -f "$compat" ] || continue
        comp_dir="$(dirname "$compat")"
        comp="$(basename "$comp_dir")"
        sl="$(basename "$(dirname "$(dirname "$comp_dir")")")"
        id="$sl/$comp"
        rd="$comp_dir/rendered"
        # CRD count over the rendered MANIFEST ONLY (rendered/manifest.yaml), never the whole
        # rendered/ tree: `task package` also writes rendered/chart/templates/manifest.yaml, so a
        # recursive count would double-count a packaged component (lint:rendered restricts to
        # manifest.yaml for the same reason). awk always exits 0 -> safe under `set -e`; a missing
        # manifest yields 0, but the per-arm `[ -f "$manifest" ]` guard is the authoritative
        # "was it rendered?" check.
        manifest="$rd/manifest.yaml"
        crd_count="$(grep -c '^kind: CustomResourceDefinition' "$manifest" 2>/dev/null | awk '{s+=$1} END{print s+0}')"
        # Marker is column-anchored: a leading-# comment line must NOT match.
        has_marker=no
        if grep -Eq '^crd-bearing:[[:space:]]+true[[:space:]]*(#.*)?$' "$compat" 2>/dev/null; then
          has_marker=yes
        fi
        case "$comp" in
          *-crds)
            [ "$has_marker" = yes ] || { echo "crd-split: ${id} is a -crds artifact but its compatibility.yaml has no line-anchored 'crd-bearing: true' (marker missing or typo)" >&2; fail=1; }
            if [ ! -f "$manifest" ]; then
              echo "crd-split: ${id} (-crds) has no rendered/manifest.yaml - run 'task render' first" >&2; fail=1
            elif [ "$crd_count" -eq 0 ]; then
              echo "crd-split: ${id} is a -crds artifact but renders 0 CustomResourceDefinition (mislabeled empty crds half)" >&2; fail=1
            fi
            ;;
          *)
            # the crd-bearing marker belongs ONLY on a -crds half; a non--crds component
            # carrying it is a misplaced marker (the co-build oracle keys on it).
            [ "$has_marker" = no ] || { echo "crd-split: ${id} carries 'crd-bearing: true' but is not a -crds artifact - the marker belongs ONLY on the -crds half" >&2; fail=1; }
            if [ -d "${root}/sub-layers/${sl}/components/${comp}-crds" ]; then
              if [ ! -f "$manifest" ]; then
                echo "crd-split: ${id} (workload half) has no rendered/manifest.yaml - run 'task render' first" >&2; fail=1
              elif [ "$crd_count" -ne 0 ]; then
                echo "crd-split: ${id} is the workload half of a strict-B pair but renders ${crd_count} CustomResourceDefinition(s) - CRDs belong in ${comp}-crds (crds.create:false / strip inline CRDs)" >&2; fail=1
              fi
            fi
            ;;
        esac
      done
      [ "$fail" -eq 0 ] || { echo "crd-split: strict-B CRD-count oracle FAILED (see above)" >&2; exit 1; }
      echo "crd-split: OK - every -crds artifact renders CRDs + carries the marker; every workload half is CRD-free"

  lint:version:
    desc: 'A7 parity (apps#226): render-source⇒version guard + declared version.<sot> vs rendered reality (parity needs `task render`)'
    summary: |
      A7 version-provenance gate (apps#226): declared `version.<sot>` in each
      compatibility.yaml vs the rendered reality. The SOT axis hard-fails; secondary
      declared axes WARN. Skips components not yet migrated to the typed `version`
      block, so it is safe to run repo-wide during rollout (no coupling to unfinished
      components — same discipline as validate:contract). Logic is INLINE here per the
      Taskfile convention ("Logic lives in the Taskfile, not external scripts/").

      Per-`sot` rendered mapping (pinned):
        app        -> app.kubernetes.io/version label, else image/package tag  [contain version.app]
        crd-schema -> rendered CRD/XRD .spec.group + .spec.versions[].name      [contain each api_surface[]]
        chart      -> declared-only (NOT render-checked)   [WARN]
        none       -> no provenance axis to check          [WARN]
      `version.artifacts[]` (when present) are render-checked against image tags (hard-fail).
      Env STRICT=1 turns a MIGRATED component's missing render from WARN into FAIL (set in CI).

      Forward invariant (render-source ⇒ version block): a component that ships render
      source (helm/ or manifests/) must declare at least one provides entry AND carry a
      typed `version` block (a non-empty `version.sot`) on EVERY entry — any missing,
      empty (sot-less), or absent-provides case FAILs under STRICT (WARN otherwise).
      Covers the all-missing case, a multi-provides component that versions only some
      entries (the rest would otherwise escape the parity loop, which skips sot-less
      entries), and a built component declaring no provides at all. Without it a newly-
      built component could silently skip the block. Unbuilt stubs (no render source)
      and sub-layer aggregates are exempt.
      Optional scope: `task lint:version -- <sub-layer>/<component> ...`.
    cmd: |
      set -euo pipefail
      set -- {{.CLI_ARGS}}
      STRICT="${STRICT:-0}"
      repo_root="$(git rev-parse --show-toplevel)"
      cd "$repo_root"

      fail=0
      warn=0
      checked=0

      if [ "$#" -gt 0 ]; then
        compat_files=()
        for c in "$@"; do compat_files+=("sub-layers/${c%/*}/components/${c#*/}/compatibility.yaml"); done
      else
        # portable to bash 3.2 (macOS default) — `mapfile` is bash 4+
        compat_files=()
        while IFS= read -r line; do compat_files+=("$line"); done \
          < <(find sub-layers -name compatibility.yaml -not -path '*/.claude/*' | sort)
      fi

      for compat in "${compat_files[@]}"; do
        [ -f "$compat" ] || { echo "ERROR $compat not found"; fail=1; continue; }
        # (.provides // []) — null-safe under jq-based yq (sub-layer aggregators have no provides).
        # Count entries with a NON-EMPTY version.sot, not just has("version"): a bare `version:`
        # / `version: {}` is present-but-meaningless — it passes key-presence yet the parity loop
        # skips it on empty sot, so keying on sot closes that silent-bypass.
        migrated=$(yq -r '[(.provides // [])[] | select((.version.sot // "") != "")] | length' "$compat")
        comp_dir="$(dirname "$compat")"
        sub_layer="$(echo "$comp_dir" | sed -E 's#sub-layers/([^/]+)/components/.*#\1#')"
        cid="${sub_layer}/$(basename "$comp_dir")"

        # A7 forward invariant (apps#226): render source ⇒ the component declares ≥1 provides
        # entry AND EVERY entry carries a typed version block (a non-empty version.sot, per the
        # `migrated` definition above). Checked per component, not just the all-missing case: a
        # multi-provides component mixing versioned + version-less entries would otherwise escape
        # both this guard and the parity loop (which skips an entry whose .version.sot is empty),
        # and a built component declaring no provides at all (total=0) would pass vacuously.
        # Stubs (no render source) and sub-layer aggregates (path without /components/) are exempt.
        # The probe MUST track render:one's input contract (helm/*.yaml OR manifests/*.yaml) — a
        # new render source shape there needs a matching update here. Probe is pipe-free,
        # dir-guarded, -type f: `find` over a MISSING path exits non-zero (even with 2>/dev/null)
        # and `| head` would SIGPIPE it — under `set -o pipefail` both falsely negate. `find`
        # (not a glob) is shell-agnostic (zsh nomatch is fatal).
        has_src=0
        case "$comp_dir" in
          */components/*)
            for d in "$comp_dir/helm" "$comp_dir/manifests"; do
              if [ -d "$d" ] && [ -n "$(find "$d" -maxdepth 1 -type f -name '*.yaml' 2>/dev/null)" ]; then
                has_src=1; break
              fi
            done
            ;;
        esac
        total=$(yq -r '(.provides // []) | length' "$compat")
        flag_reason=""
        if [ "$has_src" = "1" ]; then
          if [ "$total" -eq 0 ]; then
            flag_reason="declares no provides entries (a built component needs at least one with a typed version block)"
          elif [ "$migrated" -lt "$total" ]; then
            flag_reason="$((total - migrated))/${total} provides entries lack a typed version block (a non-empty version.sot) — add one to each"
          fi
        fi
        if [ -n "$flag_reason" ]; then
          if [ "$STRICT" = "1" ]; then
            echo "FAIL  [$cid] has render source but $flag_reason (apps#226)"
            fail=1
          else
            echo "WARN  [$cid] has render source but $flag_reason (apps#226)"
            warn=$((warn + 1))
          fi
        fi

        [ "$migrated" -gt 0 ] || continue
        manifest="${comp_dir}/rendered/manifest.yaml"

        if [ ! -s "$manifest" ]; then
          if [ "$STRICT" = "1" ]; then
            echo "FAIL  [$cid] migrated but no rendered manifest (STRICT) — render failed or was skipped"
            fail=1
          else
            echo "WARN  [$cid] no rendered manifest — run 'task render:one -- $cid'; render-parity skipped"
            warn=$((warn + 1))
          fi
          continue
        fi

        n=$(yq -r '.provides | length' "$compat")
        for i in $(seq 0 $((n - 1))); do
          sot=$(yq -r ".provides[$i].version.sot // \"\"" "$compat")
          [ -n "$sot" ] && [ "$sot" != "null" ] || continue
          checked=$((checked + 1))
          case "$sot" in
            app)
              declared=$(yq -r ".provides[$i].version.app" "$compat")
              if [ -z "$declared" ] || [ "$declared" = "null" ]; then
                echo "FAIL  [$cid] sot=app but version.app is empty/null"
                fail=1
              else
                # extraction may legitimately be empty (label-less raw manifests) — guard against pipefail
                rendered=$(grep -hoE 'app\.kubernetes\.io/version: "?[^"]+' "$manifest" \
                           | sed -E 's/.*version: "?//' | sort -u | tr '\n' ' ' || true)
                # image tags AND Crossplane spec.package OCI refs (providers/functions carry no image:/label).
                # Per-grep `|| true`: a no-match grep exits 1, which under `set -e` aborts the whole
                # command group before the 2nd grep runs in the go-task interpreter (a package-only
                # render would then yield empty img_tags). Guard each so both always contribute.
                img_tags=$( { grep -hoE 'image: "?[^"@ ]+' "$manifest" || true; grep -hoE 'package: "?[^"@ ]+' "$manifest" || true; } \
                            | sed -E 's/.*://' | sort -u | tr '\n' ' ' || true)
                # `-- ` guards a `declared` beginning with `-`; space-padding anchors whole-token match
                if printf ' %s ' "$rendered" | grep -qF -- " $declared "; then
                  echo "OK    [$cid] sot=app declared=$declared ∈ rendered labels{ $rendered}"
                elif printf ' %s ' "$img_tags" | grep -qF -- " $declared "; then
                  # #226 A7: label-less components match via image/package tag
                  echo "OK    [$cid] sot=app declared=$declared ∈ rendered image/package tags (no app-version label)"
                else
                  echo "FAIL  [$cid] sot=app declared=$declared NOT in rendered labels{ $rendered} nor image tags"
                  fail=1
                fi
              fi
              ;;
            crd-schema)
              # A7: sot=crd-schema MUST declare a non-empty api_surface, else the
              # render-check loop below is vacuous and the axis would pass silently.
              n_surface=$(yq -r ".provides[$i].api_surface // [] | length" "$compat")
              if [ "$n_surface" -eq 0 ]; then
                echo "FAIL  [$cid] sot=crd-schema but api_surface is empty/absent — nothing to render-check"
                fail=1
              fi
              # CustomResourceDefinition AND Crossplane CompositeResourceDefinition (XRD)
              rendered_gv=$(yq -r 'select(.kind == "CustomResourceDefinition" or .kind == "CompositeResourceDefinition") | .spec.group + "/" + (.spec.versions // [])[].name' \
                            "$manifest" 2>/dev/null | sort -u)
              while IFS= read -r s; do
                [ -n "$s" ] && [ "$s" != "null" ] || continue
                gv="${s%%/*}/${s##*@}"   # k8s.cni.cncf.io/NAD@v1 -> k8s.cni.cncf.io/v1
                if printf '%s\n' "$rendered_gv" | grep -qxF -- "$gv"; then
                  echo "OK    [$cid] sot=crd-schema surface=$gv ∈ rendered CRDs"
                else
                  echo "FAIL  [$cid] sot=crd-schema surface=$gv NOT in rendered CRD group/versions{ $(printf '%s' "$rendered_gv" | tr '\n' ' ')}"
                  fail=1
                fi
              done < <(yq -r ".provides[$i].api_surface[]?" "$compat" 2>/dev/null)
              ;;
            chart | none)
              echo "WARN  [$cid] sot=$sot — provenance render-parity not enforced (declared-only)"
              warn=$((warn + 1))
              ;;
            *)
              echo "FAIL  [$cid] sot=$sot not in {app,chart,crd-schema,none}"
              fail=1
              ;;
          esac

          # artifacts[] cardinality (A3): every declared image:version must appear in the render.
          arts=$(yq -r ".provides[$i].version.artifacts // [] | length" "$compat")
          if [ "$arts" -gt 0 ]; then
            img_all=$(grep -hoE 'image: "?[^"@ ]+' "$manifest" | sed -E 's/image: "?//' | sort -u || true)
            for j in $(seq 0 $((arts - 1))); do
              aimg=$(yq -r ".provides[$i].version.artifacts[$j].image" "$compat")
              aver=$(yq -r ".provides[$i].version.artifacts[$j].version" "$compat")
              # whole-line exact match (-x): ':v1.19.4' must NOT match ':v1.19.40'
              if printf '%s\n' "$img_all" | grep -qxF -- "${aimg}:${aver}"; then
                echo "OK    [$cid] artifact ${aimg}:${aver} ∈ render"
              else
                echo "FAIL  [$cid] artifact ${aimg}:${aver} NOT in render"
                fail=1
              fi
            done
          fi
        done
      done

      echo "---"
      echo "checked=$checked warnings=$warn result=$([ $fail -eq 0 ] && echo PASS || echo FAIL)"
      exit $fail

  lint:commit-msg:
    desc: 'Conventional-Commit check of a message file: task lint:commit-msg -- <msg-file>'
    summary: |
      Layer-B check logic for the commit-msg hook (lefthook calls this target).
      Validates the subject against the Conventional Commit pattern. The type set
      is the release-please versioning axis (feat→minor, fix→patch,
      BREAKING CHANGE / ! →major) plus the repo convention. Merge/Revert/fixup/
      squash subjects are passed through (generated by git/tooling).

      Tool-free by design (AGENTS.md "Logic lives in the Taskfile"): the orchestrator
      (lefthook) is swappable, the capability lives here. Runs locally and in CI.
    cmd: |
      set -eu
      set -- {{.CLI_ARGS}}
      msg_file="${1:?usage: task lint:commit-msg -- <commit-msg-file>}"
      test -f "$msg_file" || { echo "lint:commit-msg: file not found: $msg_file" >&2; exit 1; }
      # First non-comment, non-blank line is the subject.
      subject="$(grep -vE '^[[:space:]]*#' "$msg_file" | sed '/^[[:space:]]*$/d' | head -1)"
      case "$subject" in
        Merge\ *|Revert\ *|fixup!\ *|squash!\ *) exit 0 ;;
      esac
      pattern='^(feat|fix|chore|docs|refactor|test|ci|build|perf|revert)(\([a-z0-9._/-]+\))?!?: .+'
      if ! printf '%s' "$subject" | grep -qE "$pattern"; then
        echo "COMMIT-MSG BLOCKED — not a Conventional Commit:" >&2
        echo "  subject: \"$subject\"" >&2
        echo "  expected: <type>(<scope>): <subject>" >&2
        echo "  type in feat|fix|chore|docs|refactor|test|ci|build|perf|revert (append ! or BREAKING CHANGE: for major)" >&2
        exit 1
      fi

  lint:commit-scope:
    desc: 'Single-component check: staged changes must touch at most ONE component'
    summary: |
      Layer-B check logic for the pre-commit hook (lefthook calls this target).
      release-please maps commits to components PATH-based (commit-split): a commit
      touching files under more than one components/<c>/ would version-bump ALL of
      them at once. This check enforces "one commit = one component". Non-component
      files (Taskfile, .github, top-level docs) trigger no release and are tolerated.
      Deliberate cross-component commit: `git commit --no-verify`.
    cmd: |
      set -eu
      components="$(git diff --cached --name-only \
        | grep -oE '^sub-layers/[^/]+/components/[^/]+' \
        | sort -u || true)"
      count="$(printf '%s\n' "$components" | grep -cE '^sub-layers/' || true)"
      if [ "${count:-0}" -gt 1 ]; then
        echo "COMMIT BLOCKED — staged changes touch ${count} components (release-please is path-based;" >&2
        echo "one commit would version-bump all of them):" >&2
        printf '%s\n' "$components" | sed 's/^/  - /' >&2
        echo "Split into one commit per component, or override deliberately: git commit --no-verify" >&2
        exit 1
      fi

  lint:signing-config:
    desc: 'verify commit signing is configured locally (main enforces required_signatures); see README § Commit signing'
    summary: |
      Layer-B check logic for the pre-commit `signing-config` hook (lefthook calls
      this target). `main` enforces branch-protection required_signatures, so an
      unsigned commit makes the PR mergeStateStatus=BLOCKED. This gate fails fast
      when commit signing is not CONFIGURED locally (commit.gpgsign + user.signingkey),
      catching the common "never set it up" case before a PR is opened.

      Scope: it is a config-PRESENCE check, not a signature check — a key that is
      missing, wrong, or not registered on GitHub still passes here and is caught
      by the server-side required_signatures (the authoritative gate) + the GitHub
      Verified badge. Reads the merged git config, so a one-time GLOBAL setup
      satisfies it in every clone and worktree (see README § "Commit signing").

      Local pre-commit only — deliberately NOT wired into `task ci`: CI checkouts
      have no per-developer signing config, and required_signatures is the CI-side
      gate. Deliberate bypass: `git commit --no-verify`.
    cmd: |
      set -eu
      # --bool normalizes git's boolean spellings (true/yes/on/1) to "true" so a
      # valid `commit.gpgsign yes|on|1` is not mis-rejected (it errors → "" on an
      # unset/garbage value, which correctly falls through to BLOCKED).
      sign="$(git config --bool --get commit.gpgsign 2>/dev/null || true)"
      key="$(git config --get user.signingkey 2>/dev/null || true)"
      if [ "$sign" = "true" ] && [ -n "$key" ]; then
        exit 0
      fi
      echo "COMMIT BLOCKED — commit signing is not configured locally." >&2
      echo "main enforces required_signatures; an unsigned commit makes the PR BLOCKED." >&2
      echo "Configure once, globally (see README § \"Commit signing\"):" >&2
      echo "  git config --global gpg.format ssh" >&2
      echo "  git config --global user.signingkey <your-public-key>.pub" >&2
      echo "  git config --global commit.gpgsign true" >&2
      echo "then register that key on GitHub as a *Signing* key." >&2
      echo "Deliberate bypass (discouraged): git commit --no-verify" >&2
      exit 1

  validate:release-config:
    desc: 'release-please coverage: every component is a package + built components are in the manifest (apps#245)'
    summary: |
      Cross-checks the catalog component directories against release-please-config.json
      and .release-please-manifest.json so a newly added component cannot be silently
      left out of release management. Fails (exit 1) when:
        - a component dir is missing from the config
        - a config package has no matching component dir (stale entry)
        - a built config package (no initial-version) is missing from the manifest
        - a stub config package (has initial-version) is also in the manifest (redundant)
        - a package's `component` field != its path-derived <sub-layer>/<component> id
      bootstrap-sha/last-release-sha are top-level-only, so this directory↔config parity
      (plus the component-identity check) is the only mechanical guard against a
      forgotten or mis-named component (apps#245, see issue #259).
    cmd: |
      # NOTE: no `set -o pipefail` and no `grep -q` over a pipe — go-task's embedded
      # mvdan/sh terminates the script on the SIGPIPE that grep -q raises when it
      # closes the pipe early under pipefail. Set membership is done with `comm`
      # over sorted temp files instead (no early pipe close). LC_ALL=C pins the
      # collation so `sort` and `comm` agree byte-for-byte regardless of locale.
      set -u
      export LC_ALL=C
      cfg="release-please-config.json"
      man=".release-please-manifest.json"
      [ -f "$cfg" ] || { echo "✗ ${cfg} not found"; exit 2; }
      [ -f "$man" ] || { echo "✗ ${man} not found"; exit 2; }
      tmp=$(mktemp -d) || { echo "✗ mktemp failed"; exit 2; }
      trap 'rm -rf "$tmp"' EXIT
      # Every directory under components/ is an OCI distribution unit (a buildable
      # component) — there are NO stack/composition directories: a stack (e.g.
      # kube-prometheus-stack) is documented in the sub-layer README, never as a
      # components/ entry (ADR-0009). So the dir set maps 1:1 to release packages,
      # with no exclusion list to maintain.
      for d in sub-layers/*/components/*/; do printf '%s\n' "${d%/}"; done | sort > "$tmp/dirs"
      jq -r '.packages | keys[]' "$cfg" | sort > "$tmp/cfg"
      jq -r 'keys[]' "$man" | sort > "$tmp/man"
      jq -r '.packages | to_entries[] | select(.value | has("initial-version")) | .["key"]' "$cfg" | sort > "$tmp/stub"
      jq -r '.packages | to_entries[] | [.["key"], (.value.component // "")] | @tsv' "$cfg" > "$tmp/kc"
      [ -s "$tmp/cfg" ] || { echo "✗ ${cfg} has no .packages (unreadable / corrupt?)"; exit 2; }
      comm -23 "$tmp/cfg" "$tmp/stub" > "$tmp/built"   # built = all packages minus initial-version stubs
      fail=0
      report() { echo "✗ $1"; sed 's/^/    /' < "$2"; fail=1; }
      comm -23 "$tmp/dirs" "$tmp/cfg" > "$tmp/a"; [ -s "$tmp/a" ] && report "component dir(s) missing from ${cfg} (every components/ dir must be a release package — add a packages entry):" "$tmp/a"
      comm -13 "$tmp/dirs" "$tmp/cfg" > "$tmp/b"; [ -s "$tmp/b" ] && report "stale ${cfg} package(s) with no component dir:" "$tmp/b"
      comm -23 "$tmp/built" "$tmp/man" > "$tmp/c"; [ -s "$tmp/c" ] && report "built package(s) missing from ${man}:" "$tmp/c"
      comm -12 "$tmp/stub" "$tmp/man" > "$tmp/d"; [ -s "$tmp/d" ] && report "stub package(s) redundantly in ${man}:" "$tmp/d"
      # Each package's `component` (release-please's release identity → tag name / OCI
      # path) must equal the path-derived <sub-layer>/<component>; a typo there cuts a
      # mis-named tag while dir↔key parity still passes.
      awk -F'\t' '{want=$1; sub(/^sub-layers\//,"",want); sub(/\/components\//,"/",want); if ($2 != want) print $1": component=\""$2"\" expected=\""want"\""}' "$tmp/kc" > "$tmp/f"
      [ -s "$tmp/f" ] && report "package(s) whose 'component' field != path-derived id:" "$tmp/f"
      if [ "$fail" = "0" ]; then
        echo "✓ release-please coverage OK: $(wc -l < "$tmp/cfg" | tr -d ' ') package(s), $(wc -l < "$tmp/man" | tr -d ' ') manifest entr(y/ies), component fields match; every components/ dir is a release package."
      fi
      exit "$fail"

  validate:contract:
    desc: 'Customization-Contract self-consistency (ADR-0024 v2, Layer 1); optional: -- <sub-layer>/<component> to scope to one'
    summary: |
      Validates each component's customization.yaml against
      schemas/customization.schema.json (ADR-0024 v2 freeze-line contract) with
      check-jsonschema. Components WITHOUT customization.yaml are reported (not
      yet under contract).

      Scope: schema self-consistency only. The deeper render-time checks from
      ADR-0024 (config-file mount #1, selector non-nil #3, config snapshot #5)
      are a follow-up and require the Dex pilot component.
    cmd: |
      set -uo pipefail
      schema="schemas/customization.schema.json"
      # Optional per-component scope: `task validate:contract -- <sub-layer>/<component>`
      # validates only that component; with no arg, every component is validated.
      scope="{{.CLI_ARGS}}"
      if [ -n "$scope" ]; then
        set -- "sub-layers/${scope%/*}/components/${scope#*/}/"
      else
        set -- sub-layers/*/components/*/
      fi
      fail=0
      found=0
      missing=""
      for cdir in "$@"; do
        comp_id=$(echo "$cdir" | sed 's|sub-layers/||; s|/components/|/|; s|/$||')
        cfile="${cdir}customization.yaml"
        if [ ! -f "$cfile" ]; then
          missing="${missing}  - ${comp_id}"$'\n'
          continue
        fi
        found=$((found+1))
        if out=$(check-jsonschema --schemafile "$schema" "$cfile" 2>&1); then
          echo "✓ ${comp_id}"
        else
          echo "✗ ${comp_id}:"
          printf '%s\n' "$out" | sed 's/^/    /'
          fail=1
        fi
      done
      echo ""
      echo "→ ${found} component(s) validated against ${schema}."
      if [ -n "$missing" ]; then
        echo "Components WITHOUT customization.yaml (not yet under contract):"
        printf '%s' "$missing"
      fi
      exit $fail

  check:primitives:
    desc: 'Self-containment + A1 + verdict-schema + doc-conformance + harness-evolution-path parity of the .claude/ primitives'
    summary: |
      Deterministic hygiene gate for the repo-local Claude Code primitives
      (agents/skills/workflows/hooks). All checks fail-closed:
        (a) self-containment — no reference to a developer's global user config
            (~/.claude, claude-config, or a bare rules/<x>.md / references/<x>.md
            that is not the repo-local .claude/rules/). The primitives must stand
            alone for any developer who clones the repo.
        (b) A1 — no peer-agent names anywhere in an agent file (description OR
            body), self excepted. Routing lives in skills, never in a worker's
            prose or its routing description (prevents dead-documentation +
            O(N^2) coupling). Implemented by `check:agent-names` (parameterized
            + covered by `test:check-primitives`).
        (c) verdict-schema consistency — catches the schema-drift / non-local-
            invalidation class (a change to one consumer silently breaking
            another). Two canonical verdict contracts exist: the REVIEWER enum
            (approved|rejected|needs-info) and the EVALUATOR enum (pass|fail).
            Every agent that declares a verdict enum must use exactly one of them
            (discovered dynamically — a new reviewer is covered without editing
            this check); BOTH commit hooks (require-review.sh, pre-commit) must
            read `verdict` (never the retired `status`); the live workflow must
            dispatch both contracts with the canonical enums.
        (d) doc-conformance scope parity — DOCUMENTATION.md AND both reviewer
            prompts (catalog-evaluator, staff-reviewer) must each name every
            governed inline-comment file class (the canonical four; a hardcoded
            floor — a NEW class needs a one-line add here, deliberately NOT derived
            from DOCUMENTATION.md prose since a benign reflow could silently swap the
            oracle). PR #165 review: the prompts had narrowed to "manifest comments".
        (e) harness-evolution path parity — review-convergence.md's paths:
            FRONTMATTER (only) must carry a trigger glob for every canonical
            primitive dir (agents/skills/hooks/workflows/rules) PLUS
            **/DOCUMENTATION.md — a hardcoded floor, NOT "whatever the body names".
            Caught the missing .claude/rules/** (PR #165 finding #2): the body said
            rule edits are harness-evolution but the trigger did not load on them.
      Honest limits (NOT covered — by design or deferred): the agent-enum check
      normalizes whitespace then matches the value sequence exactly (catches dropped
      OR added values), but harvests only column-0 lowercase-kebab `verdict:` lines —
      an indented line or a value outside `[a-z-]` (title-case, digits) falls outside
      the grep harvest (it is not a full parser; the canonical values are
      lowercase-kebab so the harvest matches the real corpus). The WORKFLOW-enum
      check only asserts the canonical enum
      substring is PRESENT somewhere in catalog-fleet.js — a deliberate decoy comment
      or an enum on a non-dispatch line evades it (pinning the live dispatch line
      would need JS-parser semantics; the threat model is accidental drift, not an
      adversarial insider). A1 matches whole-token peer names only, so plural/affixed
      forms (`researchers`) are intentionally NOT flagged — a token boundary cannot
      tell the peer `researcher`+s from the English word without false-positiving.
      It also greps the JS dispatch-prompt enum, not the JS parser semantics (the
      parser is deliberately tolerant → 'errored'); it checks hook case-arm presence,
      not that each arm denies; the forgeable `reviewer-role` self-assertion is a
      known dormant-hook residual (see Plans/ + the hooks' own notes). (d)/(e) are
      accidental-drift guards over a hardcoded canonical floor (a NEW governed class
      or primitive dir needs a one-line add here — chosen over prose-derivation, which
      a benign reflow can silently mis-derive into a green check over the wrong set).
      (d) matches each class token as a fixed substring, so a prompt that keeps the
      token while flipping its scoping verb (an "out of scope: X" line) would
      false-pass; (e) scans only the frontmatter block, but a quoted glob mention there
      still satisfies it. Both fail-closed on a missing governing file; neither defends
      an adversarial edit — the semantic backstop is the 2-round harness-evolution review.
    cmd: |
      set -uo pipefail
      fail=0

      # (a) self-containment
      sc_hits=$(grep -rnE '~/\.claude|claude-config' .claude/agents .claude/skills .claude/workflows .claude/hooks 2>/dev/null || true)
      bare_hits=$(grep -rnE '(^|[^./[:alnum:]])(rules|references)/[a-z0-9-]+\.md' \
        .claude/agents .claude/skills .claude/workflows .claude/hooks 2>/dev/null \
        | grep -vE '\.claude/(rules|references)/' || true)
      if [ -n "$sc_hits$bare_hits" ]; then
        [ -n "$sc_hits" ] && printf '%s\n' "$sc_hits"
        [ -n "$bare_hits" ] && printf '%s\n' "$bare_hits"
        echo "✗ self-containment: primitive references a global user config (above)"
        fail=1
      else
        echo "✓ self-containment: no global-config references"
      fi

      # (b) A1 — no peer-agent names in any agent file (self excepted).
      #     Delegated to `check:agent-names` so the matching logic has ONE source
      #     and is unit-testable against fixtures (see `test:check-primitives`).
      if task check:agent-names; then :; else fail=1; fi

      # (c) verdict-schema consistency
      sc=0
      # Every agent verdict-enum line must be exactly one canonical contract.
      #   Delegated to `check:agent-verdicts` (harvest is whitespace- AND
      #   trailing-content-tolerant, normalize-then-exact-match on the value
      #   sequence, fail-closed on an empty corpus). Fixture-tested in
      #   `test:check-primitives`.
      if task check:agent-verdicts; then :; else sc=1; fi
      # No agent may carry a retired status:-keyed verdict block.
      stale=$(grep -rlE '^status: (approved|escalate|changes-requested|rejected|needs-info)' .claude/agents/*.md 2>/dev/null || true)
      [ -n "$stale" ] && { echo "✗ schema: retired status:-keyed verdict block in: $stale"; sc=1; }
      # Live workflow must dispatch BOTH contracts with the canonical enums.
      #   Delegated to `check:workflow-enums` (whitespace-tolerant ERE, not a
      #   fixed-string byte-match, so a cosmetic reformat does not cry wolf; the
      #   token values are still matched exactly). Fixture-tested in
      #   `test:check-primitives`.
      if task check:workflow-enums; then :; else sc=1; fi
      # Both commit hooks read `verdict`, not the retired `status`, and accept the three reviewer values.
      for hook in require-review.sh pre-commit; do
        grep -qF 'PRIMARY_VERDICT=' ".claude/hooks/$hook" || { echo "✗ schema: hooks/$hook does not read 'verdict'"; sc=1; }
        grep -qE 'get_yaml_field .*"status"' ".claude/hooks/$hook" && { echo "✗ schema: hooks/$hook still reads the retired 'status' field"; sc=1; }
        for v in approved rejected needs-info; do
          grep -qE "(^|\\|)[[:space:]]*${v}\\)" ".claude/hooks/$hook" || { echo "✗ schema: hooks/$hook lacks case arm for verdict '$v'"; sc=1; }
        done
      done
      [ "$sc" = 0 ] && echo "✓ verdict-schema consistent across agents/workflow/both hooks" || fail=1

      # (d) doc-conformance scope parity — DOCUMENTATION.md AND both reviewer prompts
      #     must each name every governed inline-comment file class. The class set is
      #     the canonical floor below (hardcoded, like (e)'s dir set; a NEW governed
      #     class in DOCUMENTATION.md needs a one-line add here). Hardcoding avoids
      #     deriving the oracle from fragile prose position — a benign reflow of
      #     DOCUMENTATION.md could otherwise make the check validate the WRONG/half set
      #     and still report green. Class tokens are quoted literals (helm/*.yaml is a
      #     glob) so the for-list never pathname-expands. Fail-closed on a missing file.
      dc=0
      for cls in 'helm/*.yaml' 'manifests/*.yaml' 'customization.yaml' 'compatibility.yaml'; do
        for f in DOCUMENTATION.md .claude/agents/catalog-evaluator.md .claude/agents/staff-reviewer.md; do
          if [ -f "$f" ] && grep -qF "$cls" "$f"; then :; else
            echo "✗ doc-conformance: $f omits governed inline-comment class '$cls'"
            dc=1
          fi
        done
      done
      [ "$dc" = 0 ] && echo "✓ doc-conformance: governed inline-comment classes present in DOCUMENTATION.md + both prompts (presence tripwire; scoping is review-judged)" || fail=1

      # (e) harness-evolution path parity — review-convergence.md's paths: FRONTMATTER
      #     must carry a trigger glob for every canonical primitive dir (the five below)
      #     plus the documentation standard, else a harness-evolution edit there does not
      #     load the 2-round reminder (PR #165 finding #2: .claude/rules/** was missing).
      #     The glob set is the fixed canonical floor (a NEW primitive dir needs a
      #     one-line add); the check asserts a floor, NOT "whatever the body names". Only
      #     the frontmatter block is scanned, so a body prose mention cannot satisfy it.
      #     Fail-closed on a missing file.
      #     A malformed frontmatter (no line-1 `---`, or no closing `---`) fails
      #     closed: the awk exits nonzero rather than over-capturing body prose (so a
      #     body glob mention cannot satisfy a dropped frontmatter glob).
      rc=.claude/rules/review-convergence.md
      he=0
      if [ ! -f "$rc" ]; then
        echo "✗ harness-evolution: $rc is missing"
        he=1
      elif fm=$(awk 'NR==1{if($0!="---") exit 2; next} $0=="---"{found=1; exit 0} {print} END{if(!found) exit 3}' "$rc"); then
        for glob in '.claude/agents/**' '.claude/skills/**' '.claude/hooks/**' '.claude/workflows/**' '.claude/rules/**' '**/DOCUMENTATION.md'; do
          if printf '%s\n' "$fm" | grep -qF "\"$glob\""; then :; else
            echo "✗ harness-evolution: $rc frontmatter paths: omits \"$glob\""
            he=1
          fi
        done
      else
        echo "✗ harness-evolution: $rc has no well-formed YAML frontmatter (--- … ---)"
        he=1
      fi
      [ "$he" = 0 ] && echo "✓ harness-evolution: review-convergence.md frontmatter carries every canonical primitive-dir + DOCUMENTATION.md glob" || fail=1

      if [ "$fail" != 0 ]; then echo ""; echo "check:primitives FAILED"; fi
      exit $fail

  check:agent-names:
    desc: 'A1 gate: no agent file names a peer agent (self excepted). AGENTS_DIR overridable.'
    summary: |
      Per-peer standalone-token scan: for each agent file, every OTHER agent's
      name must not appear as a standalone token. Self is excluded BEFORE
      matching (not filtered out afterwards) — that is what makes substring
      names safe. The token boundary [^-[:alnum:]] treats '-' as intra-token, so
      a name that is a hyphen-substring of another (`reviewer` inside
      `staff-reviewer`, or a future bare `reviewer` vs `plan-reviewer`) is NOT a
      false match, while a genuine standalone peer reference still is.
      Single source of the A1 logic: `check:primitives` calls this; the older
      build-all-names-alternation form false-positived on substring names.
      AGENTS_DIR defaults to .claude/agents; `test:check-primitives` passes
      fixture dirs to exercise both the false-positive and false-negative edges.
    cmd: |
      set -uo pipefail
      shopt -s nullglob
      # NOTE: go-task's shell aborts the whole script when the LAST command in a
      # loop body returns nonzero (verified: a mid-script `cond && stmt` is fine,
      # but `cond && stmt` as a loop body's final statement kills the run when
      # cond is false). So use if/fi for the flag-set — the loop body then ends on
      # `fi` (always 0). The summary line / `|| fail` idiom elsewhere is the same
      # guard at the top-level scope.
      dir='{{.AGENTS_DIR | default ".claude/agents"}}'
      a1=0
      found=0
      for f in "$dir"/*.md; do
        found=1
        self=$(basename "$f" .md)
        hits=""
        for g in "$dir"/*.md; do
          p=$(basename "$g" .md)
          if [ "$p" = "$self" ]; then continue; fi
          # Agent basenames are kebab-case ([a-z0-9-]+) → no ERE metachars to escape.
          # Boundary [^-[:alnum:]] treats '-' as intra-token, so a peer name glued
          # into a longer hyphenated name (incl. the self name) does not match.
          if grep -qE "(^|[^-[:alnum:]])${p}([^-[:alnum:]]|$)" "$f"; then
            hits="$hits $p"
          fi
        done
        if [ -n "$hits" ]; then
          echo "✗ A1: $self names peer agent(s):$hits"
          a1=1
        fi
      done
      if [ "$found" = 0 ]; then
        echo "✗ A1: no agent files found in $dir"
        exit 1
      fi
      if [ "$a1" = 0 ]; then
        echo "✓ A1: no peer-agent names in agent files"
      fi
      exit "$a1"

  check:workflow-enums:
    desc: 'Schema gate: the live workflow dispatches both canonical verdict enums. WORKFLOW_FILE overridable.'
    summary: |
      Whitespace-tolerant check that the workflow dispatches BOTH canonical
      verdict contracts in its dispatch-prompt strings (reviewer:
      approved|rejected|needs-info; evaluator: pass|fail). Uses ERE, not a
      fixed-string grep -F byte-match, so a cosmetic reformat (spaces around ':'
      or '|') does NOT cry wolf — yet the token values are matched exactly, so a
      genuinely missing or value-drifted enum still FAILS. Single source of the
      workflow-enum logic: `check:primitives` calls this. WORKFLOW_FILE defaults
      to .claude/workflows/catalog-fleet.js; `test:check-primitives` passes
      fixtures to exercise the reformat and drift edges.
    cmd: |
      set -uo pipefail
      wf='{{.WORKFLOW_FILE | default ".claude/workflows/catalog-fleet.js"}}'
      sc=0
      if [ ! -f "$wf" ]; then
        echo "✗ schema: workflow file not found: $wf"
        exit 1
      fi
      # `\|` is a literal pipe in the enum string; [[:space:]]* tolerates reformat.
      if ! grep -qE '"verdict"[[:space:]]*:[[:space:]]*"approved"[[:space:]]*\|[[:space:]]*"rejected"[[:space:]]*\|[[:space:]]*"needs-info"' "$wf"; then
        echo "✗ schema: $wf reviewer dispatch lacks the reviewer verdict enum (approved|rejected|needs-info)"
        sc=1
      fi
      if ! grep -qE '"verdict"[[:space:]]*:[[:space:]]*"pass"[[:space:]]*\|[[:space:]]*"fail"' "$wf"; then
        echo "✗ schema: $wf verify dispatch lacks the evaluator verdict enum (pass|fail)"
        sc=1
      fi
      if [ "$sc" = 0 ]; then
        echo "✓ workflow dispatches both canonical verdict enums"
      fi
      exit "$sc"

  check:agent-verdicts:
    desc: 'Schema gate: every agent verdict-enum line is exactly one canonical contract. AGENTS_DIR overridable.'
    summary: |
      For each agent file, every column-0 `verdict:` enum line whose values are
      lowercase-kebab (`[a-z-]`) must be exactly one canonical contract (reviewer:
      approved | rejected | needs-info; evaluator: pass | fail). The harvest is
      whitespace-tolerant AND has no trailing `$` anchor, so a non-spaced spelling
      (`approved|rejected`) OR a verdict line with a trailing `# comment` is still
      harvested and validated. Each enum is whitespace-normalized, then the value
      SEQUENCE is matched exactly, so a dropped OR an added value fails. Harvest scope
      (this grep is NOT a full parser — honest-limit also noted in check:primitives):
      an INDENTED verdict line, or values outside `[a-z-]` (title-case, digits), fall
      outside the harvest and are not validated. The canonical contracts are
      lowercase-kebab and the live agents write column-0 lines, so the harvest matches
      the real corpus; a parser-grade check is future work. Fail-closed on an empty
      corpus. Single source of the agent-verdict logic: `check:primitives` (c)
      delegates here. AGENTS_DIR defaults to .claude/agents; `test:check-primitives`
      passes fixtures.
    cmd: |
      set -uo pipefail
      shopt -s nullglob
      dir='{{.AGENTS_DIR | default ".claude/agents"}}'
      rev_enum='verdict: approved | rejected | needs-info'   # reviewer contract
      evl_enum='verdict: pass | fail'                        # builder-evaluator contract
      sc=0
      found=0
      for f in "$dir"/*.md; do
        found=1
        while IFS= read -r vline; do
          # Normalize whitespace around ':' and '|', strip trailing ws (incl. a CR),
          # then match the value sequence exactly against a canonical contract.
          norm=$(printf '%s' "$vline" | sed -E 's/^verdict:[[:space:]]*/verdict: /; s/[[:space:]]*\|[[:space:]]*/ | /g; s/[[:space:]]*$//')
          if [ "$norm" != "$rev_enum" ] && [ "$norm" != "$evl_enum" ]; then
            echo "✗ schema: $(basename "$f") declares non-canonical verdict enum: '$vline'"
            sc=1
          fi
        done < <(grep -oE '^verdict:[[:space:]]*[a-z-]+([[:space:]]*\|[[:space:]]*[a-z-]+)+' "$f" || true)
      done
      if [ "$found" = 0 ]; then
        echo "✗ schema: no agent files found in $dir"
        exit 1
      fi
      if [ "$sc" = 0 ]; then
        echo "✓ agent verdict enums canonical"
      fi
      exit "$sc"

  test:check-primitives:
    desc: 'Deterministic tests of the gate: A1 substring matching + workflow verdict-enum tolerance.'
    summary: |
      Hermetic fixtures (mktemp; no network) for the two fixture-testable gate
      sub-checks:
        A1 (check:agent-names):
          1. no false positive — a self-name containing a peer name as a
             hyphen-substring (`rev` in `rev-helper`) is NOT flagged;
          2. no false negative — a genuine standalone peer reference IS flagged.
        workflow enums (check:workflow-enums):
          3. a reformatted workflow (spaces around ':' and '|') still matches;
          4. a value-drifted enum (needs-info dropped) still FAILS.
        Plus: the real .claude tree passes both checks.
    cmd: |
      set -uo pipefail
      tmp=$(mktemp -d)
      trap 'rm -rf "$tmp"' EXIT
      errors=0

      # ---- A1: check:agent-names ----
      mkdir -p "$tmp/pass" "$tmp/fail"
      # PASS: rev-helper's self-name contains peer `rev` as a hyphen-substring;
      # no standalone peer reference → must NOT be flagged.
      printf 'Role: rev. Operates on its own.\n' > "$tmp/pass/rev.md"
      printf 'Role: rev-helper. Operates independently; emits findings only.\n' > "$tmp/pass/rev-helper.md"
      # FAIL: rev-helper keeps its self-name (hyphen-substring `rev`) AND adds a
      # genuine standalone reference to peer `rev` → flagged for `rev` only.
      printf 'Role: rev. Operates on its own.\n' > "$tmp/fail/rev.md"
      printf 'Role: rev-helper. Delegates to the rev agent for scoring.\n' > "$tmp/fail/rev-helper.md"

      if out=$(task check:agent-names AGENTS_DIR="$tmp/pass" 2>&1); then
        echo "✓ test: A1 substring self-name not false-flagged"
      else
        echo "✗ test: A1 PASS fixture was flagged (false positive):"; printf '%s\n' "$out"; errors=1
      fi
      if out=$(task check:agent-names AGENTS_DIR="$tmp/fail" 2>&1); then
        echo "✗ test: A1 FAIL fixture passed (false negative):"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'rev-helper names peer agent\(s\): rev$'; then
        echo "✓ test: A1 genuine standalone peer reference caught"
      else
        echo "✗ test: A1 FAIL fixture failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi
      # empty dir → fail-closed via the `found=0` guard (exit 1 + no-files message).
      mkdir -p "$tmp/empty"
      if out=$(task check:agent-names AGENTS_DIR="$tmp/empty" 2>&1); then
        echo "✗ test: A1 empty dir did not fail closed (found-guard regressed):"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'no agent files found'; then
        echo "✓ test: A1 empty dir fails closed"
      else
        echo "✗ test: A1 empty dir failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi

      # ---- workflow enums: check:workflow-enums ----
      # reformat: spaces around ':' and '|' in the reviewer enum → must still match.
      printf '%s\n' \
        'const reviewer = `{"role":"x", "verdict" : "approved" | "rejected" | "needs-info"}`' \
        'const verify = `{"verdict": "pass"|"fail"}`' \
        > "$tmp/wf_reformat.js"
      # drift: reviewer enum dropped `needs-info` → reviewer half must FAIL.
      printf '%s\n' \
        'const reviewer = `{"verdict": "approved"|"rejected"}`' \
        'const verify = `{"verdict": "pass"|"fail"}`' \
        > "$tmp/wf_broken.js"

      if out=$(task check:workflow-enums WORKFLOW_FILE="$tmp/wf_reformat.js" 2>&1); then
        echo "✓ test: workflow-enum reformat tolerated"
      else
        echo "✗ test: reformatted workflow rejected (over-strict):"; printf '%s\n' "$out"; errors=1
      fi
      if out=$(task check:workflow-enums WORKFLOW_FILE="$tmp/wf_broken.js" 2>&1); then
        echo "✗ test: value-drifted enum passed (false negative):"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'reviewer dispatch lacks the reviewer verdict enum'; then
        echo "✓ test: value-drifted reviewer enum caught"
      else
        echo "✗ test: drift fixture failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi

      # ---- agent verdicts: check:agent-verdicts ----
      mkdir -p "$tmp/av"
      # canonical agent (must NOT be flagged) + a drifted enum hidden behind a
      # trailing comment (the silent-drop edge — must still be harvested and FAIL).
      printf 'Role doc.\nverdict: approved | rejected | needs-info\n' > "$tmp/av/good.md"
      printf 'Role doc.\nverdict: approved | maybe   # a trailing comment must not hide drift\n' > "$tmp/av/drift.md"
      if out=$(task check:agent-verdicts AGENTS_DIR="$tmp/av" 2>&1); then
        echo "✗ test: agent-verdict drift behind a trailing comment passed (false negative):"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'drift.md declares non-canonical' && ! printf '%s' "$out" | grep -qE 'good.md'; then
        echo "✓ test: agent-verdict drift (trailing-comment edge) caught, canonical not flagged"
      else
        echo "✗ test: agent-verdict fixture failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi
      # empty corpus → fail-closed (own found guard, independent of the A1 check).
      if out=$(task check:agent-verdicts AGENTS_DIR="$tmp/empty" 2>&1); then
        echo "✗ test: agent-verdicts empty dir did not fail closed:"; printf '%s\n' "$out"; errors=1
      elif printf '%s' "$out" | grep -qE 'no agent files found'; then
        echo "✓ test: agent-verdicts empty dir fails closed"
      else
        echo "✗ test: agent-verdicts empty dir failed for the wrong reason:"; printf '%s\n' "$out"; errors=1
      fi

      # ---- real tree passes all three checks ----
      if task check:agent-names >/dev/null 2>&1 && task check:workflow-enums >/dev/null 2>&1 && task check:agent-verdicts >/dev/null 2>&1; then
        echo "✓ test: real .claude tree passes A1 + workflow-enum + agent-verdict checks"
      else
        echo "✗ test: real .claude tree is flagged"; errors=1
      fi

      if [ "$errors" = 0 ]; then echo "test:check-primitives PASSED"; else echo "test:check-primitives FAILED"; fi
      exit "$errors"

  # --- Security-Scans (Issue #11.8) ---

  scan:
    desc: alle Security-Scans (gitleaks + trivy + conftest + optional snyk)
    cmds:
      - task: scan:secrets
      - task: scan:trivy
      - task: scan:conftest
      - |
        if [[ -n "${SNYK_TOKEN:-}" ]]; then
          task scan:snyk
        else
          echo "SNYK_TOKEN nicht gesetzt — snyk skipped"
        fi

  scan:secrets:
    desc: gitleaks secret-scan over the full committed history (CI backstop to the lefthook hook)
    summary: |
      Server-side secret-detection backstop (ADR-0032 §Residual e). The lefthook
      `secrets` pre-commit job scans only staged hunks and is bypassable via
      `git commit --no-verify`; this scans the full git history on every PR/push.
      The .gitleaks.toml allowlist exempts local/fixtures/ (dummy E2E values only,
      per AGENTS.md "no real secrets even in tests"). Catalog code (sub-layers/) is
      fully scanned.
    cmd: gitleaks git --config .gitleaks.toml --no-banner --redact

  scan:trivy:
    desc: Trivy-Misconfig-Scan über sub-layers/, SARIF-Output
    deps: [render]
    # trivy fs akzeptiert nur EIN Target — daher das gesamte sub-layers/-Verzeichnis
    # rekursiv scannen (statt 22 rendered-Dirs einzeln, was mit 'multiple targets
    # cannot be specified' scheitert). Erfasst rendered/manifest.yaml + Quell-Manifeste;
    # READMEs/compatibility.yaml werden vom Misconfig-Scanner ignoriert.
    cmd: |
      trivy fs sub-layers/ \
        --scanners misconfig,secret \
        --format sarif \
        --output trivy-results.sarif

  scan:conftest:
    desc: Conftest-Policies aus policies/ gegen alle Komponenten-rendered/-Manifeste
    deps: [render]
    cmd: |
      files=$(find sub-layers -path '*/components/*/rendered/manifest.yaml' -size +0 -type f)
      if [ -z "$files" ]; then
        echo "Keine nicht-leeren rendered/manifest.yaml gefunden — nichts zu prüfen"
        exit 0
      fi
      echo "Conftest gegen $(echo "$files" | wc -l | tr -d ' ') Komponenten-Manifeste:"
      echo "$files" | sed 's/^/  - /'
      echo ""
      conftest test --policy policies/ --all-namespaces $files

  scan:conftest-verify:
    desc: Conftest-Policy-Selbsttests (testdata/-Korpus)
    cmd: conftest verify --policy policies/

  scan:snyk:
    desc: Snyk IaC-Scan (braucht SNYK_TOKEN)
    cmd: |
      snyk iac test sub-layers/ \
        --sarif-file-output=snyk-results.sarif

  # --- Publish-Targets ---

  package:
    desc: 'baut Helm-Chart-Wrapper: task package -- <sub-layer>/<component> <tag>'
    summary: |
      Verpackt sub-layers/<sub-layer>/components/<component>/rendered/manifest.yaml
      in einen Helm-Chart-Wrapper (Chart.yaml + templates/manifest.yaml).
      Chart-Name = Komponente. Tag wird zur Chart-Version.

      Output: sub-layers/<sub-layer>/components/<component>/rendered/<component>-<tag>.tgz
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task package -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task package -- <sub-layer>/<component> <tag>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      chart_version="${tag#v}"

      root="sub-layers/${sub_layer}/components/${component}"
      manifest="${root}/rendered/manifest.yaml"
      test -s "$manifest" || { echo "ERROR: $manifest fehlt — vorher task render:one -- ${component_id}"; exit 1; }

      wrapper="${root}/rendered/chart"
      rm -rf "$wrapper"
      mkdir -p "$wrapper/templates"

      # OCI-Annotationen (ArgoCD UI + Supply-Chain-Provenance).
      # ArgoCD liest die org.opencontainers.image.*-Keys vom OCI-Manifest und
      # zeigt sie in der UI; `helm push` propagiert Chart.yaml-annotations als
      # OCI-Manifest-annotations. Doku: argo-cd.readthedocs.io/en/stable/user-guide/oci/
      # revision + created sind dynamisch (Build-Zeit), der Rest ist deterministisch.
      repo_url="https://github.com/devobagmbh/talos-platform-apps"
      revision=$(git rev-parse HEAD 2>/dev/null || echo unknown)
      created=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      source_url="${repo_url}"
      component_url="${repo_url}/tree/main/sub-layers/${sub_layer}/components/${component}"

      # appVersion = the real running-app version (A4/A5, apps#226): prefer the declared
      # version.app (sot=app) from compatibility.yaml; fall back to the packaging tag for
      # components not yet migrated to the typed `version` block (backward-compatible).
      compat="${root}/compatibility.yaml"
      app_version=""
      if [ -f "$compat" ]; then
        app_version=$(yq -r '[.provides[].version | select(.sot == "app") | .app] | .[0] // ""' "$compat" 2>/dev/null)
      fi
      app_version="${app_version:-$chart_version}"

      cat > "$wrapper/Chart.yaml" <<EOF
      apiVersion: v2
      name: ${component}
      description: Pre-rendered Devoba-Platform-Komponente ${component_id}
      type: application
      version: ${chart_version}
      appVersion: "${app_version}"
      home: ${component_url}
      sources:
        - ${source_url}
      annotations:
        # OCI-Standard (ArgoCD-UI-Metadaten — argo-cd.readthedocs.io/en/stable/user-guide/oci/)
        org.opencontainers.image.title: "${component_id}"
        org.opencontainers.image.description: "Pre-rendered Devoba-Platform-Komponente ${component_id}"
        org.opencontainers.image.version: "${chart_version}"
        org.opencontainers.image.revision: "${revision}"
        org.opencontainers.image.source: "${source_url}"
        org.opencontainers.image.url: "${component_url}"
        org.opencontainers.image.created: "${created}"
        org.opencontainers.image.authors: "Devoba Platform Maintainers"
        # Devoba-Plattform-spezifisch (Katalog-Navigation, Pre-Render-Marker)
        platform.devoba.de/sub-layer: ${sub_layer}
        platform.devoba.de/component: ${component}
        platform.devoba.de/pre-rendered: "true"
      EOF

      cp "$manifest" "$wrapper/templates/manifest.yaml"

      helm package "$wrapper" --destination "${root}/rendered/"
      echo "✓ Packaged: ${root}/rendered/${component}-${chart_version}.tgz (rev ${revision:0:8}, ${created})"

  push:
    desc: 'helm push einer Komponente: task push -- <sub-layer>/<component> <tag>'
    summary: |
      Pusht das via "task package" gebaute Helm-Chart als OCI-Artefakt nach
      OCI_REGISTRY/<sub-layer>/<component>:<tag>.

      Default OCI_REGISTRY: ghcr.io/devobagmbh/talos-platform-apps

      Voraussetzungen:
        - rendered + packaged
        - helm registry login OCI_REGISTRY

      Beispiel: task push -- lifecycle/crossplane v0.1.0
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task push -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task push -- <sub-layer>/<component> <tag>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      chart_version="${tag#v}"

      pkg="sub-layers/${sub_layer}/components/${component}/rendered/${component}-${chart_version}.tgz"
      test -s "$pkg" || { echo "ERROR: $pkg fehlt — vorher task package -- ${component_id} $tag"; exit 1; }

      target="oci://{{.OCI_REGISTRY}}/${sub_layer}"
      echo "Pushing $pkg → ${target}/${component}"
      helm push "$pkg" "$target"
      echo "✓ Pushed: ${target}/${component}:${chart_version}"

  sign:
    desc: 'cosign sign keyless: task sign -- <sub-layer>/<component> <tag>'
    summary: |
      Signiert das Helm-OCI-Artefakt via cosign keyless.
      Lokal-Setup (localhost/kind-registry) überspringt cosign.
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task sign -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task sign -- <sub-layer>/<component> <tag>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      chart_version="${tag#v}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}/${component}:${chart_version}"
      if [[ "{{.OCI_REGISTRY}}" == *"localhost"* ]] || [[ "{{.OCI_REGISTRY}}" == *"kind-registry"* ]]; then
        echo "Lokale Registry erkannt — cosign übersprungen"
        exit 0
      fi
      echo "Signing $ref (keyless)"
      cosign sign --yes "$ref"
      echo "✓ Signed: $ref"

  attest:
    desc: 'SBOM + SLSA-Attestations (vertagt nach Phase 2 — ADR-0009 § Phase-1-Scope)'
    cmd: |
      echo "Vertagt nach Phase 2+ (ADR-0009 § Phase-1-Scope)."
      echo "SLSA-v1-Provenance + CycloneDX-SBOM werden aktiviert, sobald externe"
      echo "Konsumenten existieren oder Audit-Anforderung greift."

  publish:
    desc: 'render → package → push → sign einer Komponente: task publish -- <sub-layer>/<component> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task publish -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task publish -- <sub-layer>/<component> <tag>}"
      task render:one -- "$component_id"
      task package    -- "$component_id" "$tag"
      task push       -- "$component_id" "$tag"
      task sign       -- "$component_id" "$tag"
      echo "✓ Published ${component_id}:${tag}"

  publish:sublayer:
    desc: 'render + push aller Komponenten eines Sub-Layers mit gleichem Tag: task publish:sublayer -- <sub-layer> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task publish:sublayer -- <sub-layer> <tag>}"
      tag="${2:?usage: task publish:sublayer -- <sub-layer> <tag>}"
      sldir="sub-layers/${sub_layer}/components"
      if [ ! -d "$sldir" ]; then
        echo "ERROR: ${sldir} existiert nicht"
        exit 1
      fi
      for cdir in "$sldir"/*/; do
        component=$(basename "$cdir")
        task publish -- "${sub_layer}/${component}" "$tag"
      done

  verify:
    desc: 'cosign verify einer Komponente: task verify -- <sub-layer>/<component> <tag>'
    summary: |
      Verifiziert die cosign-Keyless-Signature. Erwartete Identity:
        https://github.com/devobagmbh/talos-platform-apps/.github/workflows/oci-publish.yml@refs/tags/<sub-layer>/<component>-<tag>
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task verify -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task verify -- <sub-layer>/<component> <tag>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      # OCI-Tag ist die Chart-Version ohne v-Präfix (wie push/sign), nicht der Git-Tag
      chart_version="${tag#v}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}/${component}:${chart_version}"
      cosign verify "$ref" \
        --certificate-identity-regexp "^https://github\.com/devobagmbh/talos-platform-apps/\.github/workflows/oci-publish\.yml@refs/tags/${sub_layer}/${component}-.*$" \
        --certificate-oidc-issuer https://token.actions.githubusercontent.com

  # --- CI (lokal-äquivalent zur GHA-Pipeline) ---

  ci:
    desc: Lokale Reproduktion der GHA-Pipeline (check:primitives + validate:release-config + lint + render + crd-split + scan:conftest)
    cmds:
      - task: check:primitives
      - task: validate:release-config
      - task: lint
      - task: validate:compatibility
      - task: render
      - task: lint:rendered
      - task: validate:crd-split
      - task: lint:version
      - task: scan:conftest-verify
      - task: scan:conftest

  # Note: validate:contract is DELIBERATELY not part of `ci`. The customization
  # contract is rolled out per component (ADR-0024); coupling the render/lint
  # pipeline to it would be the wrong dependency — a single broken contract would
  # block the whole pipeline. Instead it runs as a separate, targeted call (+ its
  # own CI job contract-validate.yml, which only checks components that carry one).

  # Note: validate:compatibility IS part of `ci` (unlike validate:contract) because
  # compatibility.yaml is a UNIVERSAL per-component contract — every component is
  # required to carry one (no per-component rollout). A missing or invalid
  # compatibility.yaml is always a pipeline failure, not an optional gap to report.

  validate:compatibility:
    desc: 'Compatibility-Contract schema validation (apps#246): every component compatibility.yaml must conform to schemas/compatibility.schema.json'
    summary: |
      Validates every component's compatibility.yaml against
      schemas/compatibility.schema.json (draft 2020-12) with check-jsonschema.
      Fails closed on zero found (no empty-run pass).

      Unlike validate:contract (customization.yaml, per-component rollout), this task
      is part of `task ci` because compatibility.yaml is a universal per-component
      contract — every component is required to carry one.

      Schema enforces:
        - required: [requires, provides]
        - provides[] items are closed (additionalProperties:false) — rejects legacy 'apis' key
        - provides[].version.sot enum: [app, chart, crd-schema, none]
        - version block is optional (unbuilt stubs carry no version)
        - capabilities[] is optional per item (providers-style no-capability components)

      Optional per-component scope: `task validate:compatibility -- <sub-layer>/<component>`
      validates only that component (parity with validate:contract). With no arg every
      component is validated AND the negative fixtures under schemas/testdata/ are asserted
      to be rejected (red-green regression guard for the schema's reject-side).
    cmd: |
      set -uo pipefail
      schema="schemas/compatibility.schema.json"
      # Optional per-component scope: `task validate:compatibility -- <sub-layer>/<component>`.
      scope="{{.CLI_ARGS}}"
      if [ -n "$scope" ]; then
        set -- "sub-layers/${scope%/*}/components/${scope#*/}/"
      else
        set -- sub-layers/*/components/*/
      fi
      fail=0
      found=0
      for cdir in "$@"; do
        [ -d "$cdir" ] || continue
        comp_id=$(echo "$cdir" | sed 's|sub-layers/||; s|/components/|/|; s|/$||')
        cfile="${cdir}compatibility.yaml"
        if [ ! -f "$cfile" ]; then
          echo "✗ ${comp_id}: compatibility.yaml MISSING"
          fail=1
          continue
        fi
        found=$((found+1))
        if out=$(check-jsonschema --schemafile "$schema" "$cfile" 2>&1); then
          echo "✓ ${comp_id}"
        else
          echo "✗ ${comp_id}:"
          printf '%s\n' "$out" | sed 's/^/    /'
          fail=1
        fi
      done
      echo ""
      if [ "$found" -eq 0 ]; then
        echo "ERROR: no compatibility.yaml files found — check sub-layers/ structure" >&2
        exit 1
      fi
      echo "→ ${found} component(s) validated against ${schema}."
      # Negative-fixture regression guard (full-corpus runs only). The schema MUST
      # reject each known-bad fixture; a fixture that PASSES means the reject-side
      # (additionalProperties:false / required sot / sot enum) silently regressed.
      if [ -z "$scope" ]; then
        for nf in schemas/testdata/compatibility-apis-legacy.yaml \
                  schemas/testdata/compatibility-missing-sot.yaml \
                  schemas/testdata/compatibility-bad-sot-enum.yaml; do
          if check-jsonschema --schemafile "$schema" "$nf" >/dev/null 2>&1; then
            echo "✗ NEGATIVE FIXTURE PASSED (schema reject-side regressed): $nf" >&2
            fail=1
          else
            echo "✓ negative fixture correctly rejected: $(basename "$nf")"
          fi
        done
      fi
      exit $fail

  # --- Worktree (parallel independent sessions) ---
  # Multiple independent Claude Code sessions build components in parallel on ONE
  # shared clone: each session gets its own git worktree under .claude/worktrees/.
  # The only .git-mutating steps (fetch + worktree add/remove/prune) run under a
  # mkdir-atomic lock (portable; macOS has no flock) so concurrent sessions can't
  # corrupt shared .git. slug = <sub-layer>-<component>; branch = catalog-build/<slug>.

  worktree:create:
    desc: 'Isolierten Worktree für eine Komponente anlegen: task worktree:create -- <sub-layer>/<component>'
    summary: |
      Cross-session-sicherer git-Worktree unter .claude/worktrees/<slug> auf Branch
      catalog-build/<slug>. Idempotent (existierender Worktree wird wiederverwendet);
      fail-fast, wenn der Branch bereits existiert (Claim einer anderen Session).
      Gibt den absoluten Worktree-Pfad auf der LETZTEN Zeile aus (vom Skill via
      `| tail -1` gelesen).
    cmd: |
      component_id="{{.COMPONENT_ID | default .CLI_ARGS}}"
      if [ -z "$component_id" ] || [ "${component_id#*/}" = "$component_id" ]; then
        echo "usage: task worktree:create -- <sub-layer>/<component>" >&2
        exit 1
      fi
      slug="${component_id%/*}-${component_id#*/}"
      # Anchor ALL paths + git ops to the MAIN worktree root (cwd-independent), fail-closed.
      # `git worktree list` always prints the MAIN worktree first, as an absolute path, from
      # any cwd inside the repo (including a linked worktree) and regardless of the git-dir
      # layout (--separate-git-dir / GIT_DIR override) — unlike dirname(--git-common-dir),
      # which only holds when .git sits directly under the root. The guard REFUSES a
      # non-absolute/empty result (outside a repo, broken git) rather than falling back to
      # cwd — a cwd-relative lock would let two sessions in different cwds see two distinct
      # physical locks and break cross-session mutual exclusion.
      root="$(git worktree list --porcelain 2>/dev/null | sed -n 's/^worktree //p' | head -1)"
      case "$root" in /*) ;; *) echo "worktree:create: cannot resolve main repo root (got '$root'); refusing" >&2; exit 1 ;; esac
      wt="$root/.claude/worktrees/${slug}"
      lock="$root/.claude/worktrees/.lock"
      branch="catalog-build/${slug}"
      # BASE_REF: the commit-ish the new worktree branch is based on. Default origin/main applies
      # only when UNSET (`-`, not `:-`): an explicitly-EMPTY BASE_REF stays empty and fails closed
      # at the guard below, rather than silently collapsing to origin/main and basing a co-build
      # workload on main without its stacked crds (an orchestrator slug-derivation-bug guard). A
      # co-build workload half passes BASE_REF=catalog-build/<crds-slug> so its worktree is STACKED
      # on the just-built crds branch (which carries the crds dir the workload's stacked PR + local
      # E2E need). Validated below, AFTER the fetch.
      BASE_REF="${BASE_REF-origin/main}"
      mkdir -p "$root/.claude/worktrees"
      # acquire cross-session lock (mkdir is atomic on POSIX; no flock on macOS).
      # Staleness is PID-liveness-based: a held lock is reclaimed only if its
      # recorded holder process is dead — so a slow `git fetch` under the lock is
      # never stolen mid-operation. The >5min age check is a last-resort fallback
      # for the rare window where the pid file was not yet written.
      waited=0
      until mkdir "$lock" 2>/dev/null; do
        holder="$(cat "$lock/pid" 2>/dev/null || true)"
        if [ -n "$holder" ] && ! kill -0 "$holder" 2>/dev/null; then
          rm -rf "$lock" 2>/dev/null || true   # holder process is dead
          continue
        fi
        if [ -n "$(find "$lock" -maxdepth 0 -mmin +5 2>/dev/null)" ]; then
          rm -rf "$lock" 2>/dev/null || true   # >5min, no live pid
          continue
        fi
        waited=$((waited + 1))
        if [ "$waited" -gt 600 ]; then
          echo "worktree:create: could not acquire lock within ~300s (holder pid ${holder:-unknown})" >&2
          exit 1
        fi
        sleep 0.5
      done
      trap 'rm -rf "$lock" 2>/dev/null || true' EXIT  # go-task sh: EXIT only; kill/crash covered by PID-liveness reclaim above
      echo "$$" > "$lock/pid" 2>/dev/null || true
      # idempotent reuse: dir exists and is on the expected branch
      if [ -d "$wt" ]; then
        cur="$(git -C "$wt" rev-parse --abbrev-ref HEAD 2>/dev/null || true)"
        if [ "$cur" = "$branch" ]; then
          (cd "$wt" && pwd)
          exit 0
        fi
        echo "worktree:create: $wt exists but is on '$cur', not '$branch'" >&2
        exit 1
      fi
      # claim check: branch exists (local or remote) without our worktree -> owned elsewhere
      if git -C "$root" show-ref --verify --quiet "refs/heads/${branch}" \
         || git -C "$root" ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
        echo "worktree:create: component ${component_id} already claimed (branch ${branch} exists) — another session owns it" >&2
        exit 1
      fi
      git -C "$root" fetch origin --quiet || echo "worktree:create: warning: git fetch failed, using existing ${BASE_REF}" >&2
      # A non-default BASE_REF (a co-build crds branch) MUST resolve LOCALLY: co-build is
      # single-clone foreground — the crds half built its branch in THIS clone (kept after
      # worktree:remove). A remote-only/absent ref fails closed here rather than silently basing
      # the workload on the wrong tree. origin/main keeps its existing fetch-fail-tolerant path.
      if [ "$BASE_REF" != "origin/main" ] && ! git -C "$root" rev-parse --verify --quiet "$BASE_REF" >/dev/null; then
        echo "worktree:create: base-ref '${BASE_REF}' not found locally — build the crds half first in this clone, or (cross-clone) merge the crds PR and re-run" >&2
        exit 1
      fi
      git -C "$root" worktree add "$wt" -b "$branch" "$BASE_REF" >/dev/null
      (cd "$wt" && pwd)

  worktree:remove:
    desc: 'Worktree einer Komponente entfernen (Branch bleibt): task worktree:remove -- <sub-layer>/<component>'
    cmd: |
      component_id="{{.COMPONENT_ID | default .CLI_ARGS}}"
      if [ -z "$component_id" ] || [ "${component_id#*/}" = "$component_id" ]; then
        echo "usage: task worktree:remove -- <sub-layer>/<component>" >&2
        exit 1
      fi
      slug="${component_id%/*}-${component_id#*/}"
      # Anchor to the MAIN worktree root, fail-closed (same method as worktree:create;
      # MUST derive $root identically so remove-from-a-different-cwd cannot orphan a
      # worktree+branch — branch == claim, a stranded claim permanently stalls the component).
      root="$(git worktree list --porcelain 2>/dev/null | sed -n 's/^worktree //p' | head -1)"
      case "$root" in /*) ;; *) echo "worktree:remove: cannot resolve main repo root (got '$root'); refusing" >&2; exit 1 ;; esac
      wt="$root/.claude/worktrees/${slug}"
      lock="$root/.claude/worktrees/.lock"
      mkdir -p "$root/.claude/worktrees"
      waited=0
      until mkdir "$lock" 2>/dev/null; do
        holder="$(cat "$lock/pid" 2>/dev/null || true)"
        if [ -n "$holder" ] && ! kill -0 "$holder" 2>/dev/null; then
          rm -rf "$lock" 2>/dev/null || true
          continue
        fi
        if [ -n "$(find "$lock" -maxdepth 0 -mmin +5 2>/dev/null)" ]; then
          rm -rf "$lock" 2>/dev/null || true
          continue
        fi
        waited=$((waited + 1))
        if [ "$waited" -gt 600 ]; then
          echo "worktree:remove: could not acquire lock within ~300s (holder pid ${holder:-unknown})" >&2
          exit 1
        fi
        sleep 0.5
      done
      trap 'rm -rf "$lock" 2>/dev/null || true' EXIT  # go-task sh: EXIT only; kill/crash covered by PID-liveness reclaim above
      echo "$$" > "$lock/pid" 2>/dev/null || true
      if [ -d "$wt" ]; then
        if [ -n "$(git -C "$wt" status --porcelain 2>/dev/null)" ] && [ "${FORCE:-}" != "1" ]; then
          echo "worktree:remove: $wt has uncommitted changes — commit/push them first, or re-run with FORCE=1" >&2
          exit 1
        fi
        git -C "$root" worktree remove --force "$wt"
      fi
      git -C "$root" worktree prune
      echo "removed worktree $wt (branch catalog-build/${slug} kept; delete with: git branch -D catalog-build/${slug})"

  worktree:list:
    desc: Aktive Komponenten-Worktrees auflisten
    cmd: |
      # `git worktree list` is cwd-independent — same list (absolute paths) from any cwd
      # inside the repo, including a linked worktree — so no main-root anchor is needed here.
      # `\.` escapes the regex dot so the filter matches the literal `.claude/worktrees/` path.
      git worktree list | grep '\.claude/worktrees/' || echo "(no active component worktrees)"

  # --- Housekeeping ---

  clean:
    desc: rendered/-Output und Scan-Artefakte entfernen
    cmds:
      - find sub-layers -path '*/components/*/rendered' -type d -exec rm -rf {} +
      - rm -f trivy-results.sarif snyk-results.sarif

  hooks:install:
    desc: install the lefthook-managed git hooks (.git/hooks/{pre-commit,commit-msg})
    cmd: lefthook install

  devbox-info:
    desc: Devbox-Tool-Versionen anzeigen
    cmd: devbox info

  # --- Lokale Entwicklung: Talos (docker) + Local-Registry + ArgoCD ---

  local:preflight:
    desc: 'Prüft dass alle Tools im PATH sind (sonst hilfreicher Hinweis)'
    cmd: |
      missing=""
      for t in docker talosctl kubectl kubectx helm mkcert envsubst yq; do
        command -v "$t" >/dev/null 2>&1 || missing="$missing $t"
      done
      if [ -n "$missing" ]; then
        echo "ERROR: folgende Tools fehlen im PATH:$missing"
        echo ""
        echo "Vermutlich ist die Devbox-Shell für dieses Repo nicht aktiv."
        echo "Fix:"
        echo "  direnv allow            # einmalig, lädt Repo-Devbox-PATH bei cd"
        echo "  oder"
        echo "  devbox shell            # explizite Shell mit Repo-Tools"
        exit 1
      fi

  local:up:
    desc: 'Lokales Entwicklungs-Setup hoch: Registry + Talos + Gateway-API + Cilium + ArgoCD'
    # WICHTIG: Gateway-API-CRDs müssen VOR Cilium installiert werden, sonst
    # initialisiert der Cilium-Operator seinen Gateway-API-Controller nicht
    # und es entsteht keine GatewayClass 'cilium' (Folge: Gateway hängt für
    # immer in "Waiting for controller").
    cmds:
      - task: local:preflight
      - task: local:registry:up
      - task: local:cluster:up
      - task: local:gateway-api:install
      - task: local:cilium:install
      - task: local:storage:install
      - task: local:cert-manager:install
      - task: local:certs
      - task: local:argo:install
      - task: local:gateway:apply
      - task: local:registry:bridge
      - |
        echo ""
        echo "✓ Lokales Setup bereit."
        echo "  Argo-UI:       https://argocd.localhost.direct"
        echo "  Argo-Admin-Pw: task local:argo:password"
        echo "  Registry:      https://localhost:5001 (Workstation, mkcert-TLS)"
        echo "                 kind-registry.registry.svc.cluster.local:5000 (Cluster, mkcert-TLS)"
        echo "  Lokal pushen:  task local:publish -- <sub-layer> <tag>"

  local:down:
    desc: 'Alles abreißen: Cluster + Registry + Mkcert-Daten'
    cmds:
      - talosctl cluster destroy --name talos-platform-apps || true
      - task: local:registry:down

  local:stop:
    desc: 'Cluster + Registry pausieren (Container stoppen, State bleibt)'
    # Im Gegensatz zu local:down wird hier nichts gelöscht — beim nächsten
    # local:start sind alle Workloads + Daten wieder da. Sinnvoll für
    # Laptop-Suspend oder mehrtägige Pausen ohne Re-Install.
    cmd: |
      for c in talos-platform-apps-controlplane-1 kind-registry; do
        if [ "$(docker inspect -f '{{`{{.State.Running}}`}}' "$c" 2>/dev/null)" = "true" ]; then
          docker stop "$c" >/dev/null
          echo "✓ $c gestoppt"
        else
          echo "  $c läuft nicht (skip)"
        fi
      done

  local:start:
    desc: 'Pausierten Cluster + Registry wieder starten'
    # Erwartet, dass local:up schon einmal lief — startet nur die bestehenden
    # Container neu. Wartet bis die K8s-API antwortet, damit Folge-Tasks
    # (kubectl, helm) nicht in Race-Conditions laufen.
    cmd: |
      for c in kind-registry talos-platform-apps-controlplane-1; do
        if ! docker inspect "$c" >/dev/null 2>&1; then
          echo "ERROR: Container '$c' existiert nicht — task local:up?"
          exit 1
        fi
        if [ "$(docker inspect -f '{{`{{.State.Running}}`}}' "$c")" = "true" ]; then
          echo "  $c läuft bereits"
        else
          docker start "$c" >/dev/null
          echo "✓ $c gestartet"
        fi
      done
      kubectx {{.LOCAL_KUBE_CONTEXT}} >/dev/null 2>&1 || true
      echo "warte bis K8s-API antwortet..."
      ready=false
      for i in $(seq 1 60); do
        if kubectl --context {{.LOCAL_KUBE_CONTEXT}} get --raw='/readyz' >/dev/null 2>&1; then
          ready=true
          echo "✓ K8s-API ready"
          break
        fi
        sleep 2
      done
      if [ "$ready" != "true" ]; then
        echo "ERROR: K8s-API auf Context {{.LOCAL_KUBE_CONTEXT}} nach 60 Versuchen nicht ready — task local:up?"
        exit 1
      fi

  local:registry:up:
    desc: 'Lokale Docker-Registry auf localhost:5001 mit mkcert-TLS starten (idempotent)'
    # Container terminiert TLS selbst — gleicher mkcert-Cert für Workstation
    # (SAN: localhost, 127.0.0.1) und Cluster (SAN: kind-registry.registry.svc.cluster.local).
    # Damit kann Argo intra-cluster die Cert-Chain validieren ohne --plain-http /
    # insecure-Flags. mkcert -install ist idempotent.
    cmd: |
      mkcert -install >/dev/null 2>&1
      mkdir -p .mkcert-registry
      if [ ! -f .mkcert-registry/kind-registry-cert.pem ]; then
        cd .mkcert-registry
        mkcert -cert-file kind-registry-cert.pem -key-file kind-registry-key.pem \
          localhost 127.0.0.1 \
          kind-registry kind-registry.registry kind-registry.registry.svc \
          kind-registry.registry.svc.cluster.local >/dev/null
        chmod 644 kind-registry-key.pem
        cd ..
        echo "✓ mkcert-Cert für kind-registry generiert"
      fi
      if [ "$(docker inspect -f '{{`{{.State.Running}}`}}' kind-registry 2>/dev/null)" = "true" ]; then
        echo "✓ kind-registry läuft bereits"
      else
        docker rm -f kind-registry >/dev/null 2>&1 || true
        docker run -d --restart=always \
          -p 127.0.0.1:5001:5000 \
          -v "$PWD/.mkcert-registry:/certs:ro" \
          -e REGISTRY_HTTP_TLS_CERTIFICATE=/certs/kind-registry-cert.pem \
          -e REGISTRY_HTTP_TLS_KEY=/certs/kind-registry-key.pem \
          --name kind-registry \
          registry:2 >/dev/null
        echo "✓ kind-registry gestartet (https://localhost:5001, TLS via mkcert)"
      fi

  local:registry:down:
    desc: 'Lokale Registry stoppen + entfernen'
    cmd: docker rm -f kind-registry || true

  local:cluster:up:
    desc: 'Talos-Cluster (docker provisioner) erstellen + lokale Registry verbinden'
    cmds:
      - |
        # Talos docker-provisioner cluster: single schedulable control plane,
        # prod-pinned Talos (v1.13.3) + K8s (1.36.0). CNI/proxy off, KubePrism,
        # and the localhost:5001 registry mirror all come from local/talos-patch.yaml.
        # Host 80/443 → NodePort 30080/30443 (Cilium-Gateway) via -p, the talosctl
        # analog of kind's extraPortMappings.
        # Node-Sizing: der talosctl-Default (2GiB/2CPU) ist zu klein — Cilium + Argo
        # + mehrere Plattform-Komponenten (crossplane, cnpg, …) sprengen 2GiB →
        # apiserver-Timeouts + OOM. Default 8GiB/6CPU (Limit, keine Reservierung →
        # passt auch in kleinere VMs, bis tatsächlich genutzt). Per LOCAL_NODE_MEMORY
        # / LOCAL_NODE_CPUS übersteuerbar.
        # talosctl create is NOT idempotent (it refuses if the state dir exists).
        # NOTE: `talosctl cluster show` is NOT a reliable existence probe — it exits
        # 0 with empty output even when nothing exists. Gate on the state dir.
        state_dir="${HOME}/.talos/clusters/talos-platform-apps"
        if [ -d "$state_dir" ]; then
          echo "✓ Talos-Cluster 'talos-platform-apps' existiert bereits (skip create)"
        else
          talosctl cluster create docker \
            --name talos-platform-apps \
            --workers 0 \
            --memory-controlplanes "${LOCAL_NODE_MEMORY:-8GiB}" \
            --cpus-controlplanes "${LOCAL_NODE_CPUS:-6}" \
            --image ghcr.io/siderolabs/talos:v1.13.3 \
            --kubernetes-version 1.36.0 \
            --config-patch @local/talos-patch.yaml \
            -p 80:30080/tcp,443:30443/tcp
        fi
      - |
        # Select the kube context. create writes it correctly (server = the
        # docker-forwarded 127.0.0.1:<port>). A skipped create with a pruned
        # kubeconfig needs a rebuild — but `talosctl kubeconfig` writes the in-VM
        # node IP (10.5.0.2:6443), which is unreachable from the host, so we
        # repoint the server at the forwarded 6443 port. Node .2 is deterministic
        # in the default 10.5.0.0/24 subnet (.1 = gateway).
        # Guard on the server URL the kube-context actually RESOLVES to: a stale
        # context named admin@talos-platform-apps (a prior, unrelated cluster that
        # reused this deterministic default name) would otherwise be trusted as-is,
        # and every pinned --context call would then hit ITS server. `config view
        # --minify --context` follows the context to its referenced cluster's server
        # — so a context pointing at a DIFFERENTLY-named cluster is still caught,
        # unlike a bare cluster-name lookup. Rebuild whenever that server is not this
        # container's forwarded loopback port (an absent context yields an empty
        # server, which also triggers the rebuild). A redundant rebuild is harmless —
        # talosctl kubeconfig --force + set-cluster are idempotent in outcome.
        api_port=$(docker port talos-platform-apps-controlplane-1 6443/tcp | head -1 | sed 's/.*://')
        if [ -z "$api_port" ]; then
          echo "ERROR: 'docker port talos-platform-apps-controlplane-1 6443/tcp' returned empty — container not running yet? Re-run once local:cluster:up has brought it up."
          exit 1
        fi
        expected_server="https://127.0.0.1:${api_port}"
        current_server=$(kubectl config view --minify --context {{.LOCAL_KUBE_CONTEXT}} -o jsonpath='{.clusters[0].cluster.server}' 2>/dev/null || true)
        if [ "$current_server" != "$expected_server" ]; then
          talosctl --context talos-platform-apps kubeconfig --force --nodes 10.5.0.2 >/dev/null
          kubectl config set-cluster talos-platform-apps --server="$expected_server"
        fi
        kubectx {{.LOCAL_KUBE_CONTEXT}}
      - |
        # Registry-Container ins Talos-Docker-Netzwerk (= Cluster-Name) hängen,
        # damit der Node sie über die Docker-DNS als kind-registry:5000 auflöst
        # (Registry-Mirror im machine-config). 'connect' meckert wenn schon drin → || true.
        docker network connect talos-platform-apps kind-registry 2>/dev/null || true
      - |
        # ConfigMap nach KEP-1755 (local-registry-hosting)
        kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f - <<'EOF'
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: local-registry-hosting
          namespace: kube-public
        data:
          localRegistryHosting.v1: |
            host: "localhost:5001"
            help: "https://github.com/siderolabs/talos"
        EOF

  local:cert-manager:install:
    desc: 'cert-manager via Helm installieren (CRDs inline)'
    cmd: |
      helm repo add jetstack https://charts.jetstack.io 2>/dev/null || true
      helm repo update jetstack
      helm upgrade --install cert-manager jetstack/cert-manager \
        --kube-context {{.LOCAL_KUBE_CONTEXT}} \
        --namespace cert-manager --create-namespace \
        --version v1.17.0 \
        --set crds.enabled=true \
        --wait --timeout 5m

  local:certs:
    desc: 'mkcert-Root-CA ins System-Trust + Cluster-Secret + ConfigMap + ClusterIssuer'
    # Drei Targets für die CA:
    #   1. cert-manager-NS als TLS-Secret → ClusterIssuer für *.localhost.direct
    #   2. argocd-NS als ConfigMap → initContainer mountet die CA und appended sie
    #      an /etc/ssl/certs/ca-certificates.crt im argocd-repo-server-Pod,
    #      damit Helm-OCI-Pulls gegen kind-registry-TLS validieren.
    # Material kommt direkt aus $(mkcert -CAROOT) (kein lokales Zwischen-File,
    # vermeidet Permission-Issues beim zweiten Lauf — mkcert speichert mit 0600).
    cmd: |
      mkcert -install
      caroot=$(mkcert -CAROOT)
      kubectl create secret tls mkcert-ca \
        --cert="$caroot/rootCA.pem" --key="$caroot/rootCA-key.pem" \
        -n cert-manager \
        --dry-run=client -o yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      kubectl create namespace argocd --dry-run=client -o yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      kubectl create configmap mkcert-ca \
        --from-file=ca.crt="$caroot/rootCA.pem" \
        -n argocd \
        --dry-run=client -o yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/mkcert-cluster-issuer.yaml
      echo "✓ mkcert-CA als ClusterIssuer + im argocd-NS bereit"

  local:cilium:install:
    desc: 'Cilium als CNI installieren (kubeProxyReplacement, Gateway-API enabled)'
    cmd: |
      # Cilium ohne kube-proxy braucht eine API-Adresse. Auf Talos zeigt sie auf
      # KubePrism (node-lokaler LB auf 127.0.0.1:7445, machine-config) — identisch
      # zu talos-seeder-cluster/tofu/main.tf. Kein docker-inspect der Node-IP mehr.
      echo "Cilium k8sServiceHost=localhost:7445 (KubePrism)"
      helm repo add cilium https://helm.cilium.io 2>/dev/null || true
      helm repo update cilium
      helm upgrade --install cilium cilium/cilium \
        --kube-context {{.LOCAL_KUBE_CONTEXT}} \
        --namespace kube-system \
        --version 1.19.3 \
        --values local/cilium-values.yaml \
        --set k8sServiceHost=localhost \
        --set k8sServicePort=7445 \
        --wait --timeout 5m
      # Wartet, bis CoreDNS via Cilium-CNI läuft. 5m statt 2m: beim Erst-Install
      # zieht der Cilium-Agent/Operator/Envoy erst Images, bevor das CNI Pods
      # verdrahtet — 2m war zu knapp und ließ local:up false-negativ failen.
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n kube-system rollout status deployment/coredns --timeout=5m

  local:storage:install:
    desc: 'local-path-provisioner als Default-StorageClass (lokal — Katalog-CSI braucht das NAS)'
    # Das lokale Talos-Cluster hat keine StorageClass; die Katalog-CSIs (synology/
    # democratic) brauchen das echte NAS. Für stateful Local-Tests (CNPG-Cluster,
    # Harbor-PVCs …) installieren wir Rancher local-path-provisioner. Talos-
    # Anpassung: / ist read-only → hostPath nach /var/local-path-provisioner.
    cmd: |
      ver="v0.0.30"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f "https://raw.githubusercontent.com/rancher/local-path-provisioner/${ver}/deploy/local-path-storage.yaml"
      # Talos erzwingt Pod-Security; der Helper-Pod (mountet hostPath) braucht
      # einen privileged-NS, sonst blockt PSA die PVC-Provisionierung.
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} label namespace local-path-storage pod-security.kubernetes.io/enforce=privileged --overwrite
      cfg='{"nodePathMap":[{"node":"DEFAULT_PATH_FOR_NON_LISTED_NODES","paths":["/var/local-path-provisioner"]}]}'
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n local-path-storage patch configmap local-path-config --type merge \
        -p "$(jq -nc --arg c "$cfg" '{data:{"config.json":$c}}')"
      # local-path als Default-StorageClass (CNPG & Co. setzen kein storageClassName)
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} patch storageclass local-path \
        -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n local-path-storage rollout restart deployment/local-path-provisioner
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n local-path-storage rollout status deployment/local-path-provisioner --timeout=2m
      echo "✓ local-path ist Default-StorageClass"

  local:gateway-api:install:
    desc: 'Gateway-API-CRDs installieren (Standard-Channel v1.2.0)'
    cmd: |
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} wait --for=condition=Established crd/gateways.gateway.networking.k8s.io --timeout=2m
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} wait --for=condition=Established crd/httproutes.gateway.networking.k8s.io --timeout=2m

  local:argo:install:
    desc: 'ArgoCD via Helm im Cluster installieren (HTTPRoute auf argocd.localhost.direct)'
    cmd: |
      helm repo add argo https://argoproj.github.io/argo-helm 2>/dev/null || true
      helm repo update argo
      helm upgrade --install argocd argo/argo-cd \
        --kube-context {{.LOCAL_KUBE_CONTEXT}} \
        --namespace argocd --create-namespace \
        --version 7.7.0 \
        --values local/argocd-values.yaml \
        --wait --timeout 5m

  local:gateway:apply:
    desc: 'Gateway + HTTPRoutes apply + Cilium-Gateway-Service auf NodePort patchen'
    cmd: |
      kubectl create namespace gateway --dry-run=client -o yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/gateway.yaml
      # warten bis Cilium den Gateway-Service erzeugt hat
      for i in $(seq 1 30); do
        if kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n gateway get svc cilium-gateway-localhost-direct >/dev/null 2>&1; then break; fi
        echo "  ... warte auf cilium-gateway-localhost-direct ($i/30)"
        sleep 2
      done
      # Patch auf NodePort + feste Ports 30080/30443
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n gateway patch svc cilium-gateway-localhost-direct --type=merge -p '{
        "spec": {
          "type": "NodePort",
          "ports": [
            {"name": "port-80",  "port": 80,  "targetPort": 80,  "nodePort": 30080, "protocol": "TCP"},
            {"name": "port-443", "port": 443, "targetPort": 443, "nodePort": 30443, "protocol": "TCP"}
          ]
        }
      }'
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/argocd-route.yaml
      echo "✓ Gateway + ArgoCD-HTTPRoute angewendet"

  local:registry:bridge:
    desc: 'kind-registry-Container als Cluster-Service exposen (Service+EndpointSlice)'
    # Bridge ist Service+EndpointSlice ohne Selector im 'registry'-NS,
    # statische Container-IP aus 'docker container inspect'. Damit ist der
    # kind-registry-Container intra-cluster über die Service-DNS
    # kind-registry.registry.svc.cluster.local:5000 erreichbar.
    # TLS terminiert der Container selbst (mkcert-Cert mit Service-DNS-SAN),
    # KEINE Gateway-HTTPRoute mehr — direkter Pfad ohne Re-Encrypt.
    cmd: |
      # Netzwerk = Cluster-Name (talosctl docker provisioner). Hyphen im Namen →
      # index statt Dot-Access im Go-Template.
      kind_registry_ip=$(docker container inspect kind-registry \
        --format '{{`{{ (index .NetworkSettings.Networks "talos-platform-apps").IPAddress }}`}}')
      if [ -z "$kind_registry_ip" ] || [ "$kind_registry_ip" = "<no value>" ]; then
        echo "ERROR: kind-registry nicht im talos-platform-apps-Netzwerk — task local:cluster:up?"
        exit 1
      fi
      echo "kind-registry-Container IP: $kind_registry_ip"
      KIND_REGISTRY_IP="$kind_registry_ip" envsubst < local/registry-bridge.yaml | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f -
      echo "✓ Registry-Bridge angewendet"
      echo "  Workstation-Push:  oci://localhost:5001/talos-platform-apps (mkcert-TLS, SAN: localhost)"
      echo "  Cluster-Pull:      kind-registry.registry.svc.cluster.local:5000/talos-platform-apps (mkcert-TLS, SAN: Service-DNS)"

  local:argo:uninstall:
    desc: 'ArgoCD entfernen (Cluster bleibt)'
    cmd: helm uninstall argocd --namespace argocd --kube-context {{.LOCAL_KUBE_CONTEXT}} || true

  local:argo:ui:
    desc: 'Argo-UI öffnen (falls Browser nicht automatisch startet: https://argocd.localhost.direct)'
    cmd: |
      pw=$(task local:argo:password --silent)
      echo "Argo-UI: https://argocd.localhost.direct"
      echo "Login:   admin / $pw"
      command -v open >/dev/null && open https://argocd.localhost.direct || true

  local:argo:password:
    desc: 'Initial-Admin-Passwort von ArgoCD ausgeben'
    cmd: |
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get secret argocd-initial-admin-secret \
        -o jsonpath='{.data.password}' | base64 -d
      echo ""

  local:publish:
    desc: 'render + package + push einer Komponente zur lokalen Registry: task local:publish -- <sub-layer>/<component> <tag>'
    summary: |
      Pusht an oci://localhost:5001/talos-platform-apps/<sub-layer>/<component>:<tag>
      (Workstation-View, mkcert-TLS via SAN 'localhost'). Argo CD im Cluster
      pullt dasselbe Artefakt intra-cluster über
      kind-registry.registry.svc.cluster.local:5000/talos-platform-apps/<sub-layer>/<component>:<tag>
      (gleicher Container, gleicher mkcert-Cert mit anderem SAN).
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task local:publish -- <sub-layer>/<component> <tag>}"
      tag="${2:?usage: task local:publish -- <sub-layer>/<component> <tag>}"
      # Lokaler Values-Overlay (externalURL/CORS auf .localhost.direct), falls vorhanden
      ov="local/values-overrides/${component_id%/*}/${component_id#*/}.yaml"; [ -f "$ov" ] || ov=""
      EXTRA_VALUES="$ov" OCI_REGISTRY=localhost:5001/talos-platform-apps task render:one -- "$component_id"
      OCI_REGISTRY=localhost:5001/talos-platform-apps task package    -- "$component_id" "$tag"
      OCI_REGISTRY=localhost:5001/talos-platform-apps task push       -- "$component_id" "$tag"
      echo "✓ Lokal publiziert: oci://localhost:5001/talos-platform-apps/${component_id}:${tag#v}"

  local:publish:sublayer:
    desc: 'Alle Komponenten eines Sub-Layers lokal publishen: task local:publish:sublayer -- <sub-layer> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:publish:sublayer -- <sub-layer> <tag>}"
      tag="${2:?usage: task local:publish:sublayer -- <sub-layer> <tag>}"
      sldir="sub-layers/${sub_layer}/components"
      if [ ! -d "$sldir" ]; then
        echo "ERROR: ${sldir} existiert nicht"
        exit 1
      fi
      for cdir in "$sldir"/*/; do
        component=$(basename "$cdir")
        task local:publish -- "${sub_layer}/${component}" "$tag"
      done

  local:apply:
    desc: 'Argo-Apps eines Sub-Layers im Cluster anwenden: task local:apply -- <sub-layer> <tag>'
    summary: |
      Sucht local/argo-apps/<sub-layer>/*.yaml und applied jede Datei mit
      envsubst-Substitution für ${TAG} und ${REGISTRY}. Pro Komponente eine
      eigene Argo-Application mit fester sync-wave-Annotation im Template.

      ${REGISTRY} = kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
                    (Cluster-Pull-Pfad, intra-cluster TLS via mkcert-SAN).
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:apply -- <sub-layer> <tag>}"
      tag="${2:?usage: task local:apply -- <sub-layer> <tag>}"
      chart_version="${tag#v}"
      apps_dir="local/argo-apps/${sub_layer}"
      # Pin the LOCAL Talos test cluster explicitly — NEVER the operator's current
      # kube-context, which may be a real/shared cluster. Applying Argo apps to the
      # wrong cluster is a cross-cluster footgun (all other local:* tasks pin this
      # context for the same reason).
      KC="kubectl --context {{.LOCAL_KUBE_CONTEXT}}"

      if [ ! -d "$apps_dir" ]; then
        echo "ERROR: ${apps_dir} existiert nicht"
        exit 1
      fi

      shopt -s nullglob
      for tmpl in "$apps_dir"/*.yaml; do
        component=$(basename "$tmpl" .yaml)
        TAG="$chart_version" \
          REGISTRY="kind-registry.registry.svc.cluster.local:5000/talos-platform-apps" \
          envsubst < "$tmpl" | $KC apply -f -
        echo "  ✓ ${sub_layer}/${component} → Argo-App '${sub_layer}-${component}'"
        # Lokale HTTPRoute mit applien, falls die Komponente eine UI hat (nur lokal).
        route="local/http-routes/${sub_layer}/${component}.yaml"
        if [ -f "$route" ]; then
          $KC apply -f "$route" >/dev/null
          echo "    🌐 https://${component}.localhost.direct"
        fi
      done
      echo "✓ Sub-Layer ${sub_layer} angelegt (Tag ${chart_version})"
      echo "  Sync-Status: ${KC} -n argocd get applications -l platform.devoba.de/sub-layer=${sub_layer}"

  local:deps:
    desc: 'Transitive Katalog-Abhängigkeiten einer Komponente in Install-Reihenfolge: task local:deps -- <sub-layer>/<component>'
    summary: |
      Liest sub-layers/<sl>/<comp>/compatibility.yaml `requires` rekursiv:
        - Component-Pfade (a/b) direkt,
        - Capabilities (z. B. cnpg-postgres) via provides[].capabilities[].id der
          anderen Komponenten aufgelöst (kein Hardcoding),
        - talos-platform-base (Substrat) wird übersprungen.
      Ausgabe (stdout): je Zeile eine Komponente, Dependencies zuerst (Post-Order),
      das Ziel selbst NICHT enthalten. Warnungen → stderr. Quelle der Wahrheit ist
      compatibility.yaml — es gibt KEIN separates Dependency-Format.
    cmd: |
      set -uo pipefail
      set -- {{.CLI_ARGS}}
      target="${1:?usage: task local:deps -- <sub-layer>/<component>}"

      comp_file() { echo "sub-layers/${1%/*}/components/${1#*/}/compatibility.yaml"; }

      # Capability-ID → erste Komponente, die sie in provides[].capabilities[] führt
      cap_to_comp() {
        for cf in sub-layers/*/components/*/compatibility.yaml; do
          if yq -e ".provides[]?.capabilities[]? | select(.id == \"$1\")" "$cf" >/dev/null 2>&1; then
            d=$(dirname "$cf")
            echo "$(basename "$(dirname "$(dirname "$d")")")/$(basename "$d")"
            return 0
          fi
        done
        return 1
      }

      seen=" "
      order=""
      resolve() {
        cf=$(comp_file "$1")
        [ -f "$cf" ] || return 0
        keys=$(yq -r '.requires // {} | keys | .[]' "$cf" 2>/dev/null)
        for k in $keys; do
          case "$k" in
            talos-platform-base*) continue ;;
            */*) dep="$k" ;;
            *) dep=$(cap_to_comp "$k") || { echo "WARN: Capability '$k' (von $1) → keine Komponente im Katalog" >&2; continue; } ;;
          esac
          case " $seen " in *" $dep "*) continue ;; esac
          seen="$seen $dep"
          resolve "$dep"
          order="${order}${dep}|"
        done
      }
      resolve "$target"
      printf '%s' "$order" | tr '|' '\n' | sed '/^$/d'

  local:dev:
    desc: 'Skaffold-artiger Watch-Loop für EINE Komponente: task local:dev -- <sub-layer>/<component>'
    summary: |
      Beobachtet sub-layers/<sub-layer>/components/<component>/ und fährt bei JEDER
      Änderung automatisch render → package → push (lokale Registry, frischer Tag)
      + Argo-Hard-Refresh. Die automated-syncPolicy der Application appliert dann
      selbst — kein manuelles publish/apply mehr.

      rendered/ ist gitignored → watchexec triggert NICHT auf den eigenen Output
      (kein Endlos-Loop). Strg-C beendet den Loop. Voraussetzung: ein Argo-App-
      Template local/argo-apps/<sub-layer>/<component>.yaml (Vorlage: crossplane).
    cmd: |
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task local:dev -- <sub-layer>/<component>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      comp_dir="sub-layers/${sub_layer}/components/${component}"
      app_tmpl="local/argo-apps/${sub_layer}/${component}.yaml"
      [ -d "$comp_dir" ] || { echo "ERROR: ${comp_dir} existiert nicht"; exit 1; }
      [ -f "$app_tmpl" ] || { echo "ERROR: kein Argo-App-Template ${app_tmpl} — anlegen (Vorlage: local/argo-apps/lifecycle/crossplane.yaml)"; exit 1; }
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} get ns argocd >/dev/null 2>&1 || { echo "ERROR: Cluster/ArgoCD nicht da — erst 'task local:up'"; exit 1; }

      # Katalog-Abhängigkeiten zuerst hochziehen (aus compatibility.yaml requires,
      # via local:deps aufgelöst). Skip pro Dep, wenn Argo-App schon Synced/Healthy.
      # Deaktivierbar mit LOCAL_DEV_SKIP_DEPS=1.
      if [ "${LOCAL_DEV_SKIP_DEPS:-0}" != "1" ]; then
        deps=$(task local:deps -- "$component_id" 2>/dev/null || true)
        if [ -n "$deps" ]; then
          echo "Abhängigkeiten (Install-Reihenfolge): $(echo "$deps" | paste -sd' ' -)"
          echo "$deps" | while IFS= read -r dep; do
            [ -z "$dep" ] && continue
            dep_app="${dep%/*}-${dep#*/}"
            dep_tmpl="local/argo-apps/${dep%/*}/${dep#*/}.yaml"
            h=$(kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get application "$dep_app" -o jsonpath='{.status.health.status}' 2>/dev/null || true)
            s=$(kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get application "$dep_app" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)
            if [ "$h" = "Healthy" ] && [ "$s" = "Synced" ]; then
              echo "  ✓ ${dep} bereits Synced/Healthy (skip)"
            elif [ ! -f "$dep_tmpl" ]; then
              echo "  ⚠ ${dep}: kein Argo-App-Template (${dep_tmpl}) — bitte manuell bereitstellen"
            else
              echo "  → ${dep} deployen…"
              task local:dev:sync -- "$dep"
            fi
          done
        fi
      fi

      # Test-Fixtures: consumer-eigene Instanzen (CNPG-Cluster, Valkey) + Dev-Secrets,
      # die der Katalog nicht liefert. Auto, sofern vorhanden; LOCAL_DEV_SKIP_FIXTURES=1 aus.
      fdir="local/fixtures/${sub_layer}/${component}"
      if [ "${LOCAL_DEV_SKIP_FIXTURES:-0}" != "1" ] && [ -d "$fdir" ]; then
        echo "Test-Fixtures (Instanzen + Dev-Secrets):"
        task local:fixtures -- "$component_id"
      fi

      # Hinweis auf consumer-gelieferte Secrets — nur wenn KEINE Fixture sie stellt
      # (sonst werden sie oben automatisch erzeugt).
      cust="${comp_dir}/customization.yaml"
      if [ ! -d "$fdir" ] && [ -f "$cust" ]; then
        sref=$(yq -r '.provided_refs.secret // ""' "$cust" 2>/dev/null)
        skeys=$(yq -r '.required.secret_keys[]?' "$cust" 2>/dev/null | paste -sd, -)
        if [ -n "$skeys" ]; then
          echo "ℹ ${component_id} braucht Secret '${sref}' mit Keys [${skeys}] (consumer-supplied, manuell anlegen — oder local/fixtures/${sub_layer}/${component}/ anlegen)"
        fi
      fi

      echo "Initial-Build ${component_id}…"
      task local:dev:sync -- "$component_id"

      # Lokale HTTPRoute applien, falls die Komponente eine UI hat. Nur lokal —
      # in prod ist die Route consumer-eigen (cluster-spez. Hostname, ADR-0023/0024).
      route="local/http-routes/${sub_layer}/${component}.yaml"
      if [ -f "$route" ]; then
        kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f "$route" >/dev/null
        echo "🌐 erreichbar unter https://${component}.localhost.direct"
      fi

      # Skaffold-artiges Teardown: Strg-C entfernt, was DIESE Komponente ausmacht —
      # Argo-App + HTTPRoute + Fixtures (CR-Instanzen + generierte Secrets). Deps/
      # Operatoren bleiben (teuer im Re-Deploy). LOCAL_DEV_KEEP=1 behält alles.
      # WICHTIG: go-tasks mvdan/sh kann KEINE Signal-Traps ("invalid signal
      # specification"). Watch + Trap laufen daher in echtem `bash -c`; Vars per env.
      echo ""
      echo "👀 Watching ${comp_dir} — Speichern löst Rebuild + Argo-Sync aus. Strg-C → Teardown."
      DEV_SL="$sub_layer" DEV_COMP="$component" DEV_CID="$component_id" \
      DEV_COMPDIR="$comp_dir" DEV_ROUTE="$route" DEV_FDIR="$fdir" DEV_APPTMPL="$app_tmpl" \
      bash -c '
        set -u
        K="kubectl --context {{.LOCAL_KUBE_CONTEXT}}"
        cleanup() {
          trap - INT TERM
          if [ "${LOCAL_DEV_KEEP:-0}" = "1" ]; then echo; echo "LOCAL_DEV_KEEP=1 → ${DEV_CID} bleibt im Cluster."; exit 0; fi
          echo; echo "🧹 Strg-C → räume ${DEV_CID} auf …"
          $K -n argocd delete application "${DEV_SL}-${DEV_COMP}" --ignore-not-found --wait=false >/dev/null 2>&1
          [ -f "$DEV_ROUTE" ] && $K delete -f "$DEV_ROUTE" --ignore-not-found --wait=false >/dev/null 2>&1
          if [ -d "$DEV_FDIR" ]; then
            [ -d "$DEV_FDIR/manifests" ] && $K delete -f "$DEV_FDIR/manifests" --ignore-not-found --wait=false >/dev/null 2>&1
            if [ -f "$DEV_FDIR/secrets.yaml" ]; then
              fns=$(yq -r ".spec.destination.namespace" "$DEV_APPTMPL" 2>/dev/null); { [ -z "$fns" ] || [ "$fns" = "null" ]; } && fns="$DEV_COMP"
              for n in $(yq -r ".secrets[].name" "$DEV_FDIR/secrets.yaml" 2>/dev/null); do $K -n "$fns" delete secret "$n" --ignore-not-found >/dev/null 2>&1; done
            fi
          fi
          echo "  ✓ ${DEV_CID} (App, Route, Fixtures) entfernt. Operatoren/Deps bleiben — task local:down räumt alles ab."
          exit 0
        }
        trap cleanup INT TERM
        watchexec --watch "$DEV_COMPDIR" --ignore "**/rendered/**" --debounce 800ms --postpone -- task local:dev:sync -- "$DEV_CID"
      '

  local:dev:sync:
    desc: 'Eine Dev-Iteration (intern, von local:dev getriggert): render→push→Argo-refresh mit frischem Tag'
    # Eigenständig aufrufbar für einen einmaligen Sync. Frischer Tag pro Lauf
    # (0.0.0-dev.<epoch>), weil ArgoCD OCI-Tags per Digest cached — gleicher Tag
    # würde nicht neu gezogen. Fehlerhafter Render (Tippfehler mitten im Edit)
    # bricht nur diese Iteration ab; der watchexec-Loop läuft weiter.
    cmd: |
      set -euo pipefail
      set -- {{.CLI_ARGS}}
      component_id="${1:?usage: task local:dev:sync -- <sub-layer>/<component>}"
      sub_layer="${component_id%/*}"
      component="${component_id#*/}"
      app_tmpl="local/argo-apps/${sub_layer}/${component}.yaml"
      app_name="${sub_layer}-${component}"
      registry="kind-registry.registry.svc.cluster.local:5000/talos-platform-apps"
      tag="0.0.0-dev.$(date +%s)"
      # Lokaler Values-Overlay (externalURL/CORS auf .localhost.direct), falls vorhanden
      ov="local/values-overrides/${sub_layer}/${component}.yaml"; [ -f "$ov" ] || ov=""
      echo "▶ ${component_id} → ${tag}"
      EXTRA_VALUES="$ov" OCI_REGISTRY=localhost:5001/talos-platform-apps task render:one -- "$component_id" >/dev/null
      OCI_REGISTRY=localhost:5001/talos-platform-apps task package    -- "$component_id" "$tag" >/dev/null
      OCI_REGISTRY=localhost:5001/talos-platform-apps task push       -- "$component_id" "$tag" >/dev/null
      TAG="$tag" REGISTRY="$registry" envsubst < "$app_tmpl" \
        | kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f - >/dev/null
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd annotate application "$app_name" \
        argocd.argoproj.io/refresh=hard --overwrite >/dev/null
      echo "  ✓ ${app_name} → ${tag} (Argo auto-sync läuft)"

  local:fixtures:
    desc: 'Lokale Test-Fixtures (Capability-Instanzen + Dev-Secrets) einer Komponente: task local:fixtures -- <sub-layer>/<component>'
    summary: |
      Bringt die consumer-eigenen Ressourcen, die der Katalog NICHT liefert
      (ADR-0023/0024), für lokale Tests ein:
        - CR-Manifeste aus local/fixtures/<sl>/<comp>/manifests/ (CNPG-Cluster, Valkey, …)
        - Dev-Secrets aus secrets.yaml — zur Apply-Zeit generiert, idempotent
          (keine Werte im Repo). `fromCnpgApp` kopiert das password aus dem
          CNPG-Auto-Secret <cluster>-app, sonst Zufallswert pro Key.
      No-op, wenn kein Fixtures-Verzeichnis existiert.
    cmd: |
      set -uo pipefail
      set -- {{.CLI_ARGS}}
      cid="${1:?usage: task local:fixtures -- <sub-layer>/<component>}"
      sl="${cid%/*}"; comp="${cid#*/}"
      fdir="local/fixtures/${sl}/${comp}"
      [ -d "$fdir" ] || { echo "  (keine Fixtures für ${cid})"; exit 0; }
      KC="kubectl --context {{.LOCAL_KUBE_CONTEXT}}"
      ns=$(yq -r '.spec.destination.namespace' "local/argo-apps/${sl}/${comp}.yaml" 2>/dev/null)
      { [ -z "$ns" ] || [ "$ns" = "null" ]; } && ns="$comp"
      $KC create namespace "$ns" --dry-run=client -o yaml | $KC apply -f - >/dev/null

      if [ -d "$fdir/manifests" ]; then
        $KC apply -f "$fdir/manifests" >/dev/null && echo "  ✓ Fixture-Manifeste angewendet"
      fi

      spec="$fdir/secrets.yaml"
      [ -f "$spec" ] || exit 0
      count=$(yq -r '.secrets | length' "$spec" 2>/dev/null)
      i=0
      while [ "$i" -lt "${count:-0}" ]; do
        name=$(yq -r ".secrets[$i].name" "$spec")
        cnpg=$(yq -r ".secrets[$i].fromCnpgApp // \"\"" "$spec")
        if $KC -n "$ns" get secret "$name" >/dev/null 2>&1; then
          echo "  ✓ Secret ${name} existiert (skip)"
        elif [ -n "$cnpg" ]; then
          echo "  → warte auf CNPG-Auto-Secret ${cnpg}-app …"
          for _ in $(seq 1 60); do $KC -n "$ns" get secret "${cnpg}-app" >/dev/null 2>&1 && break; sleep 2; done
          pw=$($KC -n "$ns" get secret "${cnpg}-app" -o jsonpath='{.data.password}' 2>/dev/null | base64 -d)
          if [ -n "$pw" ]; then
            $KC -n "$ns" create secret generic "$name" --from-literal=password="$pw" >/dev/null
            echo "  ✓ Secret ${name} (password aus ${cnpg}-app)"
          else
            echo "  ⚠ ${cnpg}-app (noch) nicht da — ${name} übersprungen"
          fi
        else
          args=""
          # literals: feste Dev-Werte (lokale Convenience, z. B. admin/admin — KEINE
          # echten Secrets; Werte dürfen keine Leerzeichen enthalten).
          for kv in $(yq -r ".secrets[$i].literals // {} | to_entries[] | .key + \"=\" + .value" "$spec" 2>/dev/null); do
            args="$args --from-literal=${kv}"
          done
          # generate: Zufallswerte pro Key. head liest /dev/urandom direkt (endlich)
          # → kein SIGPIPE; danach base64/tr/cut.
          for key in $(yq -r ".secrets[$i].generate[]?" "$spec"); do
            val=$(head -c 18 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9' | cut -c1-24)
            args="$args --from-literal=${key}=${val}"
          done
          $KC -n "$ns" create secret generic "$name" $args >/dev/null
          echo "  ✓ Secret ${name} (literals + generiert)"
        fi
        i=$((i+1))
      done

  local:remove:
    desc: 'Alle Argo-Apps eines Sub-Layers entfernen: task local:remove -- <sub-layer>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task local:remove -- <sub-layer>}"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd delete application \
        -l platform.devoba.de/sub-layer="$sub_layer",platform.devoba.de/local-test=true \
        --wait=true || true

  local:status:
    desc: 'Überblick: Cluster + Argo + Applications'
    cmd: |
      echo "=== Talos-Cluster ==="
      talosctl cluster show --name talos-platform-apps 2>/dev/null || echo "  (nicht da)"
      echo ""
      echo "=== Lokale Registry ==="
      docker ps --filter name=kind-registry --format 'table {{`{{.Names}}\t{{.Status}}\t{{.Ports}}`}}'
      echo ""
      echo "=== Argo-Status ==="
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get pods 2>/dev/null || echo "  (ArgoCD nicht installiert)"
      echo ""
      echo "=== Lokale Argo-Applications ==="
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n argocd get applications -l platform.devoba.de/local-test=true 2>/dev/null || true

  # --- Crossplane-Composition-Test (Pendant zum Argo/Helm-Loop) ---

  crossplane:render:
    desc: 'Composition OFFLINE rendern (composed Resources, ohne Cluster/Provisionierung): task crossplane:render'
    summary: |
      `crossplane render` fährt die Composition-Function-Pipeline lokal in Docker
      und zeigt die composed Resources (z. B. den opentofu-Workspace) — das
      Crossplane-Pendant zu `task render` (Helm). Schnell, kein Cluster, kein tofu.
      Default: XCluster-Composition + Test-XR. Override: XR=<file> COMP=<file>.
      functions.yaml-Versionen müssen zu sub-layers/lifecycle/.../providers passen.
    cmd: |
      xr="${XR:-local/crossplane/examples/xcluster-test.yaml}"
      comp="${COMP:-sub-layers/lifecycle/components/compositions/manifests/composition-xcluster.yaml}"
      crossplane render "$xr" "$comp" local/crossplane/functions.yaml

  crossplane:dev:
    desc: 'Skaffold-artiger Offline-Loop: rendert die Composition bei jedem Save neu'
    summary: |
      Beobachtet die Composition/XRD-Manifeste + local/crossplane/ und re-rendert
      bei jeder Änderung (offline, Docker-Functions). Strg-C beendet. Der schnelle
      Iterier-Loop für Composition-Logik — ohne Cluster, ohne Provisionierung.
    cmd: |
      echo "Initial-Render…"
      task crossplane:render || true
      echo ""
      echo "👀 Watching compositions/ + local/crossplane/ — Speichern → re-render. Strg-C beendet."
      watchexec --watch sub-layers/lifecycle/components/compositions/manifests \
        --watch local/crossplane --ignore '**/rendered/**' --debounce 500ms --postpone \
        -- task crossplane:render

  crossplane:apply:
    desc: 'XRD+Composition+Provider+Test-XR ins lokale Cluster; Reconcile bis zur Provider-Grenze'
    summary: |
      Deployt den lifecycle-Crossplane-Stack (crossplane, providers, compositions)
      ins lokale Talos-Cluster (via local:dev:sync) und appliert den Test-XR. Bis
      zur PROVIDER-GRENZE: XRD/Composition installiert, XCluster accepted, der
      opentofu-Workspace wird erzeugt — der echte tofu-apply schlägt lokal
      erwartbar fehl (keine Hardware/kein Backend). Testet die In-Cluster-Verdrahtung.
    cmd: |
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} get ns argocd >/dev/null 2>&1 || { echo "ERROR: Cluster/ArgoCD nicht da — erst 'task local:up'"; exit 1; }
      for c in lifecycle/crossplane lifecycle/providers lifecycle/compositions; do
        echo "→ ${c} deployen…"
        task local:dev:sync -- "$c"
      done
      echo "warte auf XCluster-CRD (Established)…"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} wait --for=condition=Established crd/xclusters.platform.devoba.de --timeout=120s || true
      # ClusterProviderConfig ZUERST (consumer-eigen, lokaler Dummy) — sonst kann
      # provider-opentofu sie beim Workspace-Reconcile nicht auflösen ("not found").
      echo "→ ClusterProviderConfig (lokaler Dummy) applien"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/crossplane/examples/clusterproviderconfig.yaml
      echo "→ Test-XR applien"
      kubectl --context {{.LOCAL_KUBE_CONTEXT}} apply -f local/crossplane/examples/xcluster-test.yaml
      echo ""
      echo "✓ Beobachten (tofu-apply scheitert lokal erwartbar — Provider-Grenze):"
      echo "  kubectl --context {{.LOCAL_KUBE_CONTEXT}} get xcluster xcluster-test"
      echo "  kubectl --context {{.LOCAL_KUBE_CONTEXT}} get workspace.opentofu.m.upbound.io"
      echo "  crossplane beta trace xcluster.platform.devoba.de/xcluster-test"

  local:harbor:proxy:
    desc: 'harbor Pull-Through-Proxy auf ghcr.io anlegen (z. B. für das Talos-Installer-Image): task local:harbor:proxy'
    summary: |
      Legt (idempotent) einen harbor Registry-Endpoint + ein Proxy-Cache-Project
      `ghcr` → https://ghcr.io an (ADR-0012 harbor-as-registry-proxy). Danach cacht
      harbor Pulls von ghcr.io beim ersten Zugriff, z. B.:
        harbor.localhost.direct/ghcr/siderolabs/installer:v1.13.3
      Voraussetzung: harbor läuft (task local:dev -- registry/harbor) + ist Healthy.
    cmd: |
      H="https://harbor.localhost.direct"
      pw=$(kubectl --context {{.LOCAL_KUBE_CONTEXT}} -n harbor get secret harbor-runtime-secret -o jsonpath='{.data.HARBOR_ADMIN_PASSWORD}' 2>/dev/null | base64 -d)
      [ -n "$pw" ] || { echo "ERROR: harbor-runtime-secret nicht da — erst harbor hochziehen (task local:dev -- registry/harbor)"; exit 1; }
      A="admin:${pw}"
      if [ "$(curl -sf -u "$A" "$H/api/v2.0/registries?name=ghcr" | jq 'length')" = "0" ]; then
        curl -sS -u "$A" -X POST "$H/api/v2.0/registries" -H 'Content-Type: application/json' \
          -d '{"name":"ghcr","type":"docker-registry","url":"https://ghcr.io","insecure":false}' >/dev/null
        echo "✓ Registry-Endpoint ghcr (→ https://ghcr.io) angelegt"
      else echo "✓ Registry-Endpoint ghcr existiert"; fi
      rid=$(curl -sf -u "$A" "$H/api/v2.0/registries?name=ghcr" | jq -r '.[0].id')
      if [ "$(curl -sf -u "$A" "$H/api/v2.0/projects?name=ghcr" | jq 'length')" = "0" ]; then
        curl -sS -u "$A" -X POST "$H/api/v2.0/projects" -H 'Content-Type: application/json' \
          -d "{\"project_name\":\"ghcr\",\"registry_id\":${rid},\"metadata\":{\"public\":\"true\"}}" >/dev/null
        echo "✓ Proxy-Project ghcr angelegt"
      else echo "✓ Proxy-Project ghcr existiert"; fi
      echo "✓ Talos-Installer via harbor: harbor.localhost.direct/ghcr/siderolabs/installer:<tag>"
      echo "  Test:  curl -su admin:<pw> https://harbor.localhost.direct/v2/ghcr/siderolabs/installer/manifests/v1.13.3"
