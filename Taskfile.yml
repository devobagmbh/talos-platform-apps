# Taskfile für talos-platform-apps
# https://taskfile.dev
#
# Konvention (siehe AGENTS.md § CI-Konventionen): Pipeline ist Task-Caller.
# GHA-Workflows rufen ausschließlich `task <name>`; alle Logik wohnt hier.

version: '3'

# Konvention: Tasks sind silent. Commands echoen sich nicht selbst —
# nur die Commands geben Output an die Konsole. Ausnahmen via `silent: false`
# explizit am Task.
silent: true

vars:
  SUB_LAYERS:
    sh: ls sub-layers/

tasks:
  default:
    desc: Liste verfügbare Targets
    cmd: task --list

  # --- Render ---

  render:
    desc: Rendert alle Sub-Layer in sub-layers/*/rendered/manifest.yaml
    cmds:
      - for: { var: SUB_LAYERS }
        task: render:one
        vars: { SUB_LAYER: '{{.ITEM}}' }

  render:one:
    desc: Rendert genau einen Sub-Layer
    summary: |
      Eingabe-Konvention pro Sub-Layer:
        helm/*.yaml     — YAML mit metadata.{chart,repo,version,namespace} + values
                          oder metadata.inline: true für Custom-Stubs
        manifests/*.yaml — Raw-Manifeste, werden 1:1 konkateniert
      Output: sub-layers/<name>/rendered/manifest.yaml
    vars:
      SUB_LAYER: '{{.SUB_LAYER | default .CLI_ARGS}}'
      ROOT: 'sub-layers/{{.SUB_LAYER}}'
      OUT: 'sub-layers/{{.SUB_LAYER}}/rendered/manifest.yaml'
    preconditions:
      - sh: test -d "{{.ROOT}}"
        msg: "Sub-Layer {{.SUB_LAYER}} existiert nicht ({{.ROOT}})"
    cmds:
      - mkdir -p "$(dirname {{.OUT}})"
      - ': > "{{.OUT}}"'
      - echo "=== Render Sub-Layer  {{.SUB_LAYER}} ==="
      - |
        shopt -s nullglob
        for vfile in {{.ROOT}}/helm/*.yaml; do
          name=$(basename "$vfile" .yaml)
          inline=$(yq -r '.metadata.inline // false' "$vfile")

          if [[ "$inline" == "true" ]]; then
            namespace=$(yq -r '.metadata.namespace // "default"' "$vfile")
            echo "  ↳ Inline-Stub  $name (ns=$namespace)"
            {
              echo "# Inline-Stub: $name (Sub-Layer: {{.SUB_LAYER}})"
              echo "# Custom-Manifeste folgen im Sub-Layer-Inhalt-Issue."
              echo "---"
              echo "apiVersion: v1"
              echo "kind: Namespace"
              echo "metadata:"
              echo "  name: $namespace"
              echo "  labels:"
              echo "    platform.devoba.de/sub-layer: {{.SUB_LAYER}}"
              echo "    platform.devoba.de/component: $name"
              echo "---"
            } >> "{{.OUT}}"
            continue
          fi

          chart=$(yq -r '.metadata.chart' "$vfile")
          repo=$(yq -r '.metadata.repo' "$vfile")
          version=$(yq -r '.metadata.version' "$vfile")
          namespace=$(yq -r '.metadata.namespace // "default"' "$vfile")

          echo "  ↳ Helm-Render   $name (chart=$chart version=$version)"
          vals_tmp=$(mktemp)
          yq '.values' "$vfile" > "$vals_tmp"
          helm template "$name" "$chart" \
            --repo "$repo" --version "$version" \
            --namespace "$namespace" \
            --values "$vals_tmp" >> "{{.OUT}}"
          echo "---" >> "{{.OUT}}"
          rm -f "$vals_tmp"
        done

        for mfile in {{.ROOT}}/manifests/*.yaml; do
          echo "  ↳ Raw-Manifest  $(basename "$mfile")"
          cat "$mfile" >> "{{.OUT}}"
          echo "---" >> "{{.OUT}}"
        done
      - echo "  → $(wc -l < {{.OUT}}) Zeilen geschrieben nach {{.OUT}}"

  # --- Lint ---

  lint:
    desc: YAML- und Markdown-Lint
    cmds:
      - yamllint -c .yamllint.yaml sub-layers/ Taskfile.yml .github/
      - markdownlint --config .markdownlint.yaml '**/*.md' --ignore .devbox --ignore .direnv

  lint:rendered:
    desc: kubeconform gegen alle rendered/-Manifeste
    cmd: |
      find sub-layers/*/rendered -name '*.yaml' -print0 2>/dev/null | \
        xargs -0 -r kubeconform -strict -ignore-missing-schemas -summary

  # --- Security-Scans (Issue #11.8) ---

  scan:
    desc: alle Security-Scans (trivy + conftest + optional snyk)
    cmds:
      - task: scan:trivy
      - task: scan:conftest
      - |
        if [[ -n "${SNYK_TOKEN:-}" ]]; then
          task scan:snyk
        else
          echo "SNYK_TOKEN nicht gesetzt — snyk skipped"
        fi

  scan:trivy:
    desc: Trivy-Scan über rendered/-Manifeste, SARIF-Output
    deps: [render]
    cmd: |
      trivy fs sub-layers/*/rendered/ \
        --format sarif \
        --output trivy-results.sarif

  scan:conftest:
    desc: Conftest-Policies aus policies/ gegen rendered/-Manifeste
    deps: [render]
    cmd: |
      files=$(find sub-layers -path '*/rendered/manifest.yaml' -size +0 -type f)
      if [ -z "$files" ]; then
        echo "Keine nicht-leeren rendered/manifest.yaml gefunden — nichts zu prüfen"
        exit 0
      fi
      echo "Conftest gegen $(echo "$files" | wc -l | tr -d ' ') Sub-Layer-Manifeste:"
      echo "$files" | sed 's/^/  - /'
      echo ""
      conftest test --policy policies/ --all-namespaces $files

  scan:conftest-verify:
    desc: Conftest-Policy-Selbsttests (testdata/-Korpus)
    cmd: conftest verify --policy policies/

  scan:snyk:
    desc: Snyk IaC-Scan (braucht SNYK_TOKEN)
    cmd: |
      snyk iac test sub-layers/ \
        --sarif-file-output=snyk-results.sarif

  # --- Publish-Targets ---

  push:
    desc: 'oras push eines Sub-Layers: task push -- <sub-layer> <tag>'
    summary: |
      Pusht sub-layers/<sub-layer>/rendered/manifest.yaml als signiertes
      OCI-Artefakt nach ghcr.io/devobagmbh/talos-platform-apps/<sub-layer>:<tag>.

      Voraussetzungen:
        - manifest.yaml gerendert (via task render:one -- <sub-layer>)
        - oras gegen ghcr authentifiziert
          (lokal: oras login ghcr.io -u <user> --password-stdin; in CI via GHA-Token)

      Beispiel: task push -- lifecycle v0.0.0-dev
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task push -- <sub-layer> <tag>}"
      tag="${2:?usage: task push -- <sub-layer> <tag>}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}:${tag}"
      manifest="sub-layers/${sub_layer}/rendered/manifest.yaml"
      test -s "$manifest" || { echo "ERROR: $manifest fehlt oder ist leer — vorher task render:one -- $sub_layer"; exit 1; }
      echo "Pushing $manifest → $ref"
      oras push "$ref" \
        --artifact-type application/vnd.devoba.platform-app.v1+yaml \
        "${manifest}:application/yaml"
      echo "✓ Pushed: $ref"

  sign:
    desc: 'cosign sign keyless: task sign -- <sub-layer> <tag>'
    summary: |
      Signiert das OCI-Artefakt unter <ref> via cosign keyless.

      In CI: GHA-OIDC-Token (permissions: id-token: write) →
        Fulcio-Cert → Rekor-Log-Eintrag → cosign-Signature im OCI-Tag.

      Lokal (selten): cosign sign verlangt interaktiven Browser-OIDC-Flow.
      Bei Phase 1 ausschließlich aus CI signiert; lokal nur für Tests
      mit COSIGN_EXPERIMENTAL=1.
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task sign -- <sub-layer> <tag>}"
      tag="${2:?usage: task sign -- <sub-layer> <tag>}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}:${tag}"
      echo "Signing $ref (keyless)"
      cosign sign --yes "$ref"
      echo "✓ Signed: $ref"

  attest:
    desc: 'SBOM + SLSA-Attestations (vertagt nach Phase 2 — ADR-0009 § Phase-1-Scope)'
    cmd: |
      echo "Vertagt nach Phase 2+ (ADR-0009 § Phase-1-Scope)."
      echo "SLSA-v1-Provenance + CycloneDX-SBOM werden aktiviert, sobald externe"
      echo "Konsumenten existieren oder Audit-Anforderung greift."

  publish:
    desc: 'render → push → sign: task publish -- <sub-layer> <tag>'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task publish -- <sub-layer> <tag>}"
      tag="${2:?usage: task publish -- <sub-layer> <tag>}"
      task render:one -- "$sub_layer"
      task push     -- "$sub_layer" "$tag"
      task sign     -- "$sub_layer" "$tag"
      echo "✓ Published $sub_layer:$tag"

  verify:
    desc: 'cosign verify gegen einen veröffentlichten OCI-Tag: task verify -- <sub-layer> <tag>'
    summary: |
      Verifiziert die cosign-Keyless-Signature. Erwartete Identity:
        https://github.com/devobagmbh/talos-platform-apps/.github/workflows/oci-publish.yml@refs/tags/<sub-layer>-<tag>
    vars:
      OCI_REGISTRY: '{{.OCI_REGISTRY | default "ghcr.io/devobagmbh/talos-platform-apps"}}'
    cmd: |
      set -- {{.CLI_ARGS}}
      sub_layer="${1:?usage: task verify -- <sub-layer> <tag>}"
      tag="${2:?usage: task verify -- <sub-layer> <tag>}"
      ref="{{.OCI_REGISTRY}}/${sub_layer}:${tag}"
      cosign verify "$ref" \
        --certificate-identity-regexp "^https://github\.com/devobagmbh/talos-platform-apps/\.github/workflows/oci-publish\.yml@refs/tags/${sub_layer}-.*$" \
        --certificate-oidc-issuer https://token.actions.githubusercontent.com

  # --- CI (lokal-äquivalent zur GHA-Pipeline) ---

  ci:
    desc: Lokale Reproduktion der GHA-Pipeline (lint + render + scan:conftest)
    cmds:
      - task: lint
      - task: render
      - task: lint:rendered
      - task: scan:conftest-verify
      - task: scan:conftest

  # --- Housekeeping ---

  clean:
    desc: rendered/-Output und Scan-Artefakte entfernen
    cmds:
      - rm -rf sub-layers/*/rendered
      - rm -f trivy-results.sarif snyk-results.sarif

  pre-commit-install:
    desc: pre-commit-Framework-Hooks installieren (.git/hooks/pre-commit)
    cmd: pre-commit install --install-hooks

  devbox-info:
    desc: Devbox-Tool-Versionen anzeigen
    cmd: devbox info
