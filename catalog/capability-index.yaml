# Capability index — the central capability catalog of talos-platform-apps.
#
# Model: talos-platform-docs ADR-0021 (capability-layer model).
#   Capability = stable interface · Tool = swappable implementation.
#   swap_class quantifies the swap cost:
#     drop-in           — same contract, no data migration
#     label-move        — swap = label move on the producer pod
#     data-migration    — swap requires data migration
#     rewrite-required  — tool-specific CRs must be rewritten
#     consumer-change   — consumer must adjust its reference
#
# Layer A of this three-layer model. Layer B (PNI network-trust) lives as a
# spec in talos-platform-base AGENTS §PNI + enforcement docs#65; Layer C
# (hardware features) stays in the base substrate.
#
# This registry holds the platform's complete Layer-A tool-capability set
# (30 of 36 base-index entries). NOT included and deliberately
# remaining in base: gitops-engine (argocd) + csr-approval (cert-approver)
# = substrate; internet-egress, controlplane-egress, gateway-backend,
# external-gateway-routes = Layer-B network primitive (not a tool-swap catalog).
# Implementations are partly apps components, partly consumer-/hardware-
# deployed — the DEFINITION lives centrally here, the tool is deployed by its
# respective owner. Transition note: until the base phase-3 ablation (step 3),
# talos-platform-base/docs/platform-capability-index.yaml stays the upstream source;
# after that this file is authoritative for Layer A.
#
# Schema + usage in compatibility.yaml: see catalog/README.md.

capabilities:
  # — Databases ———————————————————————————————————————————————
  - id: cnpg-postgres
    name: Managed-PostgreSQL (instanced)
    domain: databases
    instanced: true
    implementations:
      - {name: cloudnative-pg, status: active, swap_class: data-migration}
      - {name: stackgres, status: considered, swap_class: data-migration}
      - {name: zalando-pg, status: considered, swap_class: data-migration}

  # — Object store ————————————————————————————————————————————
  - id: s3-object
    name: S3-compatible object store (instanced)
    domain: storage-objects
    instanced: true
    implementations:
      - {name: garage, status: active, swap_class: drop-in}
      - {name: minio-operator, status: considered, swap_class: drop-in}
      - {name: external-s3, status: considered, swap_class: drop-in}

  # — Observability: Metrics ——————————————————————————————————
  - id: metrics-scrape
    name: Prometheus-Format-Metrics-Scrape
    domain: observability
    implementations:
      - {name: grafana-alloy, status: active, swap_class: drop-in}
      - {name: victoria-metrics-agent, status: considered, swap_class: drop-in}
  - id: metrics-storage
    name: Time-series store for metrics
    domain: observability
    implementations:
      - {name: mimir, status: active, swap_class: data-migration}
      - {name: victoria-metrics, status: considered, swap_class: data-migration}
      - {name: thanos, status: considered, swap_class: data-migration}
  - id: metrics-query
    name: PromQL-Query-Endpoint
    domain: observability
    implementations:
      - {name: mimir, status: active, swap_class: drop-in}
      - {name: thanos-query, status: considered, swap_class: drop-in}

  # — Observability: Logs —————————————————————————————————————
  - id: logs-collect
    name: Log-Collector
    domain: observability
    implementations:
      - {name: alloy, status: active, swap_class: label-move}
      - {name: fluent-bit, status: considered, swap_class: label-move}
      - {name: vector, status: considered, swap_class: label-move}
  - id: logs-storage
    name: Log store
    domain: observability
    implementations:
      - {name: loki, status: active, swap_class: data-migration}
      - {name: victoria-logs, status: considered, swap_class: data-migration}
  - id: logs-query
    name: Log-Query-Endpoint (LogQL)
    domain: observability
    implementations:
      - {name: loki, status: active, swap_class: drop-in}
      - {name: victoria-logs, status: considered, swap_class: drop-in}

  # — Observability: Events ———————————————————————————————————
  - id: events-collect
    name: Kubernetes Event collection
    domain: observability
    # Watches the cluster's Kubernetes Events (core/v1 Events) and forwards them to
    # a logs sink. A singleton by nature — exactly one collector watches the shared
    # Event stream, so a clustered/DaemonSet topology would double-ingest (issue #649:
    # observability/alloy-singleton is the Deployment/replicas-1 implementation).
    # swap_class consumer-change (NOT label-move): unlike logs-collect there is no
    # producer-pod label to move — Events are cluster API objects, not pod-labelled
    # logs — and under ADR-0024 Shape (b) the consumer supplies a tool-specific
    # collector config, so swapping the tool forces the consumer to rewrite that
    # config (mirrors ntp-service's chrony.conf rationale). No collector-owned data,
    # so not data-migration.
    implementations:
      - {name: alloy, status: active, swap_class: consumer-change}  # observability/alloy-singleton (#649); 'active' = chosen design, the component ships via #649
      - {name: otelcol, status: considered, swap_class: consumer-change}  # OpenTelemetry Collector k8sobjects receiver (watches Events)

  # — Observability: Traces ———————————————————————————————————
  - id: traces-collect
    name: Trace-Collector (OTLP)
    domain: observability
    implementations:
      - {name: alloy, status: active, swap_class: label-move}
      - {name: otelcol, status: considered, swap_class: label-move}
  - id: traces-storage
    name: Trace store
    domain: observability
    implementations:
      - {name: tempo, status: active, swap_class: data-migration}
      - {name: jaeger, status: considered, swap_class: data-migration}
  - id: traces-query
    name: Trace-Query-Endpoint
    domain: observability
    implementations:
      - {name: tempo, status: active, swap_class: drop-in}
      - {name: jaeger, status: considered, swap_class: drop-in}

  # — Observability: Dashboards + Alerting ————————————————————
  - id: dashboards
    name: Dashboard / visualization frontend
    domain: observability
    implementations:
      - {name: grafana, status: active, swap_class: label-move}
      - {name: perses, status: considered, swap_class: label-move}
  - id: alert-routing
    name: Alert-Routing / Notification
    domain: observability
    implementations:
      - {name: alertmanager, status: active, swap_class: drop-in}  # Alertmanager (#43): the chosen implementation, but NOT a catalog OCI artifact and (by design) NO components/alertmanager dir — the catalog ships the operator; the consumer instantiates an Alertmanager CR. 'active' = chosen design, not shippable-today.
      - {name: grafana-oncall, status: considered, swap_class: drop-in}

  # — Observability: Network ——————————————————————————————————
  - id: network-observability
    name: Network-Flow-Visibility (L3/L4/L7)
    domain: observability
    implementations:
      - {name: hubble, status: active, swap_class: drop-in}  # Cilium flow aggregation (relay) + UI
      - {name: retina, status: considered, swap_class: drop-in}

  # — Secrets / PKI ———————————————————————————————————————————
  - id: secret-sync
    name: External-secret sync into the cluster
    domain: secrets
    implementations:
      - {name: external-secrets, status: active, swap_class: rewrite-required}
      - {name: sealed-secrets, status: considered, swap_class: rewrite-required}
  - id: tls-issuance
    name: TLS certificate issuance
    domain: secrets
    implementations:
      - {name: cert-manager, status: active, swap_class: label-move}  # via ca-clusterissuer
      - {name: vault-pki, status: considered, swap_class: rewrite-required}

  # — Lifecycle ———————————————————————————————————————————————
  - id: cluster-provisioning
    name: Declarative cluster provisioning
    domain: lifecycle
    implementations:
      - {name: crossplane, status: active, swap_class: rewrite-required}  # + compositions (XCluster)

  # — Proposed: no base equivalent, contract still to be defined ——
  # These capabilities have no counterpart in the base index today. They are
  # needed so the remaining apps components become capability-first.
  # Status proposed = the contract (interface, provider/consumer semantics,
  # swap_class) is still to be defined, NOT guessed. One follow-up issue each.
  - id: oci-registry
    name: In-cluster OCI / container registry
    domain: registry
    status: proposed
    implementations:
      - {name: harbor, status: active, swap_class: rewrite-required}  # provisional; contract open
  - id: backup
    name: Cluster / volume backup
    domain: automation
    status: proposed
    implementations:
      - {name: velero, status: active, swap_class: rewrite-required}  # provisional; contract open
  - id: dependency-automation
    name: Dependency-Update-Automation
    domain: automation
    status: proposed
    # Satisfied by GitHub Dependabot (native, .github/dependabot.yml) — NOT a
    # self-hosted catalog component. renovate was removed (Robert, 2026-06-10).
    implementations: []
  - id: ci-runner
    name: Self-Hosted CI Runner (GitHub Actions)
    domain: automation
    status: proposed
    instanced: true  # consumer deploys scale-sets (multiple runner sets per cluster), like s3-object/cnpg-postgres
    # Network-isolated, ephemeral GitHub Actions self-hosted runners (issue #397).
    # Contract (interface, provider/consumer semantics, swap_class) still to be
    # defined — proposed, not guessed. Implemented by actions-runner-controller
    # (ARC, gha-runner-scale-set model); the catalog ships the controller + CRDs
    # (network isolation TBD by the component plan, #397 — mechanism unresolved); the
    # consumer deploys scale-sets.
    implementations:
      - {name: gha-runner-scale-set-controller, status: active, swap_class: rewrite-required}  # ARC; contract open
  - id: bare-metal-boot
    name: Bare-Metal-Boot / PXE
    domain: lifecycle
    status: proposed
    # ipxe (HTTP boot assets) and booter (proxyDHCP) are complementary halves of
    # the PXE path (Design B hybrid, ADR-0005), not swap alternatives for each
    # other — both are deployed together; `role` distinguishes them.
    implementations:
      - {name: ipxe, status: active, role: http-assets, swap_class: rewrite-required}  # provisional; contract open
      - {name: booter, status: active, role: proxydhcp, swap_class: rewrite-required}

  # ═══════════════════════════════════════════════════════════════════
  # Capabilities whose implementations are NOT deployed by apps,
  # but by consumer cluster repos or are hardware-dependent. The
  # DEFINITION (stable interface) lives here in the central catalog,
  # so consumers can choose from it; the tool itself is deployed by the consumer.
  # requires_hardware_features points to Layer C (talos-platform-base,
  # stays substrate). single_impl: true = base honestly marks
  # alt_impls_exist=false (one mature implementation, no real swap).
  # Migrated from talos-platform-base/docs/platform-capability-index.yaml.
  # NOT migrated (stay base): gitops-engine (argocd), csr-approval
  # (cert-approver) = substrate; internet-/controlplane-egress,
  # gateway-backend, external-gateway-routes = Layer-B network primitive.
  # ═══════════════════════════════════════════════════════════════════

  # — Compute (hardware-dependent) ————————————————————————————
  - id: gpu-runtime
    name: NVIDIA GPU scheduling + telemetry
    domain: compute
    single_impl: true   # NVIDIA-pinned; AMD/Intel would be sibling capabilities
    requires_hardware_features: [nvidia-gpu, iommu-enabled]   # Layer C (base)
    implementations:
      # nvidia-stack = nvidia-device-plugin + nvidia-dcgm-exporter. The capability
      # domain stays `compute` (logical axis). Component sub-layer (OCI/organizational
      # axis) is orthogonal per AGENTS.md: nvidia-device-plugin ships from
      # sub-layers/compute, while nvidia-dcgm-exporter ships from sub-layers/observability
      # (decision #16, issue #61 — it is a Prometheus exporter, CNCF "Monitoring").
      # This capability→implementation mapping is unaffected by that component-location split.
      - {name: nvidia-stack, status: active, swap_class: rewrite-required}
  - id: vm-runtime
    name: VM-Workload-Runtime
    domain: compute
    single_impl: true
    requires_hardware_features: [vt-x-or-amd-v, kvm-kernel-module]   # Layer C (base)
    implementations:
      - {name: kubevirt, status: active, swap_class: rewrite-required}  # kubevirt + kubevirt-cdi

  # — Block storage (hardware-dependent) —————————————————————
  - id: block-storage-replicated
    name: Cross-node replicated block storage
    domain: storage-block
    requires_hardware_features: [drbd-kernel-module]   # Layer C (base)
    implementations:
      - {name: piraeus-operator, status: active, swap_class: data-migration}
      - {name: rook-ceph, status: considered, swap_class: rewrite-required}
      - {name: longhorn, status: considered, swap_class: rewrite-required}
      - {name: openebs-mayastor, status: considered, swap_class: rewrite-required}
  - id: block-storage-local
    name: Node-local block storage
    domain: storage-block
    requires_hardware_features: [local-nvme-block-device]   # Layer C (base)
    implementations:
      - {name: local-path-provisioner, status: active, swap_class: data-migration}
      - {name: openebs-localpv, status: considered, swap_class: drop-in}
      - {name: topolvm, status: considered, swap_class: rewrite-required}
  - id: block-storage-network
    name: Network-attached block storage (external NAS/SAN via iSCSI)
    domain: storage-block
    # Durable block volumes provisioned as iSCSI LUNs on an EXTERNAL NAS/SAN, so the
    # data tier lives off-node and survives a node rebuild. A distinct axis from
    # block-storage-replicated (in-cluster, DRBD/distributed) and block-storage-local
    # (node-local disk). CNCF storage taxonomy: CSI block storage; the distinguishing
    # property here is the network-attached / external-array topology (landscape.cncf.io
    # cloud-native-storage — Ceph/Longhorn/Piraeus occupy the replicated axis).
    requires_hardware_features: [iscsi-initiator]   # Layer C: Talos iscsi-tools node extension (ADR-0026)
    implementations:
      # Swapping the backend array re-provisions LUNs and migrates data — PVs do not
      # transparently move between a TrueNAS and a Synology (hence data-migration).
      - {name: democratic-csi, status: active, swap_class: data-migration}   # ZFS/TrueNAS (+ Synology) over iSCSI
      - {name: synology-csi, status: active, swap_class: data-migration}      # Synology DSM iSCSI LUNs (ADR-0026)

  # — Network ——————————————————————————————————————————————————
  - id: secondary-network-attachment
    name: Secondary pod network interfaces
    domain: network
    single_impl: true   # Multus de-facto solo; alpha
    requires_hardware_features: [ebpf-capable-kernel]   # Layer C (base)
    implementations:
      - {name: multus-cni, status: active, swap_class: rewrite-required}
  - id: ntp-service
    name: In-Cluster NTP Time Service
    domain: network
    # NTP wire protocol (RFC 5905, 123/UDP) is the stable interface; chrony/ntpd/
    # openntpd are swappable implementations of it (a real capability, not a
    # sole-provider surface like node-exporter). NOT single_impl — genuine
    # alternatives exist. swap_class consumer-change: the freeze-line exposes a
    # tool-specific chrony.conf, so swapping the daemon forces the consumer to
    # rewrite that config (contrast s3-object's standard-API reference → drop-in).
    # First implementation: network/chrony (apps#485).
    implementations:
      - {name: chrony, status: active, swap_class: consumer-change}
      - {name: ntpd, status: considered, swap_class: consumer-change}
      - {name: openntpd, status: considered, swap_class: consumer-change}

  # — Data services (instanced) ———————————————————————————————
  - id: redis-managed
    name: Redis (managed)
    domain: databases
    instanced: true
    implementations:
      - {name: valkey-operator, status: active, swap_class: data-migration} # hyperspike/valkey-operator (Valkey, Redis-wire-compat); spotahome dead, Harbor migrates to Valkey (#83)
  - id: rabbitmq-managed
    name: RabbitMQ (managed)
    domain: messaging
    instanced: true
    single_impl: true
    implementations:
      - {name: rabbitmq-cluster-operator, status: candidate, swap_class: data-migration}
  - id: kafka-managed
    name: Apache Kafka (managed)
    domain: messaging
    instanced: true
    implementations:
      - {name: strimzi, status: considered, swap_class: data-migration}
      - {name: redpanda-operator, status: considered, swap_class: data-migration}

  # — Identity / Secrets ———————————————————————————————————————
  - id: identity-oidc
    name: OIDC-Identity-Provider
    domain: identity
    implementations:
      - {name: dex, status: active, swap_class: label-move}
      - {name: keycloak, status: considered, swap_class: label-move}
      - {name: authelia, status: considered, swap_class: label-move}
  - id: vault-secrets
    name: KV secret access (instanced)
    domain: secrets
    instanced: true
    implementations:
      - {name: vault-operator, status: active, swap_class: data-migration}  # + vault-config-operator
      - {name: openbao, status: considered, swap_class: drop-in}
      - {name: infisical, status: considered, swap_class: rewrite-required}
  - id: secret-config-declarative
    name: Declarative Vault configuration
    domain: secrets
    single_impl: true   # tightly coupled to vault-operator
    implementations:
      - {name: vault-config-operator, status: active, swap_class: rewrite-required}
  - id: hpa-metrics
    name: Resource-Metrics-API (HPA + kubectl top)
    domain: observability
    implementations:
      - {name: metrics-server, status: active, swap_class: drop-in}
      - {name: keda-metrics-adapter, status: considered, swap_class: drop-in}

  # — Security (Admission + Runtime) ——————————————————————————
  - id: admission-policy
    name: Admission-Policy-Engine
    domain: security
    implementations:
      - {name: kyverno, status: active, swap_class: rewrite-required}
      - {name: opa-gatekeeper, status: considered, swap_class: rewrite-required}
      - {name: native-vap, status: considered, swap_class: consumer-change}
  - id: runtime-security
    name: Runtime-Security-Observability (eBPF)
    domain: security
    implementations:
      - {name: tetragon, status: active, swap_class: rewrite-required}
      - {name: falco, status: considered, swap_class: rewrite-required}
  - id: namespace-tenancy
    name: Namespace-Multi-Tenancy / Tenant-Isolation
    domain: security
    # Stable interface: a Tenant object bundling multiple namespaces of one owner
    # under an aggregated ResourceQuota + owner-RBAC + admission guardrails. The
    # active implementation (capsule) reconciles capsule.clastix.io/Tenant CRs;
    # alternatives expose their own tenant CR surface, so a swap is rewrite-required
    # (consumer Tenant CRs must be re-authored against the new tool's schema).
    implementations:
      - {name: capsule, status: active, swap_class: rewrite-required}
      - {name: kiosk, status: considered, swap_class: rewrite-required}
      - {name: vcluster, status: considered, swap_class: rewrite-required}
      - {name: hierarchical-namespace-controller, status: considered, swap_class: rewrite-required}
