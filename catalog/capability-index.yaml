# Capability-Index — der zentrale Capability-Katalog von talos-platform-apps.
#
# Modell: talos-platform-docs ADR-0021 (Capability-Layer-Modell).
#   Capability = stabile Schnittstelle · Tool = austauschbare Implementierung.
#   swap_class quantifiziert die Austausch-Kosten:
#     drop-in           — gleicher Vertrag, kein Datenumzug
#     label-move        — Tausch = Label-Verschiebung am Producer-Pod
#     data-migration    — Tausch erfordert Datenumzug
#     rewrite-required  — tool-spezifische CRs müssen neu geschrieben werden
#     consumer-change   — Consumer muss seine Referenz anpassen
#
# Layer A dieses dreischichtigen Modells. Layer B (PNI Network-Trust) lebt als
# Spec in talos-platform-base AGENTS §PNI + Enforcement docs#65; Layer C
# (Hardware-Features) bleibt im base-Substrat.
#
# Diese Registry hält den vollständigen Layer-A-Tool-Capability-Satz der
# Plattform (30 von 36 base-Index-Einträgen). NICHT enthalten und bewusst
# in base verbleibend: gitops-engine (argocd) + csr-approval (cert-approver)
# = Substrat; internet-egress, controlplane-egress, gateway-backend,
# external-gateway-routes = Layer-B-network-primitive (kein Tool-Swap-Katalog).
# Implementierungen sind teils apps-Komponenten, teils consumer-/hardware-
# deployt — die DEFINITION lebt zentral hier, das Tool deployt der jeweilige
# Owner. Transitions-Hinweis: bis zur base-Phase-3-Ablation (Step 3) bleibt
# talos-platform-base/docs/platform-capability-index.yaml die Upstream-Quelle;
# danach ist diese Datei autoritativ für Layer A.
#
# Schema + Nutzung in compatibility.yaml: siehe catalog/README.md.

capabilities:
  # — Datenbanken —————————————————————————————————————————————
  - id: cnpg-postgres
    name: Managed-PostgreSQL (instanced)
    domain: databases
    instanced: true
    implementations:
      - {name: cloudnative-pg, status: active, swap_class: data-migration}
      - {name: stackgres, status: considered, swap_class: data-migration}
      - {name: zalando-pg, status: considered, swap_class: data-migration}

  # — Object-Store ————————————————————————————————————————————
  - id: s3-object
    name: S3-kompatibler Object-Store (instanced)
    domain: storage-objects
    instanced: true
    implementations:
      - {name: garage, status: active, swap_class: drop-in}
      - {name: minio-operator, status: considered, swap_class: drop-in}
      - {name: external-s3, status: considered, swap_class: drop-in}

  # — Observability: Metrics ——————————————————————————————————
  - id: metrics-scrape
    name: Prometheus-Format-Metrics-Scrape
    domain: observability
    implementations:
      - {name: grafana-alloy, status: active, swap_class: drop-in}
      - {name: victoria-metrics-agent, status: considered, swap_class: drop-in}
  - id: metrics-storage
    name: Zeitreihen-Speicher für Metrics
    domain: observability
    implementations:
      - {name: mimir, status: active, swap_class: data-migration}
      - {name: victoria-metrics, status: considered, swap_class: data-migration}
      - {name: thanos, status: considered, swap_class: data-migration}
  - id: metrics-query
    name: PromQL-Query-Endpoint
    domain: observability
    implementations:
      - {name: mimir, status: active, swap_class: drop-in}
      - {name: thanos-query, status: considered, swap_class: drop-in}

  # — Observability: Logs —————————————————————————————————————
  - id: logs-collect
    name: Log-Collector
    domain: observability
    implementations:
      - {name: alloy, status: active, swap_class: label-move}
      - {name: fluent-bit, status: considered, swap_class: label-move}
      - {name: vector, status: considered, swap_class: label-move}
  - id: logs-storage
    name: Log-Speicher
    domain: observability
    implementations:
      - {name: loki, status: active, swap_class: data-migration}
      - {name: victoria-logs, status: considered, swap_class: data-migration}
  - id: logs-query
    name: Log-Query-Endpoint (LogQL)
    domain: observability
    implementations:
      - {name: loki, status: active, swap_class: drop-in}
      - {name: victoria-logs, status: considered, swap_class: drop-in}

  # — Observability: Traces ———————————————————————————————————
  - id: traces-collect
    name: Trace-Collector (OTLP)
    domain: observability
    implementations:
      - {name: alloy, status: active, swap_class: label-move}
      - {name: otelcol, status: considered, swap_class: label-move}
  - id: traces-storage
    name: Trace-Speicher
    domain: observability
    implementations:
      - {name: tempo, status: active, swap_class: data-migration}
      - {name: jaeger, status: considered, swap_class: data-migration}
  - id: traces-query
    name: Trace-Query-Endpoint
    domain: observability
    implementations:
      - {name: tempo, status: active, swap_class: drop-in}
      - {name: jaeger, status: considered, swap_class: drop-in}

  # — Observability: Dashboards + Alerting ————————————————————
  - id: dashboards
    name: Dashboard-/Visualisierungs-Frontend
    domain: observability
    implementations:
      - {name: grafana, status: active, swap_class: label-move}
      - {name: perses, status: considered, swap_class: label-move}
  - id: alert-routing
    name: Alert-Routing / Notification
    domain: observability
    implementations:
      - {name: alertmanager, status: active, swap_class: drop-in}  # Alertmanager (#43): the chosen implementation, but NOT a catalog OCI artifact and (by design) NO components/alertmanager dir — the catalog ships the operator; the consumer instantiates an Alertmanager CR. 'active' = chosen design, not shippable-today.
      - {name: grafana-oncall, status: considered, swap_class: drop-in}

  # — Observability: Network ——————————————————————————————————
  - id: network-observability
    name: Network-Flow-Visibility (L3/L4/L7)
    domain: observability
    implementations:
      - {name: hubble, status: active, swap_class: drop-in}  # Cilium flow aggregation (relay) + UI
      - {name: retina, status: considered, swap_class: drop-in}

  # — Secrets / PKI ———————————————————————————————————————————
  - id: secret-sync
    name: External-Secret-Sync in den Cluster
    domain: secrets
    implementations:
      - {name: external-secrets, status: active, swap_class: rewrite-required}
      - {name: sealed-secrets, status: considered, swap_class: rewrite-required}
  - id: tls-issuance
    name: TLS-Zertifikats-Ausstellung
    domain: secrets
    implementations:
      - {name: cert-manager, status: active, swap_class: label-move}  # via ca-clusterissuer
      - {name: vault-pki, status: considered, swap_class: rewrite-required}

  # — Lifecycle ———————————————————————————————————————————————
  - id: cluster-provisioning
    name: Deklaratives Cluster-Provisioning
    domain: lifecycle
    implementations:
      - {name: crossplane, status: active, swap_class: rewrite-required}  # + compositions (XCluster)

  # — Proposed: kein base-Äquivalent, Vertrag noch zu definieren ——
  # Diese Capabilities haben heute kein Pendant im base-Index. Sie werden
  # benötigt, damit die übrigen apps-Komponenten capability-first werden.
  # Status proposed = Vertrag (Schnittstelle, Provider/Consumer-Semantik,
  # swap_class) ist noch zu definieren, NICHT erraten. Je ein Folge-Issue.
  - id: oci-registry
    name: In-Cluster-OCI-/Container-Registry
    domain: registry
    status: proposed
    implementations:
      - {name: harbor, status: active, swap_class: rewrite-required}  # vorläufig; Vertrag offen
  - id: backup
    name: Cluster-/Volume-Backup
    domain: automation
    status: proposed
    implementations:
      - {name: velero, status: active, swap_class: rewrite-required}  # vorläufig; Vertrag offen
  - id: dependency-automation
    name: Dependency-Update-Automation
    domain: automation
    status: proposed
    # Satisfied by GitHub Dependabot (native, .github/dependabot.yml) — NOT a
    # self-hosted catalog component. renovate was removed (Robert, 2026-06-10).
    implementations: []
  - id: ci-runner
    name: Self-Hosted CI Runner (GitHub Actions)
    domain: automation
    status: proposed
    # Network-isolated, ephemeral GitHub Actions self-hosted runners (issue #397).
    # Contract (interface, provider/consumer semantics, swap_class) still to be
    # defined — proposed, not guessed. Implemented by actions-runner-controller
    # (ARC, gha-runner-scale-set model); the catalog ships the controller + CRDs
    # + CiliumClusterwideNetworkPolicy isolation, the consumer deploys scale-sets.
    implementations:
      - {name: gha-runner-scale-set-controller, status: active, swap_class: rewrite-required}  # ARC; contract open
  - id: bare-metal-boot
    name: Bare-Metal-Boot / PXE
    domain: lifecycle
    status: proposed
    # ipxe (HTTP boot assets) and booter (proxyDHCP) are complementary halves of
    # the PXE path (Design B hybrid, ADR-0005), not swap alternatives for each
    # other — both are deployed together; `role` distinguishes them.
    implementations:
      - {name: ipxe, status: active, role: http-assets, swap_class: rewrite-required}  # vorläufig; Vertrag offen
      - {name: booter, status: active, role: proxydhcp, swap_class: rewrite-required}

  # ═══════════════════════════════════════════════════════════════════
  # Capabilities, deren Implementierungen NICHT von apps deployt werden,
  # sondern von Consumer-Cluster-Repos bzw. hardware-abhängig sind. Die
  # DEFINITION (stabile Schnittstelle) lebt hier im zentralen Katalog,
  # damit Consumer daraus wählen; das Tool selbst deployt der Consumer.
  # requires_hardware_features verweist auf Layer C (talos-platform-base,
  # bleibt Substrat). single_impl: true = base markiert ehrlich
  # alt_impls_exist=false (eine reife Implementierung, kein echter Swap).
  # Migriert aus talos-platform-base/docs/platform-capability-index.yaml.
  # NICHT migriert (bleiben base): gitops-engine (argocd), csr-approval
  # (cert-approver) = Substrat; internet-/controlplane-egress,
  # gateway-backend, external-gateway-routes = Layer-B-network-primitive.
  # ═══════════════════════════════════════════════════════════════════

  # — Compute (hardware-abhängig) —————————————————————————————
  - id: gpu-runtime
    name: NVIDIA-GPU-Scheduling + Telemetrie
    domain: compute
    single_impl: true   # NVIDIA-gepinnt; AMD/Intel wären Geschwister-Capabilities
    requires_hardware_features: [nvidia-gpu, iommu-enabled]   # Layer C (base)
    implementations:
      # nvidia-stack = nvidia-device-plugin + nvidia-dcgm-exporter. The capability
      # domain stays `compute` (logical axis). Component sub-layer (OCI/organizational
      # axis) is orthogonal per AGENTS.md: nvidia-device-plugin ships from
      # sub-layers/compute, while nvidia-dcgm-exporter ships from sub-layers/observability
      # (decision #16, issue #61 — it is a Prometheus exporter, CNCF "Monitoring").
      # This capability→implementation mapping is unaffected by that component-location split.
      - {name: nvidia-stack, status: active, swap_class: rewrite-required}
  - id: vm-runtime
    name: VM-Workload-Runtime
    domain: compute
    single_impl: true
    requires_hardware_features: [vt-x-or-amd-v, kvm-kernel-module]   # Layer C (base)
    implementations:
      - {name: kubevirt, status: active, swap_class: rewrite-required}  # kubevirt + kubevirt-cdi

  # — Block-Storage (hardware-abhängig) ——————————————————————
  - id: block-storage-replicated
    name: Knoten-übergreifend replizierter Block-Storage
    domain: storage-block
    requires_hardware_features: [drbd-kernel-module]   # Layer C (base)
    implementations:
      - {name: piraeus-operator, status: active, swap_class: data-migration}
      - {name: rook-ceph, status: considered, swap_class: rewrite-required}
      - {name: longhorn, status: considered, swap_class: rewrite-required}
      - {name: openebs-mayastor, status: considered, swap_class: rewrite-required}
  - id: block-storage-local
    name: Knoten-lokaler Block-Storage
    domain: storage-block
    requires_hardware_features: [local-nvme-block-device]   # Layer C (base)
    implementations:
      - {name: local-path-provisioner, status: active, swap_class: data-migration}
      - {name: openebs-localpv, status: considered, swap_class: drop-in}
      - {name: topolvm, status: considered, swap_class: rewrite-required}

  # — Netzwerk —————————————————————————————————————————————————
  - id: secondary-network-attachment
    name: Sekundäre Pod-Netzwerk-Interfaces
    domain: network
    single_impl: true   # Multus de-facto solo; alpha
    requires_hardware_features: [ebpf-capable-kernel]   # Layer C (base)
    implementations:
      - {name: multus-cni, status: active, swap_class: rewrite-required}

  # — Daten-Services (instanced) ——————————————————————————————
  - id: redis-managed
    name: Redis (managed)
    domain: databases
    instanced: true
    implementations:
      - {name: valkey-operator, status: active, swap_class: data-migration} # hyperspike/valkey-operator (Valkey, Redis-wire-compat); spotahome dead, Harbor migrates to Valkey (#83)
  - id: rabbitmq-managed
    name: RabbitMQ (managed)
    domain: messaging
    instanced: true
    single_impl: true
    implementations:
      - {name: rabbitmq-cluster-operator, status: candidate, swap_class: data-migration}
  - id: kafka-managed
    name: Apache Kafka (managed)
    domain: messaging
    instanced: true
    implementations:
      - {name: strimzi, status: considered, swap_class: data-migration}
      - {name: redpanda-operator, status: considered, swap_class: data-migration}

  # — Identität / Secrets ——————————————————————————————————————
  - id: identity-oidc
    name: OIDC-Identity-Provider
    domain: identity
    implementations:
      - {name: dex, status: active, swap_class: label-move}
      - {name: keycloak, status: considered, swap_class: label-move}
      - {name: authelia, status: considered, swap_class: label-move}
  - id: vault-secrets
    name: KV-Secret-Zugriff (instanced)
    domain: secrets
    instanced: true
    implementations:
      - {name: vault-operator, status: active, swap_class: data-migration}  # + vault-config-operator
      - {name: openbao, status: considered, swap_class: drop-in}
      - {name: infisical, status: considered, swap_class: rewrite-required}
  - id: secret-config-declarative
    name: Deklarative Vault-Konfiguration
    domain: secrets
    single_impl: true   # eng an vault-operator gekoppelt
    implementations:
      - {name: vault-config-operator, status: active, swap_class: rewrite-required}
  - id: hpa-metrics
    name: Resource-Metrics-API (HPA + kubectl top)
    domain: observability
    implementations:
      - {name: metrics-server, status: active, swap_class: drop-in}
      - {name: keda-metrics-adapter, status: considered, swap_class: drop-in}

  # — Security (Admission + Runtime) ——————————————————————————
  - id: admission-policy
    name: Admission-Policy-Engine
    domain: security
    implementations:
      - {name: kyverno, status: active, swap_class: rewrite-required}
      - {name: opa-gatekeeper, status: considered, swap_class: rewrite-required}
      - {name: native-vap, status: considered, swap_class: consumer-change}
  - id: runtime-security
    name: Runtime-Security-Observability (eBPF)
    domain: security
    implementations:
      - {name: tetragon, status: active, swap_class: rewrite-required}
      - {name: falco, status: considered, swap_class: rewrite-required}
