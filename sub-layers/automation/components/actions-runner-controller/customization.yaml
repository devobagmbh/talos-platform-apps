# Customization Contract v2 (ADR-0024). ARC controller workload (strict-B workload half,
# ADR-0028; the actions.github.com CRDs ship in actions-runner-controller-crds at wave -1,
# this controller at wave 0). The catalog ships ONLY the cluster-scoped controller +
# RBAC + its namespace. Everything tenant/GitHub-specific is consumer-owned and lives in
# the consumer's gha-runner-scale-set claim, NOT here:
#   - githubConfigUrl (org or repo), runner group
#   - the GitHub App registration secret (App id / installation id / private key) via SOPS→ESO/Vault
#   - minRunners / maxRunners, runner node-pool selection
#   - the runner-pod isolation NetworkPolicies (default-deny internal + egress allowlist),
#     which live in the consumer's runner namespace — see examples/runner-isolation.example.yaml
# The controller has no consumer config surface of its own, so every provided/required shape is empty.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (controller Deployment + RBAC + SA),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
