# Dedicated namespace for the ARC controller. PSA restricted — the gha-runner-scale-set
# -controller workload is hardened below (runAsNonRoot, seccompProfile RuntimeDefault,
# allowPrivilegeEscalation false, capabilities drop ALL, readOnlyRootFilesystem).
apiVersion: v1
kind: Namespace
metadata:
  name: arc-system
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
