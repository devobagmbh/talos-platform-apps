# Source: gha-runner-scale-set-controller/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arc-gha-rs-controller
  namespace: arc-system
  labels:
    helm.sh/chart: gha-rs-controller-0.14.2
    app.kubernetes.io/name: gha-rs-controller
    app.kubernetes.io/namespace: arc-system
    app.kubernetes.io/instance: arc
    app.kubernetes.io/version: "0.14.2"
    app.kubernetes.io/part-of: gha-rs-controller
    app.kubernetes.io/managed-by: Helm
    actions.github.com/controller-service-account-namespace: arc-system
    actions.github.com/controller-service-account-name: arc-gha-rs-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gha-rs-controller
      app.kubernetes.io/namespace: arc-system
      app.kubernetes.io/instance: arc
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: "manager"
      labels:
        app.kubernetes.io/part-of: gha-rs-controller
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/version: 0.14.2
        app.kubernetes.io/name: gha-rs-controller
        app.kubernetes.io/namespace: arc-system
        app.kubernetes.io/instance: arc
    spec:
      serviceAccountName: arc-gha-rs-controller
      containers:
      - name: manager
        image: "ghcr.io/actions/gha-runner-scale-set-controller:0.14.2"
        imagePullPolicy: IfNotPresent
        args:
        - "--auto-scaling-runner-set-only"
        - "--log-level=debug"
        - "--log-format=text"
        - "--runner-max-concurrent-reconciles=2"
        - "--update-strategy=immediate"
        - "--listener-metrics-addr=0"
        - "--listener-metrics-endpoint="
        - "--metrics-addr=0"
        command:
        - "/manager"
        env:
        - name: CONTROLLER_MANAGER_CONTAINER_IMAGE
          value: "ghcr.io/actions/gha-runner-scale-set-controller:0.14.2"
        - name: CONTROLLER_MANAGER_POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      terminationGracePeriodSeconds: 10
      volumes:
      - name: tmp
        emptyDir: {}
