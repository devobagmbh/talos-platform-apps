# ARC controller workload (strict-B workload half, ADR-0028) for
# automation/actions-runner-controller. Controller Deployment + RBAC + ServiceAccount
# that reconcile the actions.github.com CRs (AutoscalingRunnerSet / AutoscalingListener /
# EphemeralRunner / EphemeralRunnerSet). CRDs ship in actions-runner-controller-crds
# (sync-wave -1); this workload is sync-wave 0, rendered with --skip-crds. Pull-based: the
# controller/listener connect OUTBOUND to GitHub; no inbound route is required.
#
# Source chart: gha-runner-scale-set-controller 0.14.2 (appVersion 0.14.2),
#   oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller
# render:one uses `helm template --repo <https>` (no OCI) → VENDORED (not the render path),
# hardened for PSA restricted + resource requests/limits (memory limit only). Regenerate on
# a chart bump with the helm template command in README.md § Vendoring.
---
