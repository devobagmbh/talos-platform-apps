# Customization Contract v2 (ADR-0024) — Seeder pull-through-cache profile.
# The consumer supplies harbor-runtime-secret (via SOPS while Vault is not yet
# running) with two keys (Shape c).
freeze_line:
  workload: rendered/manifest.yaml # Harbor Deployment/Service/DB — never consumer-patched
provided_refs:
  env: harbor-runtime-config # Shape (a): the per-cluster external hostname (EXT_ENDPOINT)
  secret: harbor-runtime-secret # Shape (c)
provided_selectors: {}
required:
  env_keys: # Shape (a) — set in the harbor-runtime-config ConfigMap (harbor-core EXT_ENDPOINT)
    - EXTERNAL_URL # https://harbor.<cluster>… — Harbor's OIDC redirect + registry/UI base URL
  config_files: []
  secret_keys: # Shape (c) — keys in harbor-runtime-secret the consumer MUST supply
    - HARBOR_ADMIN_PASSWORD # Harbor admin login
    - secretKey # 16-char encryption key (DB at rest)
  selector_crs: []
sync_wave: "0"
external_dependencies: []
# externalURL → Shape (a) env (resolved, was the open v2 follow-up): the chart still
# bakes the placeholder https://REPLACE-ME.harbor.invalid into the harbor-core ConfigMap
# (EXT_ENDPOINT), but harbor-core now also carries an explicit env EXT_ENDPOINT
# valueFrom configMapKeyRef harbor-runtime-config/EXTERNAL_URL (optional:true). The
# explicit env overrides the baked envFrom value, so the consumer sets the real
# per-cluster hostname WITHOUT Kustomize-patching the signed workload (ADR-0024). With
# the ConfigMap absent the placeholder still applies (non-breaking), but OIDC redirects
# + the registry/UI base URL only work once the consumer provides EXTERNAL_URL.
#
# NOTE external backends (#84) — beyond harbor-runtime-secret above, the consumer
# wires the cnpg-postgres + redis-managed capabilities. The concrete CNPG `Cluster`
# (`harbor-pg` → service `harbor-pg-rw`) and `Valkey` CR (`harbor-cache:6379`) are
# consumer-owned (seeder repo). Two more consumer-supplied secrets, keys fixed by
# the goharbor chart:
#   - `harbor-db`    — key `password`        (DB; CNPG auto-creates `<cluster>-app`)
#   - `harbor-redis` — key `REDIS_PASSWORD`  (Redis; map from the Valkey secret)
# These are not in provided_refs (the schema models one ref); they are catalog
# capability edges (see compatibility.yaml requires) + documented in README.
#
# NOTE Dex/OIDC SSO (Day-2, opt-in) — Harbor binds to the cluster Dex via its
# native OIDC mode, but that is RUNTIME config (Harbor API `PUT /configurations`
# / UI), NOT a chart value: the signed workload is unchanged, so this is neither
# a config_file (Shape b) nor a hard secret_key here. When the consumer enables
# SSO it supplies one more secret (key fixed by the consumer's Day-2 tooling):
#   - `harbor-oidc` — key `OIDC_CLIENT_SECRET` (the static Dex client secret)
# plus the OIDC params (issuer/clientId/scope/groups-claim → ADR-0010). Parity
# with lifecycle/crossview's sso.oidc hook. Prereq: identity/dex (#52). See README
# § "Dex / OIDC SSO". SSO is OFF by default — DB auth (admin) is the catalog
# default, so this stays out of `required`.
