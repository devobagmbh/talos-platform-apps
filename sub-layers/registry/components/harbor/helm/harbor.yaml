# Harbor — container registry + pull-through cache (ADR-0012/0013).
# Render input for `task render:one -- registry/harbor`.
#
# Day-1 profile: pull-through cache, single-node. Storage PERSISTENT
# (ADR-0026) — Harbor state survives a node rebuild. Harbor keeps only its own
# PVCs (registry-blobs/jobLog/trivy); Postgres + Redis are EXTERNAL
# (CNPG + Valkey, #84), with no embedded harbor-database/harbor-redis.
#
# Consumer-side value layering (ADR-0023):
#   - admin password + global secretKey → existingSecret `harbor-runtime-secret`
#     (class B). The consumer supplies it via SOPS (Vault is not yet running).
#   - externalURL → placeholder; the consumer patches it via Kustomize
#     (class A, structural — Harbor bakes EXT_ENDPOINT into the core ConfigMap).
#   - DB/Redis connection → cnpg-postgres + redis-managed capabilities. The
#     concrete CNPG `Cluster` + `Valkey` CRs are consumer-owned; the
#     existingSecrets `harbor-db` (key password) + `harbor-redis` (key
#     REDIS_PASSWORD) are consumer-supplied (class B). See compatibility.yaml.
#   - internal service secrets (core/xsrf/jobservice/registry-http) are left to
#     Harbor to generate. A consumer may stabilize them via a SOPS/Vault existingSecret.

metadata:
  chart: harbor
  repo: https://helm.goharbor.io
  version: 1.19.1            # appVersion 2.15.1 — verify before tagging
  namespace: harbor

values:
  # --- Exposure: clusterIP (Gateway-API-only Hard Constraint, NO Ingress) ---
  # TLS terminates externally at the Cilium Gateway (cert-manager, own CA, ADR-0019);
  # plain HTTP inside Harbor.
  expose:
    type: clusterIP
    tls:
      enabled: false
    clusterIP:
      name: harbor
      ports:
        httpPort: 80

  # externalURL — PLACEHOLDER. The consumer patches it via Kustomize to the real
  # cluster URL (e.g. https://harbor.<cluster-domain>). Structural, not env.
  externalURL: https://REPLACE-ME.harbor.invalid

  # --- Storage: persistent (ADR-0026), so Harbor state survives a node rebuild.
  # storageClass unset → the consumer's default StorageClass applies. Only the
  # registry blobs + jobLog + trivy cache are Harbor's own PVCs now — Postgres
  # and Redis state live in CNPG / Valkey (external, below), NOT in Harbor PVCs. ---
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        size: 20Gi
      jobservice:
        jobLog:
          size: 1Gi
      trivy:
        size: 5Gi

  # --- External backends (capability-first, #84): Postgres via cnpg-postgres,
  # Redis via redis-managed (Valkey). Harbor no longer ships harbor-database /
  # harbor-redis StatefulSets. The concrete CNPG `Cluster` + `Valkey` CRs are
  # consumer-owned (consumer repo); this render only sets type=external + the
  # connection convention + the existing-secret contract (ADR-0023). ---
  database:
    type: external
    external:
      # Convention: a CNPG Cluster named `harbor-pg` in the harbor namespace →
      # its read-write service `harbor-pg-rw`. Consumer patches host via kustomize
      # if it names the cluster differently (ADR-0023 class A).
      host: harbor-pg-rw
      port: "5432"
      username: harbor
      coreDatabase: registry
      sslmode: require            # CNPG serves TLS by default
      # Consumer-supplied (class B). CNPG auto-creates `<cluster>-app` with a
      # `password` key — point existingSecret at it (or a SOPS runtime-secret).
      existingSecret: harbor-db
  redis:
    type: external
    external:
      # Convention: a Valkey CR `harbor-cache` → its service `harbor-cache:6379`.
      addr: harbor-cache:6379
      # ALL indices 0: the redis-managed capability (valkey-operator) runs Valkey in
      # CLUSTER mode, where Redis `SELECT <db>` is forbidden ("SELECT is not allowed
      # in cluster mode" → jobservice/registry/trivy crashloop). Harbor keys are
      # component-prefixed, so sharing DB 0 is safe and is the standard cluster-Redis
      # setup. (Separate indices only work against a standalone Redis.)
      coreDatabaseIndex: "0"
      jobserviceDatabaseIndex: "0"
      registryDatabaseIndex: "0"
      trivyAdapterIndex: "0"
      # Consumer-supplied (class B). Key MUST be `REDIS_PASSWORD` (goharbor chart
      # contract). Map it from the Valkey-operator secret in the consumer repo.
      existingSecret: harbor-redis

  # --- Secrets (ADR-0023 class B) ---
  # admin password: consumer supplies harbor-runtime-secret.HARBOR_ADMIN_PASSWORD
  existingSecretAdminPassword: harbor-runtime-secret
  existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
  # global 16-character encryption key: consumer supplies harbor-runtime-secret.secretKey
  existingSecretSecretKey: harbor-runtime-secret

  # --- Trivy scanner: enabled, but ephemeral (vuln DB reloads on restart) ---
  trivy:
    enabled: true

  # --- Lean single-node defaults ---
  portal:
    replicas: 1
  core:
    replicas: 1
  jobservice:
    replicas: 1
  registry:
    replicas: 1
