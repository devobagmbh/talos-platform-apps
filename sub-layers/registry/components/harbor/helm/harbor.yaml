# Harbor — Container-Registry + Pull-Through-Cache (ADR-0012/0013).
# Render-Input für `task render:one -- registry/harbor`.
#
# Tag-1-Profil: Seeder-Pull-Through-Cache, Single-Node. Storage PERSISTENT
# (ADR-0026) — Harbor-State überlebt einen Node-Rebuild. Harbor hält nur noch
# seine eigenen PVCs (registry-blobs/jobLog/trivy); Postgres + Redis sind
# EXTERN (CNPG + Valkey, #84), kein eingebettetes harbor-database/harbor-redis.
#
# Consumer-Side Value Layering (ADR-0023):
#   - admin-Passwort + globaler secretKey → existingSecret `harbor-runtime-secret`
#     (Klasse B). Der Konsument liefert es via SOPS (Vault läuft noch nicht).
#   - externalURL → Platzhalter; der Konsument patcht ihn via Kustomize
#     (Klasse A, strukturell — Harbor backt EXT_ENDPOINT in die core-ConfigMap).
#   - DB/Redis-Connection → cnpg-postgres + redis-managed capabilities. Die
#     konkreten CNPG-`Cluster`- + `Valkey`-CRs sind Konsumenten-eigen (seeder);
#     existingSecrets `harbor-db` (key password) + `harbor-redis` (key
#     REDIS_PASSWORD) liefert der Konsument (Klasse B). Siehe compatibility.yaml.
#   - interne Service-Secrets (core/xsrf/jobservice/registry-http) lässt Harbor
#     generieren. Der office-lab-Harbor stabilisiert sie via SOPS/Vault-existingSecret.

metadata:
  chart: harbor
  repo: https://helm.goharbor.io
  version: 1.19.1            # appVersion 2.15.1 — vor Tag verifizieren
  namespace: harbor

values:
  # --- Exposure: clusterIP (Gateway-API-only Hard-Constraint, KEIN Ingress) ---
  # TLS terminiert extern am Cilium-Gateway (cert-manager, eigene CA, ADR-0019);
  # Harbor-intern plain HTTP.
  expose:
    type: clusterIP
    tls:
      enabled: false
    clusterIP:
      name: harbor
      ports:
        httpPort: 80

  # externalURL — PLATZHALTER. Konsument patcht ihn via Kustomize auf die echte
  # Cluster-URL (z. B. https://harbor.seeder.devoba.de). Strukturell, kein env.
  externalURL: https://REPLACE-ME.harbor.invalid

  # --- Storage: persistent (ADR-0026), so Harbor state survives a node rebuild.
  # storageClass unset → the seeder default = synology-iscsi-storage. Only the
  # registry blobs + jobLog + trivy cache are Harbor's own PVCs now — Postgres
  # and Redis state live in CNPG / Valkey (external, below), NOT in Harbor PVCs. ---
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        size: 20Gi
      jobservice:
        jobLog:
          size: 1Gi
      trivy:
        size: 5Gi

  # --- External backends (capability-first, #84): Postgres via cnpg-postgres,
  # Redis via redis-managed (Valkey). Harbor no longer ships harbor-database /
  # harbor-redis StatefulSets. The concrete CNPG `Cluster` + `Valkey` CRs are
  # CONSUMER-owned (seeder repo); this render only sets type=external + the
  # connection convention + the existing-secret contract (ADR-0023). ---
  database:
    type: external
    external:
      # Convention: a CNPG Cluster named `harbor-pg` in the harbor namespace →
      # its read-write service `harbor-pg-rw`. Consumer patches host via kustomize
      # if it names the cluster differently (ADR-0023 class A).
      host: harbor-pg-rw
      port: "5432"
      username: harbor
      coreDatabase: registry
      sslmode: require            # CNPG serves TLS by default
      # Consumer-supplied (class B). CNPG auto-creates `<cluster>-app` with a
      # `password` key — point existingSecret at it (or a SOPS runtime-secret).
      existingSecret: harbor-db
  redis:
    type: external
    external:
      # Convention: a Valkey CR `harbor-cache` → its service `harbor-cache:6379`.
      addr: harbor-cache:6379
      # ALL indices 0: the redis-managed capability (valkey-operator) runs Valkey in
      # CLUSTER mode, where Redis `SELECT <db>` is forbidden ("SELECT is not allowed
      # in cluster mode" → jobservice/registry/trivy crashloop). Harbor keys are
      # component-prefixed, so sharing DB 0 is safe and is the standard cluster-Redis
      # setup. (Separate indices only work against a standalone Redis.)
      coreDatabaseIndex: "0"
      jobserviceDatabaseIndex: "0"
      registryDatabaseIndex: "0"
      trivyAdapterIndex: "0"
      # Consumer-supplied (class B). Key MUST be `REDIS_PASSWORD` (goharbor chart
      # contract). Map it from the Valkey-operator secret in the consumer repo.
      existingSecret: harbor-redis

  # --- Secrets (ADR-0023 Klasse B) ---
  # admin-Passwort: Konsument liefert harbor-runtime-secret.HARBOR_ADMIN_PASSWORD
  existingSecretAdminPassword: harbor-runtime-secret
  existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
  # globaler 16-Zeichen-Encryption-Key: Konsument liefert harbor-runtime-secret.secretKey
  existingSecretSecretKey: harbor-runtime-secret

  # --- Trivy-Scanner: an, aber ephemeral (vuln-DB lädt bei Restart neu) ---
  trivy:
    enabled: true

  # --- Schlanke Single-Node-Defaults ---
  portal:
    replicas: 1
  core:
    replicas: 1
  jobservice:
    replicas: 1
  registry:
    replicas: 1
