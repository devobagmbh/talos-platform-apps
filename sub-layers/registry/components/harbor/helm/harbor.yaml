# Harbor — container registry + pull-through cache (ADR-0012/0013).
# Render input for `task render:one -- registry/harbor`.
#
# Day-1 profile: pull-through cache, single-node. Storage PERSISTENT
# (ADR-0026) — Harbor state survives a node rebuild. Postgres + Redis are
# BUNDLED (Harbor's own harbor-database + harbor-redis StatefulSets, internal
# PVCs). Harbor is a single-consumer registry (the management/seeder cluster),
# so an embedded DB is the lean fit — no external CNPG/Valkey operators for a
# workload with one consumer. (External backends stay a possible future profile
# if a second, HA consumer ever appears; not built speculatively — YAGNI.)
#
# Consumer-side value layering (ADR-0023):
#   - admin password + global secretKey → existingSecret `harbor-runtime-secret`
#     (class B). The consumer supplies it via SOPS (Vault is not yet running).
#   - externalURL → placeholder; harbor-core takes EXT_ENDPOINT at RUNTIME from a
#     consumer ConfigMap `harbor-runtime-config` (key EXTERNAL_URL) — Shape (a)
#     env, see core.extraEnvVars below. No Kustomize patch of the signed workload.
#   - DB/Redis → BUNDLED (internal harbor-database + harbor-redis). Harbor
#     generates + owns their credentials; no consumer DB/Redis secret needed.
#   - internal service secrets (core/xsrf/jobservice/registry-http) are left to
#     Harbor to generate. A consumer may stabilize them via a SOPS/Vault existingSecret.

metadata:
  chart: harbor
  repo: https://helm.goharbor.io
  version: 1.19.1            # appVersion 2.15.1 — verify before tagging
  namespace: harbor

values:
  # --- Exposure: clusterIP (Gateway-API-only Hard Constraint, NO Ingress) ---
  # TLS terminates externally at the Cilium Gateway (cert-manager, own CA, ADR-0019);
  # plain HTTP inside Harbor.
  expose:
    type: clusterIP
    tls:
      enabled: false
    clusterIP:
      name: harbor
      ports:
        httpPort: 80

  # externalURL — PLACEHOLDER. The consumer patches it via Kustomize to the real
  # cluster URL (e.g. https://harbor.<cluster-domain>). Structural, not env.
  externalURL: https://REPLACE-ME.harbor.invalid

  # --- Storage: persistent (ADR-0026), so Harbor state survives a node rebuild.
  # storageClass unset → the consumer's default StorageClass applies. Registry
  # blobs + jobLog + trivy cache AND the bundled Postgres + Redis are all Harbor's
  # own PVCs. ---
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        size: 20Gi
      jobservice:
        jobLog:
          size: 1Gi
      database:
        size: 8Gi
      redis:
        size: 1Gi
      trivy:
        size: 5Gi

  # --- Bundled backends: Harbor ships its own harbor-database (Postgres) +
  # harbor-redis StatefulSets (type: internal). Harbor generates + owns their
  # credentials — no consumer-supplied DB/Redis secret. This is the lean fit for
  # a single-consumer registry; external CNPG/Valkey would add stateful operators
  # for no gain here (see the header note). Persistence sizes are set above. ---
  database:
    type: internal
  redis:
    type: internal

  # --- Secrets (ADR-0023 class B) ---
  # admin password: consumer supplies harbor-runtime-secret.HARBOR_ADMIN_PASSWORD
  existingSecretAdminPassword: harbor-runtime-secret
  existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
  # global 16-character encryption key: consumer supplies harbor-runtime-secret.secretKey
  existingSecretSecretKey: harbor-runtime-secret

  # --- Trivy scanner: enabled, but ephemeral (vuln DB reloads on restart) ---
  trivy:
    enabled: true

  # --- Lean single-node defaults ---
  portal:
    replicas: 1
  core:
    replicas: 1
    # externalURL (rendered into harbor-core's EXT_ENDPOINT) is consumer-owned per
    # ADR-0023 (Class A / Shape a). Harbor builds the OIDC redirect + registry/UI base
    # URL from it, so the per-cluster hostname MUST be set by the consumer. A
    # pre-rendered component can't be Helm-valued or Kustomize-patched at consume time
    # (ADR-0024), so resolve it at RUNTIME: take EXT_ENDPOINT from a consumer-provided
    # ConfigMap `harbor-runtime-config` (key EXTERNAL_URL). As an explicit env it wins
    # over the chart's baked envFrom value. optional:true → if the consumer omits the
    # ConfigMap the baked `externalURL` placeholder still applies (non-breaking), but
    # OIDC/redirects only work once the consumer sets EXTERNAL_URL.
    extraEnvVars:
      - name: EXT_ENDPOINT
        valueFrom:
          configMapKeyRef:
            name: harbor-runtime-config
            key: EXTERNAL_URL
            optional: true
  jobservice:
    replicas: 1
  registry:
    replicas: 1
