requires: {}
  # Bundled backends (reverts #84 external CNPG/Valkey): Harbor ships its own
  # harbor-database (Postgres) + harbor-redis StatefulSets on internal PVCs — the
  # lean fit for a single-consumer registry, no external DB/cache capability
  # required. Registry blobs stay on the consumer default StorageClass (ADR-0026).
provides:
  - name: harbor
    version:
      sot: app        # Harbor app-version (appVersion) — the running workload (#226 A6)
      app: v2.15.1    # Harbor appVersion (chart harbor 1.19.1) — render-parity-verified
      chart: 1.19.1   # harbor Helm chart — packaging axis (A5, orthogonal to appVersion)
    api_surface: []   # Harbor exposes no CRD/API surface (registry HTTP API is not a catalog API) (formerly apis[])
    capabilities: [] # TODO: define the oci-registry capability (proposed, contract open)
