# The component's own namespace. chrony is the sole occupant (dedicated
# namespace, sole-claimant rule), so this component ships the Namespace object — a
# shipped manifest takes precedence over Argo `managedNamespaceMetadata`, making
# the PSA posture authoritative and self-contained (see the build skill's
# CONVENTIONS.md § Namespace & PSA).
#
# enforce: restricted — DERIVED from the rendered Deployment pod template, NOT
# copied from a template. The workload meets every PSA Restricted control:
# runAsNonRoot, seccompProfile RuntimeDefault (pod + container),
# allowPrivilegeEscalation false, readOnlyRootFilesystem, and it drops ALL
# capabilities. Restricted PERMITS the single capability it re-adds —
# NET_BIND_SERVICE is the one member of the Restricted-allowed capability set
# (the non-root privileged-port bind for 123/UDP) — so restricted is the
# strictest level the workload provably satisfies. The workload uses NO
# host namespaces (no hostNetwork/hostPID/hostIPC), no hostPath, no host
# port, and no privileged container.
#
# The consumer adds the PNI labels and the pod-security.kubernetes.io/enforce-
# version pin (its cluster minor) in its Argo overlay; the catalog ships neither
# (they are consumer-composition concerns). See the README §Consumer obligations.
apiVersion: v1
kind: Namespace
metadata:
  name: chrony
  labels:
    pod-security.kubernetes.io/enforce: restricted
    platform.devoba.de/sub-layer: network
    platform.devoba.de/component: chrony
