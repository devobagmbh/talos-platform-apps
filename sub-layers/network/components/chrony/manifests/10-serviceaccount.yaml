# Dedicated ServiceAccount for the chrony pod. chrony needs NO Kubernetes API
# access, so no Role/RoleBinding is shipped — the account exists only to give the
# pod a distinct, non-default identity. automountServiceAccountToken is disabled
# because the workload never talks to the API server.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chrony
  namespace: chrony
  labels:
    app.kubernetes.io/name: chrony
    app.kubernetes.io/component: ntp-server
    platform.devoba.de/sub-layer: network
    platform.devoba.de/component: chrony
automountServiceAccountToken: false
