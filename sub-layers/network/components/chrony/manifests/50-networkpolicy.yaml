# Egress-only NetworkPolicy — the kernel-level backstop for the catalog-owned
# traffic. It allows exactly the egress the server needs to reach its upstream
# time source (DNS to resolve the pool, then NTP to the resolved peers) and denies
# all other egress by omission (an egress NetworkPolicy selecting the pod switches
# it to default-deny egress, so only the rules below are permitted).
#
# NO ingress NetworkPolicy is shipped: the set of client subnets allowed to reach
# 123/UDP is cluster-specific (same category as the chrony.conf access grant and
# the Service LB IP) and is delivered by the consumer as an Argo overlay alongside
# those values. See the README §Consumer obligations.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chrony-egress
  namespace: chrony
  labels:
    app.kubernetes.io/name: chrony
    app.kubernetes.io/component: ntp-server
    platform.devoba.de/sub-layer: network
    platform.devoba.de/component: chrony
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: chrony
  policyTypes:
    - Egress
  egress:
    # DNS — resolve pool.ntp.org (and any consumer-configured upstream name).
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Upstream NTP — pool.ntp.org resolves to many peers across providers, so the
    # destination is left open; tightening to a specific local time source is a
    # consumer overlay.
    - to: []
      ports:
        - port: 123
          protocol: UDP
