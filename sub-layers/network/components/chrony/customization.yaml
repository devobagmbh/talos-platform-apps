# Customization Contract v2 (ADR-0024). chrony is NOT cluster-agnostic: the
# workload (Deployment/Service/ConfigMap/ServiceAccount/NetworkPolicy/Namespace)
# is the signed, catalog-owned artifact, but the chrony.conf content is
# consumer-owned. The consumer supplies a chrony.conf carrying cluster-specific
# client-subnet access grants (and optionally a preferred upstream source) via the
# `config` shape below; the catalog ships an inert default (no access grant, so no
# open reflector). The LoadBalancer IP is a Service annotation applied by the
# consumer overlay — a manifest annotation, not a referenced config object, so it
# is not a freeze-line config_files entry.
freeze_line:
  workload: rendered/manifest.yaml  # Deployment/Service/ConfigMap/SA/NetworkPolicy/Namespace — never consumer-patched
provided_refs:
  config: chrony-config  # ConfigMap the workload mounts at /etc/chrony.conf; consumer overrides its content
provided_selectors: {}  # no operator-assembled CRs
required:
  env_keys: []
  config_files:
    # The consumer authors chrony.conf with cluster-specific access grants; the
    # workload mounts it at /etc/chrony.conf from the chrony-config ConfigMap.
    - path: /etc/chrony.conf
      ref: chrony-config
      key: chrony.conf
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
