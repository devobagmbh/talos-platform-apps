# Customization Contract v2 (ADR-0024). Strict-B WORKLOAD artifact (ADR-0028):
# the rendered workload is the thin Multus controller DaemonSet + RBAC, landing in
# the substrate-managed kube-system namespace. Multus is a cluster-agnostic node
# daemon — it reads no consumer env, mounts no consumer config file, needs no
# secret, and assembles no operator CRs — so every provided/required shape is
# empty. The controller lands at sync-wave 0, after the CRD half
# (network/multus-cni-crds, wave -1).
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (DaemonSet + RBAC),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies:
  - network/multus-cni-crds
