apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-multus-ds
  namespace: kube-system
  labels:
    tier: node
    app: multus
    name: multus
spec:
  selector:
    matchLabels:
      name: multus
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        tier: node
        app: multus
        name: multus
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      serviceAccountName: multus
      initContainers:
        # Copy the thin Multus binary to /opt/cni/bin on the host.
        - name: install-multus-binary
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.2.4
          command: ["/install_multus"]
          args:
            - "--type"
            - "thin"
          resources:
            requests:
              cpu: 10m
              memory: 15Mi
            limits:
              cpu: 100m
              memory: 100Mi
          securityContext:
            privileged: true
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin
              mountPropagation: Bidirectional
        # Install macvlan/ipvlan — not bundled in Talos v1.8+.
        # Downloads from containernetworking/plugins upstream release.
        # Idempotent: a single $plugins list drives the guard, the tar
        # extraction args, and the echo, so they can never drift apart;
        # downloads only when any of the five plugins is missing on host.
        - name: install-cni-plugins
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - |
              # Idempotent: download only if any of the five plugins is missing.
              # Single source for the plugin set — the guard, the tar args, and the
              # echo all derive from $plugins, so they can never drift apart.
              plugins="macvlan ipvlan tuning static bridge"
              missing=
              for p in $plugins; do
                [ -f "/host/opt/cni/bin/$p" ] || missing=1
              done
              if [ -n "$missing" ]; then
                ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
                set --
                for p in $plugins; do set -- "$@" "./$p"; done
                wget -qO- "https://github.com/containernetworking/plugins/releases/download/v1.9.1/cni-plugins-linux-${ARCH}-v1.9.1.tgz" \
                  | tar xzf - -C /host/opt/cni/bin "$@"
                echo "Installed $plugins to /opt/cni/bin"
              else
                echo "All CNI plugins ($plugins) already present, skipping"
              fi
          resources:
            requests:
              cpu: 10m
              memory: 15Mi
            limits:
              cpu: 100m
              memory: 150Mi
          securityContext:
            privileged: true
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - name: cnibin
              mountPath: /host/opt/cni/bin
              mountPropagation: Bidirectional
      containers:
        - name: kube-multus
          image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.2.4
          command: ["/thin_entrypoint"]
          args:
            - "--multus-conf-file=auto"
            - "--multus-autoconfig-dir=/host/etc/cni/net.d"
            - "--cni-conf-dir=/host/etc/cni/net.d"
          resources:
            requests:
              cpu: 100m
              memory: 50Mi
            limits:
              cpu: 100m
              memory: 150Mi
          securityContext:
            privileged: true
          terminationMessagePolicy: FallbackToLogsOnError
          volumeMounts:
            - name: cni
              mountPath: /host/etc/cni/net.d
            - name: cnibin
              mountPath: /host/opt/cni/bin
      terminationGracePeriodSeconds: 10
      volumes:
        - name: cni
          hostPath:
            path: /etc/cni/net.d
        - name: cnibin
          hostPath:
            path: /opt/cni/bin
