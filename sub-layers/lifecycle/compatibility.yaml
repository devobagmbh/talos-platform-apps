# Sub-layer aggregate (components have their own compatibility.yaml).
# Directory bracket for the sub-layer identity; OCI granularity is
# per component (ADR-0009).

components:
  - crossplane    # CRD-Bootstrap (sync-wave 0)
  - ipxe          # parallel to crossplane (sync-wave 0)
  - booter        # proxyDHCP, complements ipxe (sync-wave 0)
  - providers     # needs crossplane (sync-wave 10)
  - compositions  # needs providers (sync-wave 20)
  - crossview     # Dashboard, reads Crossplane CRs (sync-wave 30)
