# Crossview — Crossplane resource-visualization dashboard (crossplane-contrib).
# Layer-2 default values for talos-platform-apps. Cluster-specific bits (the
# public host / CORS origin, Dex OIDC wiring, the admin/db/session secrets) are
# consumer-owned (Layer 3, ADR-0024 Shapes b/c) — see customization.yaml.

metadata:
  chart: crossview
  repo: https://crossplane-contrib.github.io/crossview
  version: 4.4.0  # latest stable (gh-pages index, 2026-05-19); appVersion v4.4.0
  # >>> VERIFY the current chart at push (`helm search repo crossview`).
  namespace: crossview

values:
  # Gateway-API at the consumer (base Hard-Constraint: no Ingress) → ClusterIP,
  # ingress off. The consumer fronts it with an HTTPRoute on the Cilium Gateway.
  service:
    type: ClusterIP
  ingress:
    enabled: false

  # Consumer OIDC/CORS override path (ADR-0024 Shape b/c) — WITHOUT patching the
  # signed workload. The chart bakes OIDC_*/CORS_ORIGIN as explicit env from the
  # rendered `<release>-config` ConfigMap (cluster-agnostic localhost defaults, SSO
  # off). These `app.extraEnv` entries are rendered LAST, so a consumer that creates
  # the `crossview-oidc-config` ConfigMap (+ the runtime-secret OIDC key) overrides
  # them (k8s: last duplicate env wins). Each ref is `optional: true`, so when the
  # consumer supplies nothing (the SSO-off default) the kubelet SKIPS the ref and the
  # baked default stands — no breakage, byte-stable render. The consumer enables Dex
  # SSO purely additively (ConfigMap + Secret key), see README + customization.yaml.
  app:
    extraEnv:
      - name: OIDC_ENABLED
        valueFrom:
          configMapKeyRef: { name: crossview-oidc-config, key: OIDC_ENABLED, optional: true }
      - name: OIDC_ISSUER
        valueFrom:
          configMapKeyRef: { name: crossview-oidc-config, key: OIDC_ISSUER, optional: true }
      - name: OIDC_CLIENT_ID
        valueFrom:
          configMapKeyRef: { name: crossview-oidc-config, key: OIDC_CLIENT_ID, optional: true }
      - name: OIDC_CALLBACK_URL
        valueFrom:
          configMapKeyRef: { name: crossview-oidc-config, key: OIDC_CALLBACK_URL, optional: true }
      - name: CORS_ORIGIN   # public root URL; else post-login redirect goes to localhost
        valueFrom:
          configMapKeyRef: { name: crossview-oidc-config, key: CORS_ORIGIN, optional: true }
      - name: OIDC_CLIENT_SECRET   # Shape c — same value as the Dex client secret
        valueFrom:
          secretKeyRef: { name: crossview-runtime-secret, key: oidc-client-secret, optional: true }

  # External Postgres via the cnpg-postgres capability (#85). The chart's bundled
  # Postgres is OFF — `database.enabled=false` drops the crossview-postgres
  # Deployment + PVC. The DB lifecycle is owned by a consumer CNPG `Cluster`
  # (`crossview-pg` → service `crossview-pg-rw`), NOT by this workload.
  database:
    enabled: false

  config:
    # Connection config the app uses to reach the external CNPG DB. Convention:
    # a CNPG Cluster named `crossview-pg` in the crossview namespace → its
    # read-write service `crossview-pg-rw`. Consumer patches host via kustomize
    # if it names the cluster differently (ADR-0024 Shape b).
    database:
      enabled: true
      host: crossview-pg-rw
      port: 5432
      database: crossview
      username: crossview
      ssl:
        mode: require   # CNPG serves TLS by default
    server:
      auth:
        # Read-only dashboard by default; crossview reads Crossplane resources
        # cluster-wide via the chart-shipped RBAC (read ClusterRole + SA).
        defaultRole: viewer
    # SSO is cluster-specific (Dex issuer/clientId/callbackURL, ADR-0010) →
    # consumer-owned (ADR-0024 Shape b config + Shape c OIDCClientSecret). Stays
    # OFF + cluster-agnostic here; the consumer enables Dex additively via the
    # `crossview-oidc-config` ConfigMap + the `oidc-client-secret` runtime-secret key
    # (the app.extraEnv override block above), NOT by patching the signed workload.
    sso:
      oidc:
        enabled: false

  # Secrets (ADR-0024 Shape c): the render references EXISTING Secrets by name —
  # it ships NO credential value (base Hard-Constraint: no real secrets in the
  # catalog). The consumer creates them in the destination namespace before sync.
  # The workload stays payload-agnostic + signed; only the named refs are frozen.
  #   - admin/session → `crossview-runtime-secret` (SOPS-supplied).
  #   - DB password → `crossview-db` key `password`. With CNPG the consumer
  #     points this at the auto-created `<cluster>-app` secret (key `password`),
  #     so the embedded `db-password` runtime key is GONE (#85).
  # OIDCClientSecret is added the same way once the consumer enables Dex SSO.
  secrets:
    adminPassword:
      secretKeyRef:
        name: crossview-runtime-secret
        key: admin-password
    dbPassword:
      secretKeyRef:
        name: crossview-db
        key: password
    sessionSecret:
      secretKeyRef:
        name: crossview-runtime-secret
        key: session-secret
