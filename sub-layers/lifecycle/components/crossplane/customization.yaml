# Customization Contract v2 (ADR-0024). The Crossplane operator is cluster-agnostic
# — the workload carries no cluster identity. ProviderConfigs (carrying cluster
# identity) are supplied separately by the consumer repo
# (talos-seeder-cluster/crossplane/providerconfigs/), so this component provides
# no refs/selectors and requires nothing.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (operator Deployment/RBAC/CRDs),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
