# Crossplane operator — Layer-2 default values for talos-platform-apps.
#
# Cluster-specific bits (replicas, resource-limit tuning, provider package
# pinning) live in the consumer repo (talos-seeder-cluster, Layer 3).
# This file is the Helm-values default for the module catalog.

metadata:
  chart: crossplane
  repo: https://charts.crossplane.io/stable
  version: 2.3.1  # Crossplane v2 (namespaced XRs — XRD apiextensions.crossplane.io/v2,
  # scope: Namespaced; no claims). Vendored at vendor/crossplane-2.3.1.tgz —
  # charts.crossplane.io 403s CI runner IPs, so render:one prefers the local archive.
  # Bump: helm pull crossplane --repo https://charts.crossplane.io/stable --version <v> -d vendor/ && remove the old .tgz
  namespace: crossplane-system

values:
  replicas: 1

  # Metrics endpoint for Prometheus
  metrics:
    enabled: true

  # Resources — deliberately conservative; the consumer repo can raise them
  resourcesCrossplane:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # RBAC manager stays enabled for Composition authoring
  rbacManager:
    deploy: true
    replicas: 1

  # Package cache — important for air-gap / seeder Harbor pull-through
  packageCache:
    medium: ""
    sizeLimit: 5Gi

  # No extra args on v2: composition revisions are always-on (the v1
  # --enable-composition-revisions flag is removed and would crash the pod, like
  # --enable-environment-configs did). >>> VERIFY the v2 chart values surface
  # (rbacManager/resourcesCrossplane/packageCache key names may differ on v2).

  # Proactive reconcile interval (default: 1 min)
  pollInterval: 1m
