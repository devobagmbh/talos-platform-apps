# Crossplane-Operator — Layer-2-Default-Values für talos-platform-apps.
#
# Cluster-spezifisches (Replicas, Resource-Limits-Tuning, Provider-Pakete-
# Pinning) lebt im Konsumenten-Repo (talos-seeder-cluster, Layer 3).
# Diese Datei ist Helm-Values-Default für den Modulkatalog.

metadata:
  chart: crossplane
  repo: https://charts.crossplane.io/stable
  version: 1.18.0  # vendored at vendor/crossplane-1.18.0.tgz — charts.crossplane.io 403s CI runner IPs (render:one prefers the local archive). Bump: helm pull crossplane --repo https://charts.crossplane.io/stable --version <v> -d vendor/ && remove the old .tgz
  namespace: crossplane-system

values:
  replicas: 1

  # Metrics-Endpoint für Prometheus
  metrics:
    enabled: true

  # Ressourcen — bewusst konservativ; Konsumenten-Repo kann erhöhen
  resourcesCrossplane:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # RBAC-Manager bleibt enabled für Composition-Authoring
  rbacManager:
    deploy: true
    replicas: 1

  # Provider-Cache — wichtig für Air-Gap / Seeder-Harbor-Pull-Through
  packageCache:
    medium: ""
    sizeLimit: 5Gi

  # Composition-Revisions sind essentiell für GitOps-Reconciliation.
  # EnvironmentConfigs wandern in Crossplane 1.18+ in function-environment-configs;
  # das alte --enable-environment-configs ist removed und crasht den Pod.
  args:
    - --enable-composition-revisions

  # Pro-active Reconcile-Intervall (Default: 1 Min)
  pollInterval: 1m
