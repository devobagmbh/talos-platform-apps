# Crossplane operator — Layer-2 default values for talos-platform-apps.
#
# Cluster-specific bits (replicas, resource-limit tuning, provider package
# pinning) live in the consumer repo (talos-seeder-cluster, Layer 3).
# This file is the Helm-values default for the module catalog.

metadata:
  chart: crossplane
  repo: https://charts.crossplane.io/stable
  version: 1.18.0  # v1.x line. NOTE: crossplane core is now v2.x (v2.3.1) — a major
  # jump (namespaced XRs, Composition/XRD changes). Staying on v1.x until a v2
  # migration is decided. Verify the exact latest v1.x chart at push time.
  namespace: crossplane-system

values:
  replicas: 1

  # Metrics endpoint for Prometheus
  metrics:
    enabled: true

  # Resources — deliberately conservative; the consumer repo can raise them
  resourcesCrossplane:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  # RBAC manager stays enabled for Composition authoring
  rbacManager:
    deploy: true
    replicas: 1

  # Package cache — important for air-gap / seeder Harbor pull-through
  packageCache:
    medium: ""
    sizeLimit: 5Gi

  # Composition revisions are essential for GitOps reconciliation.
  # EnvironmentConfigs moved into function-environment-configs in Crossplane
  # 1.18+; the old --enable-environment-configs is removed and crashes the pod.
  args:
    - --enable-composition-revisions

  # Proactive reconcile interval (default: 1 min)
  pollInterval: 1m
