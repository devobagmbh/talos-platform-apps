# Crossplane provider + function packages — installed by the Crossplane operator
# after its bootstrap. Pinning is mandatory (ADR-0009 § no_latest_image_tag).
#
# Versions verified 2026-06 against the GitHub release pages / Upbound
# marketplace. Confirm the exact current latest at push time.
#
# Crossplane target: v2.x (chart 2.3.1, crossplane/helm/crossplane.yaml) —
# greenfield, so we start on the current major (namespaced XRs, XRD
# apiextensions.crossplane.io/v2). Pins verified 2026-06 against the GitHub
# release pages / Upbound marketplace: provider-opentofu v1.1.3 (ships the
# namespaced opentofu.m.upbound.io API), provider-kubernetes v1.2.1,
# function-patch-and-transform v0.10.6, function-auto-ready v0.6.5.

---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-opentofu
spec:
  package: xpkg.upbound.io/upbound/provider-opentofu:v1.1.3
  # Stage-1 cluster provisioning runs the consumer's stage-1 tofu root (e.g.
  # talos-seeder-cluster//stage-1) via a Workspace. We use provider-OPENTOFU, not
  # provider-terraform: the latter is frozen at Terraform 1.5.7 (BSL) and cannot
  # run our roots, which use OpenTofu 1.7+ state encryption (the `encryption {}`
  # block / tofu-encrypt). provider-opentofu runs the `tofu` binary.
  # Crossplane v2: the namespaced Workspace/ProviderConfig API group is
  # opentofu.m.upbound.io/v1beta1 (used in composition-xcluster.yaml and the
  # consumer providerconfig). env[].secretKeyRef + varFiles are supported.

---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-kubernetes
spec:
  package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v1.2.1
  # Optional/post-provisioning: may apply bootstrap objects into the child
  # (e.g. ArgoCD repo credential) IF the child tofu root doesn't already bring
  # them as a Talos inlineManifest. The CNI (Cilium) + ArgoCD bootstrap itself
  # no longer runs here, but as a base inlineManifest at the child tofu apply
  # (talos-platform-base v0.8.0 deploy_argocd, PR #102 + Cilium recipe).

# provider-helm was REMOVED: Cilium/ArgoCD no longer arrive as a downstream
# helm.crossplane.io/Release, but as a Talos inlineManifest at cluster bootstrap
# (base delivers ArgoCD via deploy_argocd, Cilium via Recipe). The xcluster
# Composition is therefore a pure tofu Workspace.

---
# Composition functions — MANDATORY for Pipeline-mode Compositions. The xcluster
# Composition runs `mode: Pipeline` and references these via functionRef; without
# the function packages installed every XCluster claim stalls in reconcile.
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform:v0.10.6
  # Maps the thin XCluster spec (clusterName, tofuModuleSource) onto the
  # provider-opentofu Workspace fields (see composition-xcluster.yaml).

---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-auto-ready
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-auto-ready:v0.6.5
  # Derives the XCluster Ready status from the composed resources
  # (Workspace Ready → XCluster Ready). Last pipeline step.

---
# ProviderConfigs (carrying cluster identity) live in Layer 3 (talos-seeder-cluster):
# an opentofu ProviderConfig that completes the stage-1 root's partial S3 backend
# (Garage endpoint/bucket/key via backendFile) — the in-cluster equivalent of the
# laptop's `tofu init -backend-config=backend.hcl`. The S3 creds + age key are
# injected as Workspace env by the Composition. These cluster-specific bindings do
# NOT belong in the module catalog.
