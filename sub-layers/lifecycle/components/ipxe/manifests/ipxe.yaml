# iPXE-Server: schlanker HTTP-Server für statische iPXE-Boot-Skripte und
# -Binaries (.ipxe / .efi / .kpxe). Wird vom DHCP-Boot-Pfad der Office-Lab-Nodes
# als Next-Boot-URL referenziert, liefert die Talos-Initial-Boot-Konfig
# (Kernel-Cmdline → machine-config-URL).
#
# Skript-Inhalt kommt aus einer ConfigMap, die das Konsumenten-Repo
# (talos-seeder-cluster, Layer 3) befüllt. Hier nur die Schale.

---
apiVersion: v1
kind: Namespace
metadata:
  name: ipxe
  labels:
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: ipxe

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ipxe
  namespace: ipxe

---
# Default-ConfigMap mit Platzhalter-Skript. Der Konsumenten-Cluster
# (talos-seeder-cluster) überschreibt diese ConfigMap mit den echten
# Boot-Skripten (Talos-Image-URL, Kernel-Args, machine-config-URL).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipxe-boot-scripts
  namespace: ipxe
  labels:
    platform.devoba.de/component: ipxe
data:
  boot.ipxe: |
    #!ipxe
    # Default-Skelett. Wird im Konsumenten-Repo überschrieben.
    echo iPXE-Server bereit, aber kein cluster-spezifisches Boot-Skript hinterlegt.
    echo Konsumenten-Repo muss ConfigMap ipxe/ipxe-boot-scripts mit
    echo gueltigem boot.ipxe befuellen.
    exit 1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipxe
  namespace: ipxe
  labels:
    app.kubernetes.io/name: ipxe
    platform.devoba.de/component: ipxe
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipxe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipxe
        platform.devoba.de/component: ipxe
    spec:
      serviceAccountName: ipxe
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: http
          # nginx als HTTP-Server für statische iPXE-Assets. Alpine-Variante
          # ist klein und Talos-konform (kein systemd, keine Privilege-Escalation).
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            runAsUser: 101  # nginx-user im Alpine-Image
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /boot.ipxe
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /boot.ipxe
              port: http
            initialDelaySeconds: 2
          volumeMounts:
            - name: scripts
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: scripts
          configMap:
            name: ipxe-boot-scripts
        - name: nginx-config
          configMap:
            name: ipxe-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

---
# Eigene nginx-Konfig statt der Default-Site auf Port 80 — der Container
# läuft non-root, kann also Port 80 nicht binden. Listen auf 8080.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipxe-nginx
  namespace: ipxe
data:
  default.conf: |
    server {
      listen 8080 default_server;
      root /usr/share/nginx/html;
      autoindex on;
      # iPXE-Skripte müssen text/plain ausliefern; nginx Default für .ipxe ist application/octet-stream
      types {
        text/plain ipxe;
      }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: ipxe
  namespace: ipxe
  annotations:
    # Cilium-LB-IPAM weist eine IP aus dem 'seeder'-Pool zu (CiliumLoadBalancerIPPool
    # liegt im Konsumenten-Repo, weil cluster-spezifisches IP-Layout).
    io.cilium/lb-ipam-pool: seeder
  labels:
    app.kubernetes.io/name: ipxe
    platform.devoba.de/component: ipxe
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: ipxe
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
