# iPXE server: slim HTTP server for static iPXE boot scripts and binaries
# (.ipxe / .efi / .kpxe). Referenced as the next-boot URL by the DHCP boot path
# of the Office-Lab nodes; serves the Talos initial boot config (kernel cmdline
# → machine-config URL).
#
# Script content comes from a ConfigMap the consumer repo (talos-seeder-cluster,
# Layer 3) fills in. This is just the shell.

---
apiVersion: v1
kind: Namespace
metadata:
  name: ipxe
  labels:
    # Pod Security Admission: the iPXE workload runs fully restricted-compliant
    # (runAsNonRoot + seccomp RuntimeDefault + drop ALL caps + no priv-esc).
    pod-security.kubernetes.io/enforce: restricted
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: ipxe

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ipxe
  namespace: ipxe

---
# Default ConfigMap with a placeholder script. The consumer cluster
# (talos-seeder-cluster) overrides this ConfigMap with the real boot scripts
# (Talos image URL, kernel args, machine-config URL).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipxe-boot-scripts
  namespace: ipxe
  labels:
    platform.devoba.de/component: ipxe
data:
  boot.ipxe: |
    #!ipxe
    # Default skeleton. Overridden in the consumer repo.
    echo iPXE server ready, but no cluster-specific boot script configured.
    echo The consumer repo must fill ConfigMap ipxe/ipxe-boot-scripts with a
    echo valid boot.ipxe.
    exit 1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipxe
  namespace: ipxe
  labels:
    app.kubernetes.io/name: ipxe
    platform.devoba.de/component: ipxe
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipxe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipxe
        platform.devoba.de/component: ipxe
    spec:
      serviceAccountName: ipxe
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: http
          # nginx as the HTTP server for static iPXE assets. The Alpine variant
          # is small and Talos-friendly (no systemd, no privilege escalation).
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            runAsUser: 101  # nginx user in the Alpine image
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /boot.ipxe
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /boot.ipxe
              port: http
            initialDelaySeconds: 2
          volumeMounts:
            - name: scripts
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: scripts
          configMap:
            name: ipxe-boot-scripts
        - name: nginx-config
          configMap:
            name: ipxe-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

---
# Custom nginx config instead of the default site on port 80 — the container
# runs non-root and therefore cannot bind port 80. Listens on 8080.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipxe-nginx
  namespace: ipxe
data:
  default.conf: |
    server {
      listen 8080 default_server;
      root /usr/share/nginx/html;
      autoindex on;
      # iPXE scripts must be served as text/plain; nginx default for .ipxe is application/octet-stream
      types {
        text/plain ipxe;
      }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: ipxe
  namespace: ipxe
  labels:
    # Cilium LB-IPAM assigns an IP from the 'seeder' pool. Pool selection is a
    # LABEL match — the CiliumLoadBalancerIPPool.serviceSelector selects on Service
    # labels, NOT annotations. The pool lives in the consumer repo (cluster IP layout).
    io.cilium/lb-ipam-pool: seeder
    app.kubernetes.io/name: ipxe
    platform.devoba.de/component: ipxe
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: ipxe
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
