# Customization Contract v2 (ADR-0024). The iPXE server (nginx) ships a default
# boot-script ConfigMap (stub); the consumer MUST author the real boot.ipxe
# (Talos image URL, kernel args, machine-config URL per hardware variant). The
# server mounts the ConfigMap as a file (Shape b) at /usr/share/nginx/html — the
# consumer owns the whole file, the signed workload is never patched. (v1 modelled
# this as a Class-A configmap_key; ADR-0024 Shape b is the correct form for a
# file-driven app.)
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (nginx Deployment/Service),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs:
  config: ipxe-boot-scripts # Shape (b): mounted boot-script file
provided_selectors: {}
required:
  env_keys: []
  config_files: # Shape (b) — the consumer authors the full boot.ipxe
    - path: /usr/share/nginx/html/boot.ipxe
      ref: ipxe-boot-scripts
      key: boot.ipxe
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
