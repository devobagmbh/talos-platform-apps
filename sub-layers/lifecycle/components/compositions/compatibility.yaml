requires:
  lifecycle/crossplane: ">=v0.1.0" # XRD-/Composition-CRDs
  # Pipeline steps need the providers + functions. As of the tofu-state-seed
  # step this now ALSO needs provider-kubernetes (the namespaced
  # kubernetes.m.crossplane.io/v1alpha1 Object API) in addition to
  # provider-opentofu and function-patch-and-transform — all delivered by
  # lifecycle/providers. MERGE ORDER: provider-kubernetes is added to
  # lifecycle/providers by PR #234 (issue #231); that PR MUST merge before this
  # component is deployed, otherwise the Object API has no backing provider and
  # every XCluster reconcile stalls in Observe. The v0.1.0 tag (2026-06-08)
  # PREDATES #234 (2026-06-19) and ships NO provider-kubernetes, so the floor
  # MUST be the first providers release that includes it — the next minor, v0.2.0
  # (a new provider is a feature add). >=v0.1.0 would admit a providers artifact
  # without the Object API and stall every XCluster reconcile.
  lifecycle/providers: ">=v0.2.0"
provides:
  - name: xcluster-api
    apis:
      - platform.devoba.de/XCluster@v1alpha1
    capabilities:
      - {id: cluster-provisioning, swap_class: rewrite-required}
