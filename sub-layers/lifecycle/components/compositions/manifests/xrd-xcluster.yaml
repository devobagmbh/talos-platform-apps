# CompositeResourceDefinition for XCluster — the API a consumer repo (child
# repo, e.g. talos-office-lab-cluster) uses to request a child cluster.
#
# Crossplane v2 (apiextensions.crossplane.io/v2): scope is Namespaced — the
# consumer creates an XCluster directly in a namespace (no separate claim; the
# v1 claim model is gone in v2). The package set is pinned to the v1.x-line
# providers/functions; see providers + crossplane/helm for the v2 decision.
#
# Arch B (DRY, ADR-0022 rev / ADR-0006): the XCluster is DELIBERATELY THIN.
# Cluster identity (nodes, classes, versions, endpoint) lives ONLY in the
# consumer's committed cluster.yaml, read by the consumer's `stage-1/` tofu root
# — the SAME root the Stage-0 laptop `tofu apply` runs. The XCluster therefore
# must NOT duplicate that identity; it only tells Crossplane WHICH root to run
# and where the secrets are. Update = edit cluster.yaml once, not the XCluster too.

apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xclusters.platform.devoba.de
spec:
  scope: Namespaced # v2 default; the consumer creates an XCluster in a namespace
  group: platform.devoba.de
  names:
    kind: XCluster
    plural: xclusters
  # No claimNames — claims are a v1/LegacyCluster concept; in v2 the namespaced
  # XCluster IS the consumer-facing object.
  defaultCompositionRef:
    name: xcluster-talos
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                clusterName:
                  type: string
                  description: >-
                    Cluster name (e.g. office-lab). Used for labeling, the tofu
                    Workspace name, the connection-secret name, and (by
                    convention) the per-cluster secret name <clusterName>-tofu-secrets.
                tofuModuleSource:
                  type: string
                  description: >-
                    Git source URL of the consumer's self-contained `stage-1/`
                    tofu root (which reads its committed cluster.yaml and calls the
                    base talos-cluster module with deploy_argocd) — e.g.
                    'git::https://github.com/devobagmbh/talos-office-lab-cluster.git//stage-1?ref=main'.
                    The SAME root the Stage-0 laptop runs. ArgoCD + Cilium come up
                    as base inlineManifest (deploy_argocd) — tofu-only.
                providerConfigName:
                  type: string
                  default: opentofu-default
                  description: >-
                    Name of the cluster-scoped provider-opentofu ClusterProviderConfig
                    whose backendFile pins THIS cluster's tofu state (Garage
                    bucket/key). MUST be unique per cluster: the backendFile's
                    bucket+key is the state location, and the consumer's stage-1
                    root carries only a PARTIAL `backend "s3" {}` — so two clusters
                    sharing one ClusterProviderConfig would share one state, and the
                    second cluster's apply would plan to destroy the first's
                    resources. Defaults to `opentofu-default` (the seeder
                    self-adoption config, key clusters/seeder); every child cluster
                    MUST set its own (e.g. opentofu-office-lab → clusters/office-lab).
              # No secretName field: the per-cluster runner Secret name follows the
              # fixed convention <clusterName>-tofu-secrets (the Composition derives
              # it). Add an override field here AND the matching Composition patches
              # together if a real need arises — an unused field is worse than none.
              required: [clusterName, tofuModuleSource]
            status:
              type: object
              properties:
                kubeconfigSecretRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                talosconfigSecretRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                conditions:
                  type: array
                  items:
                    type: object
