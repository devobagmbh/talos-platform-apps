# CompositeResourceDefinition für XCluster — die plattform-interne API,
# über die ein Konsumenten-Repo einen Talos-Cluster (Seeder oder Child,
# z. B. DHQ) als deklarative Resource claimt.
#
# Bewusst kleines, stabiles Schema (talos-platform-docs ADR-0022):
# der cluster.yaml-Inhalt wird NICHT ins XRD gespiegelt, sondern liegt
# als ConfigMap im Cluster und wird per spec.configMapRef referenziert.
# Damit ist das XRD entkoppelt von base-Schema-Bumps — Schema-Drift
# wird einmal im Composition-Template (function-go-templating)
# behandelt, nicht im XRD-Schema.

apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xclusters.platform.devoba.de
spec:
  group: platform.devoba.de
  names:
    kind: XCluster
    plural: xclusters
  claimNames:
    kind: Cluster
    plural: clusters
  defaultCompositionRef:
    name: xcluster-talos
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:

                # Die cluster.yaml-Inhalt-ConfigMap wird NICHT explizit
                # referenziert. Konvention: der Konsumenten-Repo legt die
                # ConfigMap unter dem Namespace `crossplane-system` ab und
                # trägt das Label `platform.devoba.de/cluster: <claim-name>`
                # damit die Composition (function-extra-resources mit Label-
                # Selector) sie findet. Damit fällt ein konfigMapRef-Feld
                # weg — die Cluster-Identität ist über den Claim-Namen
                # eindeutig.

                platformBaseTag:
                  type: string
                  description: >-
                    talos-platform-base-OCI-Tag, gegen den dieser Cluster
                    läuft. Informativ + bestimmt die Default-tofu-Modul-
                    Version, falls tofuModuleSource leer ist.

                tofuModuleSource:
                  type: string
                  description: >-
                    Tofu-Modul-Source-URL für die Cluster-Provisionierung.
                    Vom Konsumenten-Repo gesetzt (z. B.
                    'oci://ghcr.io/nosmoht/talos-platform-base/talos-cluster?tag=v0.6.0'
                    oder
                    'git::https://github.com/Nosmoht/talos-platform-base.git//tofu/modules/talos-cluster?ref=v0.6.0').
                    Dieses Repo (talos-platform-apps) kennt die konkrete
                    Source bewusst NICHT — die Verdrahtung base ↔ apps
                    macht erst das Cluster-Repo.

                appsSubLayerPins:
                  type: object
                  description: >-
                    Map sub-layer-name → OCI-Tag (z. B.
                    monitoring/kube-prometheus-stack: v0.3.1). Rein
                    informativ — wird nicht von der Composition gerendert.
                    Die Argo-Application-Manifeste im Cluster-Repo
                    referenzieren die Tags direkt.
                  additionalProperties:
                    type: string

                s3StateBackend:
                  type: object
                  description: >-
                    Garage-S3-Backend für den Tofu-Workspace-State
                    (ADR-0006 Rev. 2026-05-27, ADR-0022). Liegt auf dem
                    DS720+ außerhalb des Cluster-Lifecycles — vermeidet
                    Bootstrap-Chicken-Egg.
                  properties:
                    endpoint:
                      type: string
                      description: "S3-Endpoint-URL (Garage)"
                    bucket:
                      type: string
                      description: "Bucket-Name für die tfstate-Objekte"
                    region:
                      type: string
                      default: "garage"
                      description: "S3-Region — Garage akzeptiert beliebige Werte"
                    credentialsSecretRef:
                      type: object
                      description: >-
                        Referenz auf das Secret mit
                        AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY.
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                      required: [name, namespace]
                  required: [endpoint, bucket, credentialsSecretRef]

              required:
                - platformBaseTag
                - tofuModuleSource
                - s3StateBackend

            status:
              type: object
              properties:
                kubeconfigSecretRef:
                  type: object
                  description: >-
                    Connection-Secret-Ref auf das vom Workspace ausgegebene
                    kubeconfig-Secret.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                talosconfigSecretRef:
                  type: object
                  description: >-
                    Connection-Secret-Ref auf das vom Workspace ausgegebene
                    talosconfig-Secret.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                conditions:
                  type: array
                  items:
                    type: object
