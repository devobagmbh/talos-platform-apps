# CompositeResourceDefinition für XCluster — das API, mit dem ein
# Konsumenten-Repo (Child-Repo, z. B. talos-office-lab-cluster) einen
# Child-Cluster claimt.
#
# Das spec-Schema spiegelt 1:1 den Variablen-Contract des base-talos-cluster-
# Moduls (talos-platform-base v0.7.0): controlplane/worker-Rollen, Hardware-
# Spezialisierung via `class` (→ classes-Map mit architecture/extensions/
# overlay/config_patches). Die Composition mappt diese Felder auf die
# tf.Workspace-varmap.

apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xclusters.platform.devoba.de
spec:
  group: platform.devoba.de
  names:
    kind: XCluster
    plural: xclusters
  claimNames:
    kind: Cluster
    plural: clusters
  defaultCompositionRef:
    name: xcluster-talos
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                clusterName:
                  type: string
                  description: "Name des Child-Clusters (z. B. office-lab) → var.cluster_name"
                clusterEndpoint:
                  type: string
                  description: "Kubernetes-API-Endpoint/VIP, https://…:6443 → var.cluster_endpoint"
                talosVersion:
                  type: string
                  description: "Talos-Schema-Pin (Bootstrap-fix) → var.talos_version, z. B. v1.13.0"
                talosInstallVersion:
                  type: string
                  description: "Talos-Installer-Version (OS-Pin, optional) → var.talos_install_version"
                kubernetesVersion:
                  type: string
                  description: "Kubernetes-Version → var.kubernetes_version, z. B. v1.36.0"
                nodes:
                  type: array
                  description: "Bare-Metal-Nodes → var.nodes (jeder bereits im Talos-Maintenance-Mode)"
                  items:
                    type: object
                    properties:
                      hostname:
                        type: string
                      ip:
                        type: string
                      role:
                        type: string
                        enum: [controlplane, worker]
                      class:
                        type: string
                        description: "Hardware-Klasse (Key in classes), default 'standard'"
                      config_patches:
                        type: array
                        description: "Per-Node Machine-Config-Patches (YAML-Strings)"
                        items:
                          type: string
                    required: [hostname, ip, role]
                classes:
                  type: object
                  description: >-
                    Per-Klasse Image-Factory- + Patch-Profil → var.classes. Key =
                    Klassenname (matcht node.class). Pflicht-Key 'standard'.
                  additionalProperties:
                    type: object
                    properties:
                      architecture:
                        type: string
                        enum: [amd64, arm64]
                      extensions:
                        type: array
                        items:
                          type: string
                      overlay:
                        type: object
                        properties:
                          name: { type: string }
                          image: { type: string }
                          options:
                            type: object
                            additionalProperties: { type: string }
                        required: [name, image]
                      config_patches:
                        type: array
                        items:
                          type: string
                platformBaseTag:
                  type: string
                  description: "Welcher talos-platform-base-OCI-Tag konsumiert wird"
                tofuModuleSource:
                  type: string
                  description: >-
                    Tofu-Modul/Root-Source-URL für die Cluster-Provisionierung, vom
                    Konsumenten-Repo gesetzt — z. B.
                    'git::https://github.com/devobagmbh/talos-office-lab-cluster.git//stage-1?ref=main'.
                    Dieses Repo (talos-platform-apps) kennt die konkrete Source
                    bewusst NICHT; die Verdrahtung von base + apps macht erst das
                    Child-/Seeder-Repo. ArgoCD + Cilium liefert das Root als
                    base-inlineManifest (deploy_argocd) — daher tofu-only.
                appsSubLayerPins:
                  type: object
                  description: "Map sub-layer-name → OCI-Tag (z. B. monitoring: v0.3.1)"
                  additionalProperties:
                    type: string
              required: [clusterName, clusterEndpoint, talosVersion, kubernetesVersion, nodes, classes, tofuModuleSource]
            status:
              type: object
              properties:
                kubeconfigSecretRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                talosconfigSecretRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                conditions:
                  type: array
                  items:
                    type: object
