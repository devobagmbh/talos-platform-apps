# Composition für XCluster — 1-Schritt-Lifecycle-Pipeline (ADR-0022).
#
# Pipeline:
#   1. pull-cluster-config — function-extra-resources zieht die ConfigMap,
#      die vom Konsumenten-Repo unter spec.configMapRef referenziert wird.
#      Die ConfigMap trägt den cluster.yaml-Inhalt (1:1 das Schema von
#      talos-platform-base/cluster.yaml.example) unter data.cluster.yaml.
#   2. render-workspace — function-go-templating parst den cluster.yaml-
#      Inhalt und rendert daraus eine provider-terraform Workspace-CR mit
#      gefüllten spec.forProvider.{module, vars} + s3-Backend-Config.
#
# Was bewusst NICHT hier passiert (ADR-0022 § Reichweite):
#   - Cilium-Bootstrap (ist Substrate, kommt via Talos-machine-config-inline
#     aus base)
#   - ArgoCD-Bootstrap (ist Substrate, kommt via base-Bootstrap)
#   - App-of-Apps-Push (läuft orthogonal über Cluster-Repo + Argo)
#   - PNI/Cilium-CRs (BGP, L2-IPAM) — leben in apps/dhq-managed/ bzw.
#     Seeder-Äquivalent im jeweiligen Cluster-Repo (vgl. ADR-0014 Rev.
#     2026-05-28)

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xcluster-talos
  labels:
    provider: talos-on-bare-metal
spec:
  compositeTypeRef:
    apiVersion: platform.devoba.de/v1alpha1
    kind: XCluster

  mode: Pipeline
  pipeline:

    # --- Schritt 1: cluster-config-ConfigMap zur Render-Zeit nachladen ---
    #
    # Konvention (siehe ADR-0022 + apps-Komponenten-README): das
    # Konsumenten-Repo legt die ConfigMap unter dem Namespace
    # crossplane-system ab und trägt das Label
    #     platform.devoba.de/cluster: <claim-name>
    # damit dieser Selector sie findet. valueFromFieldPath zieht
    # den Claim-Namen dynamisch aus dem Composite-XR.
    - step: pull-cluster-config
      functionRef:
        name: function-extra-resources
      input:
        apiVersion: extra-resources.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          extraResources:
            - kind: ConfigMap
              apiVersion: v1
              into: cluster-config
              type: Selector
              match:
                labels:
                  - key: platform.devoba.de/cluster
                    type: Value
                    valueFromFieldPath: spec.claimRef.name

    # --- Schritt 2: Workspace-CR aus cluster.yaml-Inhalt rendern ---
    #
    # Schnittstelle zum tofu-Modul (Konvention, ADR-0022):
    #   - var.cluster_yaml — String, kompletter cluster.yaml-Inhalt.
    #     Das Modul ruft selbst `yamldecode(var.cluster_yaml)` auf und
    #     interpretiert das Schema. Damit ist diese Composition modul-
    #     agnostisch — Schema-Drift in cluster.yaml wird im Modul
    #     gehandhabt, nicht hier.
    #   - State-Backend (Garage-S3) und Backend-Credentials werden
    #     KONSUMENTEN-SEITIG in der provider-terraform-ProviderConfig
    #     konfiguriert (talos-seeder-cluster/stage-1/providerconfigs/).
    #     Diese Composition setzt nur den Module-Source + die Vars.
    - step: render-workspace
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- /*
              cluster.yaml-Inhalt aus der ConfigMap. Die ConfigMap landet
              unter .observed.resources["cluster-config"] (das `into:` aus
              Schritt 1, pull-cluster-config).
            */ -}}
            {{- $cm := index .observed.resources "cluster-config" -}}
            {{- $clusterYaml := index $cm.Resource.data "cluster.yaml" -}}

            {{- /*
              Crossplane-spezifische Felder kommen aus dem XR.
              claimRef ist der Konsumenten-Claim-Verweis.
            */ -}}
            {{- $xr := .observed.composite.resource -}}
            {{- $claimName := $xr.spec.claimRef.name -}}
            {{- $moduleSrc := $xr.spec.tofuModuleSource -}}

            ---
            apiVersion: tf.upbound.io/v1beta1
            kind: Workspace
            metadata:
              name: talos-{{ $claimName }}
              annotations:
                crossplane.io/external-name: talos-{{ $claimName }}
                gotemplating.fn.crossplane.io/composition-resource-name: talos-workspace
            spec:
              forProvider:
                source: Remote
                module: {{ $moduleSrc | quote }}
                vars:
                  - key: cluster_yaml
                    value: {{ $clusterYaml | quote }}
              providerConfigRef:
                # Konvention: ein ProviderConfig pro Cluster-Repo,
                # Name = "terraform-default". Backend-Config (Garage-S3)
                # + Credentials leben dort, nicht hier.
                name: terraform-default
              writeConnectionSecretToRef:
                # Tofu-Outputs (kubeconfig, talosconfig) landen hier.
                # Konsument zieht die Secrets via ESO/ArgoCD weiter.
                name: {{ $claimName }}-connection
                namespace: crossplane-system

# Die XCluster-Composition ist intentional schlank — sie bringt den
# Cluster auf den Punkt, an dem der base-Bootstrap (Argo) übernimmt.
# Argo zieht dann sowohl die Apps-of-Apps des Cluster-Repos als auch
# die OCI-Komponenten aus talos-platform-apps.
