# Composition for XCluster — runs the consumer's self-contained `stage-1/` tofu
# root via ONE provider-opentofu Workspace (Arch B, DRY).
#
# The Workspace runs the SAME root the Stage-0 laptop `tofu apply` runs; that
# root reads the consumer's committed cluster.yaml (single source of cluster
# identity — no duplication into the claim) and calls the base talos-cluster
# module with deploy_argocd = true. Crossplane only passes through SECRETS
# (sops_age_key, tf encryption passphrase, Garage S3 creds) and collects the
# kubeconfig/talosconfig outputs. Cilium + ArgoCD come up as base inlineManifest
# at bootstrap; the base health gate makes `tofu apply` block until the cluster
# is online. Crossplane's role ends at a running, self-bootstrapping cluster.
#
# Provider: provider-opentofu v1.1.3 (NOT provider-terraform — the roots use
# OpenTofu 1.7+ state encryption). Crossplane v2 namespaced API group:
# opentofu.m.upbound.io/v1beta1. The S3 backend (DS720+ Garage) is completed for
# the in-cluster run by the consumer ProviderConfig's backendFile (= the laptop's
# `tofu init -backend-config=backend.hcl`); the stage-1 root keeps its partial
# `backend "s3" {}`. env[].secretKeyRef is supported by the Workspace API.
# >>> VERIFY at first reconcile only: the base module's output names surfaced into
# >>> the Workspace connection secret (expects `kubeconfig` / `talosconfig`).

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xcluster-talos
  labels:
    provider: talos-on-bare-metal
spec:
  compositeTypeRef:
    apiVersion: platform.devoba.de/v1alpha1
    kind: XCluster

  mode: Pipeline
  pipeline:
    # --- Step 1: run the consumer stage-1 root = the entire cluster lifecycle ---
    - step: provision-talos-cluster
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: talos-workspace
            base:
              # provider-opentofu, Crossplane v2 namespaced API group. The composed
              # Workspace is the namespaced kind and lands in the XCluster's OWN
              # namespace. All its secret refs are therefore LOCAL (same namespace) —
              # we deliberately set NO explicit `namespace:`, because cross-namespace
              # refs are forbidden in the v2 namespaced local-ref model. The consumer
              # co-locates the runner Secret + the connection secret with the XCluster
              # (the seeder's XCluster + secrets live in crossplane-system).
              apiVersion: opentofu.m.upbound.io/v1beta1
              kind: Workspace
              metadata:
                annotations:
                  # provider-opentofu selects the tofu WORKSPACE from the MR's
                  # external-name (workspace.go: tofu.Workspace(ctx, meta.GetExternalName)).
                  # Without this it defaults to the composed name (e.g. talos-seeder) →
                  # a NAMED workspace → state at env:/<name>/<key>, a SEPARATE state from
                  # the Stage-0 laptop run (which uses the DEFAULT workspace → bare <key>).
                  # That made the runner ignore the adopted state and plan a fresh CREATE
                  # (new PKI) instead of adopting. Pin to `default` so the in-cluster run
                  # uses the SAME state the laptop wrote (clusters/<cluster>/terraform.tfstate).
                  crossplane.io/external-name: default
              spec:
                forProvider:
                  source: Remote
                  module: ""  # patched from spec.tofuModuleSource (the consumer REPO-ROOT git URL)
                  # Check out the WHOLE repo and run tofu in the `tofu/` subdir, NOT a
                  # `//tofu` go-getter subdir fetch. The consumer root reads repo-root-
                  # relative files (cluster.yaml, bootstrap/argocd/*, the *.sops.yaml the
                  # local-execs decrypt) via `${path.module}/../…`; a subdir-only fetch
                  # drops those (observe fails: file "./../cluster.yaml" not found). So
                  # tofuModuleSource is the repo root (no `//tofu`) and the root lives at
                  # `tofu/` by platform convention (seeder, office-lab). See provider-
                  # opentofu Configuration.md § relative-path module references.
                  entrypoint: tofu
                  # Default OFF: env[] below injects four secrets (sops_age_key,
                  # tf_encryption_passphrase, AWS_*); verbose tofu CLI logging can surface
                  # their values in the provider-opentofu pod logs. Consumers opt in
                  # per-cluster for debugging.
                  enableTofuCLILogging: false
                  # Secrets only — NO cluster identity (that lives in the root's
                  # committed cluster.yaml). The per-cluster Secret
                  # (<clusterName>-tofu-secrets) is supplied by Layer 3 (consumer
                  # repo, SOPS/ESO) in the XCluster's namespace. env[].secretKeyRef
                  # is a LOCAL ref (no namespace) — v2 namespaced model.
                  env:
                    - name: TF_VAR_sops_age_key
                      secretKeyRef:
                        name: ""  # patched: <clusterName>-tofu-secrets
                        key: sops_age_key
                    - name: TF_VAR_tf_encryption_passphrase
                      secretKeyRef:
                        name: ""  # patched
                        key: tf_encryption_passphrase
                    - name: AWS_ACCESS_KEY_ID
                      secretKeyRef:
                        name: ""  # patched
                        key: aws_access_key_id
                    - name: AWS_SECRET_ACCESS_KEY
                      secretKeyRef:
                        name: ""  # patched
                        key: aws_secret_access_key
                # ProviderConfig completes the S3 backend (DS720+ Garage
                # endpoint/bucket/key via backendFile) — see consumer
                # crossplane/providerconfigs/. The namespaced opentofu.m.upbound.io
                # provider REQUIRES kind explicitly (ProviderConfig vs
                # ClusterProviderConfig); we use the cluster-scoped one — one shared
                # tofu provider config for all XClusters (consumer-owned, named
                # opentofu-default).
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: opentofu-default
                # kubeconfig + talosconfig (module outputs) → connection secret,
                # written LOCALLY into the XCluster's namespace (no explicit namespace).
                writeConnectionSecretToRef:
                  name: ""  # patched: <clusterName>-cluster-conn
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "talos-%s" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tofuModuleSource
                toFieldPath: spec.forProvider.module
              # Per-cluster ClusterProviderConfig → its backendFile pins THIS
              # cluster's tofu state (Garage bucket/key). The base above defaults
              # to opentofu-default (seeder self-adoption, key clusters/seeder);
              # a child cluster MUST point at its own (e.g. opentofu-office-lab,
              # key clusters/office-lab) or it would run against another cluster's
              # state and plan to destroy it. The XRD defaults the field to
              # opentofu-default, so the seeder XCluster keeps its current ref.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.providerConfigName
                toFieldPath: spec.providerConfigRef.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.writeConnectionSecretToRef.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-cluster-conn" }
              # Secret name (<clusterName>-tofu-secrets) into every env secretKeyRef.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.env[0].secretKeyRef.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-secrets" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.env[1].secretKeyRef.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-secrets" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.env[2].secretKeyRef.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-secrets" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.env[3].secretKeyRef.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-secrets" }
              # Surface the Workspace's own connection-secret reference into the
              # XCluster status (observability). Crossplane v2 dropped native XR
              # connection-detail aggregation, so the consumer reads the
              # Workspace's secret (<clusterName>-cluster-conn) directly — the
              # Workspace is a managed resource and still writes it natively
              # (kubeconfig + talosconfig from the base module outputs).
              - type: ToCompositeFieldPath
                fromFieldPath: spec.writeConnectionSecretToRef.name
                toFieldPath: status.kubeconfigSecretRef.name
              # The conn secret is written LOCALLY into the XCluster's own namespace.
              # Surface it via ToCompositeFieldPath (mirrors the .name patch above):
              # read the composed Workspace's metadata.namespace (= the XR namespace
              # in v2) and write it to the XR status. FromCompositeFieldPath would
              # write the Workspace, not the XR status, leaving it empty (review LOW).
              - type: ToCompositeFieldPath
                fromFieldPath: metadata.namespace
                toFieldPath: status.kubeconfigSecretRef.namespace

    # --- Step 2: seed an empty tofu state when the S3 backend is empty -------
    # Workaround for OpenTofu #2518: provider-opentofu's Observe runs
    # `tofu state list`, which ERRORS with "no state" on a *fresh, empty* S3
    # backend. That error keeps the Workspace stuck in Observe — it never
    # reaches apply, so a brand-new cluster never bootstraps. This step emits a
    # ONE-SHOT Job (via a provider-kubernetes Object) that pushes a minimal,
    # encrypted, EMPTY state ONLY when the backend is definitively empty;
    # afterward the Workspace's Observe retries (provider backoff) and goes
    # green. No hard ordering between this Job and the Workspace is needed: the
    # Workspace simply keeps erroring until the seed lands, then proceeds.
    #
    # IDEMPOTENCY / SAFETY (load-bearing — see the embedded script below):
    #   - The Job is seed-IF-EMPTY: on an already-seeded or in-use backend it is
    #     a no-op (the guard returns early). Re-running / re-creating it never
    #     overwrites real state.
    #   - Two independent guards protect against clobbering live state:
    #       (1) the script's conservative emptiness check (push only on an
    #           UNAMBIGUOUSLY empty backend; on ANY error/ambiguity it exits
    #           non-zero so the Job retries, never pushes on uncertainty), and
    #       (2) `tofu state push` WITHOUT `-force`, so OpenTofu's own
    #           serial/lineage check refuses to overwrite a higher-serial remote.
    #
    # >>> SECURITY REVIEWER: confirm the embedded `encryption {}` block below is
    # >>> BYTE-FOR-BYTE the scheme the consumer's stage-1 root uses (pbkdf2 key
    # >>> provider → aes_gcm method). A mismatch makes the pushed empty state
    # >>> UNREADABLE by the real apply (decryption failure), which would surface
    # >>> as a hard apply error rather than silent data loss — but still blocks
    # >>> bootstrap. Keep the two in lockstep.
    # >>> OPERATIONAL-SAFETY REVIEWER: confirm the seed-if-empty guard's
    # >>> emptiness signal (empty/whitespace `tofu state pull` output) is the
    # >>> correct #2518 signal for the Garage S3 backend, and that the
    # >>> never-push-on-error stance plus no-`-force` push is sufficient to
    # >>> guarantee no live state is ever overwritten.
    - step: seed-tofu-state
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: tofu-state-seed
            base:
              # provider-kubernetes, Crossplane v2 NAMESPACED API group. The
              # composed Object lands in the XCluster's OWN namespace (same v2
              # local-ref model the Workspace above uses) — so the embedded Job
              # it creates is co-located with the runner Secret and the
              # Workspace. We deliberately set NO explicit `namespace:` on the
              # Object; the embedded Job's metadata.namespace is patched from the
              # composite's namespace (see patches) so the Job is created in the
              # XR namespace regardless of provider default-namespace behavior.
              apiVersion: kubernetes.m.crossplane.io/v1alpha1
              kind: Object
              spec:
                # Shared, consumer-owned kubernetes ClusterProviderConfig
                # (InjectedIdentity). Unlike the opentofu ClusterProviderConfig
                # (per-cluster, carries the backend/state location), this one
                # carries NO per-cluster state, so a single shared config named
                # `kubernetes-default` serves every XCluster. The namespaced
                # Object API REQUIRES an explicit kind (ProviderConfig vs
                # ClusterProviderConfig); we pin the cluster-scoped one.
                providerConfigRef:
                  kind: ClusterProviderConfig
                  name: kubernetes-default
                # Readiness: provider-kubernetes defaults to "ready on successful
                # apply", which would mark this Object ready BEFORE the seed Job
                # actually reaches Complete. Derive readiness from the Job's
                # Complete condition so anything gating on this Object waits for
                # the seed to finish (provider-kubernetes v1.2.1 DeriveFromCelQuery;
                # null-safe short-circuit while .status/.conditions are absent).
                readiness:
                  policy: DeriveFromCelQuery
                  celQuery: 'has(object.status) && has(object.status.conditions) && object.status.conditions.exists(c, c.type == "Complete" && c.status == "True")'
                forProvider:
                  manifest:
                    apiVersion: batch/v1
                    kind: Job
                    metadata:
                      name: ""  # patched: <clusterName>-tofu-state-seed
                      namespace: ""  # patched: the XR namespace
                    spec:
                      # Small retry budget: a transient S3/auth blip should
                      # retry, but the guard means a real failure (e.g. a
                      # genuine decryption/permission problem) should not retry
                      # forever. backoffLimit + a deadline bound the noise.
                      backoffLimit: 6
                      activeDeadlineSeconds: 600
                      # Reap the completed Job after a day so a re-create on the
                      # same backend is a clean no-op rather than name-conflict.
                      ttlSecondsAfterFinished: 86400
                      template:
                        spec:
                          restartPolicy: Never
                          # CONSUMER-OWNED ServiceAccount + RBAC (Layer 3): the
                          # seed Job needs `get` on clusterproviderconfigs
                          # (cluster-scoped) to read the backendFile. The
                          # composition does NOT emit the SA/Role/Binding — that
                          # would require provider-kubernetes to hold
                          # RBAC-creation rights (privilege escalation). The
                          # consumer provisions this SA + a ClusterRole/Binding
                          # by the convention name. See README § consumer
                          # obligations.
                          serviceAccountName: ""  # patched: <clusterName>-tofu-state-seed
                          securityContext:
                            runAsNonRoot: true
                            runAsUser: 65532
                            runAsGroup: 65532
                            fsGroup: 65532
                            seccompProfile:
                              type: RuntimeDefault
                          volumes:
                            - name: workspace
                              emptyDir: {}
                          initContainers:
                            # Read THIS cluster's S3 backend config out of the
                            # opentofu ClusterProviderConfig (the same backendFile
                            # the Workspace uses). Read at RUNTIME — the
                            # composition stays cluster-agnostic (templated only
                            # from clusterName + providerConfigName; the backend
                            # bucket/key is never baked into this artifact).
                            - name: read-backend
                              image: registry.k8s.io/kubectl:v1.33.1  # pinned (no :latest)
                              imagePullPolicy: IfNotPresent
                              command: ["/bin/sh", "-ec"]
                              args:
                                - |
                                  # The opentofu ClusterProviderConfig is the
                                  # cluster-scoped MR config; .spec.backendFile is
                                  # the partial `backend "s3" {}` completion
                                  # (Garage endpoint/bucket/key). Fail hard if it
                                  # is missing — never init against a wrong/empty
                                  # backend.
                                  kubectl get clusterproviderconfig.opentofu.m.upbound.io \
                                    "${PROVIDER_CONFIG_NAME}" \
                                    -o jsonpath='{.spec.backendFile}' > /workspace/backend.hcl
                                  if [ ! -s /workspace/backend.hcl ]; then
                                    echo "ERROR: backendFile empty for ClusterProviderConfig ${PROVIDER_CONFIG_NAME}" >&2
                                    exit 1
                                  fi
                              env:
                                - name: PROVIDER_CONFIG_NAME
                                  value: ""  # patched from spec.providerConfigName
                              volumeMounts:
                                - name: workspace
                                  mountPath: /workspace
                              securityContext:
                                allowPrivilegeEscalation: false
                                readOnlyRootFilesystem: true
                                capabilities:
                                  drop: [ALL]
                              # Bounded footprint: a one-shot kubectl-get init
                              # container. Requests + limits so the seed Job is
                              # schedulable and cannot starve a node.
                              resources:
                                requests:
                                  cpu: 10m
                                  memory: 32Mi
                                limits:
                                  cpu: 100m
                                  memory: 64Mi
                          containers:
                            - name: seed
                              image: ghcr.io/opentofu/opentofu:1.11.10  # pinned (no :latest)
                              imagePullPolicy: IfNotPresent
                              workingDir: /workspace
                              command: ["/bin/sh", "-ec"]
                              args:
                                - |
                                  # --- Minimal tofu root: ONLY the S3 backend +
                                  # the state-encryption scheme. No resources,
                                  # no providers. The encryption block MUST match
                                  # the consumer stage-1 root's `encryption {}`
                                  # byte-for-byte (pbkdf2 -> aes_gcm); otherwise
                                  # the pushed empty state is unreadable by the
                                  # real apply. SECURITY REVIEWER: confirm.
                                  cat > main.tf <<'EOF'
                                  terraform {
                                    backend "s3" {}
                                    encryption {
                                      key_provider "pbkdf2" "default" {
                                        passphrase = var.tf_encryption_passphrase
                                      }
                                      method "aes_gcm" "default" {
                                        keys = key_provider.pbkdf2.default
                                      }
                                      state {
                                        method = method.aes_gcm.default
                                      }
                                    }
                                  }
                                  variable "tf_encryption_passphrase" {
                                    type      = string
                                    sensitive = true
                                  }
                                  EOF

                                  # Complete the partial S3 backend from the
                                  # ClusterProviderConfig's backendFile (read by
                                  # the initContainer).
                                  tofu init -input=false -backend-config=/workspace/backend.hcl

                                  # --- Seed-IF-EMPTY guard (LOAD-BEARING) ------
                                  # Pull the current remote state. On a fresh,
                                  # empty backend (#2518) this returns EMPTY
                                  # output; on an in-use backend it returns the
                                  # encrypted-then-decrypted state JSON.
                                  set +e
                                  pulled="$(tofu state pull 2>/workspace/pull.err)"
                                  rc=$?
                                  set -e
                                  if [ "$rc" -ne 0 ]; then
                                    # ANY error (auth, network, decryption) is
                                    # AMBIGUOUS -> never push; exit non-zero so
                                    # the Job retries. Guard #1.
                                    # SECURITY (CWE-312): do NOT relay the raw
                                    # tofu stderr (/workspace/pull.err) into the
                                    # Job log. A `state pull` decryption/backend
                                    # error is a Go-SDK path whose masking of the
                                    # `sensitive` passphrase var is weaker than
                                    # plan/apply output; Job logs are often
                                    # scraped cluster-wide -> passphrase-leak
                                    # surface. The exit code already surfaces the
                                    # failure; detailed cause is in the
                                    # provider/pod logs (not the seed Job log).
                                    echo "tofu state pull failed (rc=$rc); see provider/pod logs; not seeding" >&2
                                    exit 1
                                  fi

                                  # Conservative emptiness test: only an EMPTY /
                                  # whitespace-only pull is treated as the
                                  # definitive empty-backend signal. Any state
                                  # body (even serial 0 with no resources) is
                                  # treated as EXISTING -> no-op. This errs toward
                                  # NEVER overwriting.
                                  trimmed="$(printf '%s' "$pulled" | tr -d '[:space:]')"
                                  if [ -n "$trimmed" ]; then
                                    echo "remote state already present; nothing to seed (no-op)."
                                    exit 0
                                  fi

                                  # Backend is definitively empty -> push a
                                  # minimal valid v4 state (serial 0, empty
                                  # resources/outputs). A fresh, unique lineage is
                                  # generated so OpenTofu adopts it as the initial
                                  # state.
                                  # FAIL-CLOSED lineage: read a kernel UUID; if it
                                  # is unavailable/empty, error out and exit 1
                                  # rather than substituting a non-UUID fallback.
                                  # A bare timestamp is NOT a valid UUID and may be
                                  # rejected at `tofu state push`, leaving the Job
                                  # permanently failing (silent-stuck bootstrap).
                                  # exit 1 -> the Job retries with a diagnostic and
                                  # we never push a malformed-lineage state.
                                  lineage="$(cat /proc/sys/kernel/random/uuid 2>/dev/null || true)"
                                  if [ -z "$lineage" ]; then
                                    echo "could not generate a UUID lineage; not seeding" >&2
                                    exit 1
                                  fi
                                  # Indentation-independent write (printf, not a
                                  # heredoc): a heredoc's closing EOF must land at
                                  # column 0 after YAML block-scalar de-indentation,
                                  # which is fragile under any future re-indent.
                                  # printf emits the same minimal valid v4 state
                                  # JSON regardless of indentation. The lineage is
                                  # concatenated in (rest single-quoted) so no shell
                                  # metacharacter in the JSON is interpreted.
                                  printf '%s\n' \
                                    '{' \
                                    '  "version": 4,' \
                                    '  "terraform_version": "1.11.10",' \
                                    '  "serial": 0,' \
                                    '  "lineage": "'"$lineage"'",' \
                                    '  "outputs": {},' \
                                    '  "resources": [],' \
                                    '  "check_results": null' \
                                    '}' > empty.tfstate

                                  # Guard #2: push WITHOUT -force, so OpenTofu's
                                  # own serial/lineage check is a SECOND barrier
                                  # against overwriting a higher-serial remote
                                  # that appeared between the pull and the push.
                                  tofu state push empty.tfstate
                                  echo "seeded empty state into the previously-empty backend."
                              env:
                                # Secrets only, by explicit key (NOT envFrom) —
                                # least privilege. The Secret <clusterName>-tofu-
                                # secrets is the SAME per-cluster Secret the
                                # Workspace uses (consumer-supplied, Layer 3).
                                - name: AWS_ACCESS_KEY_ID
                                  valueFrom:
                                    secretKeyRef:
                                      name: ""  # patched: <clusterName>-tofu-secrets
                                      key: aws_access_key_id
                                - name: AWS_SECRET_ACCESS_KEY
                                  valueFrom:
                                    secretKeyRef:
                                      name: ""  # patched
                                      key: aws_secret_access_key
                                - name: TF_VAR_tf_encryption_passphrase
                                  valueFrom:
                                    secretKeyRef:
                                      name: ""  # patched
                                      key: tf_encryption_passphrase
                              volumeMounts:
                                - name: workspace
                                  mountPath: /workspace
                              securityContext:
                                allowPrivilegeEscalation: false
                                # tofu writes main.tf / state into /workspace
                                # (an emptyDir), not the root FS.
                                readOnlyRootFilesystem: true
                                capabilities:
                                  drop: [ALL]
                              # tofu init + state pull/push is short-lived but
                              # needs more headroom than the init container.
                              resources:
                                requests:
                                  cpu: 25m
                                  memory: 64Mi
                                limits:
                                  cpu: 500m
                                  memory: 256Mi
            patches:
              # Object name (and the XR scoping) -> <clusterName>-tofu-state-seed.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-state-seed" }
              # Embedded Job name.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.metadata.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-state-seed" }
              # Embedded Job namespace = the XR's own namespace. The composed
              # Object is namespaced (v2), so metadata.namespace is the XR
              # namespace; mirror it into the embedded manifest so the Job is
              # created in the same namespace as the runner Secret (LOCAL refs).
              - type: FromCompositeFieldPath
                fromFieldPath: metadata.namespace
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              # Consumer-owned ServiceAccount name (convention).
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.spec.template.spec.serviceAccountName
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-state-seed" }
              # providerConfigName -> the initContainer's env var (the
              # `kubectl get clusterproviderconfig <NAME>` argument).
              - type: FromCompositeFieldPath
                fromFieldPath: spec.providerConfigName
                toFieldPath: spec.forProvider.manifest.spec.template.spec.initContainers[0].env[0].value
              # Secret name (<clusterName>-tofu-secrets) into each secretKeyRef.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-secrets" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].env[1].valueFrom.secretKeyRef.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-secrets" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.manifest.spec.template.spec.containers[0].env[2].valueFrom.secretKeyRef.name
                transforms:
                  - type: string
                    string: { type: Format, fmt: "%s-tofu-secrets" }

    # --- Step 3: derive Ready status (Workspace Ready → XCluster Ready) ------
    - step: ready
      functionRef:
        name: function-auto-ready

# The Composition is deliberately thin: it runs the consumer root and collects
# credentials. Cluster identity stays in the root's committed cluster.yaml — one
# config, whether applied by the laptop or by Crossplane.
