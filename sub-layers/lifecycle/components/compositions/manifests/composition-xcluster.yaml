# Composition for XCluster — provisions a child cluster via ONE tofu Workspace
# (provider-terraform) against the base talos-cluster module.
#
# Tofu-only (changed 2026-06-03): Cilium + ArgoCD no longer arrive as a
# downstream helm.crossplane.io/Release, but as a Talos inlineManifest at the
# cluster bootstrap itself — talos-platform-base v0.7.0 delivers ArgoCD via
# `deploy_argocd` (PR #102) and Cilium via Recipe (KPS style). The base health
# gate (`data.talos_cluster_health`) already waits for nodes=Ready (= CNI up)
# before `tofu apply` returns. A separate Helm step would therefore be redundant
# AND would race the health gate. Once the child is up, its OWN
# (inlineManifest) ArgoCD takes over GitOps reconciliation from the child repo.
# Crossplane's role ends at a running, self-bootstrapping cluster.
#
# Cluster identity (node IPs, versions, classes) comes from the XCluster claim
# (spec fields, authored by the child repo) and is mapped onto the tf.Workspace
# varmap. This repo does NOT know the concrete base module source — it arrives as
# spec.tofuModuleSource from the consumer (seeder/child repo).

apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xcluster-talos
  labels:
    provider: talos-on-bare-metal
spec:
  compositeTypeRef:
    apiVersion: platform.devoba.de/v1alpha1
    kind: XCluster

  # Workspace outputs (kubeconfig/talosconfig) land in the XCluster connection
  # secret and are projected into status.kubeconfigSecretRef.
  writeConnectionSecretsToNamespace: crossplane-system

  mode: Pipeline
  pipeline:
    # --- Step 1: tofu Workspace = the entire cluster lifecycle ---
    - step: provision-talos-cluster
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: talos-workspace
            base:
              apiVersion: tf.upbound.io/v1beta1
              kind: Workspace
              spec:
                forProvider:
                  source: Remote
                  module: ""  # patched from spec.tofuModuleSource
                  # Structured cluster definition as tfvars. varmap takes
                  # arbitrary objects/arrays (nodes[], classes{}) — unlike
                  # `vars` (flat strings only). Mapped from the XCluster spec.
                  varmap:
                    cluster_name: ""  # patched
                  enableTerraformCLILogging: true
                # ProviderConfig (Garage S3 backend + SOPS_AGE_KEY env for
                # decrypting the child tofu SOPS inputs) is supplied by Layer 3.
                providerConfigRef:
                  name: terraform-default
                # kubeconfig + talosconfig (module outputs) → connection secret.
                writeConnectionSecretToRef:
                  namespace: crossplane-system
                  name: ""  # patched: <clusterName>-cluster-conn
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string: { fmt: "talos-%s" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.forProvider.varmap.cluster_name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterName
                toFieldPath: spec.writeConnectionSecretToRef.name
                transforms:
                  - type: string
                    string: { fmt: "%s-cluster-conn" }
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tofuModuleSource
                toFieldPath: spec.forProvider.module
              # --- tfvars mapping (1:1 base talos-cluster variables) ---
              - type: FromCompositeFieldPath
                fromFieldPath: spec.talosVersion
                toFieldPath: spec.forProvider.varmap.talos_version
              - type: FromCompositeFieldPath
                fromFieldPath: spec.talosInstallVersion
                toFieldPath: spec.forProvider.varmap.talos_install_version
              - type: FromCompositeFieldPath
                fromFieldPath: spec.kubernetesVersion
                toFieldPath: spec.forProvider.varmap.kubernetes_version
              - type: FromCompositeFieldPath
                fromFieldPath: spec.clusterEndpoint
                toFieldPath: spec.forProvider.varmap.cluster_endpoint
              # Structured values: whole arrays/maps are copied.
              - type: FromCompositeFieldPath
                fromFieldPath: spec.nodes
                toFieldPath: spec.forProvider.varmap.nodes
              - type: FromCompositeFieldPath
                fromFieldPath: spec.classes
                toFieldPath: spec.forProvider.varmap.classes
              # Status: connection-secret reference back into the XCluster.
              - type: ToCompositeFieldPath
                fromFieldPath: spec.writeConnectionSecretToRef.name
                toFieldPath: status.kubeconfigSecretRef.name
              - type: ToCompositeFieldPath
                fromFieldPath: spec.writeConnectionSecretToRef.namespace
                toFieldPath: status.kubeconfigSecretRef.namespace
            connectionDetails:
              - type: FromConnectionSecretKey
                name: kubeconfig
                fromConnectionSecretKey: kubeconfig
              - type: FromConnectionSecretKey
                name: talosconfig
                fromConnectionSecretKey: talosconfig

    # --- Step 2: derive Ready status (Workspace Ready → XCluster Ready) ---
    - step: ready
      functionRef:
        name: function-auto-ready

# The Composition is deliberately slim: it brings the child cluster to the point
# where its own (base-inlineManifest) ArgoCD takes over the rest (the app-of-apps
# pulls the talos-platform-apps sub-layer OCIs from the child repo).
