# Customization Contract v2 (ADR-0024). CloudNativePG's workload (operator
# Deployment/Service/RBAC/webhooks) is the signed, pre-rendered artifact. Under the
# strict-B CRD split (ADR-0028) the postgresql.cnpg.io CRDs ship separately as
# databases/cnpg-crds (sync-wave -1) — they are NOT in this artifact. The operator is
# CLUSTER-AGNOSTIC at the freeze line: it needs no consumer-supplied secrets, config
# files, or env to run. The Postgres credentials that DO get consumed live in the
# per-app `Cluster` CRs the consumer authors in their own repos — they are not part of
# this operator artifact, so they are not freeze-line refs here.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (operator Deployment/RBAC/webhooks),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {} # cluster-agnostic: the operator expects nothing from the consumer
provided_selectors: {} # no operator-assembled config in this artifact
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0" # wave 0 = after the CRDs are established at wave -1 via databases/cnpg-crds; the operator (Deployment + RBAC + webhooks) starts once the postgresql.cnpg.io API group is available
external_dependencies: [databases/cnpg-crds] # strict-B (ADR-0028): the CRDs land first via databases/cnpg-crds at wave -1
