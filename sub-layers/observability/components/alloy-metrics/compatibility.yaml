requires:
  # Runtime sink component (deploy-time ordering for the Argo Application, not a
  # build-time dep): alloy-metrics forwards discovered Prometheus-format metrics
  # via remote-write. A Helm wrapper renders independently of whether Mimir exists
  # in-tree.
  observability/mimir: ">=v0.1.0"  # metric sink
provides:
  - name: alloy-metrics
    version:
      sot: app
      app: v1.17.0   # real Alloy app (chart 1.10.0)
      chart: 1.10.0
    api_surface: []
    capabilities:
      # Second role-scoped implementation of metrics-scrape alongside
      # sub-layers/observability/components/alloy (the DaemonSet, all-in-one
      # role). The capability-index is tool-keyed (grafana-alloy), not
      # component-keyed — both this component and the sibling DaemonSet
      # legitimately claim it.
      # swap_class MUST match the capability-index entry (catalog/README.md §59):
      # metrics-scrape is implemented via grafana-alloy → drop-in (same as the
      # sibling observability/alloy DaemonSet). The DaemonSet→StatefulSet
      # topology-migration cost is a distinct axis with no field in the current
      # schema; it is documented in README §Clustering & scaling instead (a
      # first-class per-topology swap field would be an ADR-0021 change).
      - {id: metrics-scrape, swap_class: drop-in}
