# Customization Contract v2 (ADR-0024). The clustered Grafana Alloy StatefulSet
# (+ headless cluster Service/SA/RBAC/Namespace) is the signed, pre-rendered
# workload. alloy-metrics is NOT cluster-agnostic: its pipeline — the
# ServiceMonitor/PodMonitor discovery config and the Mimir remote-write endpoint —
# is cluster-specific and differs per consumer. So the CONFIG is a single
# consumer-authored Shape (b) file: the consumer supplies the
# `alloy-metrics-config` ConfigMap with a `config.alloy` key; the workload mounts
# it at /etc/alloy and runs /etc/alloy/config.alloy. The signed workload is never
# patched.
#
# Config-mount mechanism verified against chart 1.10.0 templates (containers/
# _agent.yaml mounts the `config` volume at /etc/alloy and runs
# /etc/alloy/<configMap.key>; controllers/_pod.yaml binds the `config` volume to
# the ConfigMap named by configMap.name; _config.tpl resolves
# name=alloy-metrics-config, key=config.alloy from the helm values) —
# required.config_files maps to a real volumeMount + the file the alloy process
# reads.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (StatefulSet/headless
  # cluster Service/SA/RBAC + Namespace), published as a native-OCI Kustomize base
  # (kustomization.yaml + manifest.yaml, `task package`) — consumers attach
  # per-cluster overlays via `source.kustomize.patches`. Calibrated-friction
  # (ADR-0024): the base itself restricts nothing; the image digest is pinned at
  # admission (cosign) and dangerous classes are fenced by the consumer-side
  # ADR-0018 Kyverno safe-defaults — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs:
  config: alloy-metrics-config  # Shape (b): the full discovery+scrape pipeline config (config.alloy)
provided_selectors: {}  # no operator-assembled config / consumer-labeled CRs
required:
  env_keys: []
  config_files:  # Shape (b) — the consumer authors the full config.alloy (discovery + scrape + remote-write)
    - path: /etc/alloy/config.alloy
      ref: alloy-metrics-config
      key: config.alloy
  secret_keys: []
  selector_crs: []
sync_wave: "20"
external_dependencies: []  # Mimir is a deploy-time sink (compatibility.yaml requires:), not a build dep
