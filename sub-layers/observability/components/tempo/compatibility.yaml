requires:
  # Object-store dependency is the s3-object capability (#427), not the concrete
  # Garage component — any s3-object impl (garage/minio-operator/external-s3, all
  # drop-in) satisfies it. Bucket provisioning (traces) is consumer-side and
  # provider-specific, so it is not a catalog-component requirement.
  s3-object: "*"
provides:
  - name: tempo
    version:
      sot: app
      app: 2.10.7 # Tempo appVersion (image tag grafana/tempo:2.10.7)
      chart: 2.2.3 # grafana-community/tempo chart version
    api_surface: [] # monolithic single binary ships no CRDs / exposed API groups
    capabilities:
      - {id: traces-storage, swap_class: data-migration}
      - {id: traces-query, swap_class: drop-in}
