apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hubble-generate-certs
  namespace: kube-system
  labels:
    app.kubernetes.io/part-of: cilium
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - hubble-server-certs
      - hubble-relay-client-certs
      - hubble-relay-server-certs
      - hubble-metrics-server-certs
      - hubble-ui-client-certs
    verbs:
      - update
  # get/update on cilium-ca is the upstream certgen contract: --ca-generate +
  # --ca-reuse-secret reads the CA if present (get) or creates/updates it (update)
  # to mint the Hubble leaf certs. Namespaced Role (not ClusterRole); the platform
  # Kyverno image-verify policy must cover quay.io/cilium/certgen to bound the
  # blast radius of a CA overwrite by a compromised image.
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - cilium-ca
    verbs:
      - get
      - update
