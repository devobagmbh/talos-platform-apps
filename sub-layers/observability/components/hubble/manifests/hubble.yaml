        runAsGroup: 1001
        runAsUser: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      priorityClassName:
      serviceAccountName: "hubble-ui"
      # The backend calls the k8s API (cluster-wide get/list/watch via the hubble-ui
      # ClusterRole) to build the service map, so the SA token must be mounted.
      automountServiceAccountToken: true
