# Customization Contract v2 (ADR-0024). hubble-relay + hubble-ui + the cert
# CronJob are cluster-agnostic: the consumer supplies NOTHING here. The Hubble
# server (enable-hubble on the cilium-agent) is a SUBSTRATE precondition set on
# the base cluster, not a consumer-supplied ref of this component (see README).
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (relay + ui + cert Job/CronJob + peer Service),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
