# Customization Contract v2 (ADR-0024). blackbox-exporter is cluster-agnostic at
# the freeze line: the rendered Deployment/Service/ServiceAccount + the default
# probe modules are the signed workload, and the consumer supplies NOTHING here.
# The probe TARGETS (which endpoints each cluster probes) are NOT freeze-line
# config — they live in the consumer's Prometheus `Probe` CRs / Alloy scrape config
# (a monitoring-config concern, not one of the four ADR-0024 shapes). Custom probe
# modules, if ever needed, are a future Shape (b) config override; the catalog ships
# usable http/https/tcp/dns defaults, so nothing is REQUIRED. Same posture as
# observability/kube-state-metrics + metrics-server.
freeze_line:
  workload: rendered/manifest.yaml # Deployment/Service/ServiceAccount/ConfigMap + Namespace — never consumer-patched
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
