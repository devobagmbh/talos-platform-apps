# Customization Contract v2 (ADR-0024). kube-state-metrics is cluster-agnostic:
# the rendered Deployment/Service/ClusterRole/RBAC is the signed workload and the
# consumer supplies NOTHING here. The restricted securityContext posture is
# workload-fixed in the catalog helm values; the replica count and PNI labels are
# consumer-overlay concerns (not freeze-line config shapes). Empty freeze-line,
# same posture as observability/metrics-server.
freeze_line:
  workload: rendered/manifest.yaml # Deployment/Service/ClusterRole/RBAC + Namespace — never consumer-patched
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
