# Strict-B CRDs artifact (ADR-0028) for grafana-operator. The 13
# grafana.integreatly.org v1beta1 CRD objects are cluster-scoped and depend on
# nothing in the catalog → requires is empty.
#
# crd-bearing: true marks this as THE CRD-bearing half of the strict-B pair; the
# workload half is `observability/grafana-operator`. The build gate
# (task validate:crd-split) uses this marker to assert
# kind: CustomResourceDefinition count > 0 here (and == 0 in the workload
# artifact). The compatibility.yaml schema (schemas/compatibility.schema.json)
# permits this crd-bearing top-level field.
crd-bearing: true

requires: {}

# api-surface-only, NO capability. The grafana.integreatly.org CRDs are the API
# surface (schemas), not a swappable operational capability. The grafana-operator
# is a Kubernetes controller framework with its own exclusive API group — there is
# no alternative implementation satisfying the same group/version contract, so this
# is not a swappable platform capability. Carrying capabilities: [] here is the
# deliberate design (precedent: observability/prometheus-operator-crds and
# secrets/external-secrets-crds, both api-surface-only with no capability), NOT a
# deferral — so no `# TODO:` here.
provides:
  - name: grafana-operator-crds
    version:
      sot: crd-schema             # a CRD bundle's provenance axis is the schema it vendors (#226 A6)
      crd_schema: v5.24.0         # upstream grafana-operator release the CRD bundle is vendored from
    api_surface:
      - grafana.integreatly.org/Grafana@v1beta1
      - grafana.integreatly.org/GrafanaDashboard@v1beta1
      - grafana.integreatly.org/GrafanaDatasource@v1beta1
      - grafana.integreatly.org/GrafanaFolder@v1beta1
      - grafana.integreatly.org/GrafanaAlertRuleGroup@v1beta1
      - grafana.integreatly.org/GrafanaContactPoint@v1beta1
      - grafana.integreatly.org/GrafanaLibraryPanel@v1beta1
      - grafana.integreatly.org/GrafanaManifest@v1beta1
      - grafana.integreatly.org/GrafanaMuteTiming@v1beta1
      - grafana.integreatly.org/GrafanaNotificationPolicy@v1beta1
      - grafana.integreatly.org/GrafanaNotificationPolicyRoute@v1beta1
      - grafana.integreatly.org/GrafanaNotificationTemplate@v1beta1
      - grafana.integreatly.org/GrafanaServiceAccount@v1beta1
    capabilities: []
