requires:
  # Object-store dependency is the s3-object capability (#427), not the concrete
  # Garage component — any s3-object impl (garage/minio-operator/external-s3, all
  # drop-in) satisfies it. Bucket provisioning (blocks + ruler) is consumer-side and
  # provider-specific, so it is not a catalog-component requirement.
  s3-object: "*"
provides:
  - name: mimir
    version:
      sot: app
      app: 2.17.0 # Mimir appVersion (image tag grafana/mimir:2.17.0)
      chart: 5.8.0 # grafana/mimir-distributed chart version (classic, non-Kafka)
    api_surface: [] # classic microservices architecture ships no CRDs / exposed API groups
    capabilities:
      - {id: metrics-storage, swap_class: data-migration}
      - {id: metrics-query, swap_class: drop-in}
