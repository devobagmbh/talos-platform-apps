# Customization Contract v2 (ADR-0024). metrics-server is cluster-agnostic: the
# rendered Deployment/Service/APIService/RBAC is the signed workload and the
# consumer supplies NOTHING here. The Talos-critical kubelet args and the
# aggregation-layer TLS posture are workload-fixed in the catalog values.yaml; the
# replica count and PNI labels are consumer-overlay concerns (not freeze-line
# config shapes). Empty freeze-line, same posture as observability/hubble.
freeze_line:
  workload: rendered/manifest.yaml # Deployment/Service/APIService/RBAC + Namespace — never consumer-patched
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
