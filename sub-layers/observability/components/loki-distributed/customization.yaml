# Customization Contract v2 (ADR-0024). The Grafana Loki Distributed workload (the eight
# component Deployments/StatefulSets + their Services + PodDisruptionBudgets + RBAC + the
# chart-generated loki config ConfigMap + the dedicated Namespace) is the signed,
# pre-rendered artifact. Loki is NOT cluster-agnostic: its S3 connection (endpoint,
# region, bucket names, credentials) is per-cluster and 100% consumer-owned. The
# freeze-line keeps that connection OUT of the frozen workload: the rendered Loki config
# references ${VAR} placeholders, and Loki resolves them at runtime from consumer-supplied
# env via the `-config.expand-env=true` flag.
#
# Shapes (a) + (c): the non-secret connection scalars come from a ConfigMap via envFrom
# (Shape a), the credentials from a Secret via envFrom (Shape c). Both are wired via the
# chart's `global.extraEnvFrom`, whose scope covers every Distributed-mode component —
# VERIFIED against the rendered manifest: all eight component containers (distributor,
# ingester, querier, query-frontend, query-scheduler, index-gateway, compactor, ruler)
# carry BOTH `-config.expand-env=true` in `args` and an `envFrom:` referencing
# loki-distributed-runtime-config + loki-distributed-runtime-secret.
#
# Every required.* key below maps to a real ${VAR} reference in the rendered loki config:
#   common.storage.s3 (chunks) and ruler.storage.s3 (rules) both use ${S3_ENDPOINT},
#   ${S3_REGION}, ${S3_ACCESS_KEY_ID}, ${S3_SECRET_ACCESS_KEY}, ${S3_INSECURE}; the
#   bucketnames are ${S3_BUCKET_CHUNKS} (chunks) and ${S3_BUCKET_RULER} (ruler).
#
# The key NAMES are deliberately byte-identical to the SingleBinary sibling
# observability/loki's, so a consumer moving between the two topologies reuses its
# existing ConfigMap/Secret contents unchanged; only the ref NAMES are component-scoped.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT, published as a native-OCI
  # Kustomize base (kustomization.yaml + manifest.yaml, `task package`) — consumers
  # attach per-cluster overlays via `source.kustomize.patches`. Calibrated-friction
  # (ADR-0024): the base itself restricts nothing; the image digest is pinned at
  # admission (cosign) and dangerous classes are fenced by the consumer-side ADR-0018
  # Kyverno safe-defaults — never a catalog allowlist here. Per-cluster REPLICA COUNTS
  # are the expected overlay surface; container resources are NOT — this component
  # declares no `resource_policy` block, and schemas/compatibility.schema.json makes an
  # absent block mean class `fixed` (no consumer override), so a per-cluster resource
  # change is a catalog change today (ADR-0024 Resource-Sizing / docs#159 is the axis
  # that would change that).
  workload: rendered/manifest.yaml
provided_refs:
  env: loki-distributed-runtime-config # Shape (a): non-secret S3 connection scalars via envFrom
  secret: loki-distributed-runtime-secret # Shape (c): S3 credentials via envFrom
provided_selectors: {} # no operator-assembled config / consumer-labeled CRs
required:
  env_keys: # Shape (a) — set in the loki-distributed-runtime-config ConfigMap; expanded into the loki config at runtime
    - S3_ENDPOINT # explicit S3 endpoint URL
    - S3_REGION # S3 region
    - S3_BUCKET_CHUNKS # bucket for Loki chunks
    - S3_BUCKET_RULER # bucket for the Loki ruler
    - S3_INSECURE # S3 endpoint TLS mode (lowercase string): "false"=TLS/HTTPS (secure), "true"=plain HTTP (a TLS-less S3 endpoint)
  config_files: [] # no Shape (b) whole-file config — the loki config is catalog-rendered, only ${VAR}s are consumer-fed
  secret_keys: # Shape (c) — set in the loki-distributed-runtime-secret Secret
    - S3_ACCESS_KEY_ID # S3 access key id
    - S3_SECRET_ACCESS_KEY # S3 secret access key
  selector_crs: []
sync_wave: "10" # needs the cluster's S3 endpoint + buckets to exist first (s3-object capability)
external_dependencies: [] # the S3 object store is a deploy-time dep (compatibility.yaml `requires: s3-object`), not a build dep
