# node-exporter — Prometheus host/node metrics exporter (node_* series).
# Layer-2 default values for talos-platform-apps. This component is
# cluster-agnostic: it carries NO consumer-specific config — replica/HA topology
# is N/A (it is a per-node DaemonSet, not a Deployment), and PNI labels +
# ServiceMonitor are consumer-overlay concerns (see customization.yaml and the
# README §Consumer obligations).
#
# HOST ACCESS is essential and intentional: a node exporter MUST read the host's
# /proc, /sys and root filesystem to produce the node_* series, so the chart
# defaults hostPID: true + hostRootFsMount.enabled: true (a hostPath volume) +
# hostNetwork: true stay on. These are Baseline-forbidden fields, which is why the
# namespace enforces `pod-security.kubernetes.io/enforce: privileged`
# (manifests/00-namespace.yaml, derivation cited there).
#
# Even though the namespace is privileged, the CONTAINER securityContext is pinned
# as tight as the chart allows (runAsNonRoot 65534, drop ALL capabilities,
# readOnlyRootFilesystem) — least-privilege at the container scope is independent
# of the namespace PSA level.
#
# NOTE on chart-specific key names (chart 4.55.0, verified via `helm show values`):
#   - pod-level key is `securityContext:` (NOT `podSecurityContext:`).
#   - container-level key is `containerSecurityContext:`.
#   - the ServiceMonitor toggle is `prometheus.monitor.enabled` (default false).

metadata:
  chart: prometheus-node-exporter
  repo: https://prometheus-community.github.io/helm-charts
  version: 4.55.0 # bare SemVer — NO leading 'v'. VERIFY at push (`helm show chart prometheus-node-exporter --repo <repo> --version 4.55.0`).
  # appVersion 1.11.1 → image tag quay.io/prometheus/node-exporter:v1.11.1
  # (chart prints `v{{ .Chart.AppVersion }}` when image.tag is "" — appVersion pin,
  # NEVER :latest; not overridden here).
  namespace: node-exporter

values:
  # fullnameOverride so the rendered objects are named `node-exporter` (DaemonSet /
  # Service / ServiceAccount), matching the namespace and the README — instead of the
  # chart fullname `node-exporter-prometheus-node-exporter`. The README directs the
  # consumer to scrape the Service /metrics endpoint, so the names must agree.
  fullnameOverride: node-exporter

  # ServiceMonitor — kept DISABLED (chart default, restated explicitly). The
  # ServiceMonitor (and any PrometheusRule) is a consumer-overlay concern per
  # ADR-0024 / #183: Grafana Alloy scrapes the rendered Service /metrics endpoint
  # via its own config. Pinned false so a future chart default-flip cannot make
  # this artifact ship a CRD-typed object (the rendered workload MUST contain zero
  # CustomResourceDefinition / ServiceMonitor).
  prometheus:
    monitor:
      enabled: false

  # kube-rbac-proxy sidecar — kept DISABLED (chart default). Single-container
  # workload (one `node-exporter` container). Enabling it is a consumer-overlay
  # concern; its image is pinned upstream so no :latest Hard-Constraint risk.
  kubeRBACProxy:
    enabled: false

  # Pod-level securityContext pins (explicit-not-inherited). The chart key is
  # `securityContext` (not `podSecurityContext`). The chart's defaults are already
  # non-root 65534; pinned here so a future chart bump cannot silently weaken the
  # pod-level posture. seccompProfile RuntimeDefault is pinned (the chart omits it):
  # on a default Talos kubelet (SeccompDefault off) the container would otherwise run
  # Unconfined — the worst posture for a hostPID/hostNetwork pod reading host /proc,
  # /sys and / — and both sibling exporters (kube-state-metrics, blackbox-exporter) pin it.
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault

  # Container-level securityContext pins (explicit-not-inherited). The chart sets
  # only `readOnlyRootFilesystem: true` by default and omits
  # `allowPrivilegeEscalation`, `runAsNonRoot` and `capabilities.drop` at the
  # container scope — added EXPLICITLY here so the container runs as tight as
  # possible despite the privileged namespace (least-privilege at container scope).
  containerSecurityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 65534
    capabilities:
      drop:
        - ALL

  # Resource requests/limits. node-exporter is a per-node, node-health-critical
  # DaemonSet; with no requests it runs BestEffort QoS and is first to be OOM-killed
  # under node memory pressure — exactly when node_* metrics matter most. Conservative
  # requests make the pod Burstable; the limits cap a runaway scrape. node-exporter is
  # very light (a few MiB RSS), so these are generous headroom, not a tight bound.
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 64Mi

  # NOTE: no DaemonSet-tuning, tolerations or nodeSelector overrides. A node
  # exporter runs on every node by chart default; placement tweaks (tolerations
  # for tainted nodes, etc.) are a consumer-overlay concern (cluster-specific per
  # AGENTS.md §Hard Constraints). hostPID / hostNetwork / hostRootFsMount are left
  # at the chart defaults (all on) — essential host access, see the header comment.
