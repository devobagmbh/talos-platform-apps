# The component's own namespace. node-exporter is the sole occupant (dedicated
# namespace, sole-claimant rule), so this component ships the Namespace object — a
# shipped manifest takes precedence over Argo `managedNamespaceMetadata`, making
# the PSA posture authoritative and self-contained (see the build skill's
# CONVENTIONS.md § Namespace & PSA, and talos-platform-docs ADR-0032). The chart
# ships NO Namespace, so this manifest is concatenated into the render.
#
# enforce: privileged — DERIVED from the rendered DaemonSet pod template, NOT
# copied from a template. A node exporter MUST access the host to produce the
# node_* series, and the render carries three Baseline-forbidden fields:
#   - hostNetwork: true   (rendered/manifest.yaml — host-namespace control)
#   - hostPID: true       (rendered/manifest.yaml — host-namespace control)
#   - three hostPath volumes (proc → /proc, sys → /sys, root → /) mounted read-only
#     under /host/* (rendered/manifest.yaml — the "HostPath Volumes" Baseline control)
# Each of these is rejected by BOTH the Baseline and the Restricted PSS levels
# ("HostPath Volumes" and "Host Namespaces" are Baseline controls), so `privileged`
# is the ONLY level that admits this workload (precedent: storage-block/synology-csi,
# also privileged for host access). This is unavoidable, not a posture weakening:
# the container securityContext is still pinned tight (runAsNonRoot 65534,
# allowPrivilegeEscalation:false, capabilities.drop:[ALL], readOnlyRootFilesystem)
# — see helm/node-exporter.yaml.
#
# The consumer adds — per ADR-0032 — the PNI labels (platform.io/provide.*,
# network-*) and the pod-security.kubernetes.io/enforce-version pin (its cluster
# minor), plus audit/warn modes, in its Argo overlay; the catalog ships neither
# (they are consumer-composition concerns). See the README §Consumer obligations.
apiVersion: v1
kind: Namespace
metadata:
  name: node-exporter
  labels:
    pod-security.kubernetes.io/enforce: privileged
    platform.devoba.de/sub-layer: observability
    platform.devoba.de/component: node-exporter
