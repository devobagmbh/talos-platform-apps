# Customization Contract v2 (ADR-0024). node-exporter is cluster-agnostic: the
# rendered DaemonSet/Service/ServiceAccount is the signed workload and the consumer
# supplies NOTHING here. The host access (hostPID/hostNetwork/hostPath) and the
# tight container securityContext are workload-fixed in the catalog helm values;
# the ServiceMonitor and PNI labels are consumer-overlay concerns (not freeze-line
# config shapes). Empty freeze-line, same posture as
# observability/kube-state-metrics.
freeze_line:
  workload: rendered/manifest.yaml # DaemonSet/Service/ServiceAccount + Namespace — never consumer-patched
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
