# prometheus-operator — the WORKLOAD half of the strict-B pair (ADR-0028). Ships
# ONLY the Prometheus Operator controller (+ its RBAC + self-managed admission
# webhook). The CRD half is the SEPARATE component
# `observability/prometheus-operator-crds` (sync-wave -1); this workload (sync-wave 0)
# comes up against CRDs that already exist.
#
# Rendered from the prometheus-community `kube-prometheus-stack` chart in
# operator-only mode: every instance / exporter / scraper sub-chart and template is
# disabled via values so the render is framework-only (1 operator Deployment, its
# RBAC, both admission-webhook objects, the webhook-cert Jobs, ServiceMonitors —
# ZERO CRDs, ZERO Prometheus/Alertmanager/Grafana/DaemonSet/kube-state-metrics).
# The standalone `prometheus-operator` chart is DEPRECATED upstream — kube-prometheus-stack
# in operator-only mode is the maintained path.
#
# Cluster-specific bits (operator replica count, node placement, resource tuning) are
# consumer-owned (Layer 3) — see customization.yaml. The controller is cluster-agnostic
# at the freeze line: it needs nothing from the consumer to render a valid signed
# workload. The `release:` selector label on the rendered ServiceMonitors derives from
# .Release.Name (the consumer's ArgoCD Application name) at apply time, NOT a
# catalog-baked value — see README § selector-label contract.

metadata:
  chart: kube-prometheus-stack
  repo: https://prometheus-community.github.io/helm-charts
  version: 86.2.3  # appVersion v0.91.0 (Prometheus Operator); pairs with prometheus-operator-crds chart 29.0.0 (same appVersion). Bump the two together — see README § appVersion parity.
  # >>> VERIFY the current chart at push (`helm search repo prometheus-community/kube-prometheus-stack`).
  namespace: monitoring  # shared monitoring namespace — NOT shipped here (consumer-owned, see README § PSA)

values:
  # -- (bool) CRDs live in the SEPARATE -crds artifact (strict-B, ADR-0028). The
  # workload MUST render 0 CustomResourceDefinitions — never relax to true, or the
  # workload and -crds artifacts both own the CRDs and Argo reports "managed by
  # multiple Applications".
  crds:
    enabled: false

  # -- (bool) No bundled PrometheusRule defaults — alert/recording rules are the
  # consumer's Prometheus-instance concern (issue #20), not this framework's.
  defaultRules:
    create: false

  # --- instances / exporters / scrapers — all OFF: this component is the operator
  # framework only. Each instance (Prometheus, Alertmanager, Grafana), each exporter
  # (node-exporter DaemonSet, kube-state-metrics), and each control-plane scrape
  # target belongs to the Prometheus INSTANCE component (issue #20) or a dedicated
  # exporter component, never to the operator framework. ---

  # -- (bool) Prometheus instance — owned by issue #20, not this framework.
  prometheus:
    enabled: false
  # -- (bool) Alertmanager instance — consumer/instance concern.
  alertmanager:
    enabled: false
  # -- (bool) Grafana — the LGTM-A stack ships its own Grafana component.
  grafana:
    enabled: false
  # -- (bool) node-exporter DaemonSet — a dedicated exporter concern, not the operator.
  nodeExporter:
    enabled: false
  # -- (bool) kube-state-metrics — a dedicated exporter concern, not the operator.
  kubeStateMetrics:
    enabled: false

  # -- (bool) control-plane scrape targets — each renders a Service/Endpoints +
  # ServiceMonitor for a kube control-plane component; they belong to the Prometheus
  # instance's scrape config (issue #20), so all OFF here.
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  coreDns:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false
  # -- (bool) Thanos Ruler instance — instance concern, not the operator framework.
  thanosRuler:
    enabled: false

  # --- the ONE thing this component ships: the Prometheus Operator controller. ---
  prometheusOperator:
    # -- (bool) the operator controller Deployment + its RBAC. THE workload of this
    # component; never disable.
    enabled: true
    # -- (string) digest-pin the operator controller image (issue #175 — supply-chain
    # hardening). The chart renders `<registry>/<repository>:<tag>@sha256:<sha>`, so the
    # tag stays chart-default (appVersion v0.91.0) and the digest is the authoritative
    # pull reference. Bump this together with the chart version — VERIFY at push
    # (`crane digest quay.io/prometheus-operator/prometheus-operator:<tag>`). Digest for
    # quay.io/prometheus-operator/prometheus-operator:v0.91.0.
    image:
      sha: 9e53e13139218aca79ee000172de73355e9174ef2904585bfad9497fc71aae2d
    # -- (string) digest-pin the prometheus-config-reloader image (issue #175 —
    # supply-chain hardening). The operator injects this as its
    # `--prometheus-config-reloader` flag and runs it as a sidecar in every Prometheus
    # pod it manages, so it is as much attack surface as the operator itself. Tag stays
    # chart-default (appVersion v0.91.0). Digest for
    # quay.io/prometheus-operator/prometheus-config-reloader:v0.91.0.
    prometheusConfigReloader:
      image:
        sha: 7d9e4eea5f1139e602508871f422b0116c60e87c662f3dcd234d5ab60cd0d8c1
    # -- (string) digest-pin the Thanos default base image (issue #175). The operator
    # injects it via `--thanos-default-base-image` ONLY when a Prometheus CR requests a
    # Thanos sidecar (no catalog default enables one); pinned so the operator's full
    # injectable image surface is digest-anchored. Tag is chart-pinned at v0.41.0.
    # Digest for quay.io/thanos/thanos:v0.41.0.
    thanosImage:
      sha: cf3e9b292e4302ad4a4955b56379703aea39516607d382a57604a3d003c35d10
    admissionWebhooks:
      # -- (bool) the admission webhook that validates PrometheusRule / AlertmanagerConfig
      # CRs before they reach the operator. Shipped with the operator framework.
      enabled: true
      patch:
        # -- (bool) self-managed webhook-cert rotation via the kube-webhook-certgen
        # Jobs (createSecret + patchWebhook). This is why cert-manager is NOT a
        # dependency of this component — the operator manages its own webhook cert.
        enabled: true
        # -- (string) digest-pin the kube-webhook-certgen image (issue #175 —
        # supply-chain hardening; both the createSecret and patchWebhook Jobs share this
        # image). Chart renders `<registry>/<repository>:<tag>@sha256:<sha>`; the tag
        # stays chart-default (1.8.3). Digest for
        # ghcr.io/jkroepke/kube-webhook-certgen:1.8.3.
        image:
          sha: 8ce13c365c8e9ced0aad5ef350a53c50b7ca5817f99d856b9eec895db1056728
      certManager:
        # -- (bool) cert-manager is NOT a dependency; the patch Jobs above handle the
        # webhook cert. Never set true here — it would introduce a hard cert-manager
        # dependency the strict-B pair does not declare.
        enabled: false
