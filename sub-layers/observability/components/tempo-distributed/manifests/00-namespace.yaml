# The component's own namespace. tempo-distributed is the sole catalog occupant
# (dedicated namespace), so this component ships the Namespace object — a shipped manifest
# takes precedence over Argo `managedNamespaceMetadata`, making the PSA posture
# authoritative and self-contained (see the build skill's CONVENTIONS.md § Namespace &
# PSA). The namespace is deliberately distinct from the monolithic sibling's `tempo`
# namespace: the two artifacts are alternative topologies of the same store and must not
# contend over the same objects if a consumer ever has both applied during a migration.
#
# enforce: restricted — DERIVED from the rendered Distributed workload, checked against
# EVERY component pod template (distributor, ingester, querier, query-frontend, compactor),
# not just one:
#   * pod:       runAsNonRoot: true + seccompProfile: RuntimeDefault (+ runAsUser 1000,
#                runAsGroup 1000, fsGroup 1000). The chart's pod default sets only
#                `fsGroup: 1000` and OMITS seccompProfile, which would cap the namespace
#                at `baseline`; the helm values add it, so restricted holds.
#   * container: allowPrivilegeEscalation: false + capabilities.drop: [ALL] +
#                seccompProfile: RuntimeDefault (+ readOnlyRootFilesystem: true,
#                runAsNonRoot). Every container is a single Tempo binary.
#   * no Baseline-forbidden field anywhere: no hostPath volume (every non-ConfigMap volume
#     is an emptyDir or a config/runtime ConfigMap mount), no host namespace, no privileged
#     container, no host port.
# MUST NOT be relaxed below the level the workload satisfies, and MUST NOT be raised
# without re-deriving it from a fresh render — `task scan:psa-conformance` is the
# deterministic check.
#
# The consumer adds the PNI trust-anchor labels (platform.io/provide.*), the
# pod-security.kubernetes.io/enforce-version pin (its cluster minor), and the audit/warn
# modes in its Argo overlay; the catalog ships only the enforce level and the ownership
# labels. See the README § Namespace & Pod Security.
apiVersion: v1
kind: Namespace
metadata:
  name: tempo-distributed
  labels:
    pod-security.kubernetes.io/enforce: restricted
    platform.devoba.de/sub-layer: observability
    platform.devoba.de/component: tempo-distributed
