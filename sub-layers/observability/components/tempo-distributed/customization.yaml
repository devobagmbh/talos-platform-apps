# Customization Contract v2 (ADR-0024). The Grafana Tempo Distributed workload (the
# distributor/querier/query-frontend Deployments + the ingester StatefulSet + the compactor
# Deployment + their Services + PodDisruptionBudgets + the chart-generated tempo config
# ConfigMap + the dedicated Namespace) is the signed, pre-rendered artifact. Tempo is NOT
# cluster-agnostic: its S3 connection (endpoint, region, bucket name, credentials) is
# per-cluster and 100% consumer-owned. The freeze-line keeps that connection OUT of the
# frozen workload: the rendered Tempo config references ${VAR} placeholders, and Tempo
# resolves them at runtime from consumer-supplied env via the `-config.expand-env=true`
# flag (wired via `global.extraArgs` — VERIFIED rendered into every component container's
# args).
#
# Shapes (a) + (c): the non-secret connection scalars come from a ConfigMap via envFrom
# (Shape a), the credentials from a Secret via envFrom (Shape c). Both are wired via the
# chart's `global.extraEnvFrom`, whose scope covers every distributed component (the shared
# templates/_pod.tpl) — VERIFIED against the rendered manifest: the distributor, ingester,
# querier, query-frontend, and compactor containers all carry BOTH `-config.expand-env=true`
# in `args` and an `envFrom:` referencing tempo-distributed-runtime-config +
# tempo-distributed-runtime-secret.
#
# Every required.* key below maps to a real ${VAR} reference in the rendered tempo config
# (storage.trace.s3): bucket=${S3_BUCKET_TRACES}, endpoint=${S3_ENDPOINT},
# region=${S3_REGION}, access_key=${S3_ACCESS_KEY_ID}, secret_key=${S3_SECRET_ACCESS_KEY},
# insecure=${S3_INSECURE}.
#
# The key NAMES are deliberately byte-identical to the monolithic sibling
# observability/tempo's, so a consumer moving between the two topologies reuses its
# existing ConfigMap/Secret contents unchanged; only the ref NAMES are component-scoped.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT, published as a native-OCI
  # Kustomize base (kustomization.yaml + manifest.yaml, `task package`) — consumers attach
  # per-cluster overlays via `source.kustomize.patches`. Calibrated-friction (ADR-0024):
  # the base itself restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults —
  # never a catalog allowlist here. Per-cluster REPLICA COUNTS are the expected overlay
  # surface.
  workload: rendered/manifest.yaml
provided_refs:
  env: tempo-distributed-runtime-config # Shape (a): non-secret S3 connection scalars via envFrom
  secret: tempo-distributed-runtime-secret # Shape (c): S3 credentials via envFrom
provided_selectors: {} # no operator-assembled config / consumer-labeled CRs
required:
  env_keys: # Shape (a) — set in the tempo-distributed-runtime-config ConfigMap; expanded into the tempo config at runtime
    - S3_ENDPOINT # explicit S3 endpoint URL (e.g. https://garage.<cluster>:3900)
    - S3_REGION # S3 region (the platform's Garage impl uses `garage`)
    - S3_BUCKET_TRACES # bucket for Tempo trace blocks
    - S3_INSECURE # S3 endpoint TLS mode: "false"=TLS/HTTPS (default, secure), "true"=plain HTTP (a TLS-less S3 endpoint)
  config_files: [] # no Shape (b) whole-file config — the tempo config is catalog-rendered, only ${VAR}s are consumer-fed
  secret_keys: # Shape (c) — set in the tempo-distributed-runtime-secret Secret
    - S3_ACCESS_KEY_ID # S3 access key id
    - S3_SECRET_ACCESS_KEY # S3 secret access key
  selector_crs: []
sync_wave: "10" # needs the cluster's S3 endpoint + buckets to exist first (s3-object capability)
external_dependencies: [] # the S3 object store is a deploy-time dep (compatibility.yaml `requires: s3-object`), not a build dep
