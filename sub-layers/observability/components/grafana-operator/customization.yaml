# Customization Contract v2 (ADR-0024). Strict-B WORKLOAD artifact (ADR-0028): the
# Grafana Operator controller + its RBAC + Service. The controller is cluster-agnostic
# at the freeze line — it needs nothing from the consumer to render a valid, signed
# workload, so every provided/required shape is empty. Consumer configuration (watched
# namespaces, Grafana instance URLs) flows through grafana.integreatly.org CRs at
# runtime, not at catalog-bake time. The controller lands at sync-wave 0, after the
# CRDs (-crds artifact, wave -1).
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (operator Deployment + RBAC + Service),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies:
  - observability/grafana-operator-crds
