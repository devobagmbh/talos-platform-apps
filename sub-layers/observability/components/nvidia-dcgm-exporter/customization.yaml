# Customization Contract v2 (ADR-0024). nvidia-dcgm-exporter is cluster-agnostic:
# the rendered DaemonSet/Service/ServiceAccount/ConfigMap + RBAC is the signed
# workload and the consumer supplies NOTHING here. The host access
# (SYS_ADMIN + the kubelet pod-resources hostPath) is workload-fixed in the chart;
# the ServiceMonitor, the GPU-node nodeSelector, and the optional
# runtimeClassName:nvidia are consumer-overlay concerns (not freeze-line config
# shapes). Empty freeze-line, same posture as observability/node-exporter.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (DaemonSet/Service/ServiceAccount/ConfigMap + RBAC + Namespace),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
