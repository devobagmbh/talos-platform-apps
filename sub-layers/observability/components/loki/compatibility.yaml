requires:
  # Object-store dependency is the s3-object capability (#427), not the concrete
  # Garage component — any s3-object impl (garage/minio-operator/external-s3, all
  # drop-in) satisfies it. Bucket provisioning (chunks + ruler) is consumer-side and
  # provider-specific, so it is not a catalog-component requirement.
  s3-object: "*"
provides:
  - name: loki
    version:
      sot: app
      app: 3.6.7 # Loki appVersion (image tag docker.io/grafana/loki:3.6.7)
      chart: 6.55.0 # grafana/loki chart version
    api_surface: [] # SingleBinary ships no CRDs / exposed API groups
    capabilities:
      - {id: logs-storage, swap_class: data-migration}
      - {id: logs-query, swap_class: drop-in}
