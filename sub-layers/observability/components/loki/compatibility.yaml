requires:
  # s3-object capability — instanced, consumer-supplied endpoint; not a concrete component. See catalog/README.md (#427).
  s3-object: "*"
provides:
  - name: loki
    version:
      sot: app
      app: 3.6.7 # Loki appVersion (image tag docker.io/grafana/loki:3.6.7)
      chart: 6.55.0 # grafana/loki chart version
    api_surface: [] # SingleBinary ships no CRDs / exposed API groups
    capabilities:
      - {id: logs-storage, swap_class: data-migration}
      - {id: logs-query, swap_class: drop-in}
