# Customization Contract v2 (ADR-0024). The Grafana Loki SingleBinary workload (the
# StatefulSet + Services + RBAC + the chart-generated loki config ConfigMap + the
# dedicated Namespace) is the signed, pre-rendered artifact. Loki is NOT
# cluster-agnostic: its S3 connection (endpoint, region, bucket names, credentials) is
# per-cluster and 100% consumer-owned. The freeze-line keeps that connection OUT of the
# frozen workload: the rendered Loki config references ${VAR} placeholders, and Loki
# resolves them at runtime from consumer-supplied env via the `-config.expand-env=true`
# flag (verified rendered into the StatefulSet container args — chart 6.55.0,
# templates/single-binary/statefulset.yaml).
#
# Shapes (a) + (c): the non-secret connection scalars come from a ConfigMap via envFrom
# (Shape a), the credentials from a Secret via envFrom (Shape c). Both are wired onto
# the SingleBinary container's envFrom (verified rendered: `envFrom:` referencing
# loki-runtime-config + loki-runtime-secret). Every required.* key below maps to a real
# ${VAR} reference in the rendered loki config:
#   common.storage.s3 + ruler_storage.s3 use ${S3_ENDPOINT}, ${S3_REGION},
#   ${S3_ACCESS_KEY_ID}, ${S3_SECRET_ACCESS_KEY}, ${S3_INSECURE}; bucketnames use
#   ${S3_BUCKET_CHUNKS} (chunks) and ${S3_BUCKET_RULER} (ruler).
freeze_line:
  workload: rendered/manifest.yaml # StatefulSet + Services + RBAC + config ConfigMap + Namespace — never consumer-patched
provided_refs:
  env: loki-runtime-config # Shape (a): non-secret S3 connection scalars via envFrom
  secret: loki-runtime-secret # Shape (c): S3 credentials via envFrom
provided_selectors: {} # no operator-assembled config / consumer-labeled CRs
required:
  env_keys: # Shape (a) — set in the loki-runtime-config ConfigMap; expanded into the loki config at runtime
    - S3_ENDPOINT # explicit Garage S3 endpoint URL (e.g. https://garage.<cluster>:3900)
    - S3_REGION # Garage region (typically `garage`)
    - S3_BUCKET_CHUNKS # bucket for Loki chunks
    - S3_BUCKET_RULER # bucket for the Loki ruler
    - S3_INSECURE # S3 endpoint TLS mode (lowercase string): "false"=TLS/HTTPS (secure), "true"=plain HTTP (TLS-less Garage)
  config_files: [] # no Shape (b) whole-file config — the loki config is catalog-rendered, only ${VAR}s are consumer-fed
  secret_keys: # Shape (c) — set in the loki-runtime-secret Secret
    - S3_ACCESS_KEY_ID # Garage S3 access key id
    - S3_SECRET_ACCESS_KEY # Garage S3 secret access key
  selector_crs: []
sync_wave: "10" # needs the Garage S3 endpoint + buckets (storage-objects/garage, wave 0)
external_dependencies:
  - storage-objects/garage # the S3 endpoint/API (StatefulSet, wave 0)
  - storage-objects/garage-buckets # provisions the chunks + ruler buckets (wave 10)
