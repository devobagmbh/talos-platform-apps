# The component's own namespace. loki is the sole catalog occupant (dedicated
# namespace), so this component ships the Namespace object — a shipped manifest takes
# precedence over Argo `managedNamespaceMetadata`, making the PSA posture authoritative
# and self-contained (see the build skill's CONVENTIONS.md § Namespace & PSA).
#
# enforce: restricted — confirmed against the rendered SingleBinary StatefulSet pod
# template: the pod sets runAsNonRoot:true + seccompProfile RuntimeDefault, and the
# loki container sets allowPrivilegeEscalation:false + capabilities.drop:[ALL]
# (+ readOnlyRootFilesystem, runAsNonRoot, runAsUser 10001). The chart's pod default
# omits seccompProfile (would only satisfy `baseline`); the helm values add it, so the
# workload is fully restricted-compliant. The chart's rule-watching sidecar is disabled
# (sidecar.rules.enabled:false), so the pod is a single container.
#
# The consumer adds the PNI trust-anchor labels (platform.io/provide.*), the
# pod-security.kubernetes.io/enforce-version pin (its cluster minor), and the
# audit/warn modes in its Argo overlay; the catalog ships only the enforce level and
# the ownership labels. See the README §Namespace & Pod Security.
apiVersion: v1
kind: Namespace
metadata:
  name: loki
  labels:
    pod-security.kubernetes.io/enforce: restricted
    platform.devoba.de/sub-layer: observability
    platform.devoba.de/component: loki
