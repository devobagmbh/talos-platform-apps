requires:
  # Runtime sink components (deploy-time ordering for the Argo Application, not
  # build-time deps): Alloy forwards to these. A Helm wrapper renders independently
  # of whether they exist in-tree.
  observability/loki: ">=v0.1.0"  # log sink
  observability/mimir: ">=v0.1.0"  # metric sink
  observability/tempo: ">=v0.1.0"  # trace sink
provides:
  - name: alloy
    apis: [alloy@1.10.0]
    capabilities:
      - {id: logs-collect, swap_class: label-move}
      - {id: metrics-scrape, swap_class: drop-in}
      - {id: traces-collect, swap_class: label-move}
