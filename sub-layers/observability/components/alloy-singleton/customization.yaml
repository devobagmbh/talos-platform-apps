# Customization Contract v2 (ADR-0024). The Grafana Alloy Deployment (+ Service/SA
# and the hand-shipped Namespace/ClusterRole/ClusterRoleBinding) is the signed,
# pre-rendered workload. This singleton Event collector is NOT cluster-agnostic: its
# pipeline — a `loki.source.kubernetes_events` source and the Loki sink endpoint — is
# cluster-specific and differs per consumer. So the CONFIG is a single
# consumer-authored Shape (b) file: the consumer supplies the `alloy-singleton-config`
# ConfigMap with a `config.alloy` key; the workload mounts it at /etc/alloy and runs
# /etc/alloy/config.alloy. The signed workload is never patched.
#
# Shape (b) vs (c): for the default same-cluster consumer the Loki sink needs no auth,
# so a plain ConfigMap (Shape b) is correct. A consumer forwarding to a CROSS-CLUSTER
# Loki needing bearer/basic-auth credentials moves the credential portion to its own
# Shape (c) Secret — credentials are never shipped in a plain ConfigMap. See
# README §Consumer obligations.
#
# Config-mount mechanism verified against the rendered workload (chart 1.10.0): the
# `config` volume binds the ConfigMap named alloy-singleton-config and mounts it at
# /etc/alloy; the alloy container runs /etc/alloy/config.alloy — so required.config_files
# maps to a real volumeMount + the file the alloy process reads.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (Deployment/Service/SA +
  # the hand-shipped Namespace/ClusterRole/ClusterRoleBinding), published as a
  # native-OCI Kustomize base (kustomization.yaml + manifest.yaml, `task package`) —
  # consumers attach per-cluster overlays via `source.kustomize.patches`.
  # Calibrated-friction (ADR-0024): the base itself restricts nothing; the image
  # digest is pinned at admission (cosign) and dangerous classes are fenced by the
  # consumer-side ADR-0018 Kyverno safe-defaults — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs:
  config: alloy-singleton-config  # Shape (b): the full Alloy pipeline config (config.alloy)
provided_selectors: {}  # no operator-assembled config / consumer-labeled CRs
required:
  env_keys: []
  config_files:  # Shape (b) — the consumer authors the full config.alloy (events source + Loki sink)
    - path: /etc/alloy/config.alloy
      ref: alloy-singleton-config
      key: config.alloy
  secret_keys: []
  selector_crs: []
sync_wave: "20"
external_dependencies: []  # Loki is a deploy-time sink (compatibility.yaml requires:), not a build dep
