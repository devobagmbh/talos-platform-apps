# prometheus-operator-crds — strict-B CRDs artifact (ADR-0028).
# Renders ONLY the monitoring.coreos.com CustomResourceDefinitions for the
# Prometheus Operator; the controller workload is the SEPARATE component
# `observability/prometheus-operator`. CRDs are cluster-scoped, so the namespace
# below is irrelevant to the render — it is a benign placeholder only.
#
# This is the prometheus-community `prometheus-operator-crds` chart, the
# dedicated CRDs-only chart that emits exactly the 10 monitoring.coreos.com CRDs
# (no controller, no RBAC, no Service, no Namespace). The chart renders all CRDs
# by default; no toggles are needed.

metadata:
  chart: prometheus-operator-crds
  repo: https://prometheus-community.github.io/helm-charts
  version: 29.0.0  # CRD chart 29.0.0 → appVersion v0.91.0 (Prometheus Operator)
  # >>> VERIFY the current chart at push (`helm search repo prometheus-operator-crds`).
  namespace: default  # cluster-scoped CRDs — namespace is irrelevant to the render

values: {}
