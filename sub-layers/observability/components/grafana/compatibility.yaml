requires:
  # Capability-first (ADR-0021): the backends are SWAPPABLE, so grafana requires their
  # query/OIDC capabilities, not fixed component paths. grafana's helm render needs none
  # of them at build time (the datasources are consumer-supplied label-discovery
  # ConfigMaps, Shape d) — these are deploy-time, capability-satisfied deps. Hence
  # external_dependencies: [] in customization.yaml (no build/merge-order coupling).
  logs-query: "*"      # loki
  metrics-query: "*"   # mimir
  traces-query: "*"    # tempo
  identity-oidc: "*"   # dex — OIDC SSO via generic_oauth (ADR-0010)
provides:
  - name: grafana
    version:
      sot: app
      app: 13.0.2  # running Grafana app version (chart appVersion; bare — matches the rendered image tag + app.kubernetes.io/version label)
      chart: 12.4.8  # grafana-community/grafana chart version
    api_surface: []
    capabilities:
      - {id: dashboards, swap_class: label-move}
