# Customization Contract v2 (ADR-0024). The grafana Deployment/Service/SA/RBAC +
# the datasource/dashboard discovery sidecars are the signed, pre-rendered
# workload. Grafana's CONFIG (datasources, dashboards, OIDC, admin) is NOT baked:
# it is 100% consumer-owned across three contract surfaces.
#
# Override mechanism — GF_ env (Shape a + c). Grafana reads its native config from
# environment variables named GF_<SECTION>_<KEY> (verified against the chart's
# _pod.tpl env injection). The consumer supplies them in two refs the workload
# injects via envFrom: the non-secret keys (server root URL, the OIDC endpoints /
# client id / scopes) in the `grafana-runtime-config` ConfigMap, and the secret
# keys (the OIDC client secret) in the `grafana-runtime-secret` Secret. The
# catalog bakes NO GF_ literal (helm `env: {}`).
#
# admin.existingSecret choice. Setting admin.existingSecret SUPPRESSES the chart's
# literal admin Secret (verified in templates/secret.yaml: the chart bakes one
# ONLY when admin.existingSecret is empty). The admin user/password then resolve
# via secretKeyRef from `grafana-runtime-secret` using GF_-named keys
# (GF_SECURITY_ADMIN_USER / GF_SECURITY_ADMIN_PASSWORD) — valid env identifiers,
# consistent with the envFrom-injected GF_ config. So the catalog ships NO literal
# admin credential.
#
# Sidecar label discovery (Shape d). The chart's datasource + dashboard sidecars
# watch ConfigMaps in the grafana namespace by label (grafana_datasource=1 /
# grafana_dashboard=1) and import them — namespace-scoped per rbac.namespaced:
# true. The catalog ships NO datasources and NO
# dashboards; the consumer creates the labelled ConfigMaps. selector_crs below
# maps to those sidecar label watches.
#
# Every required.* key maps to a real ref in the rendered workload: env_keys ←
# envFrom grafana-runtime-config; secret_keys GF_SECURITY_ADMIN_* ←
# admin.existingSecret secretKeyRef + GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET ←
# envFrom grafana-runtime-secret; selector_crs ← sidecar ConfigMap label watch.
freeze_line:
  workload: rendered/manifest.yaml  # Deployment/Service/SA/RBAC + sidecars + Namespace — never consumer-patched
provided_refs:
  env: grafana-runtime-config  # Shape (a): non-secret GF_ env (server root URL, OIDC endpoints)
  secret: grafana-runtime-secret  # Shape (c): secret GF_ env (admin creds + OIDC client secret)
provided_selectors:
  datasources: {grafana_datasource: "1"}  # Shape (d): label the datasource ConfigMaps carry
  dashboards: {grafana_dashboard: "1"}  # Shape (d): label the dashboard ConfigMaps carry
# NOTE on `required` vs optional. The schema has only a `required` category ("what the
# consumer MUST supply"), no `optional` one — so consumer-owned-but-not-mandatory keys are
# documented inline here + in the README, not listed under required (same pattern as
# alloy/dex). OIDC is fully optional: nothing bakes GF_AUTH_GENERIC_OAUTH_ENABLED, so a
# consumer that omits the OAUTH keys still runs a valid workload. The OAUTH env + secret
# keys below are therefore RECOMMENDED-when-enabling-SSO, not required.
#   env  (grafana-runtime-config): GF_AUTH_GENERIC_OAUTH_ENABLED / _CLIENT_ID / _AUTH_URL /
#        _TOKEN_URL / _API_URL / _SCOPES
#   secret (grafana-runtime-secret): GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
required:
  env_keys:  # Shape (a) — consumer sets these in grafana-runtime-config
    - GF_SERVER_ROOT_URL  # the cluster's public root URL (OIDC redirect + correct links)
  config_files: []  # no Shape (b) merged file — grafana config is GF_ env, not a mounted file
  secret_keys:  # Shape (c) — consumer sets these in grafana-runtime-secret
    # GF_SECURITY_ADMIN_* are mandatory TODAY: the chart's admin secretKeyRef is
    # non-optional (a consumer omitting them → CreateContainerConfigError). Once the
    # upstream `optional: true` patch on grafana-community/grafana lands + releases, the
    # local admin becomes freely on/off and these move to recommended (see README §Auth).
    - GF_SECURITY_ADMIN_USER
    - GF_SECURITY_ADMIN_PASSWORD
  selector_crs:  # Shape (d) — the consumer creates + labels these ConfigMaps; the sidecars import them
    - {kind: ConfigMap, label: {grafana_datasource: "1"}}
    - {kind: ConfigMap, label: {grafana_dashboard: "1"}}
sync_wave: "20"
external_dependencies: []  # capabilities are deploy-time sinks (compatibility.yaml requires:),
                           # not build/merge-order deps — grafana's helm render needs none of
                           # loki/mimir/tempo/dex (mirrors alloy's resolved convention)
