components:
  - prometheus-operator-crds  # sync-wave -1 — strict-B CRDs artifact (ADR-0028): the monitoring.coreos.com CRDs, before the operator workload
  - prometheus-operator       # sync-wave 0  — strict-B workload artifact (ADR-0028): the operator controller (the kube-prometheus-stack chart, operator-only); CRDs in prometheus-operator-crds
  # NB: kube-prometheus-stack is a STACK (composition), not a component, so it is
  # intentionally NOT listed here — it is never built or published as an OCI
  # artifact. The operator half lives as prometheus-operator(+-crds) above; see
  # components/kube-prometheus-stack/README.md for the full composition map (#38).
  - loki                    # sync-wave 10 — needs a Garage bucket
  - mimir                   # sync-wave 10 — needs a Garage bucket
  - tempo                   # sync-wave 10 — needs a Garage bucket
  - alloy                   # sync-wave 20 — needs the Loki/Mimir/Tempo endpoints
  - grafana                 # sync-wave 20 — datasources point to Loki/Mimir/Tempo
  - hubble                  # sync-wave 0  — Cilium network-flow visibility (relay/ui); independent of LGTM, needs the Cilium-agent Hubble server
  - metrics-server          # sync-wave 0  — Resource Metrics API (HPA + kubectl top); independent, needs only the K8s control-plane API
  - kube-state-metrics      # sync-wave 0  — Kubernetes object-state metrics (kube_* series); independent, scraped by Alloy, needs only the K8s control-plane API
