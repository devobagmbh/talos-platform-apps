# Strict-B CRDs artifact (ADR-0028) for vault-config-operator. The 47
# redhatcop.redhat.io CustomResourceDefinitions are cluster-scoped and depend on
# nothing in the catalog -> requires is empty.
#
# crd-bearing: true marks this as THE CRD-bearing half of the strict-B pair; the
# workload half is `secrets/vault-config-operator`. The build gate uses this
# marker to assert kind: CustomResourceDefinition count > 0 here (and == 0 in the
# workload artifact). The compatibility.yaml schema
# (schemas/compatibility.schema.json) permits this crd-bearing top-level field.
crd-bearing: true

requires: {}

# api-surface-only, NO capability. The redhatcop.redhat.io CRDs are the API
# surface (schemas), not the swappable operational capability. The swappable
# capability `secret-config-declarative` (declarative Vault configuration via
# CRs) is provided by the workload artifact `secrets/vault-config-operator` (the
# controller Deployment + RBAC + webhooks that reconcile the
# VaultSecret/KubernetesAuthEngineRole/SecretEngineMount/etc. CRs), not by the
# CRD schemas. Carrying capabilities: [] here is the deliberate design
# (precedent: secrets/external-secrets-crds and databases/cnpg-crds, both
# api-surface-only with no capability), NOT a deferral -- so no `# TODO:` here.
provides:
  - name: vault-config-operator-crds
    version:
      sot: crd-schema             # a CRD bundle's provenance axis is the schema it vendors (#226 A6)
      crd_schema: v0.8.49         # upstream vault-config-operator chart release the CRD bundle is vendored from
    api_surface:
      - redhatcop.redhat.io/Policy@v1alpha1                    # Vault ACL policy CR
      - redhatcop.redhat.io/SecretEngineMount@v1alpha1         # secret-engine mount CR
      - redhatcop.redhat.io/KubernetesAuthEngineRole@v1alpha1  # Kubernetes auth-engine role CR
    capabilities: []
