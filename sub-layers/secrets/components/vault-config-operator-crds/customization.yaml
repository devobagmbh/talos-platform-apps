# Customization Contract v2 (ADR-0024). Strict-B CRDs artifact (ADR-0028): the
# rendered workload is purely the 47 cluster-scoped redhatcop.redhat.io CRDs. A
# CRD schema has NO consumer config surface -- no env, no config files, no
# secrets, no selector CRs -- so this component is fully cluster-agnostic: every
# provided/required shape is empty. The CRDs land at sync-wave -1, before the
# operator workload (secrets/vault-config-operator, wave 1).
freeze_line:
  workload: rendered/manifest.yaml  # the 47 vault-config-operator CRDs -- never consumer-patched
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "-1"
external_dependencies: []
