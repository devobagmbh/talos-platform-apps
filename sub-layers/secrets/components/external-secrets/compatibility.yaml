requires:
  talos-platform-base: ">=v0.4.0 <v1.0.0"
provides:
  - name: external-secrets
    apis:
      - external-secrets@2.5.0 # ESO operator + CRDs
      - external-secrets.io/v1 # ExternalSecret, ClusterSecretStore, SecretStore
      - generators.external-secrets.io/v1alpha1 # incl. GithubAccessToken (ADR-0025)
    capabilities:
      - {id: secret-sync, swap_class: rewrite-required}
