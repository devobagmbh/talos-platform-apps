requires:
  talos-platform-base: ">=v0.4.0 <v1.0.0"
provides:
  - name: external-secrets
    apis:
      # <chart>@<version>. The chart installs the API groups external-secrets.io/v1
      # (ExternalSecret, ClusterSecretStore, SecretStore) + generators.external-secrets.io/v1alpha1
      # (incl. GithubAccessToken, ADR-0025).
      - external-secrets@2.5.0
    capabilities:
      - {id: secret-sync, swap_class: rewrite-required}
