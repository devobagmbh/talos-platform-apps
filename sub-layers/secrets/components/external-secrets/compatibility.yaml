requires: {}
provides:
  - name: external-secrets
    version:
      sot: app
      app: v2.5.0
      chart: 2.5.0
    api_surface:
      - external-secrets.io/ExternalSecret@v1
      # ADR-0025: ESO must publish the GithubAccessToken generator (the consumer-side
      # GHCR-token refresh path depends on it) — declare it as part of the surface.
      - generators.external-secrets.io/GithubAccessToken@v1alpha1
    capabilities:
      - {id: secret-sync, swap_class: rewrite-required}
