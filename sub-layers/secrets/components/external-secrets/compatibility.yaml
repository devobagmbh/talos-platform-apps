# Strict-B WORKLOAD half (ADR-0028). requires the -crds artifact: the ESO operator
# reconciles the external-secrets.io / generators.external-secrets.io CRs (incl. the
# GithubAccessToken generator, ADR-0025), so those CRDs must be established first
# (strict-B ordering, ADR-0028). The CRD half is the SEPARATE component
# `secrets/external-secrets-crds` (sync-wave -1) — this workload carries 0 CRDs.
requires:
  secrets/external-secrets-crds: ">=v0.1.0"

# Provides the swappable operational capability `secret-sync` — the controller
# (Deployment + RBAC + webhooks) that reconciles the ExternalSecret/SecretStore/
# generator CRs. The CRD schemas (external-secrets.io/*, generators.external-secrets.io/*)
# are now the api-surface of the `-crds` half, NOT this workload, so api_surface is
# empty here (mirror network/multus-cni: capability on the workload, api-surface on
# the -crds half).
provides:
  - name: external-secrets
    version:
      sot: app
      app: v2.5.0
      chart: 2.5.0
    api_surface: []
    capabilities:
      - {id: secret-sync, swap_class: rewrite-required}
