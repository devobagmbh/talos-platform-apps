# Customization Contract v2 (ADR-0024). Strict-B WORKLOAD half (ADR-0028): the
# rendered workload is the ESO operator ONLY — Deployment + RBAC + webhooks, no
# CRDs (those ship in secrets/external-secrets-crds at wave -1). The operator is
# cluster-agnostic — the consumer supplies NOTHING here, so every `required` shape
# is empty and there are no `provided_refs`/`provided_selectors`. ClusterSecretStore/
# Vault auth + the consumer's generators/ExternalSecrets (e.g. the seeder GHCR
# GithubAccessToken, ADR-0025) live in the consumer repos (Layer 3), authored
# against the ESO CRDs from the -crds half. This workload lands at wave 0, after
# the CRDs (wave -1).
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (the ESO operator (Deployment + RBAC + webhooks)),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies:
  - secrets/external-secrets-crds
