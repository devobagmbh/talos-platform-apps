# External Secrets Operator (ESO) — Layer-2 default values for talos-platform-apps.
#
# Cluster-specific bits (ClusterSecretStore endpoints, Vault auth) live in the
# consumer repos (Layer 3). This file is the Helm-values default for the catalog.
#
# Strict-B WORKLOAD half (ADR-0028): this artifact renders the ESO operator only
# (Deployment + RBAC + webhooks), 0 CustomResourceDefinitions. The CRDs — including
# the generators group (generators.external-secrets.io), notably GithubAccessToken
# (the seeder mints/refreshes the GHCR pull credential without a PAT, ADR-0025) —
# are NO LONGER installed by this workload. They ship in the separate
# `secrets/external-secrets-crds` artifact, which the consumer wires at
# sync-wave -1 BEFORE this workload (wave 0).

metadata:
  chart: external-secrets
  repo: https://charts.external-secrets.io
  version: 2.5.0  # verified 2026-06 via `helm search repo`; pin/verify at push
  namespace: external-secrets

values:
  # Do NOT install CRDs from this workload (strict-B, ADR-0028). The full ESO CRD
  # set — incl. the generators (GithubAccessToken, ADR-0025) — ships in the
  # separate `secrets/external-secrets-crds` artifact at sync-wave -1, established
  # before this operator. `installCRDs` is the correct key for chart 2.x (there is
  # no crds.create/crds.enabled); set to false here, this artifact renders 0 CRDs.
  installCRDs: false

  replicaCount: 1

  # Metrics for Prometheus (observability sub-layer scrapes these).
  serviceMonitor:
    enabled: false # enabled in the consumer when kube-prometheus-stack is present

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
