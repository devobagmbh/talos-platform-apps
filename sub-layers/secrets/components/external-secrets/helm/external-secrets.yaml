# External Secrets Operator (ESO) — Layer-2 default values for talos-platform-apps.
#
# Cluster-specific bits (ClusterSecretStore endpoints, Vault auth) live in the
# consumer repos (Layer 3). This file is the Helm-values default for the catalog.
#
# CRDs include the generators group (generators.external-secrets.io) — notably
# GithubAccessToken, used by the seeder to mint/refresh the GHCR pull credential
# without a PAT (ADR-0025). They MUST be installed for that path to work.

metadata:
  chart: external-secrets
  repo: https://charts.external-secrets.io
  version: 2.5.0  # verified 2026-06 via `helm search repo`; pin/verify at push
  namespace: external-secrets

values:
  # Install all ESO CRDs, incl. the generators (GithubAccessToken, ADR-0025).
  # `installCRDs` is the correct key for chart 2.x (there is no crds.create/
  # crds.enabled); the GithubAccessToken CRD is in the rendered set.
  installCRDs: true

  replicaCount: 1

  # Metrics for Prometheus (observability sub-layer scrapes these).
  serviceMonitor:
    enabled: false # enabled in the consumer when kube-prometheus-stack is present

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
