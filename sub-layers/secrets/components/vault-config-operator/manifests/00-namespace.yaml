# The component's own namespace. vault-config-operator is the sole occupant
# (dedicated namespace), so this component ships the Namespace object — a
# shipped manifest takes precedence over Argo `managedNamespaceMetadata`,
# making the PSA posture authoritative and self-contained (see the build
# skill's CONVENTIONS.md § Namespace & PSA, and talos-platform-docs ADR-0027).
#
# enforce: restricted — the rendered pods satisfy every restricted control:
# runAsNonRoot + seccompProfile RuntimeDefault at pod level,
# allowPrivilegeEscalation: false + capabilities.drop [ALL] on the
# manager container; no hostPath, host namespaces, or host ports.
# Do not relax.
#
# The consumer adds — per ADR-0027 — the PNI labels and the
# pod-security.kubernetes.io/enforce-version pin (its cluster minor) in its
# Argo overlay; the catalog ships neither (they are consumer-composition
# concerns).
apiVersion: v1
kind: Namespace
metadata:
  name: vault-config-operator
  labels:
    pod-security.kubernetes.io/enforce: restricted
    platform.devoba.de/sub-layer: secrets
    platform.devoba.de/component: vault-config-operator
