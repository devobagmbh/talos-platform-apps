metadata:
  chart: vault-config-operator
  # The chart's dedicated index — NOT the generic redhat-cop helm-charts
  # index, which does not carry this chart.
  repo: https://redhat-cop.github.io/vault-config-operator/
  version: v0.8.49
  namespace: vault-config-operator
values:
  # -- (object) pod-level security context. runAsNonRoot matches the chart
  # default; seccompProfile is ABSENT from chart defaults and pinned here.
  # Both are required for the namespace's PSA `enforce: restricted`; the
  # pod-level seccompProfile covers the manager container (the kube-rbac-proxy
  # sidecar is inactive with `enableMonitoring: false`).
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # -- (object) manager container security context. Matches chart defaults;
  # pinned explicitly so the PSA-restricted posture is visible and immune to
  # upstream default drift.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # -- (object) manager container resources. requests match chart defaults;
  # limits.memory is ABSENT from chart defaults and required by conftest
  # base.required_resource_limits. limits.cpu is intentionally omitted
  # (Burstable QoS class, preferred for operators).
  resources:
    requests:
      cpu: 100m
      memory: 250Mi
    limits:
      memory: 512Mi
  kube_rbac_proxy:
    # -- (object) kube-rbac-proxy sidecar security context. ACTIVE ONLY when a
    # consumer overlays `enableMonitoring: true` (the catalog artifact renders
    # no sidecar); pinned so a monitoring override does not regress the
    # namespace's PSA `enforce: restricted`.
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
    # -- (object) kube-rbac-proxy sidecar resources. ACTIVE ONLY when a
    # consumer overlays `enableMonitoring: true`; mirrors the chart's request
    # and memory-limit defaults while intentionally omitting the chart's
    # limits.cpu: 500m (CPU limits are deliberately not set — conftest
    # base.required_resource_limits requires only requests.cpu,
    # requests.memory, and limits.memory). Pinned so a monitoring override
    # does not regress that gate.
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
      limits:
        memory: 128Mi
  # -- (bool) render cert-manager Certificate (x2) and Issuer (x1) for the
  # webhook serving certificate + CA injection. The chart default (false)
  # leaves `cert-manager.io/inject-ca-from` empty while both webhook
  # configurations carry `failurePolicy: Fail` — every admission request
  # would be rejected on a vanilla Kubernetes cluster. Requires
  # secrets/cert-manager (sync-wave 0) to be Healthy first — hence this
  # component's sync-wave 1.
  enableCertManager: true
  # -- (bool) ServiceMonitor stays off in the catalog artifact; the consumer
  # enables monitoring when a Prometheus stack is present.
  enableMonitoring: false
