requires:
  # Strict-B CRD half (ADR-0028): the redhatcop.redhat.io CRDs must be
  # Established (sync-wave -1) before this controller starts.
  secrets/vault-config-operator-crds: ">=v0.1.0"
  # Webhook TLS: enableCertManager renders Certificate/Issuer resources;
  # cert-manager's controller + cainjector (sync-wave 0) must be Healthy
  # before this component applies.
  secrets/cert-manager: ">=v0.1.0"
  # No secrets/vault-operator entry: a running Vault is a runtime
  # prerequisite for CR reconciliation, not a sync/build dependency —
  # each consumer-authored CR names its own Vault connection.
provides:
  - name: vault-config-operator
    version:
      sot: app
      app: v0.8.49
    api_surface: []
    capabilities:
      - id: secret-config-declarative
        swap_class: rewrite-required
