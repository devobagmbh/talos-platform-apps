# The component's own namespace. vault-operator is the sole occupant (dedicated
# namespace), so this component ships the Namespace object — a shipped manifest
# takes precedence over Argo `managedNamespaceMetadata`, making the PSA posture
# authoritative and self-contained (see the build skill's CONVENTIONS.md
# § Namespace & PSA, and talos-platform-docs ADR-0027).
#
# enforce: restricted — the operator Deployment runs fully restricted-compliant.
# Confirmed against the rendered manifest: the pod sets podSecurityContext
# runAsNonRoot:true + seccompProfile RuntimeDefault, and its single container sets
# allowPrivilegeEscalation:false + readOnlyRootFilesystem:true + capabilities.drop:[ALL].
# The chart's image already runs as a non-root UID (65534). Consumer-authored Vault
# CRs are control-plane resources reconciled into the consumer's own namespaces (no
# pods here), so this level governs the operator pod only.
#
# The consumer adds — per ADR-0027 — the PNI labels and the
# pod-security.kubernetes.io/enforce-version pin (its cluster minor) in its Argo
# overlay; the catalog ships neither (they are consumer-composition concerns).
apiVersion: v1
kind: Namespace
metadata:
  name: vault-operator
  labels:
    pod-security.kubernetes.io/enforce: restricted
    platform.devoba.de/sub-layer: secrets
    platform.devoba.de/component: vault-operator
