# Strict-B WORKLOAD half (ADR-0028). requires the -crds artifact: the vault-operator
# reconciles the vault.banzaicloud.com `Vault` CR, so that CRD must be established
# first (strict-B ordering, ADR-0028). The CRD half is the SEPARATE component
# `secrets/vault-operator-crds` (sync-wave -1) — this workload renders 0 CRDs
# (chart value `crds.install: false`).
requires:
  secrets/vault-operator-crds: ">=v0.1.0"

# Provides the swappable operational capability `vault-secrets` — the controller
# (Deployment + RBAC) that reconciles the `Vault` CR (declarative Vault instance
# management). swap_class data-migration: swapping away from vault-operator means
# migrating the stored secret data (matches the active implementation in
# catalog/capability-index.yaml). The CRD schema (vault.banzaicloud.com/Vault) is
# the api-surface of the `-crds` half, NOT this workload, so api_surface is empty
# here (mirrors secrets/external-secrets + network/multus-cni: capability on the
# workload, api-surface on the -crds half).
provides:
  - name: vault-operator
    version:
      sot: app
      app: v1.24.0
      chart: 1.24.0
    api_surface: []
    capabilities:
      - {id: vault-secrets, swap_class: data-migration}
