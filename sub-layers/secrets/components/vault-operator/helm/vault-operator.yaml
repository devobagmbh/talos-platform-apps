# Bank-Vaults Vault Operator — Layer-2 default values for talos-platform-apps.
#
# Cluster-specific bits (the Vault CR instance: storage backend, unseal config,
# HA, TLS, auth engines) live in the consumer repos (Layer 3), authored against
# the Vault CRD. This file is the Helm-values default for the catalog.
#
# Strict-B WORKLOAD half (ADR-0028): this artifact renders the operator only
# (Deployment + RBAC + Service), 0 CustomResourceDefinitions. The single CRD
# `vaults.vault.banzaicloud.com` lives in the chart's bundled `charts/crds/`
# sub-chart and is delivered by the separate `secrets/vault-operator-crds`
# artifact (sync-wave -1), which the consumer wires BEFORE this workload (wave 0).

# OCI chart: the full `oci://` reference is the `chart` value and `repo` is empty.
# Helm does not accept `--repo` with an `oci://` URL (it expects a plain chart name
# + an HTTP repo URL); the render task always passes `--repo "$repo"`, so an empty
# `repo` makes it a no-op and Helm pulls the OCI chart from `chart` directly.
metadata:
  chart: oci://ghcr.io/bank-vaults/helm-charts/vault-operator
  repo: ""
  version: 1.24.0 # verified 2026-06 via `helm show chart`; pin/verify at push
  namespace: vault-operator

values:
  # Do NOT install CRDs from this workload (strict-B, ADR-0028). The single Vault
  # CRD ships in the separate `secrets/vault-operator-crds` artifact at
  # sync-wave -1, established before this operator. `crds.install: false` disables
  # the bundled `charts/crds/` sub-chart entirely, so this artifact renders 0 CRDs.
  crds:
    install: false

  replicaCount: 1

  # Metrics for Prometheus (observability sub-layer scrapes these).
  monitoring:
    serviceMonitor:
      enabled: false # enabled in the consumer when kube-prometheus-stack is present

  # -- Pod-level security context (top-level chart key `podSecurityContext`).
  # runAsNonRoot + RuntimeDefault seccomp are restricted-profile prerequisites.
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  # -- Container-level security context (top-level chart key `securityContext`,
  # NOT crds.upgradeJob.containerSecurityContext — that sub-config never renders
  # since the upgradeJob stays disabled and crds.install is false).
  # readOnlyRootFilesystem:true is set: the operator reconciles Vault CRs and does
  # not write to its own root filesystem, so the full restricted profile holds.
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
