# Customization Contract v2 (ADR-0024). Strict-B WORKLOAD half (ADR-0028): the
# rendered workload is the Bank-Vaults Vault Operator ONLY — Deployment + RBAC +
# Service, no CRDs (the single vault.banzaicloud.com CRD ships in
# secrets/vault-operator-crds at wave -1). The operator is cluster-agnostic — the
# consumer supplies NOTHING here, so every `required` shape is empty and there are
# no `provided_refs`/`provided_selectors`. All consumer-specific Vault instance
# config (storage backend, unseal config, HA, TLS, auth engines) lives in the
# consumer repos (Layer 3), authored as `Vault` CRs against the CRD from the -crds
# half. This workload lands at wave 0, after the CRD (wave -1).
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (the vault-operator (Deployment + RBAC + Service)),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies:
  - secrets/vault-operator-crds
