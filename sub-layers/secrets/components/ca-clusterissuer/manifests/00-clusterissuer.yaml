apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-clusterissuer  # catalog-neutral name; consumers reference it via cert-manager.io/cluster-issuer: ca-clusterissuer
spec:
  ca:
    secretName: ca-key-pair  # fixed catalog-owned name; cert-manager reads this Secret from its own (cert-manager) namespace
