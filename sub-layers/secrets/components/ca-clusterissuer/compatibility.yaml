requires:
  secrets/external-secrets-crds: ">=v0.1.0"  # ExternalSecret CRD source
  secrets/external-secrets: ">=v0.1.0"  # ESO operator populates the CA Secret
provides:
  - name: ca-clusterissuer
    version:
      sot: app
      app: v1.0.0  # the cert-manager.io/v1 ClusterIssuer API surface
    api_surface: []
    capabilities:
      - {id: tls-issuance, swap_class: label-move}
