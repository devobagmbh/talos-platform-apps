requires:
  secrets/external-secrets-crds: ">=v0.1.0"  # ExternalSecret CRD source
  secrets/external-secrets: ">=v0.1.0"  # ESO operator populates the CA Secret
provides:
  - name: ca-clusterissuer
    version:
      sot: none           # thin cert-manager.io/v1 ClusterIssuer CR — no upstream app/chart/CRD-schema version axis (the CRD is base-substrate cert-manager's; precedent lifecycle/ipxe sot:none)
    api_surface: []
    capabilities:
      - {id: tls-issuance, swap_class: label-move}
