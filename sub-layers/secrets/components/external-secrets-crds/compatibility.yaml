# Strict-B CRDs artifact (ADR-0028) for external-secrets. The 23 External Secrets
# Operator CRD objects are cluster-scoped and depend on nothing in the catalog →
# requires is empty.
#
# crd-bearing: true marks this as THE CRD-bearing half of the strict-B pair; the
# workload half is `secrets/external-secrets`. The build gate uses this marker to
# assert kind: CustomResourceDefinition count > 0 here (and == 0 in the workload
# artifact). The compatibility.yaml schema (schemas/compatibility.schema.json)
# permits this crd-bearing top-level field.
crd-bearing: true

requires: {}

# api-surface-only, NO capability. The external-secrets.io and
# generators.external-secrets.io CRDs are the API surface (schemas), not the
# swappable operational capability. The swappable capability `secret-sync`
# (declarative external-secret synchronisation) is provided by the workload
# artifact `secrets/external-secrets` (the controller Deployment + RBAC + webhooks
# that reconcile the ExternalSecret/SecretStore/etc. CRs), not by the CRD schemas.
# Carrying capabilities: [] here is the deliberate design (precedent:
# network/multus-cni-crds and databases/cnpg-crds, both api-surface-only with no
# capability), NOT a deferral — so no `# TODO:` here.
provides:
  - name: external-secrets-crds
    version:
      sot: crd-schema             # a CRD bundle's provenance axis is the schema it vendors (#226 A6)
      crd_schema: v2.5.0          # upstream External Secrets Operator release the CRD bundle is vendored from
    api_surface:
      - external-secrets.io/ExternalSecret@v1                          # primary served CRD kind/group
      - generators.external-secrets.io/GithubAccessToken@v1alpha1      # GithubAccessToken generator (ADR-0025 GHCR-token refresh)
    capabilities: []
