# Strict-B CRDs artifact (ADR-0028) for the Bank-Vaults vault-operator. The single
# vault.banzaicloud.com CustomResourceDefinition is namespace-scoped and depends on
# nothing in the catalog -> requires is empty.
#
# crd-bearing: true marks this as THE CRD-bearing half of the strict-B pair; the
# workload half is `secrets/vault-operator`. The build gate uses this marker to
# assert kind: CustomResourceDefinition count > 0 here (and == 0 in the workload
# artifact). The compatibility.yaml schema (schemas/compatibility.schema.json)
# permits this crd-bearing top-level field.
crd-bearing: true

requires: {}

# api-surface-only, NO capability. The vault.banzaicloud.com CRD is the API surface
# (the Vault schema), not the swappable operational capability. The swappable
# capability `vault-secrets` (declarative Vault instance management via the Vault CR)
# is provided by the workload artifact `secrets/vault-operator` (the controller
# Deployment + RBAC that reconciles Vault CRs), not by the CRD schema. Carrying
# capabilities: [] here is the deliberate design (precedent:
# secrets/vault-config-operator-crds and databases/cnpg-crds, both api-surface-only
# with no capability), NOT a deferral -- so no `# TODO:` here.
provides:
  - name: vault-operator-crds
    version:
      sot: crd-schema             # a CRD bundle's provenance axis is the schema it vendors (#226 A6)
      crd_schema: v1.24.0         # upstream bank-vaults vault-operator chart release the CRD is vendored from
    api_surface:
      - vault.banzaicloud.com/Vault@v1alpha1   # the Vault instance CR
    capabilities: []
