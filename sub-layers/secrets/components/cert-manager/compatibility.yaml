requires:
  talos-platform-base: ">=v0.4.0 <v1.0.0"
provides:
  - name: cert-manager
    apis:
      # <chart>@<version>. The chart installs the API groups cert-manager.io/v1
      # (Certificate, ClusterIssuer, Issuer, CertificateRequest) and
      # acme.cert-manager.io/v1 (Challenge, Order).
      - cert-manager@v1.20.2
    capabilities:
      - {id: tls-issuance, swap_class: label-move}
