# Customization Contract v2 (ADR-0024). The cert-manager controller + webhook +
# cainjector + CRDs are cluster-agnostic — the consumer supplies NOTHING here,
# so every `required` shape is empty and there are no `provided_refs`/
# `provided_selectors`. ClusterIssuers + Certificates (the consumer's TLS
# policy) live in the consumer repos (Layer 3), authored against the
# cert-manager.io CRDs this component installs.
freeze_line:
  workload: rendered/manifest.yaml # the controller + webhook + cainjector + CRDs — never consumer-patched
provided_refs: {} # no consumer-supplied env/config/secret refs
provided_selectors: {} # no consumer-labeled CRs
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
