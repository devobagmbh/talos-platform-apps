# cert-manager — Layer-2 default values for talos-platform-apps.
#
# Ships the cert-manager controller + webhook + cainjector + its CRDs. This
# component is cluster-agnostic at the freeze line: it needs nothing from the
# consumer to render a valid, signed workload.
#
# Cluster-specific config (ClusterIssuers, Certificates, the CA-distribution
# wiring) is consumer-owned (Layer 3) and authored against the CRDs this
# component installs — never here. See customization.yaml.

metadata:
  chart: cert-manager
  repo: https://charts.jetstack.io
  version: v1.20.2  # pinned; verified live (chart == app version). Verify at push (`helm search repo jetstack/cert-manager`).
  namespace: cert-manager

values:
  # Install the cert-manager CRDs with the controller so the API groups
  # (cert-manager.io, acme.cert-manager.io) land in the same artifact at
  # sync-wave 0 — every consumer ClusterIssuer/Certificate CR depends on them.
  # `crds.enabled` is the modern key for v1.20.x; the legacy `installCRDs`
  # is deprecated.
  crds:
    enabled: true

  global:
    # Keep leader-election Leases in kube-system rather than the controller's
    # own namespace. This is the upstream-documented default and is pinned here
    # so the contract is explicit rather than inherited.
    leaderElection:
      namespace: kube-system
