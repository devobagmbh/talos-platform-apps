# The component's own namespace. cert-manager is the sole occupant (dedicated
# namespace), so this component ships the Namespace object — a shipped manifest
# takes precedence over Argo `managedNamespaceMetadata`, making the PSA posture
# authoritative and self-contained (see the build skill's CONVENTIONS.md
# § Namespace & PSA, and talos-platform-docs ADR-0027).
#
# enforce: restricted — every workload the chart renders into this namespace runs
# fully restricted-compliant. Confirmed against the rendered manifest: the
# controller (cert-manager), webhook (cert-manager-webhook), cainjector
# (cert-manager-cainjector) Deployments AND the post-install startupapicheck Job
# all set pod securityContext runAsNonRoot:true + seccompProfile RuntimeDefault,
# and every container sets allowPrivilegeEscalation:false + capabilities.drop:[ALL]
# (+ readOnlyRootFilesystem:true). Consumer-authored ClusterIssuer/Certificate
# CRs are control-plane resources (no pods), so this level governs the operator
# pods only.
#
# The consumer adds — per ADR-0027 — the PNI labels and the
# pod-security.kubernetes.io/enforce-version pin (its cluster minor) in its Argo
# overlay; the catalog ships neither (they are consumer-composition concerns).
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    pod-security.kubernetes.io/enforce: restricted
    platform.devoba.de/sub-layer: secrets
    platform.devoba.de/component: cert-manager
