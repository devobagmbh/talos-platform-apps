# The CDI operator-config singleton CR — the cdi-operator watches it and, on
# reconcile, deploys the CDI control plane (cdi-apiserver, cdi-controller,
# cdi-uploadproxy). Shipped HERE in the workload as a CATALOG DEFAULT, verbatim from
# the base migration source at v1.62.0
# (kubernetes/base/infrastructure/kubevirt-cdi/cdi-cr.yaml). A consumer who needs to
# diverge patches it via their own Argo overlay (Kustomize/values in the
# consumer-cluster repo); the bundled spec is the platform's posture default.
#
# spec.config.uploadProxyURLOverride is kept EMPTY ("") — it is cluster-specific
# (the externally-reachable URL of the cdi-uploadproxy, e.g. via an Ingress/Gateway
# the consumer owns) and MUST NOT be hardcoded in the catalog. Leaving it empty lets
# the operator derive the in-cluster default; a consumer sets it in their overlay
# when exposing the upload proxy externally.
#
# The CR carries 0 CustomResourceDefinitions (it is an instance of the cdi.kubevirt.io
# CRD shipped by compute/kubevirt-cdi-crds); it renders as exactly one `kind: CDI`
# named `cdi` in namespace cdi.
---
apiVersion: cdi.kubevirt.io/v1beta1
kind: CDI
metadata:
  name: cdi
  namespace: cdi
  labels:
    app.kubernetes.io/name: cdi
    app.kubernetes.io/version: v1.62.0
    app.kubernetes.io/component: data-importer
    app.kubernetes.io/managed-by: argocd
spec:
  config:
    uploadProxyURLOverride: ""
