# Strict-B CRDs artifact (ADR-0028) for kubevirt. Ships ONLY the single
# kubevirt.io operator-config CustomResourceDefinition (KubeVirt). The CRD object
# itself depends on nothing in the catalog -> requires is empty. The workload
# counterpart of this strict-B pair is `compute/kubevirt` (sync-wave 0), which
# carries 0 CRDs.
#
# crd-bearing: true marks this as THE CRD-bearing half of the strict-B pair. The
# build gate uses this marker to assert kind: CustomResourceDefinition count > 0
# here (and == 0 in the workload artifact). compatibility.yaml has no schema, so
# the extra top-level field is permitted.
crd-bearing: true

requires: {}

# apis-only, NO capability. The KubeVirt operator-config CRD is the API surface
# (schema), not the swappable operational capability. The vm-runtime capability is
# provided by the workload artifact `compute/kubevirt` (the operator that
# reconciles the KubeVirt CR into the virtualization control plane), not by the CRD
# schema. Carrying capabilities: [] here is the deliberate design (precedent:
# storage-block/piraeus-operator-crds and observability/prometheus-operator-crds,
# both apis-only with no capability), NOT a deferral -- so no `# TODO:` here.
provides:
  - name: kubevirt-crds
    apis:
      - kubevirt.io/KubeVirt@v1   # kubevirts.kubevirt.io (served: v1, v1alpha3)
    capabilities: []
