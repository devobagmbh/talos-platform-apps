# Customization Contract v2 (ADR-0024). Strict-B CRDs artifact (ADR-0028): the
# rendered workload is purely the single Cluster-scoped CDI CRD (cdi.kubevirt.io).
# A CRD schema has NO consumer config surface -- no env, no config files, no
# secrets, no selector CRs -- so this component is fully cluster-agnostic: every
# provided/required shape is empty. The CRD lands at sync-wave -1, before the
# kubevirt-cdi workload (compute/kubevirt-cdi, wave 0).
freeze_line:
  workload: rendered/manifest.yaml  # the single CDI CRD -- never consumer-patched
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "-1"
external_dependencies: []
