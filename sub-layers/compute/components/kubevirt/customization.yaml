# Customization Contract v2 (ADR-0024). Strict-B WORKLOAD half (ADR-0028) for
# kubevirt. The workload (the kubevirt Namespace, the virt-operator Deployment,
# operator RBAC, the kubevirt-cluster-critical PriorityClass, and the KubeVirt
# operator-config CR) is the signed, pre-rendered artifact — catalog-owned, never
# consumer-patched.
#
# The freeze line is genuinely all-empty (NOT a hollow pass): the operator's pod
# spec carries no cluster-specific URLs, credentials, node addresses, or consumer
# config references — the migrated manifest is cluster-agnostic. The bundled
# KubeVirt CR is a CATALOG DEFAULT, not a freeze-line shape: a consumer who needs to
# diverge (e.g. enable useEmulation on hardware without vt-x/amd-v, or tune the
# operator configuration) patches the CR via their own Argo overlay — that is an
# overlay patch of a catalog default, not one of the four config shapes (env /
# config / secret / selector) the operator reads through provided_refs. The operator
# does not render a label selector against consumer CRs (it watches VM/VMI/KubeVirt
# CRs via its reconcile loop), so selector_crs: [] / provided_selectors: {} (the
# cnpg / piraeus-operator precedent). A virt-operator image-version override would
# require a new migration of the upstream manifest, not a freeze-line shape.
#
# external_dependencies: the strict-B CRD half compute/kubevirt-crds (sync-wave -1)
# must be established before this workload (wave 0).
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (virt-operator workload + KubeVirt CR),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies:
  - compute/kubevirt-crds
