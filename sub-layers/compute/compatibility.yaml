# Sub-layer aggregate (components carry their own compatibility.yaml).
# Directory bracket for the sub-layer identity; OCI granularity is per component (ADR-0009).

components:
  - kubevirt-crds # strict-B CRD half — KubeVirt operator-config CRD (sync-wave -1, ADR-0028); pairs with kubevirt
  - kubevirt # strict-B workload half — virt-operator + KubeVirt CR, capability vm-runtime (sync-wave 0); requires kubevirt-crds
