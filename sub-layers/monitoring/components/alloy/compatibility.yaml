requires:
  talos-platform-base: ">=v0.4.0 <v1.0.0"
  monitoring/loki: ">=v0.1.0" # Log-Sink
  monitoring/mimir: ">=v0.1.0" # Metric-Sink
  monitoring/tempo: ">=v0.1.0" # Trace-Sink
provides:
  - name: alloy
    apis: [] # wird mit Issue #17 befüllt
    capabilities:
      - {id: logs-collect, swap_class: label-move}
      - {id: metrics-scrape, swap_class: drop-in}
      - {id: traces-collect, swap_class: label-move}
