# Customization Contract v2 (ADR-0024). Strict-B CRDs artifact (ADR-0028): the
# rendered workload is purely the Namespaced GarageNode CRD (deuxfleurs.fr). A CRD
# schema has NO consumer config surface — no env, no config files, no secrets, no
# selector CRs — so this component is fully cluster-agnostic: every provided/required
# shape is empty. The CRD lands at sync-wave -1, before the garage workload
# (storage-objects/garage, wave 0).
freeze_line:
  # The GarageNode CRD, published as a native-OCI Kustomize base (kustomization.yaml +
  # manifest.yaml, `task package` per apps#508) so the consumer wires the -crds Argo
  # Application as an oci:// source (sourceType=Kustomize), sync-wave -1, Prune=false
  # (ADR-0028 strict-B). A CRD schema has no consumer config surface, so there is nothing
  # to overlay here — the base is consumed as-is; this migrates the artifact FORM
  # (chart-OCI → native-OCI) to match the catalog-wide move (cf. observability/mimir #548).
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "-1"
external_dependencies: []
