# Strict-B CRDs artifact (ADR-0028) for garage. Ships ONLY the GarageNode
# CustomResourceDefinition (garagenodes.deuxfleurs.fr). The GarageNode CR is
# Namespaced, but the CRD object itself depends on nothing in the catalog →
# requires is empty. The workload counterpart of this strict-B pair is
# `storage-objects/garage` (sync-wave 0), which carries 0 CRDs.
#
# crd-bearing: true marks this as THE CRD-bearing half of the strict-B pair. The
# build gate uses this marker to assert kind: CustomResourceDefinition count > 0
# here (and == 0 in the workload artifact). The compatibility.yaml schema
# (schemas/compatibility.schema.json) permits this crd-bearing top-level field.
crd-bearing: true

requires: {}

# api-surface-only, NO capability. The deuxfleurs.fr GarageNode CRD is the API surface
# (schema), not the swappable operational capability. The capability `s3-object` is
# provided by the workload artifact `storage-objects/garage` (the garage StatefulSet
# that serves the S3 API), not by the CRD schema. Carrying capabilities: [] here is
# the deliberate design (precedent: network/multus-cni-crds and
# observability/prometheus-operator-crds, both api-surface-only with no capability), NOT a
# deferral — so no `# TODO:` here.
provides:
  - name: garage-crds
    version:
      sot: crd-schema
      crd_schema: v2.3.0   # FLAG: confirm — deuxfleurs.fr/GarageNode provenance release (aligned to garage v2.3.0)
    api_surface:
      - deuxfleurs.fr/GarageNode@v1
    capabilities: []
