# Strict-B WORKLOAD artifact (ADR-0028) for garage. The garage StatefulSet +
# Services + RBAC. The CRD half is the SEPARATE component
# `storage-objects/garage-crds` (sync-wave -1) — this workload carries 0 CRDs
# (the catalog sets `garage.kubernetesSkipCrd: true`).
#
# requires the -crds artifact: the garage ClusterRole grants
# `deuxfleurs.fr/garagenodes` and the binary reconciles GarageNode CRs for k8s peer
# discovery, so the GarageNode CRD must be established first (strict-B ordering).
requires:
  storage-objects/garage-crds: ">=v0.1.0"
provides:
  - name: garage
    version:
      sot: app
      app: v2.3.0   # real Garage app (apis[] held chart 0.9.3)
      chart: 0.9.3
    api_surface: []
    capabilities:
      - {id: s3-object, swap_class: drop-in}
