# Customization Contract v2 (ADR-0024). The local-path-provisioner workload
# (Namespace, RBAC, Deployment, StorageClass, ConfigMap) is the signed,
# pre-rendered artifact — fully cluster-agnostic. The consumer's only obligation
# is a Talos UserVolumeConfig mounting a disk at /var/mnt/local-path-provisioner,
# which is out-of-band substrate (machineconfig), NOT a provided_refs shape.
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (Deployment + StorageClass + RBAC + config ConfigMap + Namespace),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies: []
