# Customization Contract v2 (ADR-0024). Workload half (ADR-0028 strict-B) of the
# snapshot-controller pair. The snapshot-controller is a cluster singleton driven
# entirely by the presence of snapshot API objects (VolumeSnapshot etc.); it has
# NO cluster-specific config surface in its own manifest — no env, no config files,
# no secrets, no selector CRs. The dedicated namespace name (`snapshot-controller`)
# is a catalog default, not a consumer override. The webhook is disabled with
# autogenerate=false, so the render is deterministic and Secret-free. Every
# provided/required shape is therefore genuinely (not vacuously) empty. The
# workload lands at sync-wave 0, after the CRDs (storage-block/snapshot-controller-crds,
# wave -1).
freeze_line:
  # The signed pre-rendered manifest is the workload DEFAULT (the snapshot-controller Deployment + RBAC + Namespace),
  # published as a native-OCI Kustomize base (kustomization.yaml + manifest.yaml,
  # `task package` per apps#508) — consumers attach per-cluster overlays via
  # `source.kustomize.patches`. Calibrated-friction (ADR-0024): the base itself
  # restricts nothing; the image digest is pinned at admission (cosign) and
  # dangerous classes are fenced by the consumer-side ADR-0018 Kyverno safe-defaults
  # — never a catalog allowlist here.
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies:
  - storage-block/snapshot-controller-crds
