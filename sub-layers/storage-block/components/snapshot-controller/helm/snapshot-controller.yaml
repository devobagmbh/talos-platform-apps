# snapshot-controller — the cluster-singleton CSI snapshot controller (the
# WORKLOAD half of the strict-B pair). It watches VolumeSnapshot /
# VolumeSnapshotContent (and group-snapshot) objects and drives the CSI
# snapshotter sidecar to create/delete snapshots. The six CRDs that define the
# `snapshot.storage.k8s.io` + `groupsnapshot.storage.k8s.io` API surface ship in
# the SEPARATE component `storage-block/snapshot-controller-crds` (sync-wave -1);
# this workload carries 0 CRDs (strict-B, ADR-0028).
#
# This is the piraeus.io `snapshot-controller` chart (a repackaging of
# kubernetes-csi/external-snapshotter). Here `installCRDs: false` (the CRDs are
# the sibling artifact) and `controller.enabled: true` renders the
# snapshot-controller Deployment + its cluster-scoped RBAC. The optional
# conversion webhook is disabled; a consumer needing multi-version API conversion
# can enable it with a cert-manager-issued TLS overlay in their consumer repo.
#
# The cluster-singleton guarantee is leader-election (`controller.args
# .leaderElection: true` → `--leader-election=true`), NOT a pinned replicaCount —
# replicaCount is a consumer-owned cluster property (ADR-0024) and is not set here.

metadata:
  chart: snapshot-controller
  repo: https://piraeus.io/helm-charts/
  version: 5.0.4  # chart 5.0.4 → appVersion v8.5.0 (kubernetes-csi/external-snapshotter)
  # >>> VERIFY at push: `helm show chart piraeus/snapshot-controller --version 5.0.4`.
  # `metadata.namespace` drives `helm template --namespace`; without it the
  # workload renders into `default` while the PSA `enforce: restricted` label is on
  # the `snapshot-controller` namespace (manifests/00-namespace.yaml) → a false-green
  # PSA conformance gate. Keep it equal to the shipped Namespace name.
  namespace: snapshot-controller

values:
  # -- Do NOT render the CRDs here; they ship in the sibling
  # `storage-block/snapshot-controller-crds` artifact (strict-B, ADR-0028).
  installCRDs: false
  controller:
    # -- Render the snapshot-controller Deployment + its cluster-scoped RBAC.
    enabled: true
    args:
      # -- Cluster-singleton via leader-election (chart default true; pinned
      # explicitly). Renders `- --leader-election=true` in the container args.
      # No replicaCount pin — that is a consumer-owned cluster property (ADR-0024).
      leaderElection: true
    # -- Resource requests/limits for the snapshot-controller container. Chart
    # default is `{}`, which fails the `base.required_resource_limits` conftest
    # gate. These are CATALOG-DEFAULT baselines for a lightweight cluster-singleton
    # controller (a single reconcile loop, no data path) — NOT consumer-specific.
    # `limits.cpu` is intentionally omitted to avoid CPU throttling of the
    # reconcile loop; the gate requires only requests.cpu/memory + limits.memory.
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
    # -- CONTAINER-level securityContext (controller.securityContext). The chart
    # default already sets capabilities.drop=[ALL], readOnlyRootFilesystem=true,
    # runAsNonRoot=true, runAsUser=1000 but omits allowPrivilegeEscalation, which
    # PSA `restricted` requires — pin it here.
    securityContext:
      # -- Required for PSA `restricted`; absent from the chart default.
      allowPrivilegeEscalation: false
    # -- POD-level securityContext (controller.podSecurityContext; chart default
    # {}). PSA `restricted` requires a RuntimeDefault seccomp profile.
    podSecurityContext:
      seccompProfile:
        # -- Required for PSA `restricted`; absent from the chart default.
        type: RuntimeDefault
  webhook:
    # -- Disable the optional snapshot-conversion-webhook (Deployment + Service).
    enabled: false
    tls:
      # -- REQUIRED alongside `webhook.enabled: false`: prevents the chart from
      # rendering a non-deterministic autogenerated TLS Secret
      # (`<release>-conversion-webhook`) into the workload artifact.
      autogenerate: false
