# snapshot-controller-crds — strict-B CRDs artifact (ADR-0028).
# Renders ONLY the 6 external-snapshotter CustomResourceDefinitions (the
# snapshot.storage.k8s.io and groupsnapshot.storage.k8s.io API groups). The
# snapshot-controller Deployment is the SEPARATE workload component
# `storage-block/snapshot-controller` (sync-wave 0), which carries 0 CRDs.
#
# This is the piraeus.io `snapshot-controller` chart (a repackaging of
# kubernetes-csi/external-snapshotter). The chart renders its CRDs as regular
# Helm-managed resources gated by `installCRDs`, so a CRDs-only artifact sets
# installCRDs=true and disables every other component:
#   - controller.enabled=false   → no snapshot-controller Deployment / RBAC
#   - webhook.enabled=false       → no conversion-webhook Deployment / Service
#   - webhook.tls.autogenerate=false → REQUIRED alongside webhook.enabled=false;
#       without it the chart still renders a non-deterministic autogenerated TLS
#       Secret (`<release>-conversion-webhook`) that would leak into this artifact.
# With this combination the render is deterministic: exactly 6 CRDs, zero other
# objects.

metadata:
  chart: snapshot-controller
  repo: https://piraeus.io/helm-charts/
  version: 5.0.4  # chart 5.0.4 → appVersion v8.5.0 (kubernetes-csi/external-snapshotter)
  # >>> VERIFY at push: `helm show chart piraeus/snapshot-controller --version 5.0.4`.
  namespace: kube-system  # cluster-scoped CRDs — namespace is immaterial to the render

values:
  # -- Render the chart-bundled CustomResourceDefinitions (the sole purpose of
  # this artifact).
  installCRDs: true
  controller:
    # -- Disable the snapshot-controller Deployment + RBAC; the workload ships in
    # the sibling `storage-block/snapshot-controller` component.
    enabled: false
  webhook:
    # -- Disable the optional snapshot-conversion-webhook (Deployment + Service).
    enabled: false
    tls:
      # -- REQUIRED alongside `webhook.enabled: false`: prevents the chart from
      # rendering a non-deterministic autogenerated TLS Secret into the artifact.
      autogenerate: false
