# Customization Contract v2 (ADR-0024). Strict-B CRDs artifact (ADR-0028): the
# rendered workload is purely the six external-snapshotter CRDs
# (snapshot.storage.k8s.io + groupsnapshot.storage.k8s.io). A CRD schema has NO
# consumer config surface — no env, no config files, no secrets, no selector CRs —
# so this component is fully cluster-agnostic: every provided/required shape is
# empty. The CRDs land at sync-wave -1, before the snapshot-controller workload
# (storage-block/snapshot-controller, wave 0).
freeze_line:
  # The six snapshot CRDs, published as a native-OCI Kustomize base (kustomization.yaml +
  # manifest.yaml, `task package` per apps#508) so the consumer wires the -crds Argo
  # Application as an oci:// source (sourceType=Kustomize), sync-wave -1, Prune=false
  # (ADR-0028 strict-B). A CRD schema has no consumer config surface, so there is nothing
  # to overlay here — the base is consumed as-is; this migrates the artifact FORM
  # (chart-OCI → native-OCI) to match the catalog-wide move (cf. observability/mimir #548).
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "-1"
external_dependencies: []
