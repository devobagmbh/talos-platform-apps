requires: {} # no catalog-internal dependencies; the iscsi-tools substrate need is capability-form, not a version pin (#71)
provides:
  - name: democratic-csi
    version:
      sot: app
      app: v1.9.5        # democratic-csi driver — the running storage software
      chart: 0.15.1      # democratic-csi helm chart (apis[] had declared this chart version)
      artifacts:
        - {image: ghcr.io/democratic-csi/democratic-csi, version: v1.9.5}
        - {image: ghcr.io/democratic-csi/csi-grpc-proxy, version: v0.5.7}
    api_surface: []
    capabilities:
      - {id: block-storage-network, swap_class: data-migration}  # iSCSI LUNs from an external NAS/SAN (ZFS/TrueNAS); defined in catalog/capability-index.yaml
