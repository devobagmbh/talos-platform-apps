# piraeus-operator workload — strict-B WORKLOAD half (ADR-0028), 0 CRDs.
# Extracted verbatim from the upstream piraeus-operator release manifest.yaml at
# tag v2.10.7
# (https://github.com/piraeusdatastore/piraeus-operator/releases/download/v2.10.7/manifest.yaml)
# via `yq 'select(.kind != "CustomResourceDefinition")'`, minus the Namespace
# (which ships in 00-namespace.yaml). The four piraeus.io CRDs ship in the
# SEPARATE strict-B artifact storage-block/piraeus-operator-crds (sync-wave -1).
#
# Content (verbatim, NOT hand-edited): ServiceAccounts, Roles/ClusterRoles +
# RoleBindings/ClusterRoleBindings for the controller-manager and gencert; the
# ConfigMap piraeus-operator-image-config (bakes linstor-server v1.33.3 et al.);
# the Service piraeus-operator-webhook-service; the Deployments
# piraeus-operator-controller-manager and piraeus-operator-gencert; and the
# ValidatingWebhookConfiguration piraeus-operator-validating-webhook-configuration
# (failurePolicy: Fail — webhook TLS is self-managed by the gencert Deployment, no
# cert-manager dependency). Only image quay.io/piraeusdatastore/piraeus-operator:v2.10.7
# is pinned (no :latest). replicas are the upstream default (1); any deviation is a
# consumer-overlay concern, not pinned here.
