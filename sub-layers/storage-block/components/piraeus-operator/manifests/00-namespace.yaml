# piraeus-operator's own namespace. piraeus-operator is the sole catalog occupant
# (dedicated namespace), so this workload artifact ships the Namespace object — a
# shipped manifest takes precedence over Argo `managedNamespaceMetadata`, making
# the PSA posture authoritative and self-contained (build skill CONVENTIONS.md
# § Namespace & PSA). The strict-B CRD half (storage-block/piraeus-operator-crds)
# ships NO Namespace; this workload is the sole claimant.
#
# enforce: privileged — verbatim from upstream manifest.yaml @ v2.10.7. Required
# because the operator dynamically creates privileged DRBD/Linstor satellite
# DaemonSets at runtime (those satellite pods are operator-created from a
# consumer's LinstorCluster CR and are NOT in this manifest). The operator's OWN
# pods (controller-manager, gencert) are restricted-compatible (runAsNonRoot,
# allowPrivilegeEscalation: false, readOnlyRootFilesystem: true). Kept verbatim —
# not hand-relaxed.
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/name: piraeus-datastore
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: latest
  name: piraeus-datastore
