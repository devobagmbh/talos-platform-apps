# Default StorageClass for the cluster (ADR-0026: synology-csi is the seeder's
# block-storage substrate). is-default-class so PVCs without an explicit class
# (e.g. Harbor's Postgres/registry) bind here. reclaimPolicy: Retain keeps the
# iSCSI LUN on the NAS if the PVC is deleted (safety; the upstream default).
# Empty parameters → the driver picks an available DSM volume; a consumer may
# pin dsm/location/fsType via a vendored override if multiple volumes exist.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synology-iscsi-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.san.synology.com
reclaimPolicy: Retain
allowVolumeExpansion: true
