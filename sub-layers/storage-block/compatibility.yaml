# Sub-layer aggregate (components carry their own compatibility.yaml).
# Directory bracket for the sub-layer identity; OCI granularity is per component (ADR-0009).

components:
  - piraeus-operator-crds # strict-B CRD half — 4 piraeus.io Linstor CRDs (sync-wave -1, ADR-0028); pairs with piraeus-operator
  - piraeus-operator # strict-B workload half — LINSTOR/DRBD operator, capability block-storage-replicated (sync-wave 0); requires piraeus-operator-crds
  - democratic-csi # NAS iSCSI block storage, Talos-native (nsenter) — synology-iscsi driver (sync-wave 0)
  - synology-csi # DEPRECATED: official Synology CSI; does NOT work on Talos (chroot /host). Superseded by democratic-csi.
