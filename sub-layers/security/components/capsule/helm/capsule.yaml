# Capsule operator workload — strict-B WORKLOAD artifact (ADR-0028).
# Ships the Capsule controller-manager Deployment, operator RBAC (ServiceAccount,
# ClusterRole/ClusterRoleBinding), Service, admission webhook configurations
# (ValidatingWebhookConfiguration, MutatingWebhookConfiguration), and the dedicated
# capsule-system namespace. Carries ZERO CRDs — the 11 capsule.clastix.io CRDs ship
# in the separate strict-B CRD half `security/capsule-crds` (sync-wave -1).
#
# crds.install: false — suppresses all CRD rendering so the workload renders 0
# kind: CustomResourceDefinition resources. The strict-B gate asserts this count == 0.
# podSecurityContext.enabled: true + securityContext.enabled: true — chart 0.13.7
# defaults, pinned explicitly to prevent a silent future flip. Together they produce
# the restricted-grade securityContext: runAsNonRoot, seccompProfile RuntimeDefault,
# allowPrivilegeEscalation: false, capabilities.drop: [ALL].
#
# metadata.namespace: capsule-system is load-bearing — render:one passes it as
# --namespace; without it the workload renders into `default`, a PSA mismatch.

metadata:
  chart: capsule
  repo: https://projectcapsule.github.io/charts
  version: 0.13.7
  namespace: capsule-system

values:
  crds:
    # Suppress all CRD rendering — the 11 capsule.clastix.io CRDs ship in the
    # strict-B CRD half security/capsule-crds (sync-wave -1). The strict-B gate
    # asserts kind: CustomResourceDefinition count == 0 in this artifact.
    install: false

  # Harden the controller-manager pod. Pinned explicitly (chart 0.13.7 defaults)
  # so a chart upgrade cannot silently disable these controls.
  podSecurityContext:
    enabled: true

  securityContext:
    enabled: true

  # Resource budget for the Helm pre-delete Job (kubectl wrapper). Tiny one-shot
  # job; matches the cnpg hook job precedent.
  global:
    jobs:
      kubectl:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi

  # Resource budget for the controller-manager Deployment (manager.resources in
  # chart values). The controller is a pure-Go operator with modest steady-state
  # resource usage. Sized to match the external-secrets / cnpg operator precedent
  # (50m CPU request, no CPU limit to avoid throttle-induced reconcile latency
  # spikes under admission burst).
  manager:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    # CapsuleConfiguration policy — cluster-agnostic tenancy DEFAULTS, shipped as part of
    # the rendered workload (the CR is catalog-owned; rationale, consumer guidance, and
    # the migration/override paths live in the README §CapsuleConfiguration).
    options:
      # Pinned explicitly (chart 0.13.7 default IS true) so a future chart bump cannot
      # silently drop the CapsuleConfiguration render — same rationale as the pinned
      # podSecurityContext.enabled / securityContext.enabled above.
      createConfiguration: true
      # Every authenticated principal is a Capsule-managed tenant user — the self-service
      # tenancy default (a managed principal must own a Tenant to create namespaces).
      # NOTE: this is broad — every human AND every ServiceAccount is `system:authenticated`.
      # The steady-state cluster-wide `namespaces.validating` hook (failurePolicy: Fail, no
      # namespaceSelector) would then reject namespace creation by any managed principal that
      # owns no Tenant — including platform operator SAs (ArgoCD CreateNamespace, Crossplane
      # compositions). `ignoreUserWithGroups` below carves those operator SAs back out.
      users:
        - kind: Group
          name: system:authenticated
      # Exempt the platform operator ServiceAccounts from Capsule. A SA is a member of the
      # group `system:serviceaccounts:<namespace>`, so listing the operator namespaces here
      # makes Capsule ignore every SA in them → their cluster-wide namespace/resource
      # management is not tenant-gated. (This is the REAL exemption field — the chart/CRD
      # has NO `ignoredServiceAccountRegexp`; `ignoreUserWithGroups` is the supported knob.)
      # GitOps note: an Argo-created tenant namespace is thus IGNORED, not placed — placing
      # a GitOps-created namespace in a tenant needs the `administrators` field instead;
      # that is deferred to the live owner-check (apps#506).
      # Membership test — an operator namespace is listed iff its SAs match one of:
      #   (a) they CREATE/manage namespaces: argocd, crossplane-system, capsule-system,
      #       kube-system.
      #   (b) they reconcile CR-driven resources INTO (potentially tenant) namespaces, so
      #       their writes must not be tenant-policy-gated: cert-manager (Certificate →
      #       Secret), external-secrets / vault-operator / vault-config-operator (→ Secret),
      #       cnpg-system / valkey-operator-system (DB CR → StatefulSet/Pod/Service/Secret
      #       in the CR's namespace).
      # NOT listed (fail both tests): operators whose write surface is cluster-scoped or
      # own-namespace-only — piraeus-*, the CSI drivers, and snapshot-controller (PV/DRBD/
      # VolumeSnapshotContent objects are cluster-scoped; PVCs are user-created), the
      # observability stack, metrics-server. actions-runner-controller creates runner PODS
      # only in pre-existing (Argo-created, already-exempt) namespaces — no namespace
      # creation of its own, so it needs no entry either.
      ignoreUserWithGroups:
        - system:serviceaccounts:argocd
        - system:serviceaccounts:crossplane-system
        - system:serviceaccounts:cert-manager
        - system:serviceaccounts:external-secrets
        - system:serviceaccounts:vault-operator
        - system:serviceaccounts:vault-config-operator
        - system:serviceaccounts:cnpg-system
        - system:serviceaccounts:valkey-operator-system
        - system:serviceaccounts:capsule-system
        - system:serviceaccounts:kube-system
      # Namespaces must be prefixed `<tenant>-` (collision-free, visibly tenant-scoped).
      forceTenantPrefix: true
      # Namespaces a tenant owner may never claim/create (reliable defense — forceTenantPrefix
      # alone is bypassable via a per-tenant `forceTenantPrefix: false` override). Two classes:
      #   (a) catalog-shipped namespaces — from BOTH the committed `manifests/00-namespace.yaml`
      #       set AND `helm/*.yaml` `namespace:` declarations (e.g. lifecycle/crossview →
      #       `crossview`, which is set via Helm values, not a raw 00-namespace.yaml).
      #       (kube-state-metrics is covered by `kube-.*`.)
      #   (b) platform namespaces owned by base/consumer, NOT catalog components — argocd,
      #       crossplane-system, harbor, monitoring, backstage — protected forward-looking
      #       so a tenant cannot squat them regardless of forceTenantPrefix.
      # A Taskfile generator to keep (a) in sync (sweeping both declaration styles): see #516.
      protectedNamespaceRegex: "^(kube-.*|capsule-system|argocd|crossplane-system|harbor|monitoring|backstage|alloy|arc-.*|blackbox-exporter|booter|cdi|cert-manager|chrony|cnpg-system|crossview|democratic-csi|dex|external-secrets|garage|ipxe|kubevirt|local-path-storage|loki|metrics-server|mimir|node-exporter|node-feature-discovery|nvidia-dcgm-exporter|nvidia-device-plugin|piraeus-.*|snapshot-controller|synology-csi|tempo|tetragon|valkey-operator-system|vault-config-operator|vault-operator)$"
