# Customization Contract v2 (ADR-0024). Strict-B WORKLOAD half (ADR-0028) for
# Capsule. The workload (the capsule-system Namespace, the controller-manager
# Deployment, operator RBAC, Service, and admission webhook configurations) is the
# signed, pre-rendered artifact — catalog-owned, never consumer-patched.
#
# The freeze line is genuinely all-empty (NOT a hollow pass): the Capsule
# controller-manager carries no cluster-specific URLs, credentials, node addresses,
# or consumer config references — the rendered manifest is cluster-agnostic. The
# operator reconciles Tenant CRs and applies admission guardrails purely from those
# CRs; no ConfigMap or Secret is mounted by the controller-manager pod. The
# CapsuleConfiguration CR is CATALOG-owned (shipped in the rendered workload as a
# tenancy default — a consumer-supplied one would overwrite the chart-generated
# spec.admission block → operator nil-panic; office-lab#229). Only the concrete Tenant
# CRs are consumer-owned and live in the consumer cluster repos — neither is a
# freeze-line shape (no secretKeyRef, envFrom, or volumeMount referencing consumer data
# in the rendered workload). The operator does
# not use a label selector against consumer CRs (it watches via its reconcile loop),
# so provided_selectors: {} (same pattern as compute/kubevirt — an operator-loop
# watcher, no label-selector shape). A controller-manager image-version override would
# require a new component version, not a freeze-line shape.
#
# external_dependencies: the strict-B CRD half security/capsule-crds (sync-wave -1)
# must be established before this workload (wave 0), as Tenant and the other
# capsule.clastix.io CRDs must exist before the controller starts reconciling.
freeze_line:
  # controller-manager workload + RBAC + admission webhooks + the catalog-owned
  # CapsuleConfiguration, published as a native-OCI Kustomize base (kustomization.yaml +
  # manifest.yaml, `task package` per apps#508) → the consumer wires the operator Argo
  # Application as an oci:// source (sourceType=Kustomize), sync-wave 0. The freeze line
  # stays all-empty (cluster-agnostic; see header) — the base is consumed as-is; this
  # only reflects the artifact FORM (chart-OCI → native-OCI), matching mimir #548 and the
  # capsule-crds half.
  workload: rendered/manifest.yaml
provided_refs: {}
provided_selectors: {}
required:
  env_keys: []
  config_files: []
  secret_keys: []
  selector_crs: []
sync_wave: "0"
external_dependencies:
  - security/capsule-crds
