# ArgoCD-Helm-Values für lokales Kind-Setup (prod-konform).
# Kein Ingress, kein Dex/Notifications/ApplicationSet/HA.
# Exposure läuft über Gateway-API: Gateway 'localhost-direct' + HTTPRoute
# 'argocd' (siehe local/gateway.yaml, local/argocd-route.yaml).
# UI ist auf https://argocd.localhost.direct erreichbar.

global:
  domain: argocd.localhost.direct

server:
  service:
    type: ClusterIP

  # Ingress aus — Gateway-API übernimmt
  ingress:
    enabled: false

  # Argo macht intern TLS (für gRPC-Client). Gateway terminiert Front-TLS.
  extraArgs:
    - --insecure

  replicas: 1

# Headless
dex:
  enabled: false
notifications:
  enabled: false
applicationSet:
  enabled: false

# Single-Instance Redis/Repo-Server reicht lokal
redis:
  enabled: true
redis-ha:
  enabled: false
repoServer:
  replicas: 1
controller:
  replicas: 1

configs:
  params:
    server.insecure: true

  # OCI-Helm-Repo registrieren. Argos interne helm-Aufruf-Logik schaltet
  # nur dann auf den OCI-Code-Pfad (statt 'helm pull --repo oci://...'),
  # wenn ein Repository mit enableOCI=true existiert. Wird beim
  # helm install automatisch als argocd.argoproj.io/secret-type=repository
  # Secret erzeugt — kein manueller Apply-Step.
  repositories:
    kind-registry-local:
      url: kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
      type: helm
      enableOCI: "true"
      name: kind-registry-local

# argocd-repo-server muss die mkcert-CA trusten, damit Helm-OCI-Pulls gegen
# https://kind-registry.registry.svc.cluster.local:5000 validieren. Wir mergen
# die mkcert-CA an das System-CA-Bundle und overmounten /etc/ssl/certs/ca-certificates.crt.
# Der InitContainer nutzt das Argo-Image selbst, damit das System-Bundle identisch
# zum Runtime-Container ist.
repoServer:
  volumes:
    - name: mkcert-ca
      configMap:
        name: mkcert-ca
    - name: ca-bundle
      emptyDir: {}
  initContainers:
    - name: append-mkcert-ca
      # = chart appVersion (argo-cd 9.4.5 → v3.3.2); halte diesen Tag bei einem
      # Chart-Bump synchron zur --version in Taskfile local:argo:install.
      image: quay.io/argoproj/argocd:v3.3.2
      command:
        - sh
        - -c
        - |
          set -e
          cp /etc/ssl/certs/ca-certificates.crt /shared/ca-certificates.crt
          cat /mkcert/ca.crt >> /shared/ca-certificates.crt
          echo "✓ mkcert-CA ins CA-Bundle aufgenommen ($(wc -l < /shared/ca-certificates.crt) Zeilen)"
      volumeMounts:
        - name: mkcert-ca
          mountPath: /mkcert
        - name: ca-bundle
          mountPath: /shared
  volumeMounts:
    - name: ca-bundle
      mountPath: /etc/ssl/certs/ca-certificates.crt
      subPath: ca-certificates.crt
