# ArgoCD Helm values for the local kind setup (prod-conformant).
# No Ingress, no Dex/Notifications/ApplicationSet/HA.
# Exposure runs via Gateway API: Gateway 'localhost-direct' + HTTPRoute
# 'argocd' (see local/gateway.yaml, local/argocd-route.yaml).
# UI is reachable at https://argocd.localhost.direct.

global:
  domain: argocd.localhost.direct

server:
  service:
    type: ClusterIP

  # Ingress off — Gateway API takes over
  ingress:
    enabled: false

  # Argo does TLS internally (for the gRPC client). Gateway terminates front TLS.
  extraArgs:
    - --insecure

  replicas: 1

# Headless
dex:
  enabled: false
notifications:
  enabled: false
applicationSet:
  enabled: false

# A single-instance Redis/repo-server is enough locally
redis:
  enabled: true
redis-ha:
  enabled: false
repoServer:
  replicas: 1
controller:
  replicas: 1

configs:
  params:
    server.insecure: true

  # Register the native OCI repo (ADR-0009 §OCI artifact form). ArgoCD v3.1+ uses
  # the native OCI code path for type=oci + url=oci://... — the catalog is published
  # as a generic OCI artifact (task push → oras), the Application source
  # is repoURL: oci://.../<component> + path: . and resolves as sourceType=Kustomize
  # (the tarball carries a trivial kustomization.yaml next to manifest.yaml;
  # no more Helm). The local registry allows anonymous pull, so no
  # credentials; TLS trust runs via the merged mkcert CA bundle (repoServer
  # initContainer below), not via this Secret. It is created automatically on
  # helm install as an argocd.argoproj.io/secret-type=repository Secret —
  # no manual apply step.
  repositories:
    kind-registry-local:
      url: oci://kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
      type: oci
      name: kind-registry-local

# argocd-repo-server must trust the mkcert CA so that the native OCI pulls validate
# against https://kind-registry.registry.svc.cluster.local:5000. We merge
# the mkcert CA into the system CA bundle and overmount /etc/ssl/certs/ca-certificates.crt.
# The InitContainer uses the Argo image itself, so that the system bundle is identical
# to the runtime container.
repoServer:
  volumes:
    - name: mkcert-ca
      configMap:
        name: mkcert-ca
    - name: ca-bundle
      emptyDir: {}
  initContainers:
    - name: append-mkcert-ca
      # = chart appVersion (argo-cd 9.4.5 → v3.3.2); keep this tag in sync with
      # the --version in Taskfile local:argo:install on a chart bump.
      image: quay.io/argoproj/argocd:v3.3.2
      command:
        - sh
        - -c
        - |
          set -e
          cp /etc/ssl/certs/ca-certificates.crt /shared/ca-certificates.crt
          cat /mkcert/ca.crt >> /shared/ca-certificates.crt
          echo "✓ mkcert CA added to the CA bundle ($(wc -l < /shared/ca-certificates.crt) lines)"
      volumeMounts:
        - name: mkcert-ca
          mountPath: /mkcert
        - name: ca-bundle
          mountPath: /shared
  volumeMounts:
    - name: ca-bundle
      mountPath: /etc/ssl/certs/ca-certificates.crt
      subPath: ca-certificates.crt
