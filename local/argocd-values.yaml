# ArgoCD-Helm-Values für lokales Kind-Setup (prod-konform).
# Kein Ingress, kein Dex/Notifications/ApplicationSet/HA.
# Exposure läuft über Gateway-API: Gateway 'localhost-direct' + HTTPRoute
# 'argocd' (siehe local/gateway.yaml, local/argocd-route.yaml).
# UI ist auf https://argocd.localhost.direct erreichbar.

global:
  domain: argocd.localhost.direct

server:
  service:
    type: ClusterIP

  # Ingress aus — Gateway-API übernimmt
  ingress:
    enabled: false

  # Argo macht intern TLS (für gRPC-Client). Gateway terminiert Front-TLS.
  extraArgs:
    - --insecure

  replicas: 1

# Headless
dex:
  enabled: false
notifications:
  enabled: false
applicationSet:
  enabled: false

# Single-Instance Redis/Repo-Server reicht lokal
redis:
  enabled: true
redis-ha:
  enabled: false
repoServer:
  replicas: 1
controller:
  replicas: 1

configs:
  params:
    server.insecure: true
