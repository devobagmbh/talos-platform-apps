# ArgoCD-Helm-Values für lokales Kind-Setup.
# Headless im Sinne von "kein Dex/Notifications/ApplicationSet/HA".
# UI ist via Traefik-Ingress auf argocd.localhost.direct erreichbar
# (mkcert-CA als Trust-Anker, automatisch vom System-Trust gesehen).

global:
  domain: argocd.localhost.direct

server:
  service:
    type: ClusterIP

  ingress:
    enabled: true
    controller: generic
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: mkcert-ca
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hostname: argocd.localhost.direct
    tls: true

  extraArgs:
    - --insecure  # interne TLS-Logik aus (Traefik macht TLS-Termination)

  replicas: 1

# Headless — kein OIDC, kein Notifications, kein ApplicationSet
dex:
  enabled: false
notifications:
  enabled: false
applicationSet:
  enabled: false

# Single-Instance Redis/Repo-Server reicht lokal
redis:
  enabled: true
redis-ha:
  enabled: false
repoServer:
  replicas: 1
controller:
  replicas: 1

configs:
  params:
    server.insecure: true
