# Cilium Helm values for the local Talos setup (prod-conformant).
# Cluster-specific settings are added in the Taskfile as --set flags:
# k8sServiceHost=localhost / k8sServicePort=7445 (Talos KubePrism, as in the Seeder).

# --- Talos-specific (mandatory, otherwise the cilium-agent won't start) ---
# Talos is immutable + loads no kernel modules. The default Cilium chart gives
# the clean-cilium-state InitContainer the SYS_MODULE capability → on Talos
# "operation not permitted" (clean-cilium-state crashes, node stays NotReady).
# So override caps with the Talos list (SYS_MODULE removed). Source: Talos
# docs "Deploying Cilium CNI". Applies 1:1 in prod too (base ships Cilium inline).
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
# Talos mounts cgroupv2 itself under /sys/fs/cgroup — Cilium should NOT
# automount (otherwise it collides with the Talos mount).
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# kube-proxy replacement — Cilium takes over ClusterIP/NodePort/LoadBalancer
kubeProxyReplacement: true

# CNI via Kubernetes IPAM
ipam:
  mode: kubernetes

# eBPF-based NodePort + HostPort + ExternalIPs
nodePort:
  enabled: true
hostPort:
  enabled: true
externalIPs:
  enabled: true

# Gateway API as the ingress pattern (ADR-0014)
gatewayAPI:
  enabled: true
  # NodePort mode: the Cilium Gateway service comes up as NodePort instead of LoadBalancer.
  # NodePort 30443/30080 is mapped to host 443/80 via talosctl -p.
  # The detailed patch happens after apply in the Taskfile (task local:gateway:apply).

# eBPF host routing for performance + L7 policy support
bpf:
  masquerade: true

# Operator kept lean
operator:
  replicas: 1

# Hubble (eBPF observability) — locally useful for debugging
hubble:
  enabled: true
  relay:
    enabled: true

# Cilium LB-IPAM + L2 announcements for a later switch to LoadBalancer mode.
# Currently unused; see local/cilium-l2-pool.yaml for activation.
l2announcements:
  enabled: true
