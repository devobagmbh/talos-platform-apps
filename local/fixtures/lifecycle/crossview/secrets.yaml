# Secret spec for the local crossview fixture — CONTAINS NO VALUES.
# `task local:fixtures` creates the secrets at apply time (hard constraint:
# no real secrets in the repo). Idempotent: existing secrets are kept.
#   literals:    fixed dev values (local convenience, NO real secrets).
#   generate:    keys for which a random dev value is generated.
#   fromCnpgApp: key `password` is copied from the CNPG auto-secret <cluster>-app.
#
# The DB password is NO LONGER copied as crossview-db — crossview reads it
# via values-override directly from the live crossview-pg-app (otherwise the copy
# goes stale as soon as the CNPG instance is recreated). Only the runtime secret remains here.
secrets:
  - name: crossview-runtime-secret
    literals: {admin-password: admin}   # Login: admin / admin (local dev default)
    generate: [session-secret]
