# Secret-Spec für die lokale crossview-Fixture — ENTHÄLT KEINE WERTE.
# `task local:fixtures` erzeugt die Secrets zur Apply-Zeit (Hard-Constraint:
# keine echten Secrets im Repo). Idempotent: existierende Secrets bleiben.
#   literals:    feste Dev-Werte (lokale Convenience, KEINE echten Secrets).
#   generate:    Keys, für die ein zufälliger Dev-Wert erzeugt wird.
#   fromCnpgApp: Key `password` wird aus dem CNPG-Auto-Secret <cluster>-app kopiert
#                (damit App-Passwort == DB-Passwort, ohne es zu committen).
secrets:
  - name: crossview-runtime-secret
    literals: {admin-password: admin}   # Login: admin / admin (lokaler Dev-Default)
    generate: [session-secret]
  - name: crossview-db
    fromCnpgApp: crossview-pg
