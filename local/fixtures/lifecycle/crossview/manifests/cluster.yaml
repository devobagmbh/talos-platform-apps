# Local CNPG cluster instance for crossview — TEST ENVIRONMENT ONLY.
# In prod this Cluster CR is consumer-owned (seeder repo); the catalog ships
# only the cnpg operator (capability cnpg-postgres). Here 1 instance / 1Gi suffices.
# CNPG creates the Service `crossview-pg-rw` (what crossview expects as DB_HOST) and
# the Secret `crossview-pg-app` (username/password for the `crossview` user).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: crossview-pg
  namespace: crossview
spec:
  instances: 1
  storage:
    size: 1Gi
  bootstrap:
    initdb:
      database: crossview
      owner: crossview
