# Local dex config (consumer-supplied Shape c, ADR-0024). The catalog ships NO
# config (configSecret.create:false → references this secret by name). In prod the
# consumer creates `dex-config` via SOPS/ESO with the real issuer + EntraID
# connector + staticClients. THIS is a LOCAL DEMO ONLY — public example values
# (well-known dex bcrypt for "password", the example app-secret); no real secrets.
#
# Login on https://dex.localhost.direct:  admin@localhost.direct / password
apiVersion: v1
kind: Secret
metadata:
  name: dex-config
  namespace: dex
type: Opaque
stringData:
  config.yaml: |
    issuer: https://dex.localhost.direct
    storage:
      type: memory
    web:
      http: 0.0.0.0:5556
    oauth2:
      skipApprovalScreen: true
    # local password DB (replaces the EntraID OIDC connector for offline tests)
    enablePasswordDB: true
    staticPasswords:
      - email: admin@localhost.direct
        # bcrypt of "password" — public dex example hash, NOT a real secret
        hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4"
        username: admin
        userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
    staticClients:
      # generic demo relying party
      - id: demo-app
        name: Demo App
        secret: ZXhhbXBsZS1hcHAtc2VjcmV0
        redirectURIs:
          - https://demo.localhost.direct/callback
          - http://localhost:5555/callback
      # kubelogin client (mirrors the prod roster; the LOCAL apiserver is not
      # OIDC-wired, so this is for shape/demo only — see seeder `task oidc:export`)
      - id: kubelogin
        name: kubectl (kubelogin)
        secret: a3ViZWxvZ2luLWxvY2FsLWRlbW8tc2VjcmV0
        redirectURIs:
          - http://localhost:8000
          - http://localhost:18000
