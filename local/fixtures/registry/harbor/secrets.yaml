# Secret spec for the local Harbor fixture — generated/literal at apply time.
# The DB password is NOT provided here — harbor reads it via values-override directly
# from the live CNPG secret harbor-pg-app (no stale mismatch, cf. crossview).
# Redis: Valkey runs anonymously → harbor-redis.REDIS_PASSWORD stays empty.
secrets:
  # admin login + global encryption key. HARBOR_ADMIN_PASSWORD must satisfy Harbor's
  # complexity (>=8, upper+lower+digit); secretKey must be EXACTLY 16 characters.
  - name: harbor-runtime-secret
    literals:
      HARBOR_ADMIN_PASSWORD: Harbor12345
      secretKey: 0123456789abcdef
  # Anonymous Valkey → empty password (key must exist: goharbor chart contract).
  - name: harbor-redis
    literals: {REDIS_PASSWORD: ""}
