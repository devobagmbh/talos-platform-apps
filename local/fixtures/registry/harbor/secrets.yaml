# Secret-Spec für die lokale Harbor-Fixture — generiert/literal zur Apply-Zeit.
# DB-Passwort wird NICHT hier geliefert — harbor liest es via values-override direkt
# aus dem lebenden CNPG-Secret harbor-pg-app (kein Stale-Mismatch, vgl. crossview).
# Redis: Valkey läuft anonym → harbor-redis.REDIS_PASSWORD bleibt leer.
secrets:
  # admin-Login + globaler Encryption-Key. HARBOR_ADMIN_PASSWORD muss Harbors
  # Komplexität erfüllen (>=8, Upper+Lower+Digit); secretKey muss EXAKT 16 Zeichen.
  - name: harbor-runtime-secret
    literals:
      HARBOR_ADMIN_PASSWORD: Harbor12345
      secretKey: 0123456789abcdef
  # Anonyme Valkey → leeres Passwort (Key muss existieren: goharbor-Chart-Contract).
  - name: harbor-redis
    literals: {REDIS_PASSWORD: ""}
