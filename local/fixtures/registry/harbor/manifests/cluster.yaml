# Local CNPG instance for Harbor — TEST ENVIRONMENT ONLY.
# In prod consumer-owned (seeder repo). CNPG creates Service harbor-pg-rw (Harbor's
# DB_HOST) + Secret harbor-pg-app (user=harbor, key password). The DB is named `registry`
# (Harbor's coreDatabase), owner `harbor` (Harbor's username) — see helm/harbor.yaml.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: harbor-pg
  namespace: harbor
spec:
  instances: 1
  storage:
    size: 2Gi
  bootstrap:
    initdb:
      database: registry
      owner: harbor
