# Lokale CNPG-Instanz für Harbor — NUR Test-Umgebung.
# In prod consumer-eigen (seeder-Repo). CNPG erzeugt Service harbor-pg-rw (harbors
# DB_HOST) + Secret harbor-pg-app (user=harbor, key password). DB heißt `registry`
# (harbors coreDatabase), Owner `harbor` (harbors username) — siehe helm/harbor.yaml.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: harbor-pg
  namespace: harbor
spec:
  instances: 1
  storage:
    size: 2Gi
  bootstrap:
    initdb:
      database: registry
      owner: harbor
