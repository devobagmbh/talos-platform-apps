# Local Valkey instance (Redis cache) for Harbor — TEST ENVIRONMENT ONLY.
# In prod consumer-owned. Creates Service harbor-cache:6379 (Harbor's redis.addr).
# anonymousAuth: true → no Redis password locally (harbor-redis stays empty, no
# copy/key mismatch). tls: false (Harbor speaks plain Redis). Default SC (local-path).
apiVersion: hyperspike.io/v1
kind: Valkey
metadata:
  name: harbor-cache
  namespace: harbor
spec:
  nodes: 1
  replicas: 0
  anonymousAuth: true
  tls: false
  prometheus: false
  serviceMonitor: false
  volumePermissions: true
  clusterDomain: cluster.local
  storage:
    spec:
      accessModes: ["ReadWriteOnce"]
      resources: { requests: { storage: 1Gi } }
