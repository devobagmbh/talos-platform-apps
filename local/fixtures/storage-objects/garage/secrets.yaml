# Secret spec for the local garage fixture — generated at apply time by
# task local:fixtures, no value in the repo. generateHex mints a 64-char hex
# (32-byte) value: the format garage's cluster rpc_secret requires (the upstream
# chart's own default is include "jupyterhub.randHex" 64). The init container reads
# it via secretKeyRef (key rpcSecret) and substitutes it into garage.toml.
# Idempotent: local:fixtures skips it if the Secret already exists, so a re-run does
# NOT rotate the rpc_secret out from under a running garage cluster.
secrets:
  - name: garage-runtime-secret
    generateHex: [rpcSecret]
