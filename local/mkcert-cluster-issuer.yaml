# ClusterIssuer with the mkcert root CA as the trust anchor.
# The Secret 'mkcert-ca' lives in the cert-manager namespace and is created by
# the Taskfile (task local:certs) during setup.
#
# Apps get certificates for *.localhost.direct via:
#   cert-manager.io/cluster-issuer: mkcert-ca

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: mkcert-ca
spec:
  ca:
    secretName: mkcert-ca
