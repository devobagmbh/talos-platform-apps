# ClusterIssuer mit der mkcert-Root-CA als Trust-Anker.
# Das Secret 'mkcert-ca' liegt im cert-manager-Namespace und wird vom
# Taskfile (task local:certs) beim Setup angelegt.
#
# Apps bekommen Certificates für *.localhost.direct via:
#   cert-manager.io/cluster-issuer: mkcert-ca

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: mkcert-ca
spec:
  ca:
    secretName: mkcert-ca
