# Bridge: imports the kind-registry Docker container into the cluster.
# The Docker container 'kind-registry' (see task local:registry:up) is
# mapped here as an external endpoint. Service DNS is
# kind-registry.registry.svc.cluster.local:5000.
# (The name 'kind-registry' is historic — it is a plain registry:2 container,
# not bound to the kind binary; kept for stable cert SANs/service DNS.)
#
# The IP placeholder ${KIND_REGISTRY_IP} is replaced by the Taskfile
# (task local:registry:bridge) via envsubst — the container's IP in the
# talos-platform-apps Docker network, determined via 'docker container inspect'.

---
apiVersion: v1
kind: Namespace
metadata:
  name: registry
  labels:
    platform.devoba.de/component: kind-registry
---
apiVersion: v1
kind: Service
metadata:
  name: kind-registry
  namespace: registry
spec:
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      protocol: TCP
---
# Manual endpoints (no selector → no pod discovery, just a static entry)
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: kind-registry
  namespace: registry
  labels:
    kubernetes.io/service-name: kind-registry
addressType: IPv4
endpoints:
  - addresses:
      - ${KIND_REGISTRY_IP}
ports:
  - name: registry
    port: 5000
    protocol: TCP
