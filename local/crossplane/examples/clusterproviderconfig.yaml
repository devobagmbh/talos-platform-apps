# Minimal ClusterProviderConfig for the local Crossplane test.
# The Composition references ClusterProviderConfig/opentofu-default — but the
# actual CR (with tofu backend + credentials) is CONSUMER-owned
# (seeder repo), NOT in the catalog. This one is only a local dummy so that
# provider-opentofu can resolve the config and gets as far as the real tofu attempt
# (which then, lacking a backend/hardware, expectedly fails = provider boundary).
# Empty spec → local state, no credentials.
apiVersion: opentofu.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: opentofu-default
spec: {}
