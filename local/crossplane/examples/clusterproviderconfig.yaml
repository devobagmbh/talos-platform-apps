# Minimale ClusterProviderConfig für den lokalen Crossplane-Test.
# Die Composition referenziert ClusterProviderConfig/opentofu-default — die
# eigentliche CR (mit tofu-Backend + Credentials) ist aber CONSUMER-eigen
# (seeder-Repo), NICHT im Katalog. Diese hier ist nur ein lokaler Dummy, damit
# provider-opentofu die Config auflösen kann und bis zum echten tofu-Versuch
# kommt (der dann mangels Backend/Hardware erwartbar fehlschlägt = Provider-Grenze).
# Leeres spec → local-state, keine Credentials.
apiVersion: opentofu.m.upbound.io/v1beta1
kind: ClusterProviderConfig
metadata:
  name: opentofu-default
spec: {}
