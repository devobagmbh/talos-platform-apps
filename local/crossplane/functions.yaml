# Function definitions for `crossplane render` (offline Composition test).
# crossplane render pulls these packages as OCI images and runs them as containers
# (Docker). Versions MUST match sub-layers/lifecycle/components/providers/
# (the Functions installed in the cluster) — otherwise you are testing something
# other than what runs in prod.
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-patch-and-transform:v0.10.6
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-auto-ready
spec:
  package: xpkg.upbound.io/crossplane-contrib/function-auto-ready:v0.6.5
