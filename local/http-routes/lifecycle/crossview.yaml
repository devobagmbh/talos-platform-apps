# Local HTTPRoute for the Crossview dashboard.
# In prod this route is consumer-owned (seeder repo, cluster-specific
# hostname — ADR-0023/0024 shape b); the catalog does NOT ship it. This file
# exists only for the local test environment, analogous to argocd-route.yaml.
#   Gateway 'localhost-direct' (NS gateway) → listener https (*.localhost.direct)
#     → HTTPRoute (host crossview.localhost.direct) → Service crossview-service:80
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crossview
  namespace: crossview
spec:
  parentRefs:
    - name: localhost-direct
      namespace: gateway
      sectionName: https
  hostnames:
    - crossview.localhost.direct
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: crossview-service
          port: 80
