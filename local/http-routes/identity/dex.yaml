# Local HTTPRoute for dex. In prod this route is consumer-owned (seeder repo,
# cluster-specific issuer host — ADR-0023/0024); the catalog does NOT ship it.
# This file exists only for the local test env (like crossview/harbor routes).
#   Gateway 'localhost-direct' (NS gateway) → listener https (*.localhost.direct)
#     → HTTPRoute (Host dex.localhost.direct) → Service dex:5556 (http)
#
# The Host MUST equal the dex issuer in the dex-config fixture
# (https://dex.localhost.direct) — OIDC discovery returns that issuer.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dex
  namespace: dex
spec:
  parentRefs:
    - name: localhost-direct
      namespace: gateway
      sectionName: https
  hostnames:
    - dex.localhost.direct
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dex
          port: 5556
