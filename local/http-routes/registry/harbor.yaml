# Lokale HTTPRoute für die Harbor-UI/-API.
# In prod ist diese Route consumer-eigen (seeder-Repo, cluster-spezifischer
# Hostname — ADR-0023/0024 Shape b); der Katalog shippt sie NICHT. Diese Datei
# existiert nur für die lokale Test-Umgebung, analog zu argocd-route.yaml.
#   Gateway 'localhost-direct' (NS gateway) → listener https (*.localhost.direct)
#     → HTTPRoute (Host harbor.localhost.direct) → Service harbor:80
# Harbor terminiert intern plain HTTP (expose.type=clusterIP, tls off) — TLS endet
# am Cilium-Gateway (mkcert-Wildcard).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor
spec:
  parentRefs:
    - name: localhost-direct
      namespace: gateway
      sectionName: https
  hostnames:
    - harbor.localhost.direct
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: harbor
          port: 80
