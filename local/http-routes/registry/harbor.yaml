# Local HTTPRoute for the Harbor UI/API.
# In prod this route is consumer-owned (seeder repo, cluster-specific
# hostname — ADR-0023/0024 shape b); the catalog does NOT ship it. This file
# exists only for the local test environment, analogous to argocd-route.yaml.
#   Gateway 'localhost-direct' (NS gateway) → listener https (*.localhost.direct)
#     → HTTPRoute (host harbor.localhost.direct) → Service harbor:80
# Harbor terminates plain HTTP internally (expose.type=clusterIP, tls off) — TLS ends
# at the Cilium Gateway (mkcert wildcard).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor
spec:
  parentRefs:
    - name: localhost-direct
      namespace: gateway
      sectionName: https
  hostnames:
    - harbor.localhost.direct
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: harbor
          port: 80
