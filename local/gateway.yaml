# Gateway API Gateway for local ingress routing.
# Cilium creates a Service for this Gateway, which the Taskfile
# patches to NodePort 30080/30443 after apply — the talosctl docker node
# forwards 80/443 from the host to it (-p 30080:30080/30443:30443).
#
# *.localhost.direct resolves to 127.0.0.1 (DNS provider).
# The TLS cert is issued by cert-manager with the mkcert CA ClusterIssuer;
# Secret 'gateway-localhost-direct-tls' in the same NS.
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: localhost-direct
  namespace: gateway
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.localhost.direct"
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.localhost.direct"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: gateway-localhost-direct-tls
      allowedRoutes:
        namespaces:
          from: All
---
# Wildcard certificate for *.localhost.direct via mkcert CA
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-localhost-direct-tls
  namespace: gateway
spec:
  secretName: gateway-localhost-direct-tls
  issuerRef:
    kind: ClusterIssuer
    name: mkcert-ca
  commonName: "*.localhost.direct"
  dnsNames:
    - "*.localhost.direct"
    - "localhost.direct"
  duration: 2160h    # 90 days
  renewBefore: 360h  # renew 15 days before expiry
