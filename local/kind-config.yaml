# Kind-Cluster für lokale Sub-Layer-Entwicklung — prod-konform (Cilium-CNI +
# Gateway-API, wie DHQ-Cluster laut ADR-0014 + ADR-0009).
#
# - kindnet deaktiviert: Cilium übernimmt CNI
# - kube-proxy deaktiviert: Cilium übernimmt via kubeProxyReplacement
# - extraPortMappings 30080→80, 30443→443: Cilium-Gateway-Service ist NodePort,
#   Kind reicht Host-Ports auf den Container durch
# - Containerd-Patch für die lokale OCI-Registry localhost:5001

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: talos-platform-apps

networking:
  disableDefaultCNI: true   # kindnet aus
  kubeProxyMode: none       # kube-proxy aus

containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Host 80 → Container 30080 → Cilium-Gateway-NodePort (HTTP)
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # Host 443 → Container 30443 → Cilium-Gateway-NodePort (HTTPS)
      - containerPort: 30443
        hostPort: 443
        protocol: TCP
