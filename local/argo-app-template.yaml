# Argo-Application-Template für einen lokalen Sub-Layer-Test.
# Wird vom Taskfile via envsubst (oder yq) gepatched:
#   ${SUB_LAYER}   — Sub-Layer-Name (z. B. lifecycle)
#   ${TAG}         — Helm-Chart-Version (z. B. 0.0.0-dev)
#   ${REGISTRY}    — OCI-Registry-URL ohne Schema (z. B. kind-registry:5000)
#   ${NAMESPACE}   — Ziel-Namespace im Cluster (z. B. crossplane-system)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${SUB_LAYER}-local
  namespace: argocd
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: ${SUB_LAYER}
spec:
  project: default

  source:
    # ${REGISTRY} = kind-registry.registry.svc.cluster.local:5000/talos-platform-apps.
    # Ohne oci://-Schema, damit Argo die App ans registrierte Helm-Repository
    # (configs.repositories.kind-registry-local in argocd-values.yaml) matched und
    # den OCI-Code-Pfad nutzt — sonst landet 'helm pull --repo oci://...' im
    # Helm-3.x-deprecated-Pattern und scheitert mit "object required".
    repoURL: ${REGISTRY}
    chart: ${SUB_LAYER}
    targetRevision: ${TAG}
    helm:
      releaseName: ${SUB_LAYER}

  destination:
    server: https://kubernetes.default.svc
    namespace: ${NAMESPACE}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
