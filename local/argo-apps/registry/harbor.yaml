# Argo Application for registry/harbor (local test environment).
# Template placeholders (envsubst via task local:apply / local:dev):
#   ${TAG}       — chart version (e.g. 0.0.0-dev or 0.0.0-dev.<epoch>)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: registry-harbor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: registry
    platform.devoba.de/component: harbor
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/registry/harbor
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor

  # K8s 1.32+ has .status.terminatingReplicas in Deployment.status; Argo's
  # structured-merge-diff caches the old OpenAPI schema and cannot type the
  # field → "field not declared in schema". Ignoring is safe, because
  # status fields are not managed by Argo anyway.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    # harbor-trivy StatefulSet: the kube-controller-manager defaults volumeMode +
    # status into the volumeClaimTemplates, which the rendered manifest does not have.
    # volumeClaimTemplates are immutable → Argo can never reconcile the diff →
    # permanently OutOfSync (health stays Healthy). Ignoring is safe.
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - '.spec.volumeClaimTemplates[]?.metadata.annotations'
        - '.spec.volumeClaimTemplates[]?.spec.volumeMode'
        - '.spec.volumeClaimTemplates[]?.status'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
