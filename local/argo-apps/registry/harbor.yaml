# Argo-Application für registry/harbor (lokale Test-Umgebung).
# Template-Platzhalter (envsubst durch task local:apply / local:dev):
#   ${TAG}       — Chart-Version (z. B. 0.0.0-dev oder 0.0.0-dev.<epoch>)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: registry-harbor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: registry
    platform.devoba.de/component: harbor
spec:
  project: default
  source:
    repoURL: ${REGISTRY}/registry
    chart: harbor
    targetRevision: ${TAG}
    helm:
      releaseName: harbor
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor

  # K8s 1.32+ hat .status.terminatingReplicas in Deployment.status; Argos
  # structured-merge-diff cached das alte OpenAPI-Schema und kann das Feld
  # nicht typisieren → "field not declared in schema". Ignorieren ist sicher,
  # weil status-Felder eh nicht durch Argo verwaltet werden.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    # harbor-trivy StatefulSet: der kube-controller-manager defaultet volumeMode +
    # status in die volumeClaimTemplates, die das gerenderte Manifest nicht hat.
    # volumeClaimTemplates sind immutable → Argo kann den Diff nie reconcilen →
    # dauerhaft OutOfSync (Health bleibt Healthy). Ignorieren ist sicher.
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - '.spec.volumeClaimTemplates[]?.metadata.annotations'
        - '.spec.volumeClaimTemplates[]?.spec.volumeMode'
        - '.spec.volumeClaimTemplates[]?.status'

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
