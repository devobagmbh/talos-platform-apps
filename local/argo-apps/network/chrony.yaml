# Argo Application for network/chrony (local test environment).
# Bespoke in-cluster chrony NTP server: Deployment + LoadBalancer Service on
# 123/UDP. Ships its own dedicated `chrony` namespace
# (pod-security.kubernetes.io/enforce: restricted); no CRDs (strict-B N/A).
# The workload mounts an EXISTING consumer-supplied `chrony-config` ConfigMap
# (key chrony.conf) — the local test seeds a minimal serve-only one before this
# app syncs (the catalog ships NO chrony.conf; config is consumer-owned).
# Template placeholders (envsubst via task local:apply / local:dev):
#   ${TAG}       — chart version (e.g. 0.0.0-dev or 0.0.0-dev.<epoch>)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-chrony
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: network
    platform.devoba.de/component: chrony
spec:
  project: default
  source:
    repoURL: ${REGISTRY}/network
    chart: chrony
    targetRevision: ${TAG}
    helm:
      releaseName: chrony
  destination:
    server: https://kubernetes.default.svc
    namespace: chrony
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # The artifact ships its own labelled Namespace (sole-claimant rule); Argo
      # applies Namespaces before namespaced resources, so the PSA label lands
      # before any pod. CreateNamespace=true is a harmless belt-and-suspenders.
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
