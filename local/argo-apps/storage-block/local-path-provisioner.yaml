# Argo Application for storage-block/local-path-provisioner (local test environment).
# Template placeholders (envsubst by task local:apply / local:dev):
#   ${TAG}       — chart version (e.g. 0.0.0-dev)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage-block-local-path-provisioner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: storage-block
    platform.devoba.de/component: local-path-provisioner
spec:
  project: default
  source:
    repoURL: ${REGISTRY}/storage-block
    chart: local-path-provisioner
    targetRevision: ${TAG}
    helm:
      releaseName: local-path-provisioner
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage

  # K8s 1.32+ has .status.terminatingReplicas in Deployment.status; Argo's
  # structured-merge-diff caches the old OpenAPI schema and cannot type the
  # field -> "field not declared in schema". Ignoring is safe (status fields
  # are not Argo-managed).
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
