# Argo Application for secrets/vault-config-operator-crds (local test environment).
# Strict-B CRDs half (ADR-0028): the 47 redhatcop.redhat.io CRDs ship as their own
# OCI artifact, synced at sync-wave -1 ahead of the vault-config-operator workload
# (wave 1).
# Template placeholders (envsubst via task local:apply / local:dev):
#   ${TAG}       — chart version (e.g. 0.0.0-dev or 0.0.0-dev.<epoch>)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-vault-config-operator-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: secrets
    platform.devoba.de/component: vault-config-operator-crds
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/secrets/vault-config-operator-crds
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-config-operator

  syncPolicy:
    # Strict-B (ADR-0028) CR-cascade protection: CRDs are never pruned on a
    # source-delete, so removing the artifact does not garbage-collect live
    # redhatcop.redhat.io CRs (Policy/SecretEngineMount/VaultSecret/…).
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Prune=false is the ADR-0028 *authoritative* CR-cascade protection: unlike
      # automated.prune:false above (which only suppresses automated cycles), this
      # syncOption blocks pruning on BOTH automated and manual sync-with-prune, so a
      # UI "Sync + Prune" cannot garbage-collect live redhatcop.redhat.io CRs.
      - Prune=false
      # ServerSideApply clears the 262 KB client-side annotation limit on the
      # large redhatcop.redhat.io CRDs.
      - ServerSideApply=true
      - ServerSideDiff=true
