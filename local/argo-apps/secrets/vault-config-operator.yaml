# Argo Application for secrets/vault-config-operator (local test environment).
# Strict-B workload half (ADR-0028): the operator CONTROLLER only — no
# redhatcop.redhat.io CRs; the CRDs come from the separate
# vault-config-operator-crds artifact (sync-wave -1). Wave 1 (not 0): the
# admission-webhook TLS needs cert-manager (wave 0) fully Healthy first.
# Template placeholders (envsubst via task local:apply / local:dev):
#   ${TAG}       — chart version (e.g. 0.0.0-dev or 0.0.0-dev.<epoch>)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-vault-config-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: secrets
    platform.devoba.de/component: vault-config-operator
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/secrets/vault-config-operator
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-config-operator

  # K8s 1.32+ adds .status.terminatingReplicas to Deployment.status; Argo's
  # structured-merge-diff caches the old OpenAPI schema and cannot type the
  # field ("field not declared in schema"). Ignoring is safe — status fields
  # are not Argo-managed.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
