# Argo-Application für identity/dex (lokale Test-Umgebung).
# Template-Platzhalter (envsubst durch task local:apply / local:dev):
#   ${TAG}       — Chart-Version (z. B. 0.0.0-dev oder 0.0.0-dev.<epoch>)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: identity-dex
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: identity
    platform.devoba.de/component: dex
spec:
  project: default
  source:
    repoURL: ${REGISTRY}/identity
    chart: dex
    targetRevision: ${TAG}
    helm:
      releaseName: dex
  destination:
    server: https://kubernetes.default.svc
    namespace: dex

  # K8s 1.32+ hat .status.terminatingReplicas in Deployment.status; Argos
  # structured-merge-diff cached das alte OpenAPI-Schema → "field not declared in
  # schema". Ignorieren ist sicher (status-Felder verwaltet Argo eh nicht).
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
