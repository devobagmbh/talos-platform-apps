# Argo Application for identity/dex (local test environment).
# Template placeholders (envsubst via task local:apply / local:dev):
#   ${TAG}       — chart version (e.g. 0.0.0-dev or 0.0.0-dev.<epoch>)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: identity-dex
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: identity
    platform.devoba.de/component: dex
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/identity/dex
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: dex

  # K8s 1.32+ has .status.terminatingReplicas in Deployment.status; Argo's
  # structured-merge-diff caches the old OpenAPI schema → "field not declared in
  # schema". Ignoring is safe (Argo does not manage status fields anyway).
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
