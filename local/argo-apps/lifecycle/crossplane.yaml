# Argo-Application für lifecycle/crossplane.
# Sync-Wave 0: bringt die pkg.crossplane.io- und apiextensions.crossplane.io-CRDs
# mit, die alle anderen lifecycle-Komponenten als Voraussetzung haben.
# Template-Platzhalter (envsubst durch task local:apply):
#   ${TAG}       — Chart-Version (z. B. 0.0.0-dev)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-crossplane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: crossplane
spec:
  project: default
  source:
    repoURL: ${REGISTRY}/lifecycle
    chart: crossplane
    targetRevision: ${TAG}
    helm:
      releaseName: crossplane
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
