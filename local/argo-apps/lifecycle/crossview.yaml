# Argo Application for lifecycle/crossview (local test environment).
# Template placeholders (envsubst via task local:apply / local:dev):
#   ${TAG}       — chart version (e.g. 0.0.0-dev or 0.0.0-dev.<epoch>)
#   ${REGISTRY}  — kind-registry.registry.svc.cluster.local:5000/talos-platform-apps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-crossview
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: crossview
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/lifecycle/crossview
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: crossview

  # K8s 1.32+ has .status.terminatingReplicas in Deployment.status; Argo's
  # structured-merge-diff caches the old OpenAPI schema and cannot type the
  # field → "field not declared in schema". Ignoring is safe, because
  # status fields are not managed by Argo anyway.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
