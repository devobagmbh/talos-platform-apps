# Argo Application for lifecycle/providers.
# Sync-Wave 10: needs the pkg.crossplane.io/Provider CRD from crossplane (Wave 0).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-providers
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: providers
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/lifecycle/providers
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system

  # K8s 1.32+ has .status.terminatingReplicas in Deployment.status; Argo's
  # structured-merge-diff caches the old OpenAPI schema and cannot type the
  # field → "field not declared in schema". Ignoring is safe, because
  # status fields are not managed by Argo anyway.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
