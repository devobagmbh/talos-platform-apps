# Argo Application for lifecycle/ipxe.
# Sync-Wave 0: independent — can run in parallel with crossplane.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-ipxe
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: ipxe
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/lifecycle/ipxe
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: ipxe

  # K8s 1.32+ has .status.terminatingReplicas in Deployment.status; Argo's
  # structured-merge-diff caches the old OpenAPI schema and cannot type the
  # field → "field not declared in schema". Ignoring is safe, because
  # status fields are not managed by Argo anyway.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    # boot.ipxe is consumer/test-specific: locally the fixture
    # (local/fixtures/lifecycle/ipxe/) provides the real boot.ipxe via the harbor Talos image.
    # Without this ignore, selfHeal would reset it to the catalog placeholder.
    - group: ""
      kind: ConfigMap
      name: ipxe-boot-scripts
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
