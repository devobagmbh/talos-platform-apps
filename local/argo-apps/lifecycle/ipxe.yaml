# Argo-Application für lifecycle/ipxe.
# Sync-Wave 0: unabhängig — kann parallel zu crossplane laufen.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-ipxe
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: ipxe
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/lifecycle/ipxe
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: ipxe

  # K8s 1.32+ hat .status.terminatingReplicas in Deployment.status; Argos
  # structured-merge-diff cached das alte OpenAPI-Schema und kann das Feld
  # nicht typisieren → "field not declared in schema". Ignorieren ist sicher,
  # weil status-Felder eh nicht durch Argo verwaltet werden.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas
    # boot.ipxe ist consumer-/test-eigen: lokal liefert die Fixture
    # (local/fixtures/lifecycle/ipxe/) die echte boot.ipxe via harbor-Talos-Image.
    # Ohne dieses Ignore würde selfHeal sie auf den Katalog-Platzhalter zurücksetzen.
    - group: ""
      kind: ConfigMap
      name: ipxe-boot-scripts
      jsonPointers:
        - /data

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
