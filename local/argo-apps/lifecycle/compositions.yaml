# Argo-Application für lifecycle/compositions.
# Sync-Wave 20: braucht apiextensions.crossplane.io/{CompositeResourceDefinition,
# Composition}-CRDs aus crossplane (Wave 0) UND aktive Provider-Pods aus
# providers (Wave 10), damit Composition-Pipeline-Steps Workspace/Release
# ausführbar sind.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-compositions
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: compositions
spec:
  project: default
  source:
    repoURL: ${REGISTRY}/lifecycle
    chart: compositions
    targetRevision: ${TAG}
    helm:
      releaseName: compositions
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
