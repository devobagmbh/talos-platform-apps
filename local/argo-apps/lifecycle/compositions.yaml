# Argo Application for lifecycle/compositions.
# Sync-Wave 20: needs the apiextensions.crossplane.io/{CompositeResourceDefinition,
# Composition} CRDs from crossplane (Wave 0) AND active provider pods from
# providers (Wave 10), so that Composition pipeline steps can run
# Workspace/Release.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-compositions
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: compositions
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/lifecycle/compositions
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system

  # K8s 1.32+ has .status.terminatingReplicas in Deployment.status; Argo's
  # structured-merge-diff caches the old OpenAPI schema and cannot type the
  # field → "field not declared in schema". Ignoring is safe, because
  # status fields are not managed by Argo anyway.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
