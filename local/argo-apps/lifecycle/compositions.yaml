# Argo-Application für lifecycle/compositions.
# Sync-Wave 20: braucht apiextensions.crossplane.io/{CompositeResourceDefinition,
# Composition}-CRDs aus crossplane (Wave 0) UND aktive Provider-Pods aus
# providers (Wave 10), damit Composition-Pipeline-Steps Workspace/Release
# ausführbar sind.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-compositions
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  labels:
    platform.devoba.de/local-test: "true"
    platform.devoba.de/sub-layer: lifecycle
    platform.devoba.de/component: compositions
spec:
  project: default
  source:
    repoURL: oci://${REGISTRY}/lifecycle/compositions
    targetRevision: ${TAG}
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system

  # K8s 1.32+ hat .status.terminatingReplicas in Deployment.status; Argos
  # structured-merge-diff cached das alte OpenAPI-Schema und kann das Feld
  # nicht typisieren → "field not declared in schema". Ignorieren ist sicher,
  # weil status-Felder eh nicht durch Argo verwaltet werden.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status/terminatingReplicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ServerSideDiff=true
