# HTTPRoute leitet argocd.localhost.direct an den ArgoCD-Server-Service.
# Ressourcen-Verknüpfung:
#   Gateway 'localhost-direct' (NS: gateway)
#     → listener https (443, *.localhost.direct, mkcert-TLS)
#       → HTTPRoute argocd (Match: Host argocd.localhost.direct)
#         → Service argocd-server (NS: argocd, Port 443)

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: localhost-direct
      namespace: gateway
      sectionName: https
  hostnames:
    - argocd.localhost.direct
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 443
