# Local Helm values overlay for Harbor — LOCAL TEST ENVIRONMENT ONLY.
# Passed by local:dev / local:publish via EXTRA_VALUES to `task render:one`
# (a later --values wins). CI/prod renders WITHOUT this overlay and
# keeps the externalURL placeholder from helm/harbor.yaml (in prod the
# consumer patches the real cluster URL, ADR-0023/0024 shape b).
#
# externalURL bakes Harbor into the core ConfigMap as EXT_ENDPOINT → generated
# links / docker push commands / OIDC redirects point locally to the Gateway host.
externalURL: https://harbor.localhost.direct

# Locally read the DB password directly from CNPG's LIVE harbor-pg-app instead of a
# copy (harbor-db) — otherwise the copy goes stale as soon as the CNPG instance is
# recreated (cf. crossview). harbor-pg-app has key `password` (= chart expectation).
# Local only: in prod the consumer provides harbor-db (shape c, ADR-0023/0024).
database:
  external:
    existingSecret: harbor-pg-app
