# Local Helm values overlay for Crossview — LOCAL TEST ENVIRONMENT ONLY.
# Passed by local:dev / local:publish via EXTRA_VALUES to `task render:one`
# (a later --values wins). CI/prod renders WITHOUT this overlay and
# keeps the placeholder from helm/crossview.yaml (in prod the consumer provides
# host/CORS + Dex OIDC, ADR-0023/0024 shape b).
#
# CORS origin = post-SSO login redirect target + allowed browser origin. Locally
# set to the Gateway host so the UI works behind https://crossview.localhost.direct
# (instead of localhost:5173).
config:
  server:
    cors:
      origin: https://crossview.localhost.direct

# Read the DB password directly from CNPG's LIVE auto-secret <cluster>-app, instead of
# from a copy (crossview-db). The copy goes stale as soon as the CNPG instance is
# recreated across a local:dev cycle (new password) → "password authentication
# failed". CNPG always keeps username/password in crossview-pg-app up to date.
# Local only: in prod the consumer provides crossview-db (shape c, ADR-0023/0024).
secrets:
  dbPassword:
    secretKeyRef:
      name: crossview-pg-app
      key: password
