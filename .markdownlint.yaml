---
# markdownlint-cli Config — pragmatische Regeln für die Devoba-Plattform-Doku.
default: true

# Line length deaktivieren — wir nutzen Tabellen + Mermaid-Diagramme.
MD013: false

# Mehrfache H2/H3 mit gleichem Text erlaubt (z. B. wiederkehrende Sub-Sections).
MD024: false

# Inline-HTML erlaubt (Mermaid-Code-Blöcke, ggf. <details>-Blöcke).
MD033: false

# Erste Zeile muss kein H1 sein (wir nutzen frontmatter teilweise).
MD041: false

# Code-Sprachen sind optional (Tabellen-Header lassen sich nicht immer typisieren).
MD040: false

# Tabellen-Pipe-Spacing (table-column-style) — neue markdownlint-Regel ab v0.38.
# Rein kosmetisch; unsere Tabellen nutzen kompakte |---|-Separatoren bewusst.
MD060: false

# OKF-Konzepte im knowledge/-Bundle tragen sowohl einen Frontmatter-`title:`
# (fürs openknowledge-Tooling) als auch eine Body-H1 (für Leser + verbatim
# migrierte Records). Frontmatter-`title:` NICHT als H1 zählen — sonst meldet
# MD025 die Body-H1 als doppelten Titel. Die "genau eine H1 im Body"-Prüfung
# bleibt aktiv. Kein bestehendes Nicht-Bundle-.md trägt Frontmatter, daher
# ändert dies deren Linting nicht.
MD025:
  front_matter_title: ""
