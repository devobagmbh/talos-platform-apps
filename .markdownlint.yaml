---
# markdownlint-cli config — pragmatic rules for the Devoba platform docs.
default: true

# Disable line length — we use tables + Mermaid diagrams.
MD013: false

# Multiple H2/H3 with the same text allowed (e.g. recurring sub-sections).
MD024: false

# Inline HTML allowed (Mermaid code blocks, possibly <details> blocks).
MD033: false

# The first line does not have to be an H1 (we partly use frontmatter).
MD041: false

# Code languages are optional (table headers cannot always be typed).
MD040: false

# Table pipe spacing (table-column-style) — new markdownlint rule as of v0.38.
# Purely cosmetic; our tables deliberately use compact |---| separators.
MD060: false

# OKF concepts in the knowledge/ bundle carry both a frontmatter `title:`
# (for the openknowledge tooling) and a body H1 (for readers + verbatim
# migrated records). Do NOT count the frontmatter `title:` as an H1 — otherwise
# MD025 reports the body H1 as a duplicate title. The "exactly one H1 in the body"
# check stays active. No existing non-bundle .md carries frontmatter, so this
# does not change their linting.
MD025:
  front_matter_title: ""
